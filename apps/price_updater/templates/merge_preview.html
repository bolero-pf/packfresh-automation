<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Merge Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/pf-static/pf_theme.css">
    <script src="/pf-static/pf_ui.js"></script>
    <style>
        body { padding: 24px; max-width: 900px; margin: 0 auto; }
        h2 { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 16px; }
        .merge-actions { display: flex; gap: 12px; margin-top: 16px; }
        .merge-actions button { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-family: var(--font-sans); font-weight: 600; font-size: 0.85rem; color: #fff; }
        .btn-keep-left { background: #22c55e; }
        .btn-keep-left:hover { opacity: 0.9; }
        .btn-keep-right { background: var(--accent); }
        .btn-keep-right:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h2>Merge Preview</h2>
    <form method="post" action="/commit_merge?q={{ search }}">
        <input type="hidden" name="row1_index" value="{{ row1_index }}">
        <input type="hidden" name="row2_index" value="{{ row2_index }}">

        <div class="merge-actions">
            <button name="keep" value="left" class="btn-keep-left">Keep Left ({{ row1["name"] }})</button>
            <button name="keep" value="right" class="btn-keep-right">Keep Right ({{ row2["name"] }})</button>
        </div>
    </form>
</body>
</html>
