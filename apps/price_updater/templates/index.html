<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Reconciliation</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/pf-static/pf_theme.css">
    <script src="/pf-static/pf_ui.js"></script>
    <style>
        body { padding: 24px; max-width: 1400px; margin: 0 auto; }
        h2 { font-size: 1.1rem; color: var(--text-dim); margin-bottom: 16px; }
        .dataframe { width: 100%; border-collapse: collapse; }
        .dataframe th, .dataframe td { border: 1px solid var(--border); padding: 8px; text-align: left; vertical-align: top; }
        .dataframe th { background: var(--surface); color: var(--text-dim); font-weight: 600; }
    </style>
</head>
<body>
    <h2>Inventory Reconciliation</h2>
    {% for table in tables %}
        {{ table|safe }}
    {% endfor %}
</body>
</html>
