<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Price Check · Pack Fresh</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/pf-static/pf_theme.css">
<script src="/pf-static/pf_ui.js"></script>
<style>
body {
  background: var(--bg, #0d0e10);
  color: var(--text, #e7e8ea);
  font-family: 'DM Sans', system-ui, sans-serif;
  margin: 0; min-height: 100vh;
  padding: 24px;
  box-sizing: border-box;
}
.pc-card {
  width: 100%; max-width: 720px;
  margin: 5vh auto;
  background: var(--surface, #16181c);
  border: 1.5px solid var(--border, #2a2d33);
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  box-sizing: border-box;
}
.pc-title {
  font-size: 1.6rem; font-weight: 700;
  margin: 0 0 4px;
}
.pc-sub {
  color: var(--dim, #8a8e98);
  font-size: 0.95rem; margin-bottom: 24px;
}
.pc-input-wrap {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface-2, #1d2026);
  border: 2px dashed var(--accent, #4f7df9);
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 22px;
}
.pc-input-wrap .pc-icon { font-size: 2rem; }
.pc-input-wrap input {
  flex: 1; background: transparent; border: 0; outline: 0;
  color: var(--text, #e7e8ea);
  font-size: 1.15rem; font-family: 'DM Mono', monospace;
}
.pc-input-wrap input::placeholder { color: var(--dim, #8a8e98); }

.pc-result {
  display: none; gap: 22px;
  background: var(--surface-2, #1d2026);
  border: 1.5px solid var(--border, #2a2d33);
  border-radius: 12px;
  padding: 22px;
  align-items: stretch;
}
.pc-result.show { display: flex; }
.pc-img {
  width: 200px; min-width: 200px;
  aspect-ratio: 2.5/3.5;
  border-radius: 10px;
  background: var(--surface, #16181c);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.pc-img img { width: 100%; height: 100%; object-fit: contain; }
.pc-img.sealed { aspect-ratio: 1; }
.pc-img .no-img { font-size: 4rem; opacity: 0.2; }
.pc-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
.pc-name { font-size: 1.45rem; font-weight: 700; line-height: 1.25; }
.pc-meta { color: var(--dim, #8a8e98); font-size: 0.95rem; }
.pc-meta span { margin-right: 10px; }
.pc-price {
  font-family: 'DM Mono', monospace;
  font-size: 2.6rem; font-weight: 700;
  color: var(--green, #4ade80);
  margin-top: 10px;
}
.pc-source {
  font-size: 0.72rem; color: var(--dim, #8a8e98);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-top: 6px;
}
.pc-empty {
  text-align: center; padding: 60px 20px;
  color: var(--dim, #8a8e98);
}
.pc-empty .icon { font-size: 3rem; opacity: 0.3; margin-bottom: 10px; }

.pc-list { display: grid; gap: 10px; }
.pc-list-head {
  font-size: 0.72rem; color: var(--dim, #8a8e98);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.pc-row {
  display: flex; gap: 14px; align-items: center;
  background: var(--surface-2, #1d2026);
  border: 1.5px solid var(--border, #2a2d33);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.pc-row:hover { border-color: var(--accent, #4f7df9); background: var(--surface, #16181c); }
.pc-row-img {
  width: 56px; min-width: 56px; height: 78px;
  background: var(--surface, #16181c);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.pc-row-img.sealed { aspect-ratio: 1; height: auto; width: 64px; min-width: 64px; }
.pc-row-img img { width: 100%; height: 100%; object-fit: contain; }
.pc-row-img .no-img { font-size: 1.6rem; opacity: 0.3; }
.pc-row-info { flex: 1; min-width: 0; }
.pc-row-title { font-weight: 600; font-size: 1rem; line-height: 1.25; }
.pc-row-meta { font-size: 0.78rem; color: var(--dim, #8a8e98); margin-top: 2px; }
.pc-row-price {
  font-family: 'DM Mono', monospace;
  font-size: 1.3rem; font-weight: 700;
  color: var(--green, #4ade80);
  white-space: nowrap;
}

@media (max-width: 600px) {
  .pc-result { flex-direction: column; align-items: center; text-align: center; }
  .pc-img { width: 60vw; max-width: 220px; min-width: 0; }
  .pc-info { align-items: center; }
}

/* Touch/tablet bigger taps */
@media (max-width: 900px) {
  .pc-input-wrap input { font-size: 1.4rem; padding: 8px 0; }
  .pc-input-wrap { padding: 22px 26px; }
}

.pc-rails {
  margin-top: 28px;
  display: grid;
  gap: 22px;
}
.pc-rail-head {
  display: flex; align-items: baseline; justify-content: space-between;
  font-size: 0.72rem; color: var(--dim, #8a8e98);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.pc-rail-head .pc-rail-title { font-weight: 700; color: var(--text, #e7e8ea); letter-spacing: 0.06em; }
.pc-rail-head .pc-rail-empty { color: var(--dim, #8a8e98); font-style: italic; text-transform: none; letter-spacing: 0; }
.pc-rail {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}
.pc-tile {
  background: var(--surface-2, #1d2026);
  border: 1.5px solid var(--border, #2a2d33);
  border-radius: 10px;
  padding: 10px;
  display: flex; flex-direction: column; gap: 6px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  text-align: left;
  min-width: 0;
}
.pc-tile:hover { border-color: var(--accent, #4f7df9); transform: translateY(-1px); }
.pc-tile-img {
  aspect-ratio: 3/4;
  background: var(--surface, #16181c);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.pc-tile-img.sealed { aspect-ratio: 1; }
.pc-tile-img img { width: 100%; height: 100%; object-fit: contain; }
.pc-tile-img .no-img { font-size: 1.6rem; opacity: 0.3; }
.pc-tile-name {
  font-size: 0.82rem; font-weight: 600; line-height: 1.2;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.pc-tile-price {
  font-family: 'DM Mono', monospace;
  font-size: 0.95rem; font-weight: 700;
  color: var(--green, #4ade80);
}
.pc-tile-meta {
  font-size: 0.68rem; color: var(--dim, #8a8e98);
  display: flex; gap: 6px;
}
</style>
</head>
<body>
<div class="pc-card">
  <div class="pc-title">Price Check</div>
  <div class="pc-sub">Scan any Pack Fresh barcode or sealed product to see its current store price.</div>

  <div class="pc-input-wrap">
    <span class="pc-icon">🔍</span>
    <input id="pc-input"
           placeholder="Scan a barcode or type a card / product name…"
           autocomplete="off"
           autocorrect="off"
           autocapitalize="off"
           spellcheck="false"
           inputmode="text">
  </div>

  <div id="pc-result" class="pc-result"></div>
  <div id="pc-list" class="pc-list" style="display:none;"></div>
  <div id="pc-empty" class="pc-empty">
    <div class="icon">🃏</div>
    <p>Scan a barcode, or type a card / product name to look up.</p>
  </div>

  <div id="pc-rails" class="pc-rails" style="display:none;">
    <div id="pc-hot-section" style="display:none;">
      <div class="pc-rail-head">
        <span class="pc-rail-title">🔥 Hot right now</span>
      </div>
      <div id="pc-hot" class="pc-rail"></div>
    </div>
    <div id="pc-recent-section" style="display:none;">
      <div class="pc-rail-head">
        <span class="pc-rail-title">↻ Recently checked</span>
      </div>
      <div id="pc-recent" class="pc-rail"></div>
    </div>
  </div>
</div>

<script>
const inp = document.getElementById('pc-input');
const resultEl = document.getElementById('pc-result');
const listEl   = document.getElementById('pc-list');
const emptyEl  = document.getElementById('pc-empty');
const railsEl  = document.getElementById('pc-rails');
const hotEl    = document.getElementById('pc-hot');
const hotSect  = document.getElementById('pc-hot-section');
const recentEl = document.getElementById('pc-recent');
const recentSect = document.getElementById('pc-recent-section');

// Stable per-browser id so "recently checked" follows the device, not
// the customer. Survives reloads. Generated once + stashed in
// localStorage — wrapped in try/catch because private-window iOS can
// throw on localStorage access.
function getDeviceId() {
  try {
    let id = localStorage.getItem('pf_pc_device');
    if (!id) {
      id = 'd_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
      localStorage.setItem('pf_pc_device', id);
    }
    return id;
  } catch (_) {
    return null;
  }
}
const DEVICE_ID = getDeviceId();
let LAST_LOGGED_KEY = null;  // throttle dup logs of the same result

function focusInput() { try { inp.focus(); } catch(e) {} }
focusInput();
window.addEventListener('focus', focusInput);
// Re-focus aggressively — kiosk-style. Tap anywhere outside a button or
// a result row sends focus back to the scanner input. Don't steal focus
// when the user is clicking a clickable result.
document.addEventListener('click', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.target.closest('.pc-row, .pc-tile')) return;
  setTimeout(focusInput, 0);
});

function fmtPrice(p) {
  if (p === null || p === undefined) return '—';
  const n = parseFloat(p);
  if (!isFinite(n)) return '—';
  return '$' + n.toFixed(2);
}

function fmtPriceRange(min, max) {
  if (min === null || min === undefined) return '—';
  const lo = parseFloat(min);
  const hi = parseFloat(max);
  if (isFinite(hi) && hi > lo + 0.001) {
    return '$' + lo.toFixed(2) + ' – $' + hi.toFixed(2);
  }
  return fmtPrice(min);
}

function clearAll() {
  resultEl.classList.remove('show');
  listEl.style.display = 'none';
  listEl.innerHTML = '';
  emptyEl.style.display = 'none';
}

function updateRailsVisibility() {
  // Rails sit below the primary content. Hide them while the search
  // list is up — it's already filling the same role — and show them
  // otherwise (empty state OR a single result with room below).
  const listShown = listEl.style.display !== 'none';
  railsEl.style.display = listShown ? 'none' : '';
}

function showEmpty() {
  clearAll();
  emptyEl.style.display = 'block';
  updateRailsVisibility();
}

function showResult(data, originalInput) {
  clearAll();

  const isRaw = data.kind === 'raw';
  const imgClass = isRaw ? '' : 'sealed';
  const img = data.image_url
    ? '<img src="' + esc(data.image_url) + '" alt="">'
    : '<div class="no-img">' + (isRaw ? '🃏' : '📦') + '</div>';

  const meta = [];
  if (data.set_name)  meta.push('<span>' + esc(data.set_name) + '</span>');
  if (data.condition) meta.push('<span>· ' + esc(data.condition) + '</span>');
  // Search results ship a `conditions` array (e.g. ["NM","LP"]); show the list
  // when no single condition was selected (i.e. typed-name lookup).
  if (!data.condition && Array.isArray(data.conditions) && data.conditions.length) {
    meta.push('<span>· ' + esc(data.conditions.join(' / ')) + '</span>');
  }
  if (data.qty && data.qty > 1) {
    meta.push('<span>· ' + data.qty + ' in stock</span>');
  }

  const priceStr = (data.price_max !== undefined && data.price_max !== null)
    ? fmtPriceRange(data.price, data.price_max)
    : fmtPrice(data.price);

  resultEl.innerHTML =
    '<div class="pc-img ' + imgClass + '">' + img + '</div>' +
    '<div class="pc-info">' +
      '<div class="pc-name">' + esc(data.title) + '</div>' +
      (meta.length ? '<div class="pc-meta">' + meta.join(' ') + '</div>' : '') +
      '<div class="pc-price">' + priceStr + '</div>' +
      '<div class="pc-source">' + esc(data.source_label) + '</div>' +
    '</div>';
  resultEl.classList.add('show');
  updateRailsVisibility();
  logLookup(data, originalInput);
}

function logLookup(data, originalInput) {
  // Best-effort lookup log. Identifier prefers a stable key (the
  // input/barcode for direct scans, falling back to title) so the
  // server can collapse repeated lookups of the same thing.
  if (!data) return;
  const identifier = (originalInput || data.barcode || data.title || '').trim();
  if (!identifier) return;
  const key = identifier + '|' + (data.title || '');
  if (key === LAST_LOGGED_KEY) return;  // don't spam the same row
  LAST_LOGGED_KEY = key;

  fetch('/api/price-check/log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      device_id: DEVICE_ID,
      identifier,
      kind:      data.kind,
      title:     data.title,
      set_name:  data.set_name,
      image_url: data.image_url,
      price:     data.price,
    }),
  }).then(() => { loadRails(); }).catch(() => {});
}

function showList(results, q) {
  clearAll();
  if (!results.length) {
    emptyEl.style.display = 'block';
    emptyEl.innerHTML = '<div class="icon">🔍</div><p>No matches for "' + esc(q) + '".</p>';
    updateRailsVisibility();
    return;
  }
  listEl.style.display = 'grid';
  updateRailsVisibility();
  const rows = results.map((r, i) => {
    const isRaw = r.kind === 'raw';
    const imgClass = isRaw ? '' : 'sealed';
    const img = r.image_url
      ? '<img src="' + esc(r.image_url) + '" alt="">'
      : '<div class="no-img">' + (isRaw ? '🃏' : '📦') + '</div>';
    const meta = [];
    if (r.set_name) meta.push(esc(r.set_name));
    if (Array.isArray(r.conditions) && r.conditions.length) meta.push(esc(r.conditions.join(' / ')));
    if (r.qty && r.qty > 1) meta.push(r.qty + ' in stock');
    if (!isRaw) meta.push('Sealed');
    const priceStr = (r.price_max !== undefined && r.price_max !== null)
      ? fmtPriceRange(r.price, r.price_max)
      : fmtPrice(r.price);
    return '<div class="pc-row" data-idx="' + i + '">' +
             '<div class="pc-row-img ' + imgClass + '">' + img + '</div>' +
             '<div class="pc-row-info">' +
               '<div class="pc-row-title">' + esc(r.title) + '</div>' +
               (meta.length ? '<div class="pc-row-meta">' + meta.join(' · ') + '</div>' : '') +
             '</div>' +
             '<div class="pc-row-price">' + priceStr + '</div>' +
           '</div>';
  }).join('');
  listEl.innerHTML = '<div class="pc-list-head">' + results.length + ' match' +
                     (results.length === 1 ? '' : 'es') + ' for "' + esc(q) + '"</div>' +
                     rows;

  // Wire clicks to expand the row into the same single-result view used by
  // direct barcode scans.
  listEl.querySelectorAll('.pc-row').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      if (results[idx]) showResult(results[idx]);
    });
  });
}

async function lookup(input) {
  // Try barcode first. On 404, fall back to free-text search.
  try {
    const r = await fetch('/api/price-check?barcode=' + encodeURIComponent(input));
    if (r.ok) {
      const d = await r.json();
      showResult(d, input);
      try { pfSound.success(); } catch(_) {}
      return;
    }
    if (r.status !== 404) {
      const d = await r.json().catch(() => ({}));
      throw new Error(d.error || ('HTTP ' + r.status));
    }
  } catch(err) {
    showEmpty();
    await pfBlock('Lookup failed', err.message || 'Unknown error', { error: true });
    focusInput();
    return;
  }

  // 404 from barcode — try free-text search.
  try {
    const r = await fetch('/api/price-check/search?q=' + encodeURIComponent(input));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const results = d.results || [];
    if (results.length === 1) {
      showResult(results[0], input);
      try { pfSound.success(); } catch(_) {}
    } else {
      showList(results, input);
      if (results.length === 0) {
        await pfBlock('Not found',
                      '"' + input + '" — nothing in our store matches that.',
                      { error: true });
        focusInput();
      }
    }
  } catch(err) {
    showEmpty();
    await pfBlock('Lookup failed', err.message || 'Unknown error', { error: true });
    focusInput();
  }
}

inp.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const v = inp.value.trim();
  inp.value = '';
  if (!v) return;
  lookup(v);
});

// ─── Hot Right Now + Recently Checked ───────────────────────────────────────
function tileHtml(it) {
  const isRaw = it.kind === 'raw';
  const imgClass = isRaw ? '' : 'sealed';
  const img = it.image_url
    ? '<img src="' + esc(it.image_url) + '" alt="">'
    : '<div class="no-img">' + (isRaw ? '🃏' : '📦') + '</div>';
  const price = (it.price !== null && it.price !== undefined)
    ? '$' + Number(it.price).toFixed(2)
    : '—';
  const meta = [];
  if (it.set_name) meta.push(esc(it.set_name));
  if (it.hits && it.hits > 1) meta.push(it.hits + '×');
  return '<button class="pc-tile" data-identifier="' + esc(it.identifier) + '">' +
           '<div class="pc-tile-img ' + imgClass + '">' + img + '</div>' +
           '<div class="pc-tile-name">' + esc(it.title || it.identifier) + '</div>' +
           (meta.length ? '<div class="pc-tile-meta">' + meta.join(' · ') + '</div>' : '') +
           '<div class="pc-tile-price">' + price + '</div>' +
         '</button>';
}

function wireTiles(container) {
  container.querySelectorAll('.pc-tile').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.identifier;
      if (!id) return;
      // Re-running through lookup() means tapping a tile takes the same
      // barcode-then-search path as typing the value directly. Clears
      // the throttle key so the click logs a fresh hit for "hot".
      LAST_LOGGED_KEY = null;
      lookup(id);
    });
  });
}

async function loadRails() {
  try {
    const r = await fetch('/api/price-check/recent');
    if (!r.ok) return;
    const data = await r.json();
    const hot = data.hot || [];
    // Drop anything already in Hot so the two rails complement each
    // other instead of double-rendering the same tile.
    const hotKeys = new Set(hot.map(x => x.identifier));
    const recent = (data.recent || []).filter(x => !hotKeys.has(x.identifier));

    if (hot.length) {
      hotEl.innerHTML = hot.map(tileHtml).join('');
      wireTiles(hotEl);
      hotSect.style.display = '';
    } else {
      hotSect.style.display = 'none';
    }

    if (recent.length) {
      recentEl.innerHTML = recent.map(tileHtml).join('');
      wireTiles(recentEl);
      recentSect.style.display = '';
    } else {
      recentSect.style.display = 'none';
    }
  } catch (_) { /* rails are best-effort */ }
}

loadRails();
// Refresh "Hot right now" every minute so the kiosk reflects current
// traffic without needing a reload. Recent will refresh on next lookup.
setInterval(loadRails, 60000);
</script>
</body>
</html>
