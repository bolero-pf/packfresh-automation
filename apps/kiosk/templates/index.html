<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pack Fresh — Browse Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Fredoka:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0B0B09;   /* cl-neutral-900 */
  --surface:  #171514;   /* cl-neutral-800 */
  --surface2: #232120;   /* cl-neutral-700 */
  --border:   #3B3938;   /* cl-neutral-600 */
  --accent:   #DFA32A;   /* cl-gold-500 — Commonlands logo gold */
  --accent2:  #12BC8F;   /* cl-teal-300 — secondary actions */
  --green:    #4ade80;
  --red:      #f87171;
  --text:     #FDF5E4;   /* cl-gold-50 — warm off-white */
  --dim:      #838180;   /* cl-neutral-300 */
  /* Commonlands brand font stacks — fallbacks chain to iOS Chalkboard SE
     so iPads stay on-brand even if the Google webfont fails to load. */
  --cl-font-amatic-family: "Amatic SC", "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Chalkboard", sans-serif;
  --cl-font-amatic-weight: 700;
  --cl-font-amatic-style:  normal;
  --cl-font-fredoka-family: "Fredoka", "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Chalkboard", sans-serif;
  --cl-font-fredoka-weight: 400;
  --cl-font-fredoka-style:  normal;
  --cl-font-body-family:    var(--cl-font-fredoka-family);
  --cl-font-body-weight:    var(--cl-font-fredoka-weight);
  --cl-font-body-style:     var(--cl-font-fredoka-style);
  --cl-font-heading-family: var(--cl-font-amatic-family);
  --cl-font-heading-weight: var(--cl-font-amatic-weight);
  --cl-font-heading-style:  var(--cl-font-amatic-style);
  --sans:     var(--cl-font-body-family);
  --display:  var(--cl-font-heading-family);
  --mono:     'DM Mono', monospace;
  --r:        12px;
  --touch:    56px;   /* minimum tap target */
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  overscroll-behavior: none;
}
/* Themed scrollbar for the main page — matches the slim style we use
   inside the bottom-sheet so the kiosk doesn't show a chunky native
   scrollbar when the grid runs long. */
html { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
html::-webkit-scrollbar { width: 8px; height: 8px; }
html::-webkit-scrollbar-track { background: transparent; }
html::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
html::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(180deg, rgba(11,11,9,0.98) 0%, rgba(11,11,9,0.92) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
}
.header-top { max-width: 1200px; margin: 0 auto; display: flex; gap: 14px; align-items: center; justify-content: space-between; }
.header-search { max-width: 1200px; margin: 10px auto 0; }
.logo { font-family: var(--display); font-size: 2rem; letter-spacing: 0.06em; color: var(--accent); white-space: nowrap; line-height: 1; }
.logo-sub { font-size: 0.7rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; line-height: 1; white-space: nowrap; }
.logo-link { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; line-height: 0; }
/* The PNG has a small bit of padding baked in from Canva — small negative
   vertical margins absorb that so the apparent logo height tracks the
   number we set here. */
.logo-img { display: block; height: 104px; width: auto; margin: -16px 0; }
@media (max-width: 640px) {
  .logo-img { height: 80px; margin: -12px 0; }
  .logo-sub { font-size: 0.62rem; }
  .logo-link { gap: 8px; }
  /* Stack the filter strip on phones so the game pills (All/Pokémon/Magic/…)
     get a dedicated full-width row instead of being squeezed behind the
     Sort + Filters buttons. Tablet (≥768px coarse) is untouched. */
  .filter-strip { flex-wrap: wrap; padding: 10px 12px; gap: 8px; }
  .filter-strip .game-pills { flex-basis: 100%; min-width: 0; }
  .filter-strip .sort-wrap { margin-left: auto; }
  /* Snap the bottom-sheet to viewport width on mobile — clip any rogue child
     so the sheet can't be panned sideways. touch-action stays default so the
     sheet body still scrolls vertically. */
  .sheet-overlay { overflow: hidden; }
  .sheet { overflow-x: hidden; max-width: 100vw; }
  .sheet-body { overflow-x: hidden; }
  .chip-row { max-width: 100%; }
}

.search-input {
  width: 100%; height: var(--touch);
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--r); color: var(--text);
  padding: 0 52px 0 18px; font-family: var(--sans); font-size: 1rem; outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--dim); }
.header-search { position: relative; }
.search-clear {
  position: absolute; top: 50%; right: 10px; transform: translateY(-50%);
  width: 36px; height: 36px; border-radius: 50%; border: none; padding: 0;
  background: var(--surface); color: var(--dim);
  font-family: var(--sans); font-size: 1.4rem; line-height: 1; cursor: pointer;
  display: none; align-items: center; justify-content: center;
}
.search-clear:hover, .search-clear:active {
  background: var(--border); color: var(--text);
}
.header-search.has-value .search-clear { display: flex; }

/* Cart button */
.cart-btn {
  position: relative; height: var(--touch); min-width: var(--touch);
  background: var(--accent); border: none; border-radius: var(--r);
  color: #000; font-family: var(--display); font-size: 1.2rem; letter-spacing: 0.05em;
  cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0 18px;
  transition: transform 0.1s, opacity 0.15s;
}
.cart-btn:active { transform: scale(0.97); }
.cart-badge {
  position: absolute; top: -6px; right: -6px;
  background: var(--red); color: #fff; border-radius: 50%;
  width: 22px; height: 22px; font-family: var(--sans); font-size: 0.7rem;
  font-weight: 600; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.cart-badge.visible { opacity: 1; }

/* ── Grid ── */
.main { max-width: 1200px; margin: 0 auto; padding: 20px; }

.results-info { font-size: 0.82rem; color: var(--dim); margin-bottom: 16px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  display: flex; flex-direction: column;
  user-select: none;
}
.card:active { transform: scale(0.97); }
.card:hover { border-color: var(--accent); }

.card-img {
  aspect-ratio: 2.5/3.5;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card-img img { width: 100%; height: 100%; object-fit: contain; }
.card-img .no-img { font-size: 3rem; opacity: 0.15; }

.card-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
/* Tile names + sets always render to one line — long names like "Eevee
   (Master Ball Pattern)" or sets like "Scarlet & Violet Black Star Promos"
   would otherwise wrap and force every card in the row to grow taller, with
   short-name cards sprouting an ugly white gap before their price. */
.card-name { font-size: 0.88rem; font-weight: 600; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-set  { font-size: 0.72rem; color: var(--dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* Variant badge gets its own row inside the card body so its left edge
   aligns with name/set instead of dangling off the end of a wrapped name. */
.card-variant {
  align-self: flex-start; max-width: 100%; box-sizing: border-box;
  font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 5px;
  background: rgba(192,132,252,0.18); color: #c084fc;
  letter-spacing: 0.02em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.cond-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.cond-pill {
  font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
  border-radius: 20px; letter-spacing: 0.04em;
}

/* Pills + price share one row at the bottom of the card body — pills wrap on
   the left, price stays anchored on the right. Center-align so a 1.05rem
   price reads level with the much shorter condition pills. */
.card-pricerow {
  display: flex; align-items: center; gap: 8px;
  margin-top: auto; padding-top: 6px;
}
.card-pricerow .cond-pills { margin-top: 0; flex: 1 1 auto; min-width: 0; }
.card-pricerow .card-price {
  margin-top: 0; padding-top: 0; flex-shrink: 0;
  white-space: nowrap;
}
.cond-NM  { background: rgba(74,222,128,0.15); color: var(--green); }
.cond-LP  { background: rgba(223,163,42,0.15); color: var(--accent); }
.cond-MP  { background: rgba(251,146,60,0.15); color: #fb923c; }
.cond-HP  { background: rgba(248,113,113,0.15); color: var(--red); }
.cond-DMG { background: rgba(248,113,113,0.25); color: var(--red); }

.variant-badge {
  display: inline-block; font-size: 0.78rem; font-weight: 700;
  padding: 3px 9px; border-radius: 6px; margin-left: 6px;
  background: rgba(192,132,252,0.18); color: #c084fc;
  letter-spacing: 0.02em; vertical-align: middle;
}

.card-price { font-family: var(--mono); font-size: 1.05rem; font-weight: 700; color: var(--accent); margin-top: auto; padding-top: 6px; }

/* ── Pagination ── */
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
.pg { height: 44px; min-width: 44px; padding: 0 14px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: var(--sans);
  font-size: 0.9rem; cursor: pointer; }
.pg.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.pg:disabled { opacity: 0.3; cursor: default; }

/* ── Overlay / panels ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  padding: 20px;
}
.overlay.active { display: flex; }
body.modal-open { overflow: hidden; touch-action: none; }

.panel {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r);
  width: 100%; max-width: 640px;
  max-height: 88vh; overflow-y: auto;
  padding: 28px; animation: fadeScale 0.2s ease;
}
@keyframes fadeScale {
  from { opacity: 0; transform: scale(0.96); }
  to   { opacity: 1; transform: scale(1); }
}

.panel-title { font-family: var(--display); font-size: 1.6rem; letter-spacing: 0.05em; margin-bottom: 4px; }
.panel-sub   { font-size: 0.85rem; color: var(--dim); margin-bottom: 20px; }

/* Card detail panel */
.detail-hero { display: flex; gap: 18px; margin-bottom: 20px; align-items: flex-start; }
.detail-img  { width: 140px; min-width: 140px; aspect-ratio: 2.5/3.5; border-radius: 8px; overflow: hidden; background: var(--surface2); cursor: pointer; transition: transform 0.15s; }
.detail-img-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.detail-img:hover { transform: scale(1.03); }
.detail-img img { width: 100%; height: 100%; object-fit: contain; }
.detail-img-hint { font-size: 0.7rem; color: var(--dim); margin-top: 4px; text-align: center; }
.detail-info { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.detail-info-row { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; }
.detail-info-label { color: var(--dim); min-width: 60px; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
.detail-info-val { color: var(--text); font-weight: 500; }
.meta-section { margin-bottom: 14px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); }
.meta-block { margin-bottom: 8px; }
.meta-block:last-child { margin-bottom: 0; }
.meta-heading { font-weight: 700; font-size: 0.85rem; color: var(--accent); margin-bottom: 2px; }
.meta-text { font-size: 0.82rem; color: var(--text); line-height: 1.5; }
.meta-flavor { font-style: italic; color: var(--dim); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
.energy-icon { display: inline-block; width: 18px; height: 18px; vertical-align: -3px; margin: 0 1px; }
/* ── Tablet (768px+ touch devices only) ── */
@media (min-width: 768px) and (pointer: coarse) {
  .panel { max-width: 800px; padding: 32px 36px; }
  .detail-img { width: 200px; min-width: 200px; }
  .detail-hero { gap: 24px; }
  .detail-info-row { font-size: 0.92rem; }
  .detail-info-label { min-width: 70px; font-size: 0.8rem; }
  .meta-section { padding: 14px 16px; }
  .meta-text { font-size: 0.86rem; }
  .meta-heading { font-size: 0.9rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
  .card-body { padding: 12px 14px 14px; }
  .card-name { font-size: 0.92rem; }
  .copy-row { padding: 14px 18px; }
  .copy-cond { font-size: 1.05rem; }
  .copy-num { font-size: 0.86rem; }
  .copy-price { font-size: 1.05rem; }
  .copy-add-btn { padding: 10px; font-size: 0.95rem; }
  .cart-item { padding: 14px 18px; gap: 16px; }
  .cart-item img { width: 48px; }
  .cart-item-name { font-size: 0.95rem; }
  .cart-item-sub { font-size: 0.8rem; }
  .cart-item .qty-btn { width: 36px; height: 36px; font-size: 1.1rem; }
  .confirm-screen { padding: 30px 20px 16px; }
  .confirm-title { font-size: 2.8rem; }
  .confirm-msg { font-size: 1.15rem; }
  .btn { height: 60px; font-size: 1.05rem; }
  .form-input { height: 60px; font-size: 1.05rem; }
  .form-label { font-size: 0.85rem; }
  .search-input { font-size: 1.05rem; }
  .panel-title { font-size: 1.8rem; }
  .panel-sub { font-size: 0.9rem; }
  .lightbox-flip { padding: 12px 28px; font-size: 0.95rem; }
}

/* ── Large tablet landscape (1024px+ touch devices only) ── */
@media (min-width: 1024px) and (pointer: coarse) {
  .panel { max-width: 900px; }
  .detail-img { width: 240px; min-width: 240px; }
}

/* ── Phone (480px and below) ── */
@media (max-width: 480px) {
  .detail-hero { flex-direction: column; align-items: center; }
  .detail-img { width: 180px; min-width: unset; }
}

/* Image lightbox */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; flex-direction: column;
  cursor: zoom-out; padding: 20px; gap: 16px;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 90vw; max-height: 80vh; object-fit: contain;
  border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  animation: fadeScale 0.2s ease;
}
.lightbox-flip {
  display: none; cursor: pointer; background: var(--accent); color: #000;
  border: none; border-radius: var(--r); padding: 10px 24px;
  font-family: var(--sans); font-weight: 700; font-size: 0.9rem;
  transition: transform 0.1s;
}
.lightbox-flip:active { transform: scale(0.95); }
.lightbox-flip.visible { display: inline-flex; align-items: center; gap: 8px; }

.copy-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.copy-row {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px; cursor: pointer;
  transition: border-color 0.15s;
}
.copy-row.selected { border-color: var(--accent); }
.copy-info {
  display: flex; align-items: center; gap: 10px;
}
.copy-cond { font-weight: 700; font-size: 1rem; min-width: 40px; }
.copy-num  { font-size: 0.8rem; color: var(--dim); flex: 1; }
.copy-price { font-family: var(--mono); font-size: 1rem; color: var(--accent); white-space: nowrap; }
.copy-action {
  margin-top: 8px;
}
.copy-add-btn {
  display: block; width: 100%; padding: 8px; border: 1.5px solid var(--accent);
  background: transparent; color: var(--accent); border-radius: 8px;
  font-weight: 700; font-size: 0.9rem; cursor: pointer; text-align: center;
}
.copy-add-btn:active { background: rgba(223,163,42,0.15); }
.copy-qty-bar {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  padding: 6px; background: rgba(223,163,42,0.08); border-radius: 8px;
}
.copy-qty-bar .qty-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--accent);
  background: transparent; color: var(--accent); font-size: 1.2rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.copy-qty-bar .qty-btn:active { background: rgba(223,163,42,0.2); }
.copy-qty-bar .qty-val { font-size: 1.1rem; font-weight: 700; min-width: 28px; text-align: center; }
.copy-check { width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border); display: flex; align-items: center;
  justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
.copy-row.selected .copy-check { background: var(--accent); border-color: var(--accent); color: #000; }
/* DISPLAY copy rows — visible info, not cartable. Slightly muted so they
   read as a different mode than the cartable rows above. */
.copy-row.display-only-row { background: rgba(192,132,252,0.06); border-color: rgba(192,132,252,0.35); cursor: default; }
.copy-display-note {
  display: block; padding: 8px; border-radius: 8px;
  background: rgba(192,132,252,0.12); color: #c084fc;
  font-size: 0.8rem; font-weight: 600; text-align: center;
}

/* Qty controls */
.qty-row { display: flex; align-items: center; gap: 14px; margin: 16px 0; }
.qty-label { font-size: 0.85rem; color: var(--dim); flex: 1; }
.qty-ctrl { display: flex; align-items: center; gap: 12px; }
.qty-btn {
  width: 44px; height: 44px; border-radius: 8px;
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text); font-size: 1.4rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s;
}
.qty-btn:active { border-color: var(--accent); }
.qty-val { font-family: var(--mono); font-size: 1.1rem; min-width: 24px; text-align: center; }

/* Cart panel */
.cart-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.cart-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border-radius: 10px; padding: 12px 14px;
}
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 600; font-size: 0.9rem; }
.cart-item-sub  { font-size: 0.75rem; color: var(--dim); }
.cart-item .copy-qty-bar { min-width: 84px; gap: 8px; }
.cart-item .qty-btn { width: 30px; height: 30px; font-size: 1rem; }
.cart-item img { width: 36px; }

/* Toast notice */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 20px; font-size: 0.85rem;
  color: var(--text); z-index: 300; animation: toastIn 0.2s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* Form */
.form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-label { font-size: 0.8rem; color: var(--dim); letter-spacing: 0.05em; text-transform: uppercase; }
.form-input {
  height: var(--touch); background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--r); color: var(--text); padding: 0 18px;
  font-family: var(--sans); font-size: 1rem; outline: none; width: 100%;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }

/* Buttons */
.btn {
  height: var(--touch); padding: 0 24px; border-radius: var(--r);
  font-family: var(--sans); font-size: 1rem; font-weight: 600;
  cursor: pointer; border: none; transition: transform 0.1s, opacity 0.15s;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(0.97); }
.btn-gold    { background: var(--accent); color: #000; width: 100%; }
.btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text); }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

/* Confirmation screen */
.confirm-screen {
  text-align: center; padding: 20px 0 10px;
}
.confirm-icon { font-size: 4rem; margin-bottom: 16px; }
.confirm-title { font-family: var(--display); font-size: 2.5rem; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 8px; }
.confirm-ref { font-family: var(--mono); font-size: 1rem; color: var(--text); opacity: 0.8; margin-bottom: 20px; }
.confirm-msg { font-size: 1.1rem; color: var(--text); line-height: 1.7; margin-bottom: 24px; }

/* Confirm modal */
.confirm-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.confirm-overlay.active { display: flex; }
.confirm-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 28px; max-width: 360px; width: 90%; text-align: center;
}
.confirm-box h3 { margin-bottom: 10px; }
.confirm-box p { color: var(--dim); font-size: 0.9rem; margin-bottom: 20px; }

/* Top filter strip — Game pills (horizontal scroll) + Filters button.
   Not sticky on its own — header is already sticky and a second sticky
   element here would have to compute the header's height to avoid overlap. */
.filter-strip {
  display: flex; gap: 10px; align-items: center; padding: 10px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  max-width: 1200px; margin: 0 auto;
}
/* Kind tabs (Raw / Sealed / Slabs) — pills inside the sticky header,
   between the lockup row and the search bar. */
.kind-tabs {
  display: flex; gap: 6px;
  max-width: 1200px; margin: 10px auto 0;
}
.kind-tab {
  flex: 1; min-height: 44px; padding: 0 14px;
  border: 1px solid var(--border);
  background: var(--surface); color: var(--dim);
  font-family: inherit; font-weight: 700; font-size: 0.92rem;
  border-radius: 10px; cursor: pointer;
  line-height: 1;
}
.kind-tab.on {
  background: rgba(223,163,42,0.12);
  color: var(--accent);
  border-color: var(--accent);
}
.game-pills {
  display: flex; gap: 8px; overflow-x: auto; flex: 1; padding: 2px 0;
  scrollbar-width: none;
}
.game-pills::-webkit-scrollbar { display: none; }
.game-pill {
  flex-shrink: 0; min-height: 44px; padding: 0 18px;
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 22px;
  color: var(--text); font-family: var(--sans); font-size: 0.95rem; font-weight: 500;
  cursor: pointer; user-select: none; transition: all 0.15s; white-space: nowrap;
}
/* Match the in-sheet chip pattern: parenthesized count, sans baseline. */
.game-pill .qty { color: var(--dim); font-weight: 500; font-size: 0.78rem; font-variant-numeric: tabular-nums; }
.game-pill .qty::before { content: '('; }
.game-pill .qty::after  { content: ')'; }
.game-pill.active {
  background: var(--accent); border-color: var(--accent); color: #0B0B09;
}
.game-pill.active .qty { color: rgba(11,11,9,0.7); font-weight: 700; }

.filters-btn {
  flex-shrink: 0; min-height: 44px; padding: 0 18px;
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 22px;
  color: var(--text); font-family: var(--sans); font-size: 0.95rem; font-weight: 500;
  cursor: pointer;
}
.sort-wrap { position: relative; flex-shrink: 0; }
.sort-menu {
  position: absolute; top: calc(100% + 6px); right: 0; z-index: 60;
  min-width: 200px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: 12px;
  padding: 6px; display: none; flex-direction: column; gap: 2px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.5);
}
.sort-wrap.open .sort-menu { display: flex; }
.sort-option {
  background: transparent; border: none; color: var(--text);
  padding: 12px 14px; border-radius: 8px;
  text-align: left; cursor: pointer;
  font-family: var(--sans); font-size: 0.95rem;
  min-height: 44px;
}
.sort-option:hover { background: var(--surface2); }
.sort-option.on { background: rgba(223,163,42,0.14); color: var(--accent); font-weight: 700; }
.filters-btn.has-active { border-color: var(--accent); color: var(--accent); }
.filters-btn .badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 22px; padding: 0 7px; border-radius: 11px;
  background: var(--accent); color: #0B0B09;
  font-size: 0.78rem; font-weight: 700; font-variant-numeric: tabular-nums;
}

/* Bottom sheet overlay (centers when content is short, fills upward to 90vh
   when tall — short prod-filter sheets shouldn't get pinned to the bottom). */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: none; z-index: 100; align-items: center; justify-content: center;
  animation: fadeIn 0.18s ease-out;
}
.sheet-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.sheet {
  width: 100%; max-width: 760px; margin: auto;
  background: var(--surface); border-radius: 18px;
  max-height: 90vh; display: flex; flex-direction: column;
  animation: slideUp 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.55);
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
}
.sheet-header h3 { font-family: var(--sans); font-size: 1.05rem; font-weight: 600; }
.sheet-header .clear-link {
  background: none; border: none; color: var(--accent); font-size: 0.85rem;
  cursor: pointer; padding: 8px; font-weight: 500;
}
.sheet-body { padding: 16px 20px 24px; overflow-y: auto; flex: 1; }
/* Slim themed scrollbar so it doesn't look like a stacked system widget.
   Applies to both the sheet body and the inner set-list. */
.sheet-body, .set-list { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.sheet-body::-webkit-scrollbar, .set-list::-webkit-scrollbar { width: 6px; }
.sheet-body::-webkit-scrollbar-track, .set-list::-webkit-scrollbar-track { background: transparent; }
.sheet-body::-webkit-scrollbar-thumb, .set-list::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 3px;
}
.sheet-body::-webkit-scrollbar-thumb:hover, .set-list::-webkit-scrollbar-thumb:hover {
  background: var(--dim);
}
.sheet-section { margin-bottom: 22px; }
.sheet-section-title {
  font-size: 0.72rem; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 10px; font-weight: 600;
}
/* Content-sized chips with flex-wrap — same pattern as eBay/Amazon facets.
   Sizing chips to a uniform grid cell wide enough for the longest label
   wasted huge amounts of space when 13/15 rarities are short. With
   white-space: nowrap on the chip, label + paren count always stay on
   one line, so the centered-text-with-orphaned-paren wrap artifact can't
   happen. Rows pack tight; chip widths vary within a row. */
.chip-row {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.chip {
  min-height: 44px; padding: 4px 14px;
  display: inline-flex; align-items: center; justify-content: center; gap: 4px;
  text-align: center; line-height: 1.1;
  white-space: nowrap;
  /* Off-state: outline button feel — clearly tappable, not blending with surface */
  background: rgba(240, 240, 248, 0.04);
  border: 1.5px solid rgba(240, 240, 248, 0.28);
  border-radius: 22px;
  color: var(--text); font-family: var(--sans); font-size: 0.78rem; font-weight: 500;
  cursor: pointer; user-select: none; transition: all 0.12s;
}
.chip:hover {
  background: rgba(240, 240, 248, 0.08);
  border-color: rgba(240, 240, 248, 0.45);
}
.chip.on {
  background: var(--accent); border-color: var(--accent); color: #0B0B09;
}
.chip.on:hover {
  background: var(--accent); border-color: var(--accent);
}
/* Filter-chip count formatting follows the standard faceted-search pattern
   used by eBay / Amazon / etc.: parenthesized count, slightly dimmer than
   the label, same font as the chip text so the baseline aligns. The parens
   signal "this is a count" without adding a separate badge that would
   compete with the label visually. */
.chip .qty {
  color: var(--dim); font-weight: 500; font-size: 0.78rem;
  font-variant-numeric: tabular-nums;
}
.chip .qty::before { content: '('; }
.chip .qty::after  { content: ')'; }
.chip.on .qty { color: rgba(11,11,9,0.7); font-weight: 700; }
.chip.cond-NM.on { background: #14532d; border-color: #4ade80; color: #4ade80; }
.chip.cond-LP.on { background: rgba(223,163,42,0.22); border-color: #DFA32A; color: #DFA32A; }
.chip.cond-MP.on { background: rgba(251,146,60,0.22); border-color: #fb923c; color: #fb923c; }
.chip.cond-HP.on { background: rgba(248,113,113,0.22); border-color: #f87171; color: #f87171; }
.chip.cond-DMG.on { background: rgba(185,28,28,0.22); border-color: #b91c1c; color: #f87171; }

.set-search-input {
  width: 100%; min-height: 44px; padding: 0 14px;
  background: rgba(240, 240, 248, 0.06);
  border: 1.5px solid rgba(240, 240, 248, 0.28);
  border-radius: 10px;
  color: var(--text); font-family: var(--sans); font-size: 0.95rem;
  outline: none; margin-bottom: 10px;
  transition: border-color 0.12s, background 0.12s;
}
.set-search-input::placeholder { color: var(--dim); }
.set-search-input:focus {
  border-color: var(--accent);
  background: rgba(232, 197, 71, 0.06);
}
.set-list { max-height: 280px; overflow-y: auto; padding-right: 4px; }
.set-row {
  min-height: 48px; padding: 0 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border-radius: 8px; cursor: pointer; user-select: none;
}
.set-row + .set-row { margin-top: 4px; }
.set-row:hover { background: var(--surface2); }
.set-row.on { background: rgba(223,163,42,0.12); color: var(--accent); }
.set-row .qty { color: var(--dim); font-family: var(--mono); font-weight: 500; font-size: 0.82rem; font-variant-numeric: tabular-nums; }
.set-row.on .qty { color: var(--accent); }

.price-row { display: flex; gap: 10px; align-items: center; }
.price-input {
  flex: 1; min-height: 48px; padding: 0 14px;
  background: rgba(240, 240, 248, 0.06);
  border: 1.5px solid rgba(240, 240, 248, 0.28);
  border-radius: 10px;
  color: var(--text); font-family: var(--mono); font-size: 1rem; outline: none;
  text-align: center;
  transition: border-color 0.12s, background 0.12s;
}
.price-input::placeholder { color: var(--dim); }
.price-input:focus {
  border-color: var(--accent);
  background: rgba(232, 197, 71, 0.06);
}
.price-dash { color: var(--dim); font-size: 1.1rem; }

.sheet-footer {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center;
  background: var(--surface);
}
.sheet-apply {
  flex: 1; min-height: 56px; border-radius: 12px; border: none;
  background: var(--accent); color: #0B0B09;
  font-family: var(--sans); font-size: 1.05rem; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
}
.sheet-apply:disabled { opacity: 0.55; }

/* Segmented Any/Exactly toggle for MTG/OP color identity. Lives on its
   own row above the chips (not floated into the section title) so it
   reads as a control over the chip set, not as a separate header element. */
.mode-toggle {
  display: inline-flex; align-self: flex-start; align-items: stretch;
  margin-bottom: 10px;
  border: 1.5px solid rgba(240,240,248,0.28); border-radius: 16px;
  background: rgba(240,240,248,0.04);
  overflow: hidden; font-family: var(--sans); font-size: 0.82rem;
}
.mode-toggle .mode-btn {
  padding: 6px 16px; min-height: 32px;
  background: transparent; color: var(--text); border: none;
  cursor: pointer; font-weight: 600; letter-spacing: 0.02em;
  transition: background 0.12s, color 0.12s;
}
.mode-toggle .mode-btn.on {
  background: var(--accent); color: #0B0B09;
}
.mode-toggle .mode-btn + .mode-btn { border-left: 1.5px solid rgba(240,240,248,0.18); }
.mode-toggle .mode-btn.on + .mode-btn,
.mode-toggle .mode-btn:has(+ .mode-btn.on) { border-left-color: transparent; }

/* MTG color chips — colored pip on the chip when on. Default border is
   light so dark pips (B / Black) read against the dark site background;
   light pips (W / Yellow) explicitly set a darker border so they stand
   out on the chip surface. */
.chip-color {
  display: inline-flex; align-items: center; gap: 6px;
}
.chip-color .pip {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.45);
  box-sizing: border-box;
}
.chip-color .pip-W  { background: #f8f3d4; border-color: rgba(0,0,0,0.45); }
.chip-color .pip-U  { background: #2196f3; }
.chip-color .pip-B  { background: #2a2a2a; }
.chip-color .pip-R  { background: #e53935; }
.chip-color .pip-G  { background: #43a047; }
.chip-color .pip-C  { background: linear-gradient(135deg, #cccccc 0%, #999999 100%); }
.chip-color .pip-Red    { background: #e53935; }
.chip-color .pip-Green  { background: #43a047; }
.chip-color .pip-Blue   { background: #2196f3; }
.chip-color .pip-Purple { background: #8e24aa; }
.chip-color .pip-Black  { background: #2a2a2a; }
.chip-color .pip-Yellow { background: #fdd835; border-color: rgba(0,0,0,0.45); }

/* Selected-filter chips strip above results */
.active-chips {
  display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  margin-bottom: 14px; min-height: 0;
}
.active-chips:empty { display: none; }
.active-chips .ac-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 12px; border-radius: 14px;
  background: rgba(223,163,42,0.14);
  border: 1px solid rgba(223,163,42,0.45);
  color: var(--accent); font-size: 0.78rem; font-weight: 600;
}
.active-chips .ac-chip .ac-x {
  cursor: pointer; font-weight: 700;
  width: 18px; height: 18px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(223,163,42,0.25);
}
.active-chips .ac-chip .ac-x:active { background: rgba(223,163,42,0.45); }
.active-chips .ac-clear {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 14px; cursor: pointer;
  background: transparent; border: 1px solid rgba(248,113,113,0.5);
  color: var(--red); font-size: 0.76rem; font-weight: 600;
}

/* Tablet: more breathing room */
@media (min-width: 768px) {
  .active-chips { gap: 8px; margin-bottom: 18px; }
  .active-chips .ac-chip { font-size: 0.85rem; padding: 5px 12px 5px 14px; }
  .mode-toggle { font-size: 0.85rem; }
  .mode-toggle .mode-btn { padding: 6px 14px; min-height: 32px; }
}

/* Empty / loading */
.empty { text-align: center; padding: 80px 20px; color: var(--dim); }
.empty-icon { font-size: 3rem; opacity: 0.2; margin-bottom: 12px; }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.7s linear infinite; margin: 80px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Cart total bar */
.cart-total-bar {
  background: var(--surface2); border-top: 1.5px solid var(--border);
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.cart-total-label { font-size: 0.82rem; color: var(--dim); }
.cart-total-val { font-family: var(--mono); font-size: 1.1rem; color: var(--accent); }
.cart-limit { font-size: 0.75rem; color: var(--dim); text-align: center; margin-bottom: 12px; }

/* Warning */
.warning { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
  border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--red); margin-bottom: 12px; }
.info { background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.3);
  border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--accent2); margin-bottom: 12px; }
</style>
</head>
<body>

<!-- Champion status bar -->
<div id="champion-bar" style="display:none;align-items:center;gap:8px;padding:4px 16px;background:rgba(223,163,42,0.08);border-bottom:1px solid rgba(223,163,42,0.15);font-size:0.82rem;line-height:1;"></div>

<header>
  <div class="header-top">
    <a href="/" class="logo-link">
      <img class="logo-img" src="/static/commonlandslogo.png" alt="Commonlands">
      <span class="logo-sub" id="logo-sub">Card Browser</span>
    </a>
    <button class="cart-btn" onclick="openCart()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="7" y="3" width="14" height="14" rx="2" opacity="0.45"/><rect x="3" y="7" width="14" height="14" rx="2"/></svg>
      My Picks
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
  <!-- Kind tabs (Raw / Sealed / Slabs). In Champion mode only Raw renders.
       Sits directly under the lockup so the customer picks what they're
       browsing first; the search input below reads as "search within". -->
  <div class="kind-tabs" id="kind-tabs" style="display:none;">
    <button class="kind-tab on" data-kind="raw" onclick="setActiveKind('raw')">Raw</button>
    <button class="kind-tab" data-kind="sealed" onclick="setActiveKind('sealed')">Sealed</button>
    <button class="kind-tab" data-kind="slab" onclick="setActiveKind('slab')">Slabs</button>
  </div>
  <div class="header-search" id="header-search">
    <input class="search-input" type="text" id="q" placeholder="Search…" oninput="debounce(); _toggleSearchClear()" autocomplete="off" autocorrect="off">
    <button type="button" class="search-clear" id="search-clear" onclick="clearSearch()" aria-label="Clear search">×</button>
  </div>
</header>

<!-- Top filter strip: Game pills (always visible) + Filters button.
     Only relevant on the Raw tab — hidden when browsing sealed/slabs. -->
<div class="filter-strip" id="raw-filter-strip">
  <div class="game-pills" id="game-pills"></div>
  <div class="sort-wrap" id="sort-wrap">
    <button class="filters-btn" id="sort-btn" onclick="toggleSortMenu(event, 'raw')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M7 4v16M3 8l4-4 4 4M17 20V4M21 16l-4 4-4-4"/></svg>
      <span id="sort-btn-label">Name A–Z</span>
    </button>
    <div class="sort-menu" id="sort-menu">
      <button type="button" class="sort-option" data-sort="name_asc"   onclick="setRawSort('name_asc')">Name A–Z</button>
      <button type="button" class="sort-option" data-sort="price_asc"  onclick="setRawSort('price_asc')">Price: Low to High</button>
      <button type="button" class="sort-option" data-sort="price_desc" onclick="setRawSort('price_desc')">Price: High to Low</button>
      <button type="button" class="sort-option" data-sort="newest"     onclick="setRawSort('newest')">Newest</button>
    </div>
  </div>
  <button class="filters-btn" id="filters-btn" onclick="openFilterSheet()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
    <span>Filters</span>
    <span class="badge" id="filters-count" style="display:none;">0</span>
  </button>
</div>

<!-- Sealed / Slabs filter strip — game pills (first-class, like Raw) +
     Filters button on the right. Pills render dynamically from the
     /api/products/filter-meta endpoint per active kind. -->
<div class="filter-strip" id="prod-filter-strip" style="display:none;">
  <div class="game-pills" id="prod-game-pills"></div>
  <div class="sort-wrap" id="prod-sort-wrap">
    <button class="filters-btn" id="prod-sort-btn" onclick="toggleSortMenu(event, 'prod')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M7 4v16M3 8l4-4 4 4M17 20V4M21 16l-4 4-4-4"/></svg>
      <span id="prod-sort-btn-label">Name A–Z</span>
    </button>
    <div class="sort-menu" id="prod-sort-menu">
      <button type="button" class="sort-option" data-sort="name_asc"   onclick="setProdSort('name_asc')">Name A–Z</button>
      <button type="button" class="sort-option" data-sort="price_asc"  onclick="setProdSort('price_asc')">Price: Low to High</button>
      <button type="button" class="sort-option" data-sort="price_desc" onclick="setProdSort('price_desc')">Price: High to Low</button>
    </div>
  </div>
  <button class="filters-btn" id="prod-filters-btn" onclick="openProdFilterSheet()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
    <span>Filters</span>
    <span class="badge" id="prod-filters-count" style="display:none;">0</span>
  </button>
</div>

<!-- Bottom-sheet filter overlay (sealed/slab) -->
<div class="sheet-overlay" id="prod-filter-sheet-overlay" onclick="closeProdFilterSheet(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <h3 id="prod-sheet-title">Filters</h3>
      <button class="clear-link" onclick="clearAllProdFilters()">Clear all</button>
    </div>
    <div class="sheet-body">
      <div class="sheet-section" id="prod-sheet-game-section">
        <div class="sheet-section-title">Game</div>
        <div class="chip-row" id="prod-sheet-games"></div>
      </div>
      <div class="sheet-section" id="prod-sheet-format-section" style="display:none;">
        <div class="sheet-section-title">Format</div>
        <div class="chip-row" id="prod-sheet-formats"></div>
      </div>
      <div class="sheet-section" id="prod-sheet-grade-section" style="display:none;">
        <div class="sheet-section-title">Grade</div>

<script>
const MAX = 20;
const KIOSK_ACCESS_KEY = '{{ access_key }}';
// Inline card-stack glyph reused across empty states / no-image fallbacks /
// detail placeholders. Sized by the parent (.empty-icon, .no-img, etc) via
// width:1em / font-size:Xrem so each consumer controls its scale. Two
// solid filled rects (front + faded back) read as "stack" more clearly
// than the previous outlined L-shape.
const ICON_CARD_STACK = '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="currentColor" aria-hidden="true"><rect x="7" y="3" width="14" height="14" rx="2" opacity="0.45"/><rect x="3" y="7" width="14" height="14" rx="2"/></svg>';
let _cart = [];  // [{card_name, set_name, condition, qty, price, image_url}]
// Active conditions live on _filters.conds now (set in the bottom-sheet apply flow)
let _hasAccess = false;

// Access gate — check URL param or localStorage
function checkAccess() {
  const params = new URLSearchParams(window.location.search);
  const urlKey = params.get('key');
  if (urlKey && urlKey === KIOSK_ACCESS_KEY) {
    localStorage.setItem('pf_kiosk_key', urlKey);
    // Strip only the `key` param — preserve filter state in the rest of
    // the URL so a shared/bookmarked link still applies its filters.
    params.delete('key');
    const rest = params.toString();
    window.history.replaceState({}, '', rest ? '?' + rest : '/');
    _hasAccess = true;
    return true;
  }
  const savedKey = localStorage.getItem('pf_kiosk_key');
  if (savedKey && savedKey === KIOSK_ACCESS_KEY) {
    _hasAccess = true;
    return true;
  }
  if (!KIOSK_ACCESS_KEY) {
    _hasAccess = true;
    return true;
  }
  return false;
}

function showAccessGate() {
  document.getElementById('grid').innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;">
      <div style="margin-bottom:12px;color:var(--dim);"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="6" width="13" height="16" rx="2"/><path d="M8 4h11a2 2 0 0 1 2 2v14"/></svg></div>
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;">Commonlands Card Browser</div>
      <div style="color:var(--dim);margin-bottom:20px;">This kiosk is for in-store use. Ask a staff member for access.</div>
      <div style="color:var(--dim);font-size:0.82rem;">Champion? <a href="#" onclick="showChampionAccessLogin(event)" style="color:var(--accent);">Sign in with your email</a></div>
      <div id="gate-champion-form" style="display:none;max-width:300px;margin:16px auto 0;">
        <input class="form-input" id="gate-champ-email" type="email" placeholder="your@email.com" style="margin-bottom:8px;">
        <div id="gate-champ-error" style="display:none;color:var(--red);font-size:0.82rem;margin-bottom:8px;"></div>
        <button class="btn btn-gold" style="width:100%;" onclick="gateChampionVerify()">Verify Champion Status</button>
      </div>
    </div>
  `;
}

function showChampionAccessLogin(e) {
  e.preventDefault();
  document.getElementById('gate-champion-form').style.display = 'block';
}

async function gateChampionVerify() {
  const email = (document.getElementById('gate-champ-email')?.value || '').trim().toLowerCase();
  const errEl = document.getElementById('gate-champ-error');
  if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }
  try {
    const d = await post('/api/champion/identify', { email });
    if (d.verified) {
      _champion = { verified: true, first_name: d.first_name, customer_gid: d.customer_gid, email: d.email, checkout_enabled: d.checkout_enabled };
      _saveChampion();
      _hasAccess = true;
      updateChampionUI();
      location.reload();
    } else {
      errEl.textContent = d.reason || 'Not a Champion account.';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = e.message || 'Verification failed.';
    errEl.style.display = 'block';
  }
}

// Mode + active catalog tab. _mode comes from /api/mode (cookie or champion);
// _activeKind drives whether we render raw, sealed, or slab content. Champions
// only ever see the Raw tab (server enforces too).
let _mode = null;             // 'instore' | 'champion' | null
let _allowedKinds = ['raw'];  // restricted in champion mode, full set in-store
let _activeKind = 'raw';

// Champion state — persisted in localStorage
let _champion = null;  // { verified, first_name, customer_gid, email }

function _saveChampion() {
  try { localStorage.setItem('pf_champion', JSON.stringify(_champion)); } catch(e) {}
}
function _loadChampion() {
  try {
    const saved = localStorage.getItem('pf_champion');
    if (saved) _champion = JSON.parse(saved);
  } catch(e) { _champion = null; }
}
function _clearChampion() {
  _champion = null;
  try { localStorage.removeItem('pf_champion'); } catch(e) {}
  // If no store key either, reload to show the access gate
  if (!localStorage.getItem('pf_kiosk_key')) {
    location.reload();
    return;
  }
  updateChampionUI();
}
function updateChampionUI() {
  const bar = document.getElementById('champion-bar');
  if (!bar) return;
  if (_champion && _champion.verified) {
    bar.innerHTML = `<span style="color:var(--accent);font-weight:700;">★ Champion</span><span style="color:var(--text);margin-left:4px;">${esc(_champion.first_name || _champion.email)}</span><button class="btn btn-outline" style="padding:2px 10px;font-size:0.72rem;margin-left:auto;line-height:1;" onclick="_clearChampion()">Sign Out</button>`;
    bar.style.display = 'flex';
  } else {
    bar.innerHTML = '';
    bar.style.display = 'none';
  }
}

// ── Themed Confirm ───────────────────────────────────────────────────────────
function themedConfirm(title, msg) {
  return new Promise(resolve => {
    document.getElementById('confirm-dlg-title').textContent = title;
    document.getElementById('confirm-dlg-msg').textContent = msg;
    const overlay = document.getElementById('confirm-overlay');
    overlay.classList.add('active');
    const cleanup = (val) => { overlay.classList.remove('active'); resolve(val); };
    document.getElementById('confirm-dlg-ok').onclick = () => cleanup(true);
    document.getElementById('confirm-dlg-cancel').onclick = () => cleanup(false);
  });
}

// ── Filter state (committed) — drives the URL/search ─────────────────────────
let _filters = {
  game: '',          // '' = all games
  era:  '',          // only meaningful when game === 'pokemon'
  set:  '',          // exact set name
  sort: 'name_asc',
  conds: new Set(['NM','LP','MP','HP','DMG']),
  minP: '',
  maxP: '',
  // Game-aware advanced filters (only meaningful when game !== '')
  colors:    new Set(),   // MTG: W/U/B/R/G/C — OP: Red/Blue/...
  colorMode: 'any',       // 'any' or 'exactly' (MTG/OP only)
  cardTypes: new Set(),   // MTG: Sorcery/Instant/... — Pokemon: Fire/Water/... — OP: Leader/...
  rarities:  new Set(),   // raw_cards.rarity values (game-specific)
};
// Sheet's pending state — committed only when Apply pressed
let _draft = null;
let _allSets = [];   // current /api/sets response, for in-sheet search filter
let _filterMeta = null;  // /api/filter-meta response for current draft.game
// Token bumped on every loadFilterMetaForDraft() call so out-of-order responses
// can be discarded. Without this, rapid game-chip switching (Pokemon → Magic →
// One Piece) lets a slow earlier request resolve last and overwrite the latest
// game's pills with stale data — making "both sets of filters" appear at once.
let _filterMetaReqId = 0;

function _activeFilterCount() {
  let n = 0;
  if (_filters.game)   n++;
  if (_filters.era)    n++;
  if (_filters.set)    n++;
  if (_filters.sort && _filters.sort !== 'name_asc') n++;
  if (_filters.conds.size && _filters.conds.size !== 5) n++;
  if (_filters.minP)   n++;
  if (_filters.maxP)   n++;
  if (_filters.colors && _filters.colors.size)       n++;
  if (_filters.cardTypes && _filters.cardTypes.size) n++;
  if (_filters.rarities && _filters.rarities.size)   n++;
  return n;
}

function _refreshFiltersBtn() {
  const btn = document.getElementById('filters-btn');
  const badge = document.getElementById('filters-count');
  const n = _activeFilterCount();
  if (n > 0) {
    btn.classList.add('has-active');
    badge.style.display = 'inline-flex';
    badge.textContent = String(n);
  } else {
    btn.classList.remove('has-active');
    badge.style.display = 'none';
  }
}

// ── Sort: top-strip button + popover ────────────────────────────────────────
// Sort lives on the strip (not buried inside the filter sheet) because
// changing sort is a high-frequency action — customers compare price low/high
// constantly while browsing. The bottom-sheet still has a Sort section so
// "open filters, change sort, apply" still works; the two stay in sync via
// _filters.sort.
const _RAW_SORT_LABELS = {
  name_asc:   'Name A–Z',
  price_asc:  'Price: Low to High',
  price_desc: 'Price: High to Low',
  newest:     'Newest',
};
const _PROD_SORT_LABELS = {
  name_asc:   'Name A–Z',
  price_asc:  'Price: Low to High',
  price_desc: 'Price: High to Low',
};

function _refreshSortBtn() {
  const lbl = document.getElementById('sort-btn-label');
  if (lbl) lbl.textContent = _RAW_SORT_LABELS[_filters.sort] || 'Name A–Z';
  document.querySelectorAll('#sort-menu .sort-option').forEach(el => {
    el.classList.toggle('on', el.getAttribute('data-sort') === _filters.sort);
  });
}

function _refreshProdSortBtn() {
  const lbl = document.getElementById('prod-sort-btn-label');
  if (lbl) lbl.textContent = _PROD_SORT_LABELS[_prodFilters.sort] || 'Name A–Z';
  document.querySelectorAll('#prod-sort-menu .sort-option').forEach(el => {
    el.classList.toggle('on', el.getAttribute('data-sort') === _prodFilters.sort);
  });
}

function _closeAllSortMenus() {
  document.querySelectorAll('.sort-wrap.open').forEach(el => el.classList.remove('open'));
}

function toggleSortMenu(e, scope) {
  e.stopPropagation();
  const wrapId = scope === 'prod' ? 'prod-sort-wrap' : 'sort-wrap';
  const wrap = document.getElementById(wrapId);
  const wasOpen = wrap.classList.contains('open');
  _closeAllSortMenus();
  if (!wasOpen) wrap.classList.add('open');
}

// Click-outside dismisses the sort popover. Stop-propagation in toggleSortMenu
// prevents the same click from immediately closing the menu it just opened.
document.addEventListener('click', _closeAllSortMenus);

function setRawSort(sort) {
  if (_filters.sort === sort) { _closeAllSortMenus(); return; }
  _filters.sort = sort;
  _refreshSortBtn();
  _refreshFiltersBtn();
  _writeUrlState();
  _closeAllSortMenus();
  doSearch();
}

function setProdSort(sort) {
  if (_prodFilters.sort === sort) { _closeAllSortMenus(); return; }
  _prodFilters.sort = sort;
  _refreshProdSortBtn();
  _refreshProdFiltersBtn();
  _closeAllSortMenus();
  _page = 1;
  doSearch();
}

// ── Game pills (top strip) — single-select, fires search immediately ─────────
async function loadGames() {
  try {
    const d = await get('/api/games');
    _gameCache = d.games || [];
    const strip = document.getElementById('game-pills');
    const totalQty = _gameCache.reduce((s, g) => s + (g.qty || 0), 0);
    const items = [{ code: '', label: 'All', qty: totalQty }, ..._gameCache];
    strip.innerHTML = items.map(g =>
      `<span class="game-pill${_filters.game === g.code ? ' active' : ''}" data-game="${esc(g.code)}">
        ${esc(g.label)}<span class="qty">${g.qty}</span>
      </span>`
    ).join('');
    strip.querySelectorAll('.game-pill').forEach(el => {
      el.addEventListener('click', () => {
        const newGame = el.getAttribute('data-game');
        if (_filters.game === newGame) return;
        _filters.game = newGame;
        // Switching games invalidates set + era — they're game-scoped.
        // Same for the advanced filters: 'White (W)' on MTG means nothing
        // on OP, and 'Holo Rare' from Pokemon shouldn't carry over.
        _filters.set = '';
        _filters.era = '';
        _filters.colors    = new Set();
        _filters.cardTypes = new Set();
        _filters.rarities  = new Set();
        _filters.colorMode = 'any';
        // Refresh meta cache so the next sheet open / chip-render uses the
        // correct labels for the new game.
        _filterMeta = null;
        // Optimistic active-state toggle — loadGames() is async and the user
        // shouldn't have to wait for /api/games before seeing the pill light up.
        strip.querySelectorAll('.game-pill').forEach(p =>
          p.classList.toggle('active', p.getAttribute('data-game') === newGame));
        loadGames();          // refresh counts (re-renders pills)
        loadSetsForFilters(); // refresh available sets for this game
        // Warm /api/filter-meta in the background — opening the Filters sheet
        // right after a game switch otherwise blocks on this slow query.
        if (newGame) loadFilterMetaForDraft();
        _refreshFiltersBtn();
        doSearch();
      });
    });
  } catch(e) {}
}

// ── Bottom sheet: open / close / draft / apply ───────────────────────────────
let _gameCache = []; // populated by loadGames(), reused inside the sheet

function openFilterSheet() {
  // Snapshot current filters into a draft so Cancel just closes
  _draft = {
    game: _filters.game,
    era: _filters.era,
    set: _filters.set,
    sort: _filters.sort,
    conds: new Set(_filters.conds),
    minP: _filters.minP,
    maxP: _filters.maxP,
    colors:    new Set(_filters.colors),
    colorMode: _filters.colorMode || 'any',
    cardTypes: new Set(_filters.cardTypes),
    rarities:  new Set(_filters.rarities),
  };
  renderGameChips();
  _refreshSheetEraVisibility();
  // Conditions
  document.querySelectorAll('#sheet-conds .chip').forEach(el => {
    const c = el.getAttribute('data-cond');
    el.classList.toggle('on', _draft.conds.has(c));
  });
  // Sort
  document.querySelectorAll('#sheet-sort .chip').forEach(el => {
    el.classList.toggle('on', el.getAttribute('data-sort') === _draft.sort);
  });
  // Price
  document.getElementById('price-min').value = _draft.minP || '';
  document.getElementById('price-max').value = _draft.maxP || '';
  // Eras + Sets — re-render with selection state
  renderEraChips();
  document.getElementById('set-search-input').value = '';
  renderSetList();
  // Game-aware advanced filters (color/type/rarity). If a recent boot/top-
  // strip prefetch left us with meta for this game, paint the pills from
  // cache immediately — then re-fetch in the background to refresh counts.
  if (_filterMeta && _filterMeta.game === _draft.game) {
    renderAdvancedFilterSections();
  }
  loadFilterMetaForDraft().then(ok => { if (ok) renderAdvancedFilterSections(); });

  document.getElementById('filter-sheet-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFilterSheet(e) {
  if (e && e.target.id !== 'filter-sheet-overlay') return;
  document.getElementById('filter-sheet-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _draft = null;
}

function clearAllFilters() {
  _draft = {
    game: '', era: '', set: '', sort: 'name_asc',
    conds: new Set(['NM','LP','MP','HP','DMG']),
    minP: '', maxP: '',
    colors: new Set(), colorMode: 'any',
    cardTypes: new Set(), rarities: new Set(),
  };
  document.querySelectorAll('#sheet-conds .chip').forEach(el => el.classList.add('on'));
  document.querySelectorAll('#sheet-sort .chip').forEach(el => {
    el.classList.toggle('on', el.getAttribute('data-sort') === 'name_asc');
  });
  document.getElementById('price-min').value = '';
  document.getElementById('price-max').value = '';
  renderGameChips();
  _refreshSheetEraVisibility();
  loadSetsForFilters().then(() => {
    document.getElementById('set-search-input').value = '';
    renderSetList();
  });
  // Reset advanced sections (game now '', so they hide)
  loadFilterMetaForDraft().then(renderAdvancedFilterSections);
}

function applyFilterSheet() {
  if (!_draft) return;
  // Pull live price input values (not bound on every keystroke)
  _draft.minP = document.getElementById('price-min').value || '';
  _draft.maxP = document.getElementById('price-max').value || '';
  Object.assign(_filters, _draft);
  closeFilterSheet({ target: { id: 'filter-sheet-overlay' } });
  // Re-render the top-strip game pills so the active state matches
  loadGames();
  _refreshFiltersBtn();
  _refreshSortBtn();
  _renderActiveChips();
  _writeUrlState();
  doSearch();
}

function _refreshSheetEraVisibility() {
  const sec = document.getElementById('sheet-era-section');
  if (!sec) return;
  const g = _draft ? _draft.game : _filters.game;
  // Era is a Pokemon-only concept (Sword & Shield, Sun & Moon, etc.).
  // Showing it under "All" was confusing — non-Pokemon cards get filtered
  // out when an era is selected, which surprises users browsing all games.
  sec.style.display = (g === 'pokemon') ? '' : 'none';
}

function renderGameChips() {
  const wrap = document.getElementById('sheet-games');
  if (!wrap) return;
  const totalQty = _gameCache.reduce((s, g) => s + (g.qty || 0), 0);
  const items = [{ code: '', label: 'All', qty: totalQty }, ..._gameCache];
  wrap.innerHTML = items.map(g => {
    const active = (_draft ? _draft.game : _filters.game) === g.code;
    return `<span class="chip${active ? ' on' : ''}" data-game="${esc(g.code)}">${esc(g.label)} <span class="qty">${g.qty}</span></span>`;
  }).join('');
  wrap.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', async () => {
      if (!_draft) return;
      const newGame = el.getAttribute('data-game');
      if (_draft.game === newGame) return;
      _draft.game = newGame;
      // Switching games invalidates set + era selections — they're game-scoped
      _draft.era = '';
      _draft.set = '';
      // Same for the advanced filters: 'White (W)' on MTG means nothing on
      // OP, and 'Holo Rare' from Pokemon shouldn't carry over. Wipe them.
      _draft.colors    = new Set();
      _draft.cardTypes = new Set();
      _draft.rarities  = new Set();
      _draft.colorMode = 'any';
      renderGameChips();
      // Don't toggle Era visibility yet — hiding the Pokemon Era row right
      // now, before Magic's color/type/rarity pills land, makes everything
      // below jump up and then back down when the new pills render. Defer
      // ALL layout-affecting updates until after the fetches resolve so
      // every change paints in one frame.
      // Sets and filter-meta are independent — fetch in parallel so the
      // sheet doesn't wait for sets before kicking off the slower meta call.
      const [, metaFresh] = await Promise.all([
        loadSetsForFilters(_draft.era, _draft.game),
        loadFilterMetaForDraft(),
      ]);
      // Discard if the user clicked another game while these were in flight.
      if (_draft && _draft.game !== newGame) return;
      _refreshSheetEraVisibility();
      renderEraChips();
      document.getElementById('set-search-input').value = '';
      renderSetList();
      if (metaFresh) renderAdvancedFilterSections();
    });
  });
}

// ── Game-aware advanced filters: color / card_type / rarity ─────────────────
//
// Filter-meta is faceted: each group's counts reflect the OTHER currently-
// selected groups. So if the user picks Black, the card_type counts narrow
// from "Creature: 26" to "Creature: 4" — but the colors group itself stays
// stable (its own selection doesn't shrink its own options). Re-fetching on
// every toggle keeps badges live; we debounce so rapid clicks don't thrash.
// Returns true if the response is fresh (caller should re-render), false if
// stale (a newer request is in flight — discard) or errored.
async function loadFilterMetaForDraft() {
  const game = _draft ? _draft.game : _filters.game;
  if (!game) { _filterMeta = null; _filterMetaReqId++; return true; }
  const p = new URLSearchParams();
  p.set('game', game);
  if (_draft) {
    if (_draft.colors && _draft.colors.size) {
      p.set('colors', Array.from(_draft.colors).join(','));
      if (_draft.colorMode === 'exactly') p.set('color_mode', 'exactly');
    }
    if (_draft.cardTypes && _draft.cardTypes.size) {
      p.set('card_type', Array.from(_draft.cardTypes).join(','));
    }
    if (_draft.rarities && _draft.rarities.size) {
      p.set('card_rarity', Array.from(_draft.rarities).join(','));
    }
  }
  const myReq = ++_filterMetaReqId;
  try {
    const data = await get('/api/filter-meta?' + p.toString());
    if (myReq !== _filterMetaReqId) return false;  // a newer request superseded us
    _filterMeta = data;
    return true;
  } catch(e) {
    if (myReq === _filterMetaReqId) _filterMeta = null;
    return false;
  }
}

// Debounced refresh: fired after any chip toggle so qty badges across the
// other facets update to reflect the new selection. We re-render the whole
// filter sheet — it's short, no scroll cost — but only after a 220 ms
// quiet period so a flurry of toggles produces one network roundtrip.
let _filterMetaRefreshTimer = null;
function refreshFacetCounts() {
  if (_filterMetaRefreshTimer) clearTimeout(_filterMetaRefreshTimer);
  _filterMetaRefreshTimer = setTimeout(async () => {
    _filterMetaRefreshTimer = null;
    // Pull color/type/rarity counts AND era counts in parallel so the
    // sheet's chip badges all reflect the same selection state after one
    // round-trip cycle.
    const [metaFresh, ] = await Promise.all([loadFilterMetaForDraft(), loadEras()]);
    if (metaFresh) renderAdvancedFilterSections();
    renderEraChips();
  }, 220);
}

function renderAdvancedFilterSections() {
  const colorsSec = document.getElementById('sheet-colors-section');
  const typeSec   = document.getElementById('sheet-cardtype-section');
  const raritySec = document.getElementById('sheet-rarity-section');
  if (!colorsSec || !typeSec || !raritySec) return;

  // Hide everything when no game selected (filters are game-scoped)
  if (!_draft || !_draft.game || !_filterMeta || !_filterMeta.filters) {
    colorsSec.style.display = 'none';
    typeSec.style.display = 'none';
    raritySec.style.display = 'none';
    return;
  }

  const F = _filterMeta.filters || {};
  const game = _draft.game;

  // Colors
  if (F.colors) {
    document.getElementById('sheet-colors-label').textContent = F.colors.label || 'Color';
    const modes = _filterMeta.color_modes || [];
    const modeWrap = document.getElementById('sheet-color-mode');
    modeWrap.style.display = modes.length > 1 ? '' : 'none';
    // Sync mode toggle UI
    modeWrap.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('on', b.getAttribute('data-mode') === (_draft.colorMode || 'any'));
    });
    const wrap = document.getElementById('sheet-colors');
    wrap.innerHTML = (F.colors.options || []).map(o => {
      const on = _draft.colors.has(o.value);
      const cls = 'pip-' + o.value;  // pip-W / pip-Red / etc
      return `<span class="chip chip-color${on ? ' on' : ''}" data-color="${esc(o.value)}">
        <span class="pip ${cls}"></span>${esc(o.label)} <span class="qty">${o.qty}</span>
      </span>`;
    }).join('');
    wrap.querySelectorAll('.chip-color').forEach(el => {
      el.addEventListener('click', () => {
        if (!_draft) return;
        const v = el.getAttribute('data-color');
        if (_draft.colors.has(v)) _draft.colors.delete(v); else _draft.colors.add(v);
        el.classList.toggle('on');
        refreshFacetCounts();
      });
    });
    colorsSec.style.display = '';
  } else {
    colorsSec.style.display = 'none';
  }

  // Card type / Energy
  if (F.card_type) {
    document.getElementById('sheet-cardtype-label').textContent = F.card_type.label || 'Card type';
    const wrap = document.getElementById('sheet-cardtypes');
    wrap.innerHTML = (F.card_type.options || []).map(o => {
      const on = _draft.cardTypes.has(o.value);
      // Don't show options that have zero in stock — looks broken if you
      // toggle 'Battle' for MTG and the result is always 0.
      if (!o.qty) return '';
      return `<span class="chip${on ? ' on' : ''}" data-cardtype="${esc(o.value)}">
        ${esc(o.label)} <span class="qty">${o.qty}</span>
      </span>`;
    }).join('') || '<div style="color:var(--dim);font-size:0.8rem;">No cards in stock yet for this game.</div>';
    wrap.querySelectorAll('.chip').forEach(el => {
      el.addEventListener('click', () => {
        if (!_draft) return;
        const v = el.getAttribute('data-cardtype');
        if (_draft.cardTypes.has(v)) _draft.cardTypes.delete(v); else _draft.cardTypes.add(v);
        el.classList.toggle('on');
        refreshFacetCounts();
      });
    });
    typeSec.style.display = '';
  } else {
    typeSec.style.display = 'none';
  }

  // Rarity (always shown for the three supported games)
  if (F.rarity) {
    const wrap = document.getElementById('sheet-rarities');
    wrap.innerHTML = (F.rarity.options || []).map(o => {
      const on = _draft.rarities.has(o.value);
      return `<span class="chip${on ? ' on' : ''}" data-rarity="${esc(o.value)}">
        ${esc(o.label)} <span class="qty">${o.qty}</span>
      </span>`;
    }).join('') || '<div style="color:var(--dim);font-size:0.8rem;">No rarities in stock.</div>';
    wrap.querySelectorAll('.chip').forEach(el => {
      el.addEventListener('click', () => {
        if (!_draft) return;
        const v = el.getAttribute('data-rarity');
        if (_draft.rarities.has(v)) _draft.rarities.delete(v); else _draft.rarities.add(v);
        el.classList.toggle('on');
        refreshFacetCounts();
      });
    });
    raritySec.style.display = '';
  } else {
    raritySec.style.display = 'none';
  }
}

function setSheetColorMode(mode) {

// ── Active filter chips (above results) — removable, plus a clear pill ──────
function _renderActiveChips() {
  const wrap = document.getElementById('active-chips');
  if (!wrap) return;
  const chips = [];
  function chip(key, label) {
    chips.push(`<span class="ac-chip" data-key="${esc(key)}">${esc(label)}<span class="ac-x" title="Remove">✕</span></span>`);
  }
  if (_filters.game) {
    const g = (_gameCache.find(x => x.code === _filters.game) || {});
    chip('game', g.label || _filters.game);
  }
  if (_filters.era) chip('era', _filters.era);
  if (_filters.set) chip('set', _filters.set);
  if (_filters.colors && _filters.colors.size) {
    const mode = (_filters.colorMode === 'exactly') ? 'Exactly' : 'Any';
    // Reuse the option labels from the cached filter meta when available
    const labels = (_filterMeta && _filterMeta.filters && _filterMeta.filters.colors)
      ? Object.fromEntries(_filterMeta.filters.colors.options.map(o => [o.value, o.label]))
      : {};
    const list = [..._filters.colors].map(c => labels[c] || c).join(', ');
    chip('colors', `${mode}: ${list}`);
  }
  if (_filters.cardTypes && _filters.cardTypes.size) {
    chip('cardTypes', [..._filters.cardTypes].join(', '));
  }
  if (_filters.rarities && _filters.rarities.size) {
    chip('rarities', [..._filters.rarities].join(', '));
  }
  if (_filters.minP || _filters.maxP) {
    const lo = _filters.minP ? `$${_filters.minP}` : '$0';
    const hi = _filters.maxP ? `$${_filters.maxP}` : '∞';
    chip('price', `${lo} – ${hi}`);
  }
  if (_filters.conds && _filters.conds.size && _filters.conds.size !== 5) {
    chip('conds', [..._filters.conds].join(', '));
  }
  if (chips.length) {
    chips.push('<button type="button" class="ac-clear" onclick="_clearAllActive()">Clear all</button>');
  }
  wrap.innerHTML = chips.join('');
  wrap.querySelectorAll('.ac-chip').forEach(el => {
    el.querySelector('.ac-x').addEventListener('click', (e) => {
      e.stopPropagation();
      _removeActive(el.getAttribute('data-key'));
    });
  });
}

function _removeActive(key) {
  switch (key) {
    case 'game':      _filters.game = ''; _filters.era = ''; _filters.set = '';
                      _filters.colors = new Set(); _filters.cardTypes = new Set();
                      _filters.rarities = new Set(); break;
    case 'era':       _filters.era = ''; break;
    case 'set':       _filters.set = ''; break;
    case 'colors':    _filters.colors = new Set(); _filters.colorMode = 'any'; break;
    case 'cardTypes': _filters.cardTypes = new Set(); break;
    case 'rarities':  _filters.rarities = new Set(); break;
    case 'price':     _filters.minP = ''; _filters.maxP = ''; break;
    case 'conds':     _filters.conds = new Set(['NM','LP','MP','HP','DMG']); break;
  }
  loadGames();             // re-render top game-pills (in case game cleared)
  _refreshFiltersBtn();
  _renderActiveChips();
  _writeUrlState();
  doSearch();
}

function _clearAllActive() {
  _filters.game = ''; _filters.era = ''; _filters.set = '';
  _filters.colors = new Set(); _filters.cardTypes = new Set(); _filters.rarities = new Set();
  _filters.colorMode = 'any';
  _filters.minP = ''; _filters.maxP = '';

// ── URL state — bookmark / share-friendly persistence ────────────────────────
function _writeUrlState() {
  const p = new URLSearchParams();
  if (_filters.game)   p.set('game', _filters.game);
  if (_filters.era)    p.set('era', _filters.era);
  if (_filters.set)    p.set('set', _filters.set);
  if (_filters.sort && _filters.sort !== 'name_asc') p.set('sort', _filters.sort);
  if (_filters.colors && _filters.colors.size) {
    p.set('colors', [..._filters.colors].join(','));
    if (_filters.colorMode === 'exactly') p.set('color_mode', 'exactly');
  }
  if (_filters.cardTypes && _filters.cardTypes.size) p.set('card_type',   [..._filters.cardTypes].join(','));
  if (_filters.rarities  && _filters.rarities.size)  p.set('card_rarity', [..._filters.rarities].join(','));
  if (_filters.minP) p.set('min_price', _filters.minP);
  if (_filters.maxP) p.set('max_price', _filters.maxP);
  if (_filters.conds && _filters.conds.size !== 5)   p.set('condition', [..._filters.conds].join(','));
  const q = (document.getElementById('q')?.value || '').trim();
  if (q) p.set('q', q);
  const qs = p.toString();
  // replaceState (not pushState) — back button shouldn't unwind every chip toggle
  history.replaceState({}, '', qs ? '?' + qs : window.location.pathname);
}

function _readUrlState() {
  const p = new URLSearchParams(window.location.search);
  if (p.has('game')) _filters.game = p.get('game');
  if (p.has('era'))  _filters.era  = p.get('era');
  if (p.has('set'))  _filters.set  = p.get('set');
  if (p.has('sort')) _filters.sort = p.get('sort');
  if (p.has('colors')) _filters.colors = new Set(p.get('colors').split(',').filter(Boolean));
  if (p.get('color_mode') === 'exactly') _filters.colorMode = 'exactly';
  if (p.has('card_type'))   _filters.cardTypes = new Set(p.get('card_type').split(',').filter(Boolean));
  if (p.has('card_rarity')) _filters.rarities  = new Set(p.get('card_rarity').split(',').filter(Boolean));
  if (p.has('min_price'))   _filters.minP = p.get('min_price');
  if (p.has('max_price'))   _filters.maxP = p.get('max_price');
  if (p.has('condition'))   _filters.conds = new Set(p.get('condition').split(',').filter(Boolean));
  if (p.has('q')) {
    const qInput = document.getElementById('q');
    if (qInput) qInput.value = p.get('q');
    _toggleSearchClear();
  }
  // Don't strip the URL here — boot() does the access-key clean-up later.
}

function toggleSheetCond(el) {
