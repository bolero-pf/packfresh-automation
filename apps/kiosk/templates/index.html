<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pack Fresh — Browse Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0f;
  --surface:  #111118;
  --surface2: #1a1a24;
  --border:   #2a2a38;
  --accent:   #e8c547;    /* gold — premium card shop feel */
  --accent2:  #4fc3f7;   /* blue for secondary actions */
  --green:    #4ade80;
  --red:      #f87171;
  --text:     #f0f0f8;
  --dim:      #9494b0;
  --sans:     'DM Sans', sans-serif;
  --display:  'Bebas Neue', sans-serif;
  --mono:     'DM Mono', monospace;
  --r:        12px;
  --touch:    56px;   /* minimum tap target */
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  overscroll-behavior: none;
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: linear-gradient(180deg, rgba(10,10,15,0.98) 0%, rgba(10,10,15,0.92) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
}
.header-top { max-width: 1200px; margin: 0 auto; display: flex; gap: 14px; align-items: center; justify-content: space-between; }
.header-search { max-width: 1200px; margin: 10px auto 0; }
.logo { font-family: var(--display); font-size: 2rem; letter-spacing: 0.06em; color: var(--accent); white-space: nowrap; line-height: 1; }
.logo-sub { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; margin-top: -2px; }

.search-input {
  width: 100%; height: var(--touch);
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--r); color: var(--text);
  padding: 0 18px; font-family: var(--sans); font-size: 1rem; outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--dim); }

/* Cart button */
.cart-btn {
  position: relative; height: var(--touch); min-width: var(--touch);
  background: var(--accent); border: none; border-radius: var(--r);
  color: #000; font-family: var(--display); font-size: 1.2rem; letter-spacing: 0.05em;
  cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0 18px;
  transition: transform 0.1s, opacity 0.15s;
}
.cart-btn:active { transform: scale(0.97); }
.cart-badge {
  position: absolute; top: -6px; right: -6px;
  background: var(--red); color: #fff; border-radius: 50%;
  width: 22px; height: 22px; font-family: var(--sans); font-size: 0.7rem;
  font-weight: 600; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.cart-badge.visible { opacity: 1; }

/* ── Grid ── */
.main { max-width: 1200px; margin: 0 auto; padding: 20px; }

.results-info { font-size: 0.82rem; color: var(--dim); margin-bottom: 16px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

.card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r); overflow: hidden;
  cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  display: flex; flex-direction: column;
  user-select: none;
}
.card:active { transform: scale(0.97); }
.card:hover { border-color: var(--accent); }

.card-img {
  aspect-ratio: 2.5/3.5;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card-img img { width: 100%; height: 100%; object-fit: contain; }
.card-img .no-img { font-size: 3rem; opacity: 0.15; }

.card-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
.card-name { font-size: 0.88rem; font-weight: 600; line-height: 1.3; }
.card-set  { font-size: 0.72rem; color: var(--dim); }

.cond-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
.cond-pill {
  font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
  border-radius: 20px; letter-spacing: 0.04em;
}
.cond-NM  { background: rgba(74,222,128,0.15); color: var(--green); }
.cond-LP  { background: rgba(232,197,71,0.15); color: var(--accent); }
.cond-MP  { background: rgba(251,146,60,0.15); color: #fb923c; }
.cond-HP  { background: rgba(248,113,113,0.15); color: var(--red); }
.cond-DMG { background: rgba(248,113,113,0.25); color: var(--red); }

.variant-badge {
  display: inline-block; font-size: 0.6rem; font-weight: 700;
  padding: 1px 6px; border-radius: 4px; margin-left: 6px;
  background: rgba(192,132,252,0.18); color: #c084fc;
  letter-spacing: 0.02em; vertical-align: middle;
}

.card-price { font-family: var(--mono); font-size: 0.88rem; color: var(--accent); margin-top: auto; padding-top: 6px; }

/* ── Pagination ── */
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
.pg { height: 44px; min-width: 44px; padding: 0 14px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: var(--sans);
  font-size: 0.9rem; cursor: pointer; }
.pg.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.pg:disabled { opacity: 0.3; cursor: default; }

/* ── Overlay / panels ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  padding: 20px;
}
.overlay.active { display: flex; }

.panel {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r);
  width: 100%; max-width: 640px;
  max-height: 88vh; overflow-y: auto;
  padding: 28px; animation: fadeScale 0.2s ease;
}
@keyframes fadeScale {
  from { opacity: 0; transform: scale(0.96); }
  to   { opacity: 1; transform: scale(1); }
}

.panel-title { font-family: var(--display); font-size: 1.6rem; letter-spacing: 0.05em; margin-bottom: 4px; }
.panel-sub   { font-size: 0.85rem; color: var(--dim); margin-bottom: 20px; }

/* Card detail panel */
.detail-hero { display: flex; gap: 18px; margin-bottom: 20px; }
.detail-img  { width: 140px; min-width: 140px; aspect-ratio: 2.5/3.5; border-radius: 8px; overflow: hidden; background: var(--surface2); cursor: pointer; transition: transform 0.15s; }
.detail-img:hover { transform: scale(1.03); }
.detail-img img { width: 100%; height: 100%; object-fit: contain; }
.detail-info { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.detail-info-row { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; }
.detail-info-label { color: var(--dim); min-width: 60px; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; }
.detail-info-val { color: var(--text); font-weight: 500; }
@media (max-width: 480px) {
  .detail-hero { flex-direction: column; align-items: center; }
  .detail-img { width: 180px; min-width: unset; }
}

/* Image lightbox */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.92); backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
  cursor: zoom-out; padding: 20px;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 90vw; max-height: 90vh; object-fit: contain;
  border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  animation: fadeScale 0.2s ease;
}

.copy-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.copy-row {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px; cursor: pointer;
  transition: border-color 0.15s;
}
.copy-row.selected { border-color: var(--accent); }
.copy-info {
  display: flex; align-items: center; gap: 10px;
}
.copy-cond { font-weight: 700; font-size: 1rem; min-width: 40px; }
.copy-num  { font-size: 0.8rem; color: var(--dim); flex: 1; }
.copy-price { font-family: var(--mono); font-size: 1rem; color: var(--accent); white-space: nowrap; }
.copy-action {
  margin-top: 8px;
}
.copy-add-btn {
  display: block; width: 100%; padding: 8px; border: 1.5px solid var(--accent);
  background: transparent; color: var(--accent); border-radius: 8px;
  font-weight: 700; font-size: 0.9rem; cursor: pointer; text-align: center;
}
.copy-add-btn:active { background: rgba(232,197,71,0.15); }
.copy-qty-bar {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  padding: 6px; background: rgba(232,197,71,0.08); border-radius: 8px;
}
.copy-qty-bar .qty-btn {
  width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--accent);
  background: transparent; color: var(--accent); font-size: 1.2rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.copy-qty-bar .qty-btn:active { background: rgba(232,197,71,0.2); }
.copy-qty-bar .qty-val { font-size: 1.1rem; font-weight: 700; min-width: 28px; text-align: center; }
.copy-check { width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border); display: flex; align-items: center;
  justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
.copy-row.selected .copy-check { background: var(--accent); border-color: var(--accent); color: #000; }

/* Qty controls */
.qty-row { display: flex; align-items: center; gap: 14px; margin: 16px 0; }
.qty-label { font-size: 0.85rem; color: var(--dim); flex: 1; }
.qty-ctrl { display: flex; align-items: center; gap: 12px; }
.qty-btn {
  width: 44px; height: 44px; border-radius: 8px;
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--text); font-size: 1.4rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s;
}
.qty-btn:active { border-color: var(--accent); }
.qty-val { font-family: var(--mono); font-size: 1.1rem; min-width: 24px; text-align: center; }

/* Cart panel */
.cart-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.cart-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border-radius: 10px; padding: 12px 14px;
}
.cart-item-info { flex: 1; }
.cart-item-name { font-weight: 600; font-size: 0.9rem; }
.cart-item-sub  { font-size: 0.75rem; color: var(--dim); }
.cart-item .copy-qty-bar { min-width: 84px; gap: 8px; }
.cart-item .qty-btn { width: 30px; height: 30px; font-size: 1rem; }
.cart-item img { width: 36px; }

/* Toast notice */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 10px 20px; font-size: 0.85rem;
  color: var(--text); z-index: 300; animation: toastIn 0.2s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* Form */
.form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-label { font-size: 0.8rem; color: var(--dim); letter-spacing: 0.05em; text-transform: uppercase; }
.form-input {
  height: var(--touch); background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--r); color: var(--text); padding: 0 18px;
  font-family: var(--sans); font-size: 1rem; outline: none; width: 100%;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }

/* Buttons */
.btn {
  height: var(--touch); padding: 0 24px; border-radius: var(--r);
  font-family: var(--sans); font-size: 1rem; font-weight: 600;
  cursor: pointer; border: none; transition: transform 0.1s, opacity 0.15s;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(0.97); }
.btn-gold    { background: var(--accent); color: #000; width: 100%; }
.btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text); }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

/* Confirmation screen */
.confirm-screen {
  text-align: center; padding: 20px 0 10px;
}
.confirm-icon { font-size: 4rem; margin-bottom: 16px; }
.confirm-title { font-family: var(--display); font-size: 2.5rem; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 8px; }
.confirm-ref { font-family: var(--mono); font-size: 1rem; color: var(--text); opacity: 0.8; margin-bottom: 20px; }
.confirm-msg { font-size: 1.1rem; color: var(--text); line-height: 1.7; margin-bottom: 24px; }

/* Confirm modal */
.confirm-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.confirm-overlay.active { display: flex; }
.confirm-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r);
  padding: 28px; max-width: 360px; width: 90%; text-align: center;
}
.confirm-box h3 { margin-bottom: 10px; }
.confirm-box p { color: var(--dim); font-size: 0.9rem; margin-bottom: 20px; }

/* Top filter strip — Game pills (horizontal scroll) + Filters button.
   Not sticky on its own — header is already sticky and a second sticky
   element here would have to compute the header's height to avoid overlap. */
.filter-strip {
  display: flex; gap: 10px; align-items: center; padding: 10px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  max-width: 1200px; margin: 0 auto;
}
.game-pills {
  display: flex; gap: 8px; overflow-x: auto; flex: 1; padding: 2px 0;
  scrollbar-width: none;
}
.game-pills::-webkit-scrollbar { display: none; }
.game-pill {
  flex-shrink: 0; min-height: 44px; padding: 0 18px;
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 22px;
  color: var(--text); font-family: var(--sans); font-size: 0.95rem; font-weight: 500;
  cursor: pointer; user-select: none; transition: all 0.15s; white-space: nowrap;
}
.game-pill .qty { color: var(--dim); font-size: 0.78rem; font-variant-numeric: tabular-nums; }
.game-pill.active {
  background: var(--accent); border-color: var(--accent); color: #0a0a0f;
}
.game-pill.active .qty { color: rgba(10,10,15,0.65); }

.filters-btn {
  flex-shrink: 0; min-height: 44px; padding: 0 18px;
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1.5px solid var(--border); border-radius: 22px;
  color: var(--text); font-family: var(--sans); font-size: 0.95rem; font-weight: 500;
  cursor: pointer;
}
.filters-btn.has-active { border-color: var(--accent); color: var(--accent); }
.filters-btn .badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 22px; height: 22px; padding: 0 7px; border-radius: 11px;
  background: var(--accent); color: #0a0a0f;
  font-size: 0.78rem; font-weight: 700; font-variant-numeric: tabular-nums;
}

/* Bottom sheet overlay */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: none; z-index: 100; align-items: flex-end;
  animation: fadeIn 0.18s ease-out;
}
.sheet-overlay.open { display: flex; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.sheet {
  width: 100%; max-width: 760px; margin: 0 auto;
  background: var(--surface); border-top-left-radius: 18px; border-top-right-radius: 18px;
  max-height: 90vh; display: flex; flex-direction: column;
  animation: slideUp 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.sheet-grip { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
.sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
}
.sheet-header h3 { font-family: var(--sans); font-size: 1.05rem; font-weight: 600; }
.sheet-header .clear-link {
  background: none; border: none; color: var(--accent); font-size: 0.85rem;
  cursor: pointer; padding: 8px; font-weight: 500;
}
.sheet-body { padding: 16px 20px 24px; overflow-y: auto; flex: 1; }
/* Slim themed scrollbar so it doesn't look like a stacked system widget.
   Applies to both the sheet body and the inner set-list. */
.sheet-body, .set-list { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.sheet-body::-webkit-scrollbar, .set-list::-webkit-scrollbar { width: 6px; }
.sheet-body::-webkit-scrollbar-track, .set-list::-webkit-scrollbar-track { background: transparent; }
.sheet-body::-webkit-scrollbar-thumb, .set-list::-webkit-scrollbar-thumb {
  background: var(--border); border-radius: 3px;
}
.sheet-body::-webkit-scrollbar-thumb:hover, .set-list::-webkit-scrollbar-thumb:hover {
  background: var(--dim);
}
.sheet-section { margin-bottom: 22px; }
.sheet-section-title {
  font-size: 0.72rem; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 10px; font-weight: 600;
}
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  min-height: 44px; padding: 0 16px;
  display: inline-flex; align-items: center; gap: 6px;
  /* Off-state: outline button feel — clearly tappable, not blending with surface */
  background: rgba(240, 240, 248, 0.04);
  border: 1.5px solid rgba(240, 240, 248, 0.28);
  border-radius: 22px;
  color: var(--text); font-family: var(--sans); font-size: 0.92rem; font-weight: 500;
  cursor: pointer; user-select: none; transition: all 0.12s;
}
.chip:hover {
  background: rgba(240, 240, 248, 0.08);
  border-color: rgba(240, 240, 248, 0.45);
}
.chip.on {
  background: var(--accent); border-color: var(--accent); color: #0a0a0f;
}
.chip.on:hover {
  background: var(--accent); border-color: var(--accent);
}
.chip .qty { color: var(--dim); font-size: 0.78rem; font-variant-numeric: tabular-nums; }
.chip.on .qty { color: rgba(10,10,15,0.7); font-weight: 600; }
.chip.cond-NM.on { background: #14532d; border-color: #4ade80; color: #4ade80; }
.chip.cond-LP.on { background: rgba(232,197,71,0.22); border-color: #e8c547; color: #e8c547; }
.chip.cond-MP.on { background: rgba(251,146,60,0.22); border-color: #fb923c; color: #fb923c; }
.chip.cond-HP.on { background: rgba(248,113,113,0.22); border-color: #f87171; color: #f87171; }
.chip.cond-DMG.on { background: rgba(185,28,28,0.22); border-color: #b91c1c; color: #f87171; }

.set-search-input {
  width: 100%; min-height: 44px; padding: 0 14px;
  background: rgba(240, 240, 248, 0.06);
  border: 1.5px solid rgba(240, 240, 248, 0.28);
  border-radius: 10px;
  color: var(--text); font-family: var(--sans); font-size: 0.95rem;
  outline: none; margin-bottom: 10px;
  transition: border-color 0.12s, background 0.12s;
}
.set-search-input::placeholder { color: var(--dim); }
.set-search-input:focus {
  border-color: var(--accent);
  background: rgba(232, 197, 71, 0.06);
}
.set-list { max-height: 280px; overflow-y: auto; padding-right: 4px; }
.set-row {
  min-height: 48px; padding: 0 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border-radius: 8px; cursor: pointer; user-select: none;
}
.set-row + .set-row { margin-top: 4px; }
.set-row:hover { background: var(--surface2); }
.set-row.on { background: rgba(232,197,71,0.12); color: var(--accent); }
.set-row .qty { color: var(--dim); font-size: 0.82rem; font-variant-numeric: tabular-nums; }
.set-row.on .qty { color: var(--accent); }

.price-row { display: flex; gap: 10px; align-items: center; }
.price-input {
  flex: 1; min-height: 48px; padding: 0 14px;
  background: rgba(240, 240, 248, 0.06);
  border: 1.5px solid rgba(240, 240, 248, 0.28);
  border-radius: 10px;
  color: var(--text); font-family: var(--mono); font-size: 1rem; outline: none;
  text-align: center;
  transition: border-color 0.12s, background 0.12s;
}
.price-input::placeholder { color: var(--dim); }
.price-input:focus {
  border-color: var(--accent);
  background: rgba(232, 197, 71, 0.06);
}
.price-dash { color: var(--dim); font-size: 1.1rem; }

.sheet-footer {
  padding: 14px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center;
  background: var(--surface);
}
.sheet-apply {
  flex: 1; min-height: 56px; border-radius: 12px; border: none;
  background: var(--accent); color: #0a0a0f;
  font-family: var(--sans); font-size: 1.05rem; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
}
.sheet-apply:disabled { opacity: 0.55; }

/* Empty / loading */
.empty { text-align: center; padding: 80px 20px; color: var(--dim); }
.empty-icon { font-size: 3rem; opacity: 0.2; margin-bottom: 12px; }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.7s linear infinite; margin: 80px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Cart total bar */
.cart-total-bar {
  background: var(--surface2); border-top: 1.5px solid var(--border);
  padding: 12px 0; display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.cart-total-label { font-size: 0.82rem; color: var(--dim); }
.cart-total-val { font-family: var(--mono); font-size: 1.1rem; color: var(--accent); }
.cart-limit { font-size: 0.75rem; color: var(--dim); text-align: center; margin-bottom: 12px; }

/* Warning */
.warning { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
  border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--red); margin-bottom: 12px; }
.info { background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.3);
  border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: var(--accent2); margin-bottom: 12px; }
</style>
</head>
<body>

<!-- Champion status bar -->
<div id="champion-bar" style="display:none;align-items:center;gap:8px;padding:4px 16px;background:rgba(232,197,71,0.08);border-bottom:1px solid rgba(232,197,71,0.15);font-size:0.82rem;line-height:1;"></div>

<header>
  <div class="header-top">
    <div>
      <div class="logo">Pack Fresh</div>
      <div class="logo-sub">Card Browser</div>
    </div>
    <button class="cart-btn" onclick="openCart()">
      🃏 My Picks
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
  <div class="header-search">
    <input class="search-input" type="text" id="q" placeholder="Search cards or card #…" oninput="debounce()" autocomplete="off" autocorrect="off">
  </div>
</header>

<!-- Top filter strip: Game pills (always visible) + Filters button -->
<div class="filter-strip">
  <div class="game-pills" id="game-pills"></div>
  <button class="filters-btn" id="filters-btn" onclick="openFilterSheet()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M6 12h12M10 18h4"/></svg>
    <span>Filters</span>
    <span class="badge" id="filters-count" style="display:none;">0</span>
  </button>
</div>

<!-- Bottom-sheet filter overlay -->
<div class="sheet-overlay" id="filter-sheet-overlay" onclick="closeFilterSheet(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-grip"></div>
    <div class="sheet-header">
      <h3>Filters</h3>
      <button class="clear-link" onclick="clearAllFilters()">Clear all</button>
    </div>
    <div class="sheet-body">
      <div class="sheet-section">
        <div class="sheet-section-title">Game</div>
        <div class="chip-row" id="sheet-games"></div>
      </div>
      <div class="sheet-section" id="sheet-era-section" style="display:none;">
        <div class="sheet-section-title">Era (Pokémon)</div>
        <div class="chip-row" id="sheet-eras"></div>
      </div>
      <div class="sheet-section">
        <div class="sheet-section-title">Set</div>
        <input class="set-search-input" id="set-search-input" placeholder="Search sets…" oninput="renderSetList()" autocomplete="off">
        <div class="set-list" id="sheet-sets"></div>
      </div>
      <div class="sheet-section">
        <div class="sheet-section-title">Condition</div>
        <div class="chip-row" id="sheet-conds">
          <span class="chip cond-NM on" data-cond="NM" onclick="toggleSheetCond(this)">NM</span>
          <span class="chip cond-LP on" data-cond="LP" onclick="toggleSheetCond(this)">LP</span>
          <span class="chip cond-MP on" data-cond="MP" onclick="toggleSheetCond(this)">MP</span>
          <span class="chip cond-HP on" data-cond="HP" onclick="toggleSheetCond(this)">HP</span>
          <span class="chip cond-DMG on" data-cond="DMG" onclick="toggleSheetCond(this)">DMG</span>
        </div>
      </div>
      <div class="sheet-section">
        <div class="sheet-section-title">Sort</div>
        <div class="chip-row" id="sheet-sort">
          <span class="chip on" data-sort="name_asc" onclick="setSheetSort(this)">Name A–Z</span>
          <span class="chip" data-sort="price_asc" onclick="setSheetSort(this)">Price Low–High</span>
          <span class="chip" data-sort="price_desc" onclick="setSheetSort(this)">Price High–Low</span>
          <span class="chip" data-sort="newest" onclick="setSheetSort(this)">Newest</span>
        </div>
      </div>
      <div class="sheet-section">
        <div class="sheet-section-title">Price</div>
        <div class="price-row">
          <input class="price-input" id="price-min" type="number" inputmode="numeric" min="0" step="1" placeholder="Min $">
          <span class="price-dash">—</span>
          <input class="price-input" id="price-max" type="number" inputmode="numeric" min="0" step="1" placeholder="Max $">
        </div>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="sheet-apply" id="sheet-apply" onclick="applyFilterSheet()">Apply</button>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-dlg-title"></h3>
    <p id="confirm-dlg-msg"></p>
    <div class="btn-row">
      <button class="btn btn-outline" id="confirm-dlg-cancel">Cancel</button>
      <button class="btn btn-gold" id="confirm-dlg-ok">Confirm</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="results-info" id="results-info"></div>
  <div id="grid" class="grid"></div>
  <div id="pagination" class="pagination"></div>
</div>

<!-- Card detail overlay -->
<div class="overlay" id="detail-overlay">
  <div class="panel" id="detail-panel"></div>
</div>

<!-- Cart / checkout overlay -->
<div class="overlay" id="cart-overlay">
  <div class="panel" id="cart-panel"></div>
</div>

<script>
const MAX = 20;
const KIOSK_ACCESS_KEY = '{{ access_key }}';
let _cart = [];  // [{card_name, set_name, condition, qty, price, image_url}]
// Active conditions live on _filters.conds now (set in the bottom-sheet apply flow)
let _hasAccess = false;

// Access gate — check URL param or localStorage
function checkAccess() {
  const params = new URLSearchParams(window.location.search);
  const urlKey = params.get('key');
  if (urlKey && urlKey === KIOSK_ACCESS_KEY) {
    localStorage.setItem('pf_kiosk_key', urlKey);
    // Clean the URL
    window.history.replaceState({}, '', '/');
    _hasAccess = true;
    return true;
  }
  const savedKey = localStorage.getItem('pf_kiosk_key');
  if (savedKey && savedKey === KIOSK_ACCESS_KEY) {
    _hasAccess = true;
    return true;
  }
  if (!KIOSK_ACCESS_KEY) {
    _hasAccess = true;
    return true;
  }
  return false;
}

function showAccessGate() {
  document.getElementById('grid').innerHTML = `
    <div style="grid-column:1/-1;text-align:center;padding:60px 20px;">
      <div style="font-size:2rem;margin-bottom:12px;">🃏</div>
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;">Pack Fresh Card Browser</div>
      <div style="color:var(--dim);margin-bottom:20px;">This kiosk is for in-store use. Ask a staff member for access.</div>
      <div style="color:var(--dim);font-size:0.82rem;">Champion? <a href="#" onclick="showChampionAccessLogin(event)" style="color:var(--accent);">Sign in with your email</a></div>
      <div id="gate-champion-form" style="display:none;max-width:300px;margin:16px auto 0;">
        <input class="form-input" id="gate-champ-email" type="email" placeholder="your@email.com" style="margin-bottom:8px;">
        <div id="gate-champ-error" style="display:none;color:var(--red);font-size:0.82rem;margin-bottom:8px;"></div>
        <button class="btn btn-gold" style="width:100%;" onclick="gateChampionVerify()">Verify Champion Status</button>
      </div>
    </div>
  `;
}

function showChampionAccessLogin(e) {
  e.preventDefault();
  document.getElementById('gate-champion-form').style.display = 'block';
}

async function gateChampionVerify() {
  const email = (document.getElementById('gate-champ-email')?.value || '').trim().toLowerCase();
  const errEl = document.getElementById('gate-champ-error');
  if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }
  try {
    const d = await post('/api/champion/identify', { email });
    if (d.verified) {
      _champion = { verified: true, first_name: d.first_name, customer_gid: d.customer_gid, email: d.email, checkout_enabled: d.checkout_enabled };
      _saveChampion();
      _hasAccess = true;
      updateChampionUI();
      location.reload();
    } else {
      errEl.textContent = d.reason || 'Not a Champion account.';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = e.message || 'Verification failed.';
    errEl.style.display = 'block';
  }
}

// Champion state — persisted in localStorage
let _champion = null;  // { verified, first_name, customer_gid, email }

function _saveChampion() {
  try { localStorage.setItem('pf_champion', JSON.stringify(_champion)); } catch(e) {}
}
function _loadChampion() {
  try {
    const saved = localStorage.getItem('pf_champion');
    if (saved) _champion = JSON.parse(saved);
  } catch(e) { _champion = null; }
}
function _clearChampion() {
  _champion = null;
  try { localStorage.removeItem('pf_champion'); } catch(e) {}
  // If no store key either, reload to show the access gate
  if (!localStorage.getItem('pf_kiosk_key')) {
    location.reload();
    return;
  }
  updateChampionUI();
}
function updateChampionUI() {
  const bar = document.getElementById('champion-bar');
  if (!bar) return;
  if (_champion && _champion.verified) {
    bar.innerHTML = `<span style="color:var(--accent);font-weight:700;">★ Champion</span><span style="color:var(--text);margin-left:4px;">${esc(_champion.first_name || _champion.email)}</span><button class="btn btn-outline" style="padding:2px 10px;font-size:0.72rem;margin-left:auto;line-height:1;" onclick="_clearChampion()">Sign Out</button>`;
    bar.style.display = 'flex';
  } else {
    bar.innerHTML = '';
    bar.style.display = 'none';
  }
}

// ── Themed Confirm ───────────────────────────────────────────────────────────
function themedConfirm(title, msg) {
  return new Promise(resolve => {
    document.getElementById('confirm-dlg-title').textContent = title;
    document.getElementById('confirm-dlg-msg').textContent = msg;
    const overlay = document.getElementById('confirm-overlay');
    overlay.classList.add('active');
    const cleanup = (val) => { overlay.classList.remove('active'); resolve(val); };
    document.getElementById('confirm-dlg-ok').onclick = () => cleanup(true);
    document.getElementById('confirm-dlg-cancel').onclick = () => cleanup(false);
  });
}

// ── Filter state (committed) — drives the URL/search ─────────────────────────
let _filters = {
  game: '',          // '' = all games
  era:  '',          // only meaningful when game === 'pokemon'
  set:  '',          // exact set name
  sort: 'name_asc',
  conds: new Set(['NM','LP','MP','HP','DMG']),
  minP: '',
  maxP: '',
};
// Sheet's pending state — committed only when Apply pressed
let _draft = null;
let _allSets = [];   // current /api/sets response, for in-sheet search filter

function _activeFilterCount() {
  let n = 0;
  if (_filters.game)   n++;
  if (_filters.era)    n++;
  if (_filters.set)    n++;
  if (_filters.sort && _filters.sort !== 'name_asc') n++;
  if (_filters.conds.size && _filters.conds.size !== 5) n++;
  if (_filters.minP)   n++;
  if (_filters.maxP)   n++;
  return n;
}

function _refreshFiltersBtn() {
  const btn = document.getElementById('filters-btn');
  const badge = document.getElementById('filters-count');
  const n = _activeFilterCount();
  if (n > 0) {
    btn.classList.add('has-active');
    badge.style.display = 'inline-flex';
    badge.textContent = String(n);
  } else {
    btn.classList.remove('has-active');
    badge.style.display = 'none';
  }
}

// ── Game pills (top strip) — single-select, fires search immediately ─────────
async function loadGames() {
  try {
    const d = await get('/api/games');
    _gameCache = d.games || [];
    const strip = document.getElementById('game-pills');
    const totalQty = _gameCache.reduce((s, g) => s + (g.qty || 0), 0);
    const items = [{ code: '', label: 'All', qty: totalQty }, ..._gameCache];
    strip.innerHTML = items.map(g =>
      `<span class="game-pill${_filters.game === g.code ? ' active' : ''}" data-game="${esc(g.code)}">
        ${esc(g.label)}<span class="qty">${g.qty}</span>
      </span>`
    ).join('');
    strip.querySelectorAll('.game-pill').forEach(el => {
      el.addEventListener('click', () => {
        const newGame = el.getAttribute('data-game');
        if (_filters.game === newGame) return;
        _filters.game = newGame;
        // Switching games invalidates set + era — they're game-scoped
        _filters.set = '';
        _filters.era = '';
        loadGames();          // re-render pills with new active state
        loadSetsForFilters(); // refresh available sets for this game
        _refreshFiltersBtn();
        doSearch();
      });
    });
  } catch(e) {}
}

// ── Bottom sheet: open / close / draft / apply ───────────────────────────────
let _gameCache = []; // populated by loadGames(), reused inside the sheet

function openFilterSheet() {
  // Snapshot current filters into a draft so Cancel just closes
  _draft = {
    game: _filters.game,
    era: _filters.era,
    set: _filters.set,
    sort: _filters.sort,
    conds: new Set(_filters.conds),
    minP: _filters.minP,
    maxP: _filters.maxP,
  };
  renderGameChips();
  _refreshSheetEraVisibility();
  // Conditions
  document.querySelectorAll('#sheet-conds .chip').forEach(el => {
    const c = el.getAttribute('data-cond');
    el.classList.toggle('on', _draft.conds.has(c));
  });
  // Sort
  document.querySelectorAll('#sheet-sort .chip').forEach(el => {
    el.classList.toggle('on', el.getAttribute('data-sort') === _draft.sort);
  });
  // Price
  document.getElementById('price-min').value = _draft.minP || '';
  document.getElementById('price-max').value = _draft.maxP || '';
  // Eras + Sets — re-render with selection state
  renderEraChips();
  document.getElementById('set-search-input').value = '';
  renderSetList();

  document.getElementById('filter-sheet-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFilterSheet(e) {
  if (e && e.target.id !== 'filter-sheet-overlay') return;
  document.getElementById('filter-sheet-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _draft = null;
}

function clearAllFilters() {
  _draft = {
    game: '', era: '', set: '', sort: 'name_asc',
    conds: new Set(['NM','LP','MP','HP','DMG']),
    minP: '', maxP: '',
  };
  document.querySelectorAll('#sheet-conds .chip').forEach(el => el.classList.add('on'));
  document.querySelectorAll('#sheet-sort .chip').forEach(el => {
    el.classList.toggle('on', el.getAttribute('data-sort') === 'name_asc');
  });
  document.getElementById('price-min').value = '';
  document.getElementById('price-max').value = '';
  renderGameChips();
  _refreshSheetEraVisibility();
  loadSetsForFilters().then(() => {
    document.getElementById('set-search-input').value = '';
    renderSetList();
  });
}

function applyFilterSheet() {
  if (!_draft) return;
  // Pull live price input values (not bound on every keystroke)
  _draft.minP = document.getElementById('price-min').value || '';
  _draft.maxP = document.getElementById('price-max').value || '';
  Object.assign(_filters, _draft);
  closeFilterSheet({ target: { id: 'filter-sheet-overlay' } });
  // Re-render the top-strip game pills so the active state matches
  loadGames();
  _refreshFiltersBtn();
  doSearch();
}

function _refreshSheetEraVisibility() {
  const sec = document.getElementById('sheet-era-section');
  if (!sec) return;
  const g = _draft ? _draft.game : _filters.game;
  // Era only meaningful for Pokemon (or All, which still includes Pokemon)
  sec.style.display = (g === 'pokemon' || g === '') ? '' : 'none';
}

function renderGameChips() {
  const wrap = document.getElementById('sheet-games');
  if (!wrap) return;
  const totalQty = _gameCache.reduce((s, g) => s + (g.qty || 0), 0);
  const items = [{ code: '', label: 'All', qty: totalQty }, ..._gameCache];
  wrap.innerHTML = items.map(g => {
    const active = (_draft ? _draft.game : _filters.game) === g.code;
    return `<span class="chip${active ? ' on' : ''}" data-game="${esc(g.code)}">${esc(g.label)} <span class="qty">${g.qty}</span></span>`;
  }).join('');
  wrap.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', async () => {
      if (!_draft) return;
      const newGame = el.getAttribute('data-game');
      if (_draft.game === newGame) return;
      _draft.game = newGame;
      // Switching games invalidates set + era selections — they're game-scoped
      _draft.era = '';
      _draft.set = '';
      renderGameChips();
      _refreshSheetEraVisibility();
      // Refetch sets/eras scoped to the new draft.game
      await loadSetsForFilters(_draft.era, _draft.game);
      renderEraChips();
      document.getElementById('set-search-input').value = '';
      renderSetList();
    });
  });
}

function toggleSheetCond(el) {
  if (!_draft) return;
  const cond = el.getAttribute('data-cond');
  if (_draft.conds.has(cond)) {
    if (_draft.conds.size <= 1) return; // keep at least one
    _draft.conds.delete(cond);
    el.classList.remove('on');
  } else {
    _draft.conds.add(cond);
    el.classList.add('on');
  }
}

function setSheetSort(el) {
  if (!_draft) return;
  _draft.sort = el.getAttribute('data-sort');
  document.querySelectorAll('#sheet-sort .chip').forEach(x => x.classList.toggle('on', x === el));
}

function renderEraChips() {
  const wrap = document.getElementById('sheet-eras');
  if (!wrap) return;
  const eras = _eraCache || [];
  wrap.innerHTML = eras.map(e =>
    `<span class="chip${(_draft && _draft.era === e.name) ? ' on' : ''}" data-era="${esc(e.name)}">${esc(e.name)} <span class="qty">${e.set_count}</span></span>`
  ).join('');
  wrap.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      if (!_draft) return;
      const era = el.getAttribute('data-era');
      _draft.era = (_draft.era === era) ? '' : era;
      _draft.set = '';
      wrap.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', x === el && _draft.era === era));
      // Refresh sets to be era-scoped (also honor any draft-level game change)
      loadSetsForFilters(_draft.era, _draft.game).then(renderSetList);
    });
  });
}

function renderSetList() {
  const list = document.getElementById('sheet-sets');
  if (!list) return;
  const filter = (document.getElementById('set-search-input').value || '').toLowerCase().trim();
  const visible = _allSets.filter(s => !filter || (s.name || '').toLowerCase().includes(filter));
  list.innerHTML = visible.slice(0, 200).map(s =>
    `<div class="set-row${(_draft && _draft.set === s.name) ? ' on' : ''}" data-set="${esc(s.name)}">
       <span>${esc(s.name)}</span><span class="qty">${s.qty}</span>
     </div>`
  ).join('') || '<div style="padding:12px;color:var(--dim);text-align:center;">No sets match.</div>';
  list.querySelectorAll('.set-row').forEach(el => {
    el.addEventListener('click', () => {
      if (!_draft) return;
      const name = el.getAttribute('data-set');
      _draft.set = (_draft.set === name) ? '' : name;
      list.querySelectorAll('.set-row').forEach(x => x.classList.toggle('on', x === el && _draft.set === name));
    });
  });
}

async function loadSetsForFilters(era, gameOverride) {
  try {
    const params = new URLSearchParams();
    const g = (gameOverride !== undefined) ? gameOverride : _filters.game;
    if (g)   params.set('game', g);
    if (era) params.set('era', era);
    const url = '/api/sets' + (params.toString() ? '?' + params : '');
    const d = await get(url);
    _allSets = d.sets || [];
  } catch(e) { _allSets = []; }
}

function _saveCart() {
  try { localStorage.setItem('pf_cart', JSON.stringify(_cart)); } catch(e) {}
}
function _loadCart() {
  try {
    const saved = localStorage.getItem('pf_cart');
    if (saved) _cart = JSON.parse(saved);
  } catch(e) { _cart = []; }
}
let _page = 1;
let _timer = null;
let _detail = null;  // current card being viewed

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  _loadCart();
  _loadChampion();

  // Champions bypass the access gate
  const championAccess = _champion && _champion.verified;
  if (!championAccess && !checkAccess()) {
    showAccessGate();
    return;
  }
  _hasAccess = true;

  updateCartBadge();
  updateChampionUI();
  await Promise.all([loadGames(), loadSetsForFilters(), loadEras()]);
  _refreshFiltersBtn();
  doSearch();
}

let _eraCache = [];
async function loadEras() {
  try {
    const d = await get('/api/eras');
    _eraCache = d.eras || [];
  } catch(e) { _eraCache = []; }
}

// ── Search ────────────────────────────────────────────────────────────────────
function debounce() {
  clearTimeout(_timer);
  _timer = setTimeout(() => doSearch(), 400);
}

async function doSearch(page) {
  _page = page || 1;
  const q = document.getElementById('q').value.trim();
  const conds = [..._filters.conds].join(',');
  const params = new URLSearchParams({
    q, page: _page, sort: _filters.sort, condition: conds,
  });
  if (_filters.game) params.set('game', _filters.game);
  if (_filters.set)  params.set('set', _filters.set);
  if (_filters.era)  params.set('era', _filters.era);
  if (_filters.minP) params.set('min_price', _filters.minP);
  if (_filters.maxP) params.set('max_price', _filters.maxP);

  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="spinner"></div>';
  document.getElementById('pagination').innerHTML = '';

  try {
    const d = await get('/api/browse?' + params);
    renderGrid(d.cards || []);
    renderPagination(d.page, d.pages, d.total);
    document.getElementById('results-info').textContent =
      d.total ? `${d.total} card${d.total !== 1 ? 's' : ''} available` : '';
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><p>${e.message}</p></div>`;
  }
}

function renderGrid(cards) {
  const grid = document.getElementById('grid');
  if (!cards.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🃏</div><p>No cards found</p></div>';
    return;
  }
  // Store card data in a map keyed by index to avoid HTML attribute escaping issues
  window._cardCache = {};
  grid.innerHTML = cards.map((c, idx) => {
    window._cardCache[idx] = c;
    const conds = Object.entries(c.conditions || {})
      .sort(([a],[b]) => ['NM','LP','MP','HP','DMG'].indexOf(a) - ['NM','LP','MP','HP','DMG'].indexOf(b));
    const pills = conds.map(([cond, qty]) =>
      `<span class="cond-pill cond-${cond}">${cond} ×${qty}</span>`).join('');
    const img = c.image_url
      ? `<img src="${esc(c.image_url)}" alt="${esc(c.card_name)}" loading="lazy">`
      : '<div class="no-img">🃏</div>';
    const price = c.min_price
      ? c.min_price === c.max_price
        ? `$${c.min_price.toFixed(2)}`
        : `$${c.min_price.toFixed(2)} – $${c.max_price.toFixed(2)}`
      : '';
    // variant_label only appears when the card has multiple printings in
    // Scrydex — single-variant cards stay uncluttered. Filtering uses
    // variant_key (folded bucket value) instead.
    const variantBadge = c.variant_label
      ? `<span class="variant-badge">${esc(c.variant_label)}</span>`
      : '';
    return `<div class="card" onclick="openDetail(window._cardCache[${idx}])">
      <div class="card-img">${img}</div>
      <div class="card-body">
        <div class="card-name">${esc(c.card_name)}${variantBadge}</div>
        <div class="card-set">${esc(c.set_name||'')}</div>
        <div class="cond-pills">${pills}</div>
        ${price ? `<div class="card-price">${price}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderPagination(page, pages, total) {
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let h = `<button class="pg" onclick="doSearch(${page-1})" ${page<=1?'disabled':''}>←</button>`;
  const show = new Set([1, pages, page-1, page, page+1].filter(p=>p>=1&&p<=pages));
  let prev = 0;
  [...show].sort((a,b)=>a-b).forEach(p => {
    if (p - prev > 1) h += `<span style="color:var(--dim);align-self:center">…</span>`;
    h += `<button class="pg${p===page?' active':''}" onclick="doSearch(${p})">${p}</button>`;
    prev = p;
  });
  h += `<button class="pg" onclick="doSearch(${page+1})" ${page>=pages?'disabled':''}>→</button>`;
  el.innerHTML = h;
}

// ── Card Detail ───────────────────────────────────────────────────────────────
async function openDetail(card) {
  _detail = card;
  const overlay = document.getElementById('detail-overlay');
  const panel   = document.getElementById('detail-panel');
  panel.innerHTML = '<div class="spinner"></div>';
  overlay.classList.add('active');

  try {
    // tcgplayer_id is the actual card identity. Two cards with the same
    // name + set + variant_fold (e.g. Boa Hancock OP14-041 vs OP14-112)
    // would otherwise collapse into one detail view with averaged prices.
    const _params = new URLSearchParams({
      name: card.card_name,
      set: card.set_name || '',
      variant: card.variant_key || '',
    });
    if (card.tcgplayer_id) _params.set('tcgplayer_id', card.tcgplayer_id);
    if (card.scrydex_id)   _params.set('scrydex_id',   card.scrydex_id);
    const d = await get('/api/card?' + _params);
    renderDetail(card, d.copies || []);
  } catch(e) {
    panel.innerHTML = `<div class="empty"><p>${e.message}</p></div>`;
  }
}

function renderDetail(card, copies) {
  const panel = document.getElementById('detail-panel');
  const imgUrl = card.image_url || '';
  const img = imgUrl
    ? `<img src="${esc(imgUrl)}" alt="${esc(card.card_name)}">`
    : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.2">🃏</div>';
  const variantNote = card.variant_label
    ? `<span class="variant-badge" style="vertical-align:middle;margin-left:8px;">${esc(card.variant_label)}</span>`
    : '';

  // Group copies by condition for qty selection
  const byCondition = {};
  copies.forEach(c => {
    if (!byCondition[c.condition]) byCondition[c.condition] = [];
    byCondition[c.condition].push(c);
  });

  const condOrder = ['NM','LP','MP','HP','DMG'];
  const cardVariantKey = card.variant_key || '';
  const cardVariantLabel = card.variant_label || '';
  const cardTcgId = card.tcgplayer_id || '';
  const cardSxId  = card.scrydex_id || '';
  const probe = { card_name: card.card_name, set_name: card.set_name,
                  variant_key: cardVariantKey, tcg_id: cardTcgId, scrydex_id: cardSxId };
  const condRows = Object.entries(byCondition)
    .sort(([a],[b]) => condOrder.indexOf(a) - condOrder.indexOf(b))
    .map(([cond, copies]) => {
      const avgPrice = copies.reduce((s,c) => s + (parseFloat(c.current_price)||0), 0) / copies.length;
      const inCart = _cart.filter(ci => _sameCartItem(ci, { ...probe, condition: cond }));
      const cartQty = inCart.reduce((s,ci) => s + ci.qty, 0);
      const actionHtml = cartQty > 0
        ? `<div class="copy-action"><div class="copy-qty-bar">
            <button class="qty-btn" data-delta="-1">−</button>
            <div class="qty-val">${cartQty}</div>
            <button class="qty-btn" data-delta="1">+</button>
          </div></div>`
        : `<div class="copy-action"><button class="copy-add-btn">+ Add to Picks</button></div>`;
      return `<div class="copy-row${cartQty>0?' selected':''}" data-cond="${cond}" data-variant-key="${esc(cardVariantKey)}" data-variant-label="${esc(cardVariantLabel)}" data-tcg-id="${esc(String(cardTcgId))}" data-scrydex-id="${esc(cardSxId)}" data-avail="${copies.length}" data-price="${avgPrice.toFixed(2)}" data-card-name="${esc(card.card_name)}" data-set-name="${esc(card.set_name||'')}" data-image-url="${esc(card.image_url||'')}">
        <div class="copy-info">
          <div class="copy-cond"><span class="cond-pill cond-${cond}">${cond}</span></div>
          <div class="copy-num">${copies.length} available${copies[0]?.card_number ? ' · #'+copies[0].card_number : ''}</div>
          <div class="copy-price">$${avgPrice > 0 ? avgPrice.toFixed(2) : '—'}</div>
        </div>
        ${actionHtml}
      </div>`;
    }).join('');

  // Build card info rows from available data
  const firstCopy = copies[0] || {};
  const infoRows = [];
  if (firstCopy.card_number) infoRows.push(['Number', '#' + firstCopy.card_number]);
  if (card.set_name)         infoRows.push(['Set', card.set_name]);
  if (firstCopy.rarity)      infoRows.push(['Rarity', firstCopy.rarity]);
  if (card.variant_label)    infoRows.push(['Variant', card.variant_label]);
  const totalAvail = copies.length;
  infoRows.push(['In Stock', totalAvail + ' cop' + (totalAvail === 1 ? 'y' : 'ies')]);

  const infoHtml = infoRows.map(([label, val]) =>
    `<div class="detail-info-row"><span class="detail-info-label">${label}</span><span class="detail-info-val">${esc(val)}</span></div>`
  ).join('');

  const cartTotal = cartCount();
  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
      <div>
        <div class="panel-title">${esc(card.card_name)}${variantNote}</div>
        <div class="panel-sub">${esc(card.set_name||'')}</div>
      </div>
      <button class="btn btn-outline" style="min-width:44px;padding:0 12px;" onclick="closeDetailPanel()">✕</button>
    </div>
    <div class="detail-hero">
      <div class="detail-img" ${imgUrl ? `onclick="openLightbox('${esc(imgUrl)}')" title="Tap to enlarge"` : ''}>${img}</div>
      <div style="flex:1;">
        <div class="detail-info">${infoHtml}</div>
        <div style="font-size:0.82rem;color:var(--dim);margin-bottom:10px;">Select condition(s) to add to your picks:</div>
        <div class="copy-list" id="copy-list">${condRows}</div>
      </div>
    </div>
    ${cartTotal >= MAX ? `<div class="warning">You've reached the maximum of ${MAX} cards per request.</div>` : ''}
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-outline" onclick="closeDetailPanel()">Back to Browse</button>
      <button class="btn btn-gold" id="detail-picks-btn" onclick="closeDetailPanel(); openCart();">View My Picks (${cartTotal})</button>
    </div>
  `;
}

document.addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-qty-bar .qty-btn');
  if (!btn) return;
  e.stopPropagation();
  const row = btn.closest('.copy-row');
  if (!row) return;
  const cardName = row.dataset.cardName;
  const setName = row.dataset.setName;
  const cond = row.dataset.cond;
  const variantKey = row.dataset.variantKey || '';
  const tcgId = row.dataset.tcgId || '';
  const sxId  = row.dataset.scrydexId || '';
  const avail = parseInt(row.dataset.avail);
  const delta = parseInt(btn.dataset.delta);
  const probe = { card_name: cardName, set_name: setName, condition: cond,
                  variant_key: variantKey, tcg_id: tcgId, scrydex_id: sxId };
  const item = _cart.find(c => _sameCartItem(c, probe));
  if (!item) return;
  const newQty = item.qty + delta;
  if (newQty < 1) {
    removeFromCart(cardName, setName, cond, variantKey, tcgId, sxId);
    row.classList.remove('selected');
    row.querySelector('.copy-action').innerHTML = '<button class="copy-add-btn">+ Add to Picks</button>';
    _updateDetailPicksBtn();
    return;
  }
  if (newQty > avail) { showToast(`Only ${avail} available in ${cond}`); return; }
  if (delta > 0 && cartCount() >= MAX) return;
  item.qty = newQty;
  updateCartBadge();
  _saveCart();
  const valEl = row.querySelector('.qty-val');
  if (valEl) valEl.textContent = newQty;
  _updateDetailPicksBtn();
});

  const probe = { card_name: cardName, set_name: setName, condition: cond,
                  variant_key: variantKey, tcg_id: tcgId, scrydex_id: sxId };
  const item = _cart.find(c => _sameCartItem(c, probe));
  if (!item) return;

});


// Identity key for a cart line. Two raw_cards with the same name + set +
// variant fold can still be different products (OP14-041 vs OP14-112 Boa
// Hancock both share name + set + variant_fold='altArt'); the actual
// distinguisher is tcgplayer_id (or scrydex_id when there's no TCG ID).
function _cartItemKey(c) {
  const tcg = c.tcg_id || c.tcgplayer_id || '';
  const sx  = c.scrydex_id || '';
  return [c.card_name||'', c.set_name||'', c.condition||'',
          c.variant_key||'', String(tcg), sx].join('§');
}
function _sameCartItem(a, b) { return _cartItemKey(a) === _cartItemKey(b); }

function addToCart(cardName, setName, cond, qty, price, imageUrl, avail, variantKey, variantLabel, tcgId, scrydexId) {
  variantKey = variantKey || '';
  const probe = { card_name: cardName, set_name: setName, condition: cond,
                  variant_key: variantKey, tcg_id: tcgId || '', scrydex_id: scrydexId || '' };
  const existing = _cart.find(c => _sameCartItem(c, probe));
  if (existing) {
    existing.qty = Math.min(existing.qty + qty, MAX);
    if (avail) existing.avail = avail;
  } else {
    _cart.push({ card_name: cardName, set_name: setName, condition: cond,
                 variant_key: variantKey, variant_label: variantLabel || '',
                 tcg_id: tcgId || '', scrydex_id: scrydexId || '',
                 qty, price, image_url: imageUrl, avail: avail || qty });
  }
  updateCartBadge();
  _saveCart();
}

function removeFromCart(cardName, setName, cond, variantKey, tcgId, scrydexId) {
  variantKey = variantKey || '';
  const probe = { card_name: cardName, set_name: setName, condition: cond,
                  variant_key: variantKey, tcg_id: tcgId || '', scrydex_id: scrydexId || '' };
  _cart = _cart.filter(c => !_sameCartItem(c, probe));
  updateCartBadge();
  _saveCart();
}

  const ok = await themedConfirm('Clear All Picks?', 'This will remove all cards from your selection.');

  _cart = [];

  renderCart(document.getElementById('cart-panel'));
}

async function submitHold() {
  const name  = (document.getElementById('cust-name')?.value || '').trim();
  const phone = (document.getElementById('cust-phone')?.value || '').replace(/\D/g, '');
  const errEl = document.getElementById('submit-error');
  const btn   = document.getElementById('submit-btn');

  if (!name) {
    errEl.textContent = 'Please enter your name.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Submitting…';
  errEl.style.display = 'none';

  const items = _cart.map(c => ({
    card_name:    c.card_name,
    set_name:     c.set_name,
    condition:    c.condition,
    variant:      c.variant_key || '',
    tcgplayer_id: c.tcg_id || null,
    scrydex_id:   c.scrydex_id || null,
    qty:          c.qty,
  }));

  try {
    const d = await post('/api/hold', { customer_name: name, customer_phone: phone, items });
    showConfirmation(d, name);
    _cart = [];
    updateCartBadge();
    _saveCart();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Request These Cards →';
    errEl.textContent = e.message || 'Something went wrong. Please ask a staff member.';
    errEl.style.display = 'block';
  }
}

function showConfirmation(d, name) {
  const panel = document.getElementById('cart-panel');
  const warnings = (d.warnings || []).length > 0
    ? `<div class="warning" style="text-align:left;margin-bottom:16px;">
        Some cards weren't available: ${d.warnings.join('; ')}
       </div>` : '';
  panel.innerHTML = `
    <div class="confirm-screen">
      <div class="confirm-icon">✅</div>
      <div class="confirm-title">You're all set, ${name}!</div>
      <div class="confirm-ref">Ref: ${d.hold_id?.slice(0,8).toUpperCase()}</div>
      ${warnings}
      <div class="confirm-msg">
        A staff member will retrieve your ${d.assigned} card${d.assigned !== 1 ? 's' : ''} shortly.<br>
        Please stay nearby — we'll come find you!
      </div>
      <button class="btn btn-gold" onclick="closeCartPanel()">Continue Browsing</button>
    </div>
  `;
}

// ── Champion Login + Checkout ─────────────────────────────────────────────────
function showChampionLogin(e) {
  e.preventDefault();
  const form = document.getElementById('champion-login-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function verifyChampion() {
  const email = (document.getElementById('champ-email')?.value || '').trim().toLowerCase();
  const errEl = document.getElementById('champ-error');
  const btn = document.getElementById('champ-verify-btn');
  if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  errEl.style.display = 'none';

  try {
    const d = await post('/api/champion/identify', { email });
    if (d.verified) {
      _champion = { verified: true, first_name: d.first_name, customer_gid: d.customer_gid, email: d.email, checkout_enabled: d.checkout_enabled };
      _saveChampion();
      updateChampionUI();
      renderCart(document.getElementById('cart-panel'));  // re-render with Champion mode
    } else {
      errEl.textContent = d.reason || 'Not a Champion account.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Verify Champion Status';
    }
  } catch(e) {
    errEl.textContent = e.message || 'Verification failed.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Verify Champion Status';
  }
}

async function submitChampionCheckout() {
  const errEl = document.getElementById('submit-error');
  const btn = document.getElementById('submit-btn');

  if (!_champion || !_champion.verified) {
    errEl.textContent = 'Please sign in as a Champion first.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating checkout…';
  errEl.style.display = 'none';

  const items = _cart.map(c => ({
    card_name:    c.card_name,
    set_name:     c.set_name,
    condition:    c.condition,
    variant:      c.variant_key || '',
    tcgplayer_id: c.tcg_id || null,
    scrydex_id:   c.scrydex_id || null,
    qty:          c.qty,
  }));

  try {
    const d = await post('/api/checkout', {
      email: _champion.email,
      customer_gid: _champion.customer_gid,
      items
    });

    if (d.checkout_url) {
      // Clear cart before redirecting
      _cart = [];
      updateCartBadge();
      _saveCart();
      // Redirect to Shopify checkout
      window.location.href = d.checkout_url;
    } else {
      throw new Error('No checkout URL returned');
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Checkout on Shopify →';
    errEl.textContent = e.message || 'Checkout failed. Please try again.';
    errEl.style.display = 'block';
  }
}

function closeCartPanel() {
  document.getElementById('cart-overlay').classList.remove('active');
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function _kioskHeaders() {
  const h = {};
  const key = localStorage.getItem('pf_kiosk_key');
  if (key) h['X-Kiosk-Key'] = key;
  if (_champion && _champion.verified && _champion.email) h['X-Champion-Email'] = _champion.email;
  return h;
}
async function get(url) {
  const r = await fetch(url, { headers: _kioskHeaders() });
  if (!r.ok) { const d = await r.json(); throw new Error(d.error || `HTTP ${r.status}`); }
  return r.json();
}
async function post(url, body) {
  const r = await fetch(url, { method: 'POST', headers: {..._kioskHeaders(), 'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('active')) {
      closeLightbox();
    } else {
      closeDetailPanel();
      closeCartPanel();
    }
  }
});

function formatPhone(input) {
  // Strip everything non-digit
  const digits = input.value.replace(/\D/g, '').slice(0, 10);
  let formatted = '';
  if (digits.length === 0) {
    formatted = '';
  } else if (digits.length <= 3) {
    formatted = `(${digits}`;
  } else if (digits.length <= 6) {
    formatted = `(${digits.slice(0,3)}) ${digits.slice(3)}`;
  } else {
    formatted = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  }
  input.value = formatted;
}

boot();
</script>

<!-- Image lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="Card">
</div>
