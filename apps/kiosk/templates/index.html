async function loadSetsForFilters(era, gameOverride) {
  try {
    const params = new URLSearchParams();
    const g = (gameOverride !== undefined) ? gameOverride : _filters.game;
    if (g)   params.set('game', g);
    if (era) params.set('era', era);
    const url = '/api/sets' + (params.toString() ? '?' + params : '');
    const d = await get(url);
    _allSets = d.sets || [];
  } catch(e) { _allSets = []; }
}

function _saveCart() {
  try { localStorage.setItem('pf_cart', JSON.stringify(_cart)); } catch(e) {}
}
function _loadCart() {
  try {
    const saved = localStorage.getItem('pf_cart');
    if (saved) _cart = JSON.parse(saved);
  } catch(e) { _cart = []; }
}
let _page = 1;
let _timer = null;
let _detail = null;  // current card being viewed

// ── Dynamic page size ───────────────────────────────────────────────────────
// The grid uses repeat(auto-fill, minmax(...)), so column count varies with
// viewport width: iPad → 5, desktop → 6, narrow phone → 2-3. Page size is
// kept at 5 rows × ncols so the last visible row never ends up half-empty.
const _PAGE_ROWS = 5;
let _currentPerPage = 25;          // last value sent to the API
let _resizeTimer = null;
function _computeColCount() {
  const grid = document.getElementById('grid');
  if (!grid) return 5;
  // After layout, gridTemplateColumns reads as N space-separated track sizes.
  const tpl = getComputedStyle(grid).gridTemplateColumns || '';
  const n = tpl.trim() ? tpl.split(/\s+/).length : 0;
  // Fallback if the grid hasn't been laid out yet (no children, etc).
  if (n > 0) return n;
  const cardMin = window.matchMedia('(min-width: 640px)').matches ? 180 : 160;
  const w = grid.clientWidth || (window.innerWidth - 40);
  return Math.max(1, Math.floor((w + 14) / (cardMin + 14)));
}
function _computePageSize() {
  return Math.max(1, Math.min(60, _computeColCount() * _PAGE_ROWS));
}
function _watchGridResize() {
  // Re-fetch only when the column count actually changes — pure pixel
  // resizes (e.g., browser DevTools nudges) shouldn't trigger network.
  let lastCols = _computeColCount();
  window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
      const cols = _computeColCount();
      if (cols !== lastCols) {
        lastCols = cols;
        _page = 1;
        doSearch();
      }
    }, 200);
  });
}

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  _loadCart();
  _loadChampion();

  // Strip legacy ?key=... param into localStorage so it travels via
  // X-Kiosk-Key on subsequent requests. Once /activate sets the cookie,
  // this path is dead — but it stays as a transition fallback.
  checkAccess();

  // Server is the source of truth: cookie OR legacy key OR champion header
  // determine our mode. Anonymous → access gate.
  await loadMode();
  if (_mode === null) {
    showAccessGate();
    return;
  }
  _hasAccess = true;

  _renderKindTabs();
  updateCartBadge();
  updateChampionUI();

  // Filter state restoration only matters for Raw — sealed/slabs don't use it.
  _readUrlState();
  await Promise.all([loadGames(), loadSetsForFilters(_filters.era, _filters.game), loadEras()]);
  if (_filters.game) {
    try { _filterMeta = await get('/api/filter-meta?game=' + encodeURIComponent(_filters.game)); }
    catch(e) { _filterMeta = null; }
  }
  _refreshFiltersBtn();
  _refreshSortBtn();
  _refreshProdSortBtn();
  _renderActiveChips();
  startIdleWatch();
  _watchGridResize();
  _updateLogoSub();
  doSearch();
}

// ── Mode + tabs ──────────────────────────────────────────────────────────────
async function loadMode() {
  try {
    const r = await fetch('/api/mode', { headers: _kioskHeaders() });
    const d = await r.json();
    _mode = d.mode || null;
    _allowedKinds = d.show_kinds || ['raw'];
    if (!_allowedKinds.includes(_activeKind)) {
      _activeKind = _allowedKinds[0] || 'raw';
    }
  } catch (e) {
    _mode = null;
    _allowedKinds = ['raw'];
  }
}

function _renderKindTabs() {
  const tabs = document.getElementById('kind-tabs');
  if (!tabs) return;
  // Champions only ever see one catalog → no need for a tab strip at all.
  if (_allowedKinds.length <= 1) {
    tabs.style.display = 'none';
    return;
  }
  tabs.style.display = 'flex';
  for (const btn of tabs.querySelectorAll('.kind-tab')) {
    const kind = btn.getAttribute('data-kind');
    btn.style.display = _allowedKinds.includes(kind) ? '' : 'none';
    btn.classList.toggle('on', kind === _activeKind);
  }
  // Hide raw-only filter strip when not on Raw tab; show the product
  // (sealed/slab) filter strip on those tabs.
  const fs = document.getElementById('raw-filter-strip');
  if (fs) fs.style.display = (_activeKind === 'raw') ? '' : 'none';
  const ps = document.getElementById('prod-filter-strip');
  if (ps) ps.style.display = (_activeKind === 'sealed' || _activeKind === 'slab') ? '' : 'none';
  const psl = document.getElementById('prod-strip-label');
  if (psl) psl.textContent = (_activeKind === 'slab') ? 'PSA Slabs' : 'Sealed Products';
}

// ── Idle watchdog (in-store auto-reset between customers) ───────────────────
const IDLE_WARN_MS  = 90_000;   // first warning at 90s of no activity
const IDLE_FINAL_MS = 10_000;   // 10s grace after warning before reset
let _idleLast = Date.now();
let _idleWarning = null;        // overlay element when shown
let _idleTimer = null;
let _idleDirty = false;         // true once user touches the screen since last reset

function _onActivity() {
  _idleLast = Date.now();
  _idleDirty = true;
  if (_idleWarning) _dismissIdleWarning();
}

// Throttled mousemove — every event would fire constantly, but a 2s
// minimum keeps "user has their hand on the mouse" registering as activity
// without flooding _onActivity.
let _lastMouseActivity = 0;
function _onMouseActivity() {
  const now = Date.now();
  if (now - _lastMouseActivity < 2000) return;
  _lastMouseActivity = now;
  _onActivity();
}

function startIdleWatch() {
  // Champions are remote — don't wipe their cart / identity on inactivity.
  // The idle reset only exists to recycle the in-store iPad between walk-ups.
  if (_mode !== 'instore') return;
  // Capture phase + a wider event set so handlers that stopPropagation
  // (e.g. the bottom-sheet's onclick guard) can't swallow the activity
  // signal. touchmove covers slow drags; mousemove (throttled) covers
  // hover/scroll-without-click on desktop. scroll is window-level, not
  // bubbled — capture catches it on document either way.
  const opts = { passive: true, capture: true };
  ['touchstart','touchmove','pointerdown','mousedown','keydown','wheel'].forEach(ev =>
    document.addEventListener(ev, _onActivity, opts));
  document.addEventListener('mousemove', _onMouseActivity, opts);
  window.addEventListener('scroll', _onActivity, opts);
  if (_idleTimer) clearInterval(_idleTimer);
  _idleTimer = setInterval(_idleTick, 1000);
}

// True when there's actually customer-visible state worth wiping. If the
// kiosk is sitting on the default front page (no picks, no filters, no
// search, raw tab), prompting "Still there?" annoys the customer for no
// reason — the reset would be a no-op.
const _DEFAULT_CONDS = ['NM','LP','MP','HP','DMG'];
function _hasResettableState() {
  if (_cart && _cart.length > 0) return true;
  if (_champion) return true;
  const q = document.getElementById('q');
  if (q && q.value.trim()) return true;
  if (_activeKind && _activeKind !== 'raw') return true;
  if (_filters) {
    if (_filters.game || _filters.era || _filters.set) return true;
    if (_filters.sort && _filters.sort !== 'name_asc') return true;
    if (_filters.minP || _filters.maxP) return true;
    if (_filters.conds && (_filters.conds.size !== _DEFAULT_CONDS.length
        || !_DEFAULT_CONDS.every(c => _filters.conds.has(c)))) return true;
    if (_filters.colors    && _filters.colors.size)    return true;
    if (_filters.colorMode && _filters.colorMode !== 'any') return true;
    if (_filters.cardTypes && _filters.cardTypes.size) return true;
    if (_filters.rarities  && _filters.rarities.size)  return true;
  }
  if (_prodFilters) {
    if (_prodFilters.game) return true;
    if (_prodFilters.formats && _prodFilters.formats.size) return true;
    if (_prodFilters.eras    && _prodFilters.eras.size)    return true;
    if (_prodFilters.grades  && _prodFilters.grades.size)  return true;
    if (_prodFilters.minP || _prodFilters.maxP) return true;
    if (_prodFilters.sort && _prodFilters.sort !== 'name_asc') return true;
  }
  return false;
}

function _idleTick() {
  if (!_idleDirty) return;  // no activity since last reset → nothing to do
  // Only nag if there's something to actually reset. A customer reading
  // the front page in default state shouldn't be prompted.
  if (!_hasResettableState()) {
    if (_idleWarning) _dismissIdleWarning();
    return;
  }
  const now = Date.now();
  const idle = now - _idleLast;
  if (idle >= IDLE_WARN_MS && !_idleWarning) {
    _showIdleWarning();
  } else if (idle >= IDLE_WARN_MS + IDLE_FINAL_MS) {
    _doIdleReset();
  }
}

function _showIdleWarning() {
  if (_idleWarning) return;
  const el = document.createElement('div');
  el.id = 'pf-idle-warning';
  el.style.cssText = `
    position:fixed; inset:0; z-index:99999;
    background:rgba(0,0,0,0.7); display:flex;
    align-items:center; justify-content:center;
    backdrop-filter: blur(4px);
  `;
  el.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--accent);
                border-radius:14px;padding:30px 36px;max-width:360px;text-align:center;
                box-shadow:0 20px 60px rgba(0,0,0,0.5);">
      <div style="font-size:2.4rem;margin-bottom:12px;">⏳</div>
      <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;">Still there?</div>
      <div style="color:var(--dim);margin-bottom:20px;font-size:0.92rem;">
        Resetting in <span id="idle-countdown">10</span>s…
      </div>
      <button class="btn btn-gold" style="width:100%;" onclick="_dismissIdleWarning()">I'm Still Here</button>
    </div>
  `;
  document.body.appendChild(el);
  _idleWarning = el;
  // Live countdown
  let n = Math.ceil(IDLE_FINAL_MS / 1000);
  const cd = el.querySelector('#idle-countdown');
  const t = setInterval(() => {
    if (!_idleWarning) { clearInterval(t); return; }
    n--;
    if (cd) cd.textContent = String(Math.max(0, n));
    if (n <= 0) clearInterval(t);
  }, 1000);
}

function _dismissIdleWarning() {
  if (_idleWarning) {
    _idleWarning.remove();
    _idleWarning = null;
  }
  _idleLast = Date.now();
}

function _doIdleReset() {
  _dismissIdleWarning();
  // Clear customer-level state but KEEP the device cookie / legacy key so
  // the iPad stays unlocked as in-store
  _cart = [];
  _saveCart();
  updateCartBadge();
  // Drop champion identity so the next walk-up customer starts fresh
  if (_champion) {
    _champion = null;
    try { localStorage.removeItem('pf_champion'); } catch(e) {}
    updateChampionUI();
  }
  // Close any open overlays. Sheet overlays use the 'open' class instead
  // of 'active', so we strip both — otherwise the filter sheet stays
  // visible after an idle reset (and the user comes back to a half-reset
  // UI on a kiosk that should look fresh).
  document.body.classList.remove('modal-open');
  ['cart-overlay','detail-overlay','filter-sheet-overlay','prod-filter-sheet-overlay','confirm-overlay','lightbox']
    .forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('active', 'open');
    });
  // Drop any open sort popovers as well
  document.querySelectorAll('.sort-wrap.open').forEach(el => el.classList.remove('open'));
  // Reset search + filters back to Raw default
  const q = document.getElementById('q');
  if (q) q.value = '';
  _toggleSearchClear();
  if (_allowedKinds.includes('raw') && _activeKind !== 'raw') {
    _activeKind = 'raw';
    _page = 1;
    const ac = document.getElementById('active-chips');
    if (ac) ac.style.display = '';
    _renderKindTabs();
    _updateLogoSub();
  }
  // Clear all active filters (game/era/set/conds/price/colors/types/rarities/sort)
  // — this also re-renders chips, refreshes the filter button, and runs doSearch().
  _clearAllActive();
  _resetProdFilters();
  window.scrollTo(0, 0);
  _idleLast = Date.now();
  _idleDirty = false;
}

const _LOGO_SUB_LABELS = {
  raw:    'Card Browser',
  sealed: 'Sealed Product Browser',
  slab:   'Graded Card Browser',
};
function _updateLogoSub() {
  const el = document.getElementById('logo-sub');
  if (el) el.textContent = _LOGO_SUB_LABELS[_activeKind] || 'Card Browser';
}

function setActiveKind(kind) {
  if (!_allowedKinds.includes(kind)) return;
  if (_activeKind === kind) return;
  _activeKind = kind;
  _updateLogoSub();
  // Reset paging + clear search input to avoid carrying a raw query into sealed
  _page = 1;
  const qInput = document.getElementById('q');
  if (qInput) qInput.value = '';
  // Hide any Raw-only filter chips display
  const ac = document.getElementById('active-chips');
  if (ac) ac.style.display = (kind === 'raw') ? '' : 'none';
  // Reset product filters when switching between sealed/slab — the filter
  // dimensions overlap (game/era) but the format vs grade pickers are
  // kind-specific, and stale state would surface buttons that no longer apply.
  if (kind === 'sealed' || kind === 'slab') {
    _resetProdFilters();
    loadProdGameMeta();
  }
  _renderKindTabs();
  doSearch();
}

let _eraCache = [];
async function loadEras() {
  // Era counts are faceted against the current draft selection — picking a
  // rarity, color, etc. re-shrinks every era's count to "this many cards in
  // that era match." Same pattern as Rarity ↔ Color ↔ Card Type via
  // /api/filter-meta. Filters are sourced from _draft when the sheet is
  // open (the user's in-progress, unapplied selection) and from _filters
  // otherwise (initial sheet open or post-apply refresh).
  const f = _draft || _filters || {};
  const p = new URLSearchParams();
  if (f.colors && f.colors.size) {
    p.set('colors', Array.from(f.colors).join(','));
    if (f.colorMode === 'exactly') p.set('color_mode', 'exactly');
  }
  if (f.cardTypes && f.cardTypes.size) p.set('card_type',   Array.from(f.cardTypes).join(','));
  if (f.rarities  && f.rarities.size)  p.set('card_rarity', Array.from(f.rarities).join(','));
  if (f.conds     && f.conds.size && f.conds.size !== 5) p.set('condition', Array.from(f.conds).join(','));
  if (f.minP) p.set('min_price', f.minP);
  if (f.maxP) p.set('max_price', f.maxP);
  if (f.set)  p.set('set', f.set);
  const q = (document.getElementById('q')?.value || '').trim();
  if (q) p.set('q', q);
  const qs = p.toString();
  try {
    const d = await get('/api/eras' + (qs ? '?' + qs : ''));
    _eraCache = d.eras || [];
  } catch(e) { _eraCache = []; }
}

// ── Search ────────────────────────────────────────────────────────────────────
function debounce() {
  clearTimeout(_timer);
  _timer = setTimeout(() => doSearch(), 400);
}

function _toggleSearchClear() {
  const wrap = document.getElementById('header-search');
  const q = document.getElementById('q');
  if (!wrap || !q) return;
  wrap.classList.toggle('has-value', !!q.value);
}

function clearSearch() {
  const q = document.getElementById('q');
  if (!q) return;
  q.value = '';
  _toggleSearchClear();
  clearTimeout(_timer);
  doSearch();
  q.focus();
}

async function doSearch(page) {
  _page = page || 1;
  // Dispatch by active tab — Raw uses the existing /api/browse, sealed/slabs
  // use the simpler /api/products endpoint that reads inventory_product_cache.
  if (_activeKind === 'sealed' || _activeKind === 'slab') {
    return doSearchProducts();
  }
  const q = document.getElementById('q').value.trim();
  const conds = [..._filters.conds].join(',');
  _currentPerPage = _computePageSize();
  const params = new URLSearchParams({
    q, page: _page, per_page: _currentPerPage, sort: _filters.sort, condition: conds,
  });
  if (_filters.game) params.set('game', _filters.game);
  if (_filters.set)  params.set('set', _filters.set);
  if (_filters.era)  params.set('era', _filters.era);
  if (_filters.minP) params.set('min_price', _filters.minP);
  if (_filters.maxP) params.set('max_price', _filters.maxP);
  // Game-aware advanced filters — only sent when a game is selected, since
  // the same value space is meaningless cross-game (MTG 'B' ≠ OP 'Black').
  if (_filters.game && _filters.colors && _filters.colors.size) {
    params.set('colors', [..._filters.colors].join(','));
    if (_filters.colorMode === 'exactly') params.set('color_mode', 'exactly');
  }
  if (_filters.game && _filters.cardTypes && _filters.cardTypes.size) {
    params.set('card_type', [..._filters.cardTypes].join(','));
  }
  if (_filters.game && _filters.rarities && _filters.rarities.size) {
    params.set('card_rarity', [..._filters.rarities].join(','));
  }

  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="spinner"></div>';
  document.getElementById('pagination').innerHTML = '';

  // Repaint chips + URL on every search so they always match what's loaded
  _renderActiveChips();
  _writeUrlState();

  try {
    const d = await get('/api/browse?' + params);
    renderGrid(d.cards || []);
    renderPagination(d.page, d.pages, d.total);
    document.getElementById('results-info').textContent =
      d.total ? `${d.total} card${d.total !== 1 ? 's' : ''} available` : '';
  } catch(e) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><p>${e.message}</p></div>`;
  }
}

function renderGrid(cards) {
  const grid = document.getElementById('grid');
  if (!cards.length) {
    // Show actionable empty state when filters are active — no point telling
    // a customer "no cards" when the fix is right there.
    const hasFilters = _activeFilterCount() > 0 || (document.getElementById('q')?.value || '').trim();
    const msg = hasFilters
      ? 'No cards match. Try removing a filter.'
      : 'No cards found';
    grid.innerHTML = `<div class="empty"><div class="empty-icon">${ICON_CARD_STACK}</div><p>${msg}</p></div>`;
    return;
  }
  // Store card data in a map keyed by index to avoid HTML attribute escaping issues
  window._cardCache = {};
  grid.innerHTML = cards.map((c, idx) => {
    window._cardCache[idx] = c;
    // Tile pills show TOTAL coverage (stored + display) so a card sitting
    // only in a binder still surfaces its NM/LP availability on the tile.
    // Cart eligibility logic still keys off c.conditions (STORED only) —
    // detail panel splits cartable rows from "ask staff" rows.
    const allConds = {};
    Object.entries(c.conditions || {}).forEach(([k,v]) => allConds[k] = (allConds[k]||0) + v);
    Object.entries(c.display_conditions || {}).forEach(([k,v]) => allConds[k] = (allConds[k]||0) + v);
    const conds = Object.entries(allConds)
      .sort(([a],[b]) => ['NM','LP','MP','HP','DMG'].indexOf(a) - ['NM','LP','MP','HP','DMG'].indexOf(b));
    const pills = conds.map(([cond, qty]) =>
      `<span class="cond-pill cond-${cond}">${cond} ×${qty}</span>`).join('');
    const img = c.image_url
      ? `<img src="${esc(c.image_url)}" alt="${esc(c.card_name)}" loading="lazy">`
      : `<div class="no-img">${ICON_CARD_STACK}</div>`;
    // Tile is narrow — a "$14.99 – $15.99" range chews the whole row and
     // overlaps the condition pills. The detail panel still shows the full
    // breakdown, so on the tile we collapse to "$min+".
    const price = c.min_price
      ? c.min_price === c.max_price
        ? `$${c.min_price.toFixed(2)}`
        : `$${c.min_price.toFixed(2)}+`
      : '';
    // variant_label only appears when the card has multiple printings in
    // Scrydex — single-variant cards stay uncluttered. Filtering uses
    // variant_key (folded bucket value) instead. Rendered on its own row
    // (not appended to the name) so its left edge aligns with name/set.
    const variantBadge = c.variant_label
      ? `<div class="card-variant">${esc(c.variant_label)}</div>`
      : '';
    // Tile rendering is intentionally identical for STORED-only, mixed,
    // and DISPLAY-only cards — the cascade of tiles shouldn't read as
    // "some are different, some are dimmed." The location / availability
    // split lives in the detail panel instead.
    return `<div class="card" onclick="openDetail(window._cardCache[${idx}])">
      <div class="card-img">${img}</div>
      <div class="card-body">
        <div class="card-name">${esc(c.card_name)}</div>
        ${variantBadge}
        <div class="card-set">${esc(c.set_name||'')}</div>
        <div class="card-pricerow">
          <div class="cond-pills">${pills}</div>
          ${price ? `<div class="card-price">${price}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Sealed / Slabs filter sheet ──────────────────────────────────────────────
// Distinct from the raw filter sheet — sealed/slab share most filters with
// each other but very few with raw, so a separate sheet keeps each flow simple.
let _prodFilters = {
  game:    '',
  formats: new Set(),
  eras:    new Set(),
  grades:  new Set(),
  minP:    '',
  maxP:    '',
  sort:    'name_asc',
};
let _prodDraft = null;
let _prodFilterMeta = null;  // {games, formats, eras, grades} from /api/products/filter-meta

function _prodActiveFilterCount() {
  const f = _prodFilters; let n = 0;
  if (f.game) n++;
  if (f.formats && f.formats.size) n++;
  if (f.eras    && f.eras.size)    n++;
  if (f.grades  && f.grades.size)  n++;
  if (f.minP)   n++;
  if (f.maxP)   n++;
  if (f.sort && f.sort !== 'name_asc') n++;
  return n;
}

function _refreshProdFiltersBtn() {
  const btn = document.getElementById('prod-filters-btn');
  const badge = document.getElementById('prod-filters-count');
  if (!btn || !badge) return;
  const n = _prodActiveFilterCount();
  if (n > 0) {
    btn.classList.add('has-active');
    badge.textContent = String(n);
    badge.style.display = '';
  } else {
    btn.classList.remove('has-active');
    badge.style.display = 'none';
  }
}

async function _loadProdFilterMeta() {
  // Pass the current draft selections so the server can return faceted
  // counts (each facet's counts apply OTHER selections but not its own).
  const p = new URLSearchParams({ kind: _activeKind });
  const d = _prodDraft;
  if (d) {
    if (d.game) p.set('game', d.game);
    if (d.formats && d.formats.size) p.set('format', [...d.formats].join(','));
    if (d.eras    && d.eras.size)    p.set('era',    [...d.eras].join(','));
    if (d.grades  && d.grades.size)  p.set('grade',  [...d.grades].join(','));
    if (d.minP)   p.set('min_price', d.minP);
    if (d.maxP)   p.set('max_price', d.maxP);
  }
  try {
    _prodFilterMeta = await get('/api/products/filter-meta?' + p.toString()) || null;
  } catch(e) { _prodFilterMeta = null; }
}

// Debounced re-fetch on chip toggle, mirroring refreshFacetCounts() for raw.
let _prodFilterMetaTimer = null;
function _refreshProdFacetCounts() {
  if (_prodFilterMetaTimer) clearTimeout(_prodFilterMetaTimer);
  _prodFilterMetaTimer = setTimeout(async () => {
    _prodFilterMetaTimer = null;
    if (!_prodDraft) return;
    await _loadProdFilterMeta();
    _renderAllProdSheetSections();
  }, 220);
}

function _renderAllProdSheetSections() {
  const meta = _prodFilterMeta || {};
  _renderProdSheetSection('prod-sheet-game-section', 'prod-sheet-games',
    meta.games || [], null, 'game');
  if (_activeKind === 'sealed') {
    _renderProdSheetSection('prod-sheet-format-section', 'prod-sheet-formats',
      meta.formats || [], _prodDraft.formats, null);
  } else {
    document.getElementById('prod-sheet-format-section').style.display = 'none';
  }
  if (_activeKind === 'slab') {
    _renderProdSheetSection('prod-sheet-grade-section', 'prod-sheet-grades',
      meta.grades || [], _prodDraft.grades, null);
  } else {
    document.getElementById('prod-sheet-grade-section').style.display = 'none';
  }
  _renderProdSheetSection('prod-sheet-era-section', 'prod-sheet-eras',
    meta.eras || [], _prodDraft.eras, null);
}

function _renderProdSheetSection(sectionId, listId, options, draftSet, single) {
  // options: [{key,label,count}, ...]; single=true → radio behavior on draft.<single>
  const sec = document.getElementById(sectionId);
  const wrap = document.getElementById(listId);
  if (!sec || !wrap) return;
  if (!options || !options.length) {
    sec.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  sec.style.display = '';
  wrap.innerHTML = options.map(o => {
    const on = single
      ? (_prodDraft[single] === o.key)
      : (draftSet && draftSet.has(o.key));
    return `<span class="chip ${on ? 'on' : ''}" data-key="${esc(o.key)}">${esc(o.label)} <span class="qty">${o.count}</span></span>`;
  }).join('');
  wrap.querySelectorAll('.chip').forEach(el => {
    el.onclick = () => {
      const k = el.getAttribute('data-key');
      if (single) {
        // Single-select: toggle off if already selected
        _prodDraft[single] = (_prodDraft[single] === k) ? '' : k;
      } else {
        if (draftSet.has(k)) draftSet.delete(k); else draftSet.add(k);
      }
      // Re-render this section immediately so selection state reflects,
      // then debounced re-fetch of OTHER facets' counts.
      _renderProdSheetSection(sectionId, listId, options, draftSet, single);
      _refreshProdFacetCounts();
    };
  });
}

async function openProdFilterSheet() {
  // Snapshot current filters into a draft so Cancel just closes
  _prodDraft = {
    game: _prodFilters.game,
    formats: new Set(_prodFilters.formats),
    eras:    new Set(_prodFilters.eras),
    grades:  new Set(_prodFilters.grades),
    minP:    _prodFilters.minP,
    maxP:    _prodFilters.maxP,
    sort:    _prodFilters.sort,
  };
  // Title reflects the current tab
  document.getElementById('prod-sheet-title').textContent =
    (_activeKind === 'slab') ? 'Slab Filters' : 'Sealed Filters';

  // Load fresh meta (counts) for this kind, faceted by current draft.
  await _loadProdFilterMeta();
  _renderAllProdSheetSections();
  // Sort
  document.querySelectorAll('#prod-sheet-sort .chip').forEach(el => {
    el.classList.toggle('on', el.getAttribute('data-sort') === _prodDraft.sort);
  });
  // Price
  document.getElementById('prod-price-min').value = _prodDraft.minP || '';
  document.getElementById('prod-price-max').value = _prodDraft.maxP || '';

  document.getElementById('prod-filter-sheet-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeProdFilterSheet(e) {
  if (e && e.target.id !== 'prod-filter-sheet-overlay') return;
  document.getElementById('prod-filter-sheet-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _prodDraft = null;
}

function setProdSheetSort(el) {
  if (!_prodDraft) return;
  _prodDraft.sort = el.getAttribute('data-sort');
  document.querySelectorAll('#prod-sheet-sort .chip').forEach(c => {
    c.classList.toggle('on', c === el);
  });
}

function clearAllProdFilters() {
  _prodDraft = {
    game: '', formats: new Set(), eras: new Set(), grades: new Set(),
    minP: '', maxP: '', sort: 'name_asc',
  };
  document.getElementById('prod-price-min').value = '';
  document.getElementById('prod-price-max').value = '';
  document.querySelectorAll('#prod-sheet-sort .chip').forEach(el => {
    el.classList.toggle('on', el.getAttribute('data-sort') === 'name_asc');
  });
  // Re-fetch with cleared selections so the chip counts go back to global.
  _refreshProdFacetCounts();
}

function applyProdFilterSheet() {
  if (!_prodDraft) return;
  _prodDraft.minP = document.getElementById('prod-price-min').value || '';
  _prodDraft.maxP = document.getElementById('prod-price-max').value || '';
  Object.assign(_prodFilters, _prodDraft);
  closeProdFilterSheet({ target: { id: 'prod-filter-sheet-overlay' } });
  _refreshProdFiltersBtn();
  _refreshProdSortBtn();
  renderProdGamePills();
  _page = 1;
  doSearch();
}

function _resetProdFilters() {
  _prodFilters = {
    game: '', formats: new Set(), eras: new Set(), grades: new Set(),
    minP: '', maxP: '', sort: 'name_asc',
  };
  _refreshProdFiltersBtn();
  _refreshProdSortBtn();
  renderProdGamePills();
}

// ── Top-strip game pills for sealed/slab (mirrors raw's game-pills) ─────────
// Pills source from /api/products/filter-meta which already returns game
// counts faceted against current sealed/slab selections. Single-select; an
// "All" pill clears the game filter. Pills re-render on kind switch and
// after each search so counts stay current.
let _prodGameMeta = [];   // [{key, label, count}, ...] for the active kind
async function loadProdGameMeta() {
  if (_activeKind !== 'sealed' && _activeKind !== 'slab') return;
  try {
    const d = await get('/api/products/filter-meta?kind=' + encodeURIComponent(_activeKind));
    _prodGameMeta = (d && d.games) ? d.games : [];
  } catch(e) { _prodGameMeta = []; }
  renderProdGamePills();
}
function renderProdGamePills() {
  const strip = document.getElementById('prod-game-pills');
  if (!strip) return;
  if (_activeKind !== 'sealed' && _activeKind !== 'slab') {
    strip.innerHTML = '';
    return;
  }
  const total = _prodGameMeta.reduce((s, g) => s + (g.count || 0), 0);
  const items = [{ key: '', label: 'All', count: total }, ..._prodGameMeta];
  const sel = _prodFilters.game || '';
  strip.innerHTML = items.map(g =>
    `<span class="game-pill${sel === g.key ? ' active' : ''}" data-game="${esc(g.key)}">
      ${esc(g.label)}<span class="qty">${g.count}</span>
    </span>`
  ).join('');
  strip.querySelectorAll('.game-pill').forEach(el => {
    el.addEventListener('click', () => {
      const newGame = el.getAttribute('data-game');
      if ((_prodFilters.game || '') === newGame) return;
      _prodFilters.game = newGame;
      // Game scope changes → clear era/format/grade since their values are
      // game-specific (e.g. Pokémon eras don't apply to MTG).
      _prodFilters.formats = new Set();
      _prodFilters.eras    = new Set();
      _prodFilters.grades  = new Set();
      // Re-render the pills strip so the new active state is visible —
      // doSearch() updates the grid but didn't touch the pills, leaving
      // the previously-active pill highlighted.
      renderProdGamePills();
      _refreshProdFiltersBtn();
      _page = 1;
      doSearch();
    });
  });
}

// ── Sealed / Slabs grid (reads inventory_product_cache via /api/products) ────
async function doSearchProducts() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="spinner"></div>';
  document.getElementById('pagination').innerHTML = '';
  document.getElementById('results-info').textContent = '';

  const q = (document.getElementById('q')?.value || '').trim();
  const f = _prodFilters;
  _currentPerPage = _computePageSize();
  const params = new URLSearchParams({ kind: _activeKind, page: _page, per_page: _currentPerPage, sort: f.sort || 'name_asc' });
  if (q)         params.set('q', q);
  if (f.game)    params.set('game', f.game);
  if (f.formats && f.formats.size) params.set('format', [...f.formats].join(','));
  if (f.eras    && f.eras.size)    params.set('era',    [...f.eras].join(','));
  if (f.grades  && f.grades.size)  params.set('grade',  [...f.grades].join(','));
  if (f.minP)    params.set('min_price', f.minP);
  if (f.maxP)    params.set('max_price', f.maxP);

  try {
    const d = await get('/api/products?' + params);
    renderProductsGrid(d.products || []);
    renderPagination(d.page, d.pages, d.total);
    document.getElementById('results-info').textContent =
      d.total ? `${d.total} ${_activeKind === 'slab' ? 'slab' : 'sealed product'}${d.total !== 1 ? 's' : ''} available` : '';
  } catch (e) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><p>${esc(e.message)}</p></div>`;
  }
}

function renderProductsGrid(products) {
  const grid = document.getElementById('grid');
  if (!products.length) {
    const hint = (document.getElementById('q')?.value || '').trim()
      ? 'No matches. Try a different search.'
      : `No ${_activeKind === 'slab' ? 'slabs' : 'sealed products'} in stock right now.`;
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><p>${esc(hint)}</p></div>`;
    return;
  }
  // Cache so click handlers don't have to re-encode card data into attributes
  window._productCache = {};
  grid.innerHTML = products.map((p, idx) => {
    window._productCache[idx] = p;
    const price = (p.price !== null && p.price !== undefined)
      ? `$${Number(p.price).toFixed(2)}`
      : '';
    const qtyLabel = `${p.available_qty} in stock`;
    const imgInner = p.image_url
      ? `<img src="${esc(p.image_url)}" alt="${esc(p.title)}" loading="lazy">`
      : `<div class="no-img">📦</div>`;
    return `<div class="card" onclick="openProductDetail(window._productCache[${idx}])">
      <div class="card-img">${imgInner}</div>
      <div class="card-body">
        <div class="card-name">${esc(p.title)}</div>
        <div class="card-pricerow">
          <div class="cond-pills"><span class="cond-pill">${esc(qtyLabel)}</span></div>
          ${price ? `<div class="card-price">${price}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openProductDetail(p) {
  // Lightweight inline detail — no full overlay, just a confirm-style sheet
  // that lets the customer pick qty and add to the cart. Sealed/slab UX
  // intentionally simpler than raw cards.
  const overlay = document.getElementById('detail-overlay');
  const panel = document.getElementById('detail-panel');
  const max = Math.min(p.available_qty || 1, MAX);
  const img = p.image_url
    ? `<img src="${esc(p.image_url)}" alt="${esc(p.title)}"
            style="width:100%;max-height:260px;object-fit:contain;border-radius:10px;background:var(--surface2);margin-bottom:14px;">`
    : '';
  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="panel-title">${esc(p.title)}</div>
      <button class="btn btn-outline" style="min-width:44px;padding:0 12px;" onclick="closeDetailPanel()">✕</button>
    </div>
    ${img}
    <div style="margin-bottom:12px;color:var(--dim);">${p.available_qty} in stock${p.price ? ` · $${Number(p.price).toFixed(2)} each` : ''}</div>
    <div class="qty-row">
      <div class="qty-label">Quantity</div>
      <div class="qty-ctrl">
        <button class="qty-btn" id="prod-qty-minus" aria-label="Decrease quantity">−</button>
        <div class="qty-val" id="prod-qty-val">1</div>
        <button class="qty-btn" id="prod-qty-plus" aria-label="Increase quantity">+</button>
      </div>
    </div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-outline" onclick="closeDetailPanel()">Cancel</button>
      <button class="btn btn-gold" onclick="confirmAddProduct(${p.shopify_variant_id})">Add to Picks</button>
    </div>
  `;
  // Stepper handlers — clamp [1, max]
  const valEl = document.getElementById('prod-qty-val');
  const setQty = (n) => {
    const clamped = Math.max(1, Math.min(max, n));
    valEl.textContent = String(clamped);
    valEl.dataset.qty = String(clamped);
    document.getElementById('prod-qty-minus').disabled = clamped <= 1;
    document.getElementById('prod-qty-plus').disabled = clamped >= max;
  };
  setQty(1);
  document.getElementById('prod-qty-minus').onclick = () =>
    setQty((parseInt(valEl.dataset.qty) || 1) - 1);
  document.getElementById('prod-qty-plus').onclick = () =>
    setQty((parseInt(valEl.dataset.qty) || 1) + 1);
  overlay.classList.add('active');
  document.body.classList.add('modal-open');
}

function confirmAddProduct(variantId) {
  // Resolve product from the cached grid render
  let p = null;
  for (const idx in (window._productCache || {})) {
    if (window._productCache[idx].shopify_variant_id === variantId) {
      p = window._productCache[idx]; break;
    }
  }
  if (!p) return;
  const valEl = document.getElementById('prod-qty-val');
  const qty = Math.max(1, Math.min(p.available_qty || 1, parseInt(valEl?.dataset.qty) || 1));
  if (cartCount() + qty > MAX) {
    showToast(`Cart limit is ${MAX} items.`);
    return;
  }
  addProductToCart(_activeKind, p, qty);
  closeDetailPanel();
  showToast(`Added ${qty}× ${p.title}`);
}

function addProductToCart(kind, p, qty) {
  const probe = { kind, shopify_variant_id: p.shopify_variant_id };
  const existing = _cart.find(c => _sameCartItem(c, probe));
  if (existing) {
    existing.qty = Math.min(existing.qty + qty, MAX);
    existing.avail = p.available_qty;
  } else {
    // SKU comes from inventory_product_cache (populated by the daily price-
    // updater pull). Falls back to a variant-id placeholder only if the
    // cache hasn't been refreshed since the SKU column was added — staff
    // scan-out will fail in that case, which is the loud signal we want.
    _cart.push({
      kind,
      shopify_variant_id: p.shopify_variant_id,
      sku:       p.sku || `variant-${p.shopify_variant_id}`,
      title:     p.title,
      qty,
      price:     p.price,
      unit_price: p.price,
      avail:     p.available_qty,
    });
  }
  updateCartBadge();
  _saveCart();
}

function renderPagination(page, pages, total) {
  const el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  let h = `<button class="pg" onclick="doSearch(${page-1})" ${page<=1?'disabled':''}>←</button>`;
  const show = new Set([1, pages, page-1, page, page+1].filter(p=>p>=1&&p<=pages));
  let prev = 0;
  [...show].sort((a,b)=>a-b).forEach(p => {
    if (p - prev > 1) h += `<span style="color:var(--dim);align-self:center">…</span>`;
    h += `<button class="pg${p===page?' active':''}" onclick="doSearch(${p})">${p}</button>`;
    prev = p;
  });
  h += `<button class="pg" onclick="doSearch(${page+1})" ${page>=pages?'disabled':''}>→</button>`;
  el.innerHTML = h;
}

// ── Card Detail ───────────────────────────────────────────────────────────────
async function openDetail(card) {
  _detail = card;
  const overlay = document.getElementById('detail-overlay');
  const panel   = document.getElementById('detail-panel');
  panel.innerHTML = '<div class="spinner"></div>';
  overlay.classList.add('active');
  document.body.classList.add('modal-open');

  try {
    // tcgplayer_id is the actual card identity. Two cards with the same
    // name + set + variant_fold (e.g. Boa Hancock OP14-041 vs OP14-112)
    // would otherwise collapse into one detail view with averaged prices.
    const _params = new URLSearchParams({
      name: card.card_name,
      set: card.set_name || '',
      variant: card.variant_key || '',
    });
    if (card.tcgplayer_id) _params.set('tcgplayer_id', card.tcgplayer_id);
    if (card.scrydex_id)   _params.set('scrydex_id',   card.scrydex_id);
    const d = await get('/api/card?' + _params);
    renderDetail(card, d.copies || [], d.meta || null);
  } catch(e) {
    panel.innerHTML = `<div class="empty"><p>${e.message}</p></div>`;
  }
}

function renderDetail(card, copies, meta) {
  const panel = document.getElementById('detail-panel');
  const imgUrl = card.image_url || '';
  const img = imgUrl
    ? `<img src="${esc(imgUrl)}" alt="${esc(card.card_name)}">`
    : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.2">${ICON_CARD_STACK}</div>`;
  // Detail-panel title is 1.6rem display font, so the .variant-badge default
  // (0.78rem) reads as tiny noise next to the name. Bump it to 1rem with
  // matching padding so it actually reads as a tag.
  const variantNote = card.variant_label
    ? `<span class="variant-badge" style="vertical-align:middle;margin-left:10px;font-size:1rem;padding:4px 11px;border-radius:8px;">${esc(card.variant_label)}</span>`
    : '';

  // Group STORED copies by condition for qty selection. DISPLAY copies are
  // tracked separately — they're customer-visible (so we show them so people
  // know the card exists) but not cartable, so they get their own info-only
  // rows under the cartable conditions.
  const storedCopies  = copies.filter(c => (c.state || 'STORED') === 'STORED');
  const displayCopies = copies.filter(c => c.state === 'DISPLAY');
  const byCondition = {};
  storedCopies.forEach(c => {
    if (!byCondition[c.condition]) byCondition[c.condition] = [];
    byCondition[c.condition].push(c);
  });

  const condOrder = ['NM','LP','MP','HP','DMG'];
  const cardVariantKey = card.variant_key || '';
  const cardVariantLabel = card.variant_label || '';
  const cardTcgId = card.tcgplayer_id || '';
  const cardSxId  = card.scrydex_id || '';
  const probe = { card_name: card.card_name, set_name: card.set_name,
                  variant_key: cardVariantKey, tcg_id: cardTcgId, scrydex_id: cardSxId };
  const condRows = Object.entries(byCondition)
    .sort(([a],[b]) => condOrder.indexOf(a) - condOrder.indexOf(b))
    .map(([cond, copies]) => {
      const avgPrice = copies.reduce((s,c) => s + (parseFloat(c.current_price)||0), 0) / copies.length;
      const inCart = _cart.filter(ci => _sameCartItem(ci, { ...probe, condition: cond }));
      const cartQty = inCart.reduce((s,ci) => s + ci.qty, 0);
      const actionHtml = cartQty > 0
        ? `<div class="copy-action"><div class="copy-qty-bar">
            <button class="qty-btn" data-delta="-1">−</button>
            <div class="qty-val">${cartQty}</div>
            <button class="qty-btn" data-delta="1">+</button>
          </div></div>`
        : `<div class="copy-action"><button class="copy-add-btn">+ Add to Picks</button></div>`;
      return `<div class="copy-row${cartQty>0?' selected':''}" data-cond="${cond}" data-variant-key="${esc(cardVariantKey)}" data-variant-label="${esc(cardVariantLabel)}" data-tcg-id="${esc(String(cardTcgId))}" data-scrydex-id="${esc(cardSxId)}" data-avail="${copies.length}" data-price="${avgPrice.toFixed(2)}" data-card-name="${esc(card.card_name)}" data-set-name="${esc(card.set_name||'')}" data-image-url="${esc(card.image_url||'')}">
        <div class="copy-info">
          <div class="copy-cond"><span class="cond-pill cond-${cond}">${cond}</span></div>
          <div class="copy-num">${copies.length} available${copies[0]?.card_number ? ' · #'+copies[0].card_number : ''}</div>
          <div class="copy-price">$${avgPrice > 0 ? avgPrice.toFixed(2) : '—'}</div>
        </div>
        ${actionHtml}
      </div>`;
    }).join('') +
    // Each DISPLAY copy renders as its own info row — customers can see
    // condition + location (binder / case label) and ask staff to bring
    // it over. No qty stepper / add button: it's not cartable.
    displayCopies.map(c => {
      const cond = c.condition || 'NM';
      const price = parseFloat(c.current_price) || 0;
      const loc = c.location || 'On Display';
      return `<div class="copy-row display-only-row">
        <div class="copy-info">
          <div class="copy-cond"><span class="cond-pill cond-${cond}">${cond}</span></div>
          <div class="copy-num">On display · ${esc(loc)}${c.card_number ? ' · #'+esc(c.card_number) : ''}</div>
          <div class="copy-price">$${price > 0 ? price.toFixed(2) : '—'}</div>
        </div>
        <div class="copy-action"><span class="copy-display-note">Ask staff</span></div>
      </div>`;
    }).join('');

  // Pokemon energy type → inline SVG icon mapping
  // Each icon is a colored circle with a white symbol, mimicking real energy cards
  function _esvg(bg, path) {
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='${bg}' stroke='#fff' stroke-width='1'/>${path}</svg>`;
    return `<img class="energy-icon" src="data:image/svg+xml,${encodeURIComponent(svg)}" alt="">`;
  }
  const _energy = {
    // Colorless — white circle, gray star
    'Colorless': _esvg('#ddd', "<polygon points='16,6 18.5,12.5 25,12.5 20,17 22,24 16,20 10,24 12,17 7,12.5 13.5,12.5' fill='#999' stroke='#777' stroke-width='0.5'/>"),
    // Fire — red circle, white flame
    'Fire': _esvg('#e53935', "<path d='M16 6c0 0-7 8-7 13a7 7 0 0014 0c0-3-2-5-3.5-6.5 0 3-2 4.5-3.5 4.5s-3-1.5-3-4c0-2.5 3-7 3-7z' fill='#fff'/>"),
    // Water — blue circle, white water drop
    'Water': _esvg('#1e88e5', "<path d='M16 6 c-0.5 1-6 8-6 13a6 6 0 0012 0c0-5-5.5-12-6-13z' fill='#fff'/>"),
    // Grass — green circle, white leaf
    'Grass': _esvg('#43a047', "<path d='M10 22 Q10 10 22 8 Q22 22 10 22z' fill='#fff'/><line x1='10' y1='22' x2='19' y2='12' stroke='#43a047' stroke-width='1.2'/>"),
    // Lightning — yellow circle, white bolt
    'Lightning': _esvg('#fdd835', "<polygon points='18,5 11,17 15,17 13,27 22,14 17,14 20,5' fill='#fff' stroke='#f9a825' stroke-width='0.5'/>"),
    // Psychic — purple circle, white eye
    'Psychic': _esvg('#8e24aa', "<circle cx='16' cy='16' r='6' fill='none' stroke='#fff' stroke-width='2.5'/><circle cx='16' cy='16' r='2.5' fill='#fff'/>"),
    // Fighting — brown circle, white fist
    'Fighting': _esvg('#bf360c', "<path d='M11 20 L11 13 Q11 10 14 10 L18 10 Q21 10 21 13 L21 17 L19 17 L19 14 Q19 12.5 17.5 12.5 L14.5 12.5 Q13 12.5 13 14 L13 20z' fill='#fff'/><rect x='11' y='18' width='10' height='4' rx='2' fill='#fff'/>"),
    // Darkness — black circle, white crescent
    'Darkness': _esvg('#212121', "<path d='M18 7a10 10 0 100 18 8 8 0 010-18z' fill='#fff'/>"),
    // Metal — silver circle, white gear-like hexagon
    'Metal': _esvg('#757575', "<polygon points='16,7 22,11 22,21 16,25 10,21 10,11' fill='none' stroke='#fff' stroke-width='2.5'/><circle cx='16' cy='16' r='3' fill='#fff'/>"),
    // Dragon — gold circle, white fang
    'Dragon': _esvg('#e8a100', "<path d='M12 8 L16 16 L20 8 Q22 14 20 20 L16 24 L12 20 Q10 14 12 8z' fill='#fff' stroke='#c68400' stroke-width='0.5'/>"),
    // Fairy — pink circle, white star-flower
    'Fairy': _esvg('#ec407a', "<polygon points='16,7 17.5,13 24,13 19,17.5 21,24 16,20 11,24 13,17.5 8,13 14.5,13' fill='#fff'/>"),
  };
  // Case-insensitive aliases
  Object.keys(_energy).forEach(k => { _energy[k.toLowerCase()] = _energy[k]; });
  _energy['Normal'] = _energy['Colorless'];
  _energy['normal'] = _energy['Colorless'];
  _energy['Electric'] = _energy['Lightning'];
  _energy['electric'] = _energy['Lightning'];
  _energy['Dark'] = _energy['Darkness'];
  _energy['dark'] = _energy['Darkness'];
  _energy['Steel'] = _energy['Metal'];
  _energy['steel'] = _energy['Metal'];
  _energy['Free'] = _energy['Colorless'];
  _energy['free'] = _energy['Colorless'];

  function energySym(name) { return _energy[name] || _energy[name?.toLowerCase()] || esc(name); }
  function energyCost(arr) { return (arr||[]).map(energySym).join(''); }

  // Build card info rows from available data + scrydex meta (game-aware)
  const firstCopy = copies[0] || {};
  const m = meta || {};
  const game = (firstCopy.game || 'pokemon').toLowerCase();
  const infoRows = [];
  // Card number (prefer printed_number from meta)
  const num = m.printed_number || firstCopy.card_number;
  if (num) infoRows.push(['Number', '#' + num]);
  if (card.set_name) infoRows.push(['Set', card.set_name]);
  if (firstCopy.rarity) infoRows.push(['Rarity', firstCopy.rarity]);
  if (card.variant_label) infoRows.push(['Variant', card.variant_label]);

  if (game === 'pokemon') {
    // Pokemon: supertype (Pokémon/Trainer/Energy), HP, energy types, evolution
    if (m.supertype) infoRows.push(['Type', m.supertype]);
    if (m.hp) infoRows.push(['HP', String(m.hp)]);
    if (m.types && m.types.length) infoRows.push(['Energy', m.types.map(t => energySym(t) + ' ' + esc(t)).join(' / '), true]);
    if (m.subtypes && m.subtypes.length) infoRows.push(['Subtype', m.subtypes.join(', ')]);
    if (m.evolves_from) {
      const ef = Array.isArray(m.evolves_from) ? m.evolves_from.join(', ') : m.evolves_from;
      if (ef) infoRows.push(['Evolves', 'From ' + ef]);
    }
  } else if (game === 'onepiece') {
    // One Piece: card_type (Leader/Character/Event/Stage), attribute, power, life, colors
    if (m.card_type) infoRows.push(['Type', m.card_type]);
    if (m.attribute) infoRows.push(['Attr', m.attribute]);
    if (m.power) infoRows.push(['Power', String(m.power)]);
    if (m.life) infoRows.push(['Life', String(m.life)]);
    if (m.colors && m.colors.length) infoRows.push(['Color', m.colors.join(' / ')]);
  } else {
    // Magic / Lorcana / other: types + subtypes form the type line
    if (m.mana_cost) infoRows.push(['Cost', m.mana_cost]);
    const typeLine = [];
    if (m.supertype) typeLine.push(m.supertype);
    if (m.types && m.types.length) typeLine.push(...m.types);
    const subLine = (m.subtypes && m.subtypes.length) ? m.subtypes.join(' ') : '';
    const fullType = typeLine.join(' ') + (subLine ? ' — ' + subLine : '');
    if (fullType.trim()) infoRows.push(['Type', fullType.trim()]);
  }

  // Universal
  if (m.artist) infoRows.push(['Artist', m.artist]);
  const totalAvail = copies.length;
  infoRows.push(['In Stock', totalAvail + ' cop' + (totalAvail === 1 ? 'y' : 'ies')]);

  const infoHtml = infoRows.map(([label, val, rawHtml]) =>
    `<div class="detail-info-row"><span class="detail-info-label">${label}</span><span class="detail-info-val">${rawHtml ? val : esc(val)}</span></div>`
  ).join('');

  // Build attacks / abilities / rules section
  let metaHtml = '';
  if (m.abilities && m.abilities.length) {
    metaHtml += m.abilities.map(a =>
      `<div class="meta-block"><div class="meta-heading">Ability: ${esc(a.name || '')}</div><div class="meta-text">${esc(a.text || '')}</div></div>`
    ).join('');
  }
  if (m.attacks && m.attacks.length) {
    metaHtml += m.attacks.map(a => {
      const cost = energyCost(a.cost);
      const dmg = a.damage || '';
      return `<div class="meta-block"><div class="meta-heading">${cost ? cost + ' ' : ''}${esc(a.name || '')}${dmg ? ' — ' + esc(dmg) : ''}</div>${a.text ? `<div class="meta-text">${esc(a.text)}</div>` : ''}</div>`;
    }).join('');
  }
  // Rules: filter out Pokemon mechanic boilerplate (V rule, VSTAR, VMAX, ex rule, etc.)
  if (m.rules && m.rules.length) {
    const dominated = /\b(V rule|VSTAR|VMAX|Prism Star|GX rule|EX rule|ex rule|TAG TEAM|Radiant)\b/i;
    const meaningful = m.rules.filter(r => !dominated.test(r));
    if (meaningful.length) {
      metaHtml += meaningful.map(r => `<div class="meta-block"><div class="meta-text">${esc(r)}</div></div>`).join('');
    }
  }
  if (m.weaknesses && m.weaknesses.length) {
    const w = m.weaknesses.map(w => energySym(w.type || '') + ' ' + (w.value || '')).join(', ');
    if (w.trim()) metaHtml += `<div class="meta-block"><div class="meta-text">Weakness: ${w.trim()}</div></div>`;
  }
  if (m.resistances && m.resistances.length) {
    const r = m.resistances.map(r => energySym(r.type || '') + ' ' + (r.value || '')).join(', ');
    if (r.trim()) metaHtml += `<div class="meta-block"><div class="meta-text">Resistance: ${r.trim()}</div></div>`;
  }
  if (m.converted_retreat_cost != null) {
    const retreatIcons = Array(m.converted_retreat_cost).fill(energySym('Colorless')).join('');
    metaHtml += `<div class="meta-block"><div class="meta-text">Retreat: ${retreatIcons || '0'}</div></div>`;
  }
  if (m.flavor_text) {
    metaHtml += `<div class="meta-block"><div class="meta-text meta-flavor">${esc(m.flavor_text)}</div></div>`;
  }
  // Back face for double-faced cards (MTG MDFCs, transform)
  if (m.back_face) {
    const bf = m.back_face;
    const bfType = (bf.types || []).join(' ') + ((bf.subtypes && bf.subtypes.length) ? ' — ' + bf.subtypes.join(' ') : '');
    metaHtml += `<div class="meta-block" style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);">
      <div class="meta-heading">↻ ${esc(bf.name || 'Back Face')}</div>
      ${bfType ? `<div class="meta-text" style="color:var(--dim);margin-bottom:4px;">${esc(bfType)}</div>` : ''}
      ${(bf.rules||[]).map(r => `<div class="meta-text">${esc(r)}</div>`).join('')}
      ${bf.flavor_text ? `<div class="meta-text meta-flavor">${esc(bf.flavor_text)}</div>` : ''}
    </div>`;
  }

  const cartTotal = cartCount();
  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
      <div>
        <div class="panel-title">${esc(card.card_name)}${variantNote}</div>
        <div class="panel-sub">${esc(card.set_name||'')}</div>
      </div>
      <button class="btn btn-outline" style="min-width:44px;padding:0 12px;" onclick="closeDetailPanel()">✕</button>
    </div>
    <div class="detail-hero">
      <div class="detail-img-wrap">
        <div class="detail-img" ${imgUrl ? `onclick="openLightbox('${esc(imgUrl)}', '${esc(m.image_back || '')}')"` : ''}>${img}</div>
        ${imgUrl ? '<div class="detail-img-hint">Tap to enlarge</div>' : ''}
      </div>
      <div style="flex:1;">
        <div class="detail-info">${infoHtml}</div>
        ${metaHtml ? `<div class="meta-section">${metaHtml}</div>` : ''}
        <div style="font-size:0.82rem;color:var(--dim);margin-bottom:10px;">Select condition(s) to add to your picks:</div>
        <div class="copy-list" id="copy-list">${condRows}</div>
      </div>
    </div>
    ${cartTotal >= MAX ? `<div class="warning">You've reached the maximum of ${MAX} items per request.</div>` : ''}
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-outline" onclick="closeDetailPanel()">Back to Browse</button>
      <button class="btn btn-gold" id="detail-picks-btn" onclick="closeDetailPanel(); openCart();">View My Picks (${cartTotal})</button>
    </div>
  `;
}

let _toastTimer = null;
function showToast(msg) {
  let el = document.getElementById('pf-toast');
  if (el) el.remove();
  clearTimeout(_toastTimer);
  el = document.createElement('div');
  el.id = 'pf-toast';
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  _toastTimer = setTimeout(() => el.remove(), 2500);
}

function _updateDetailPicksBtn() {
  const btn = document.getElementById('detail-picks-btn');
  if (btn) btn.textContent = `View My Picks (${cartCount()})`;
}

// Delegated click: "+ Add to Picks" button
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-add-btn');
  if (!btn) return;
  const row = btn.closest('.copy-row');
  if (!row || !row.dataset.cardName) return;
  if (cartCount() >= MAX) return;
  addToCart(row.dataset.cardName, row.dataset.setName, row.dataset.cond, 1,
            parseFloat(row.dataset.price) || 0, row.dataset.imageUrl,
            parseInt(row.dataset.avail) || 1,
            row.dataset.variantKey || '', row.dataset.variantLabel || '',
            row.dataset.tcgId || '', row.dataset.scrydexId || '');
  // Swap add button to qty bar in place
  row.classList.add('selected');
  row.querySelector('.copy-action').innerHTML = `<div class="copy-qty-bar">
    <button class="qty-btn" data-delta="-1">−</button>
    <div class="qty-val">1</div>
    <button class="qty-btn" data-delta="1">+</button>
  </div>`;
  _updateDetailPicksBtn();
});

// Delegated click: qty +/- buttons in condition rows
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.copy-qty-bar .qty-btn');
  if (!btn) return;
  e.stopPropagation();
  const row = btn.closest('.copy-row');
  if (!row) return;
  const cardName = row.dataset.cardName;
  const setName = row.dataset.setName;
  const cond = row.dataset.cond;
  const variantKey = row.dataset.variantKey || '';
  const tcgId = row.dataset.tcgId || '';
  const sxId  = row.dataset.scrydexId || '';
  const avail = parseInt(row.dataset.avail);
  const delta = parseInt(btn.dataset.delta);
  const probe = { card_name: cardName, set_name: setName, condition: cond,
                  variant_key: variantKey, tcg_id: tcgId, scrydex_id: sxId };
  const item = _cart.find(c => _sameCartItem(c, probe));
  if (!item) return;
  const newQty = item.qty + delta;
  if (newQty < 1) {
    removeFromCart(cardName, setName, cond, variantKey, tcgId, sxId);
    row.classList.remove('selected');
    row.querySelector('.copy-action').innerHTML = '<button class="copy-add-btn">+ Add to Picks</button>';
    _updateDetailPicksBtn();
    return;
  }
  if (newQty > avail) { showToast(`Only ${avail} available in ${cond}`); return; }
  if (delta > 0 && cartCount() >= MAX) return;
  item.qty = newQty;
  updateCartBadge();
  _saveCart();
  const valEl = row.querySelector('.qty-val');
  if (valEl) valEl.textContent = newQty;
  _updateDetailPicksBtn();
});

// Delegated click handler for cart qty +/- buttons
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.cart-qty-btn');
  if (!btn) return;
  e.stopPropagation();
  const row = btn.closest('.cart-item');
  if (!row) return;
  const kind = row.dataset.kind || 'raw';
  const delta = parseInt(btn.dataset.delta);
  const avail = parseInt(row.dataset.avail) || 999;

  let probe;
  if (kind === 'sealed' || kind === 'slab') {
    probe = { kind, shopify_variant_id: parseInt(row.dataset.variantId) };
  } else {
    probe = {
      kind: 'raw',
      card_name: row.dataset.cardName, set_name: row.dataset.setName,
      condition: row.dataset.condition, variant_key: row.dataset.variantKey || '',
      tcg_id: row.dataset.tcgId || '', scrydex_id: row.dataset.scrydexId || '',
    };
  }
  const item = _cart.find(c => _sameCartItem(c, probe));
  if (!item) return;
  const newQty = item.qty + delta;
  if (newQty < 1) {
    _cart = _cart.filter(c => !_sameCartItem(c, probe));
    updateCartBadge();
    _saveCart();
    renderCart(document.getElementById('cart-panel'));
    return;
  }
  if (newQty > avail) { showToast(`Only ${avail} available in ${cond}`); return; }
  if (delta > 0 && cartCount() >= MAX) return;
  item.qty = newQty;
  updateCartBadge();
  _saveCart();
  // Update in place
  const valEl = row.querySelector('.qty-val');
  if (valEl) valEl.textContent = newQty;
  // Update subtotal text
  const subEl = row.querySelector('.cart-item-sub');
  if (subEl) {
    const price = parseFloat(item.price) || 0;
    subEl.innerHTML = `<span class="cond-pill cond-${cond}">${cond}</span> · $${price.toFixed(2)} ea · <strong style="color:var(--accent);">$${(price * newQty).toFixed(2)}</strong>`;
  }
  // Update total bar
  const totalVal = document.querySelector('.cart-total-val');
  if (totalVal) {
    const est = _cart.reduce((s,c) => s + (parseFloat(c.price)||0) * c.qty, 0);
    totalVal.textContent = `$${est.toFixed(2)}`;
  }
  // Update count
  const limitEl = document.querySelector('.cart-limit');
  if (limitEl) limitEl.textContent = `${cartCount()} of ${MAX} items selected`;
});


// Identity key for a cart line. Sealed/slab items key on (kind, variant_id);
// raw items key on the (name, set, variant, tcg_id) tuple — name+set+variant
// alone isn't unique because OP14-041 vs OP14-112 Boa Hancock both fold to
// altArt and the disambiguator is tcgplayer_id / scrydex_id.
function _cartItemKey(c) {
  const k = c.kind || 'raw';
  if (k === 'sealed' || k === 'slab') {
    return [k, String(c.shopify_variant_id || '')].join('§');
  }
  const tcg = c.tcg_id || c.tcgplayer_id || '';
  const sx  = c.scrydex_id || '';
  return ['raw', c.card_name||'', c.set_name||'', c.condition||'',
          c.variant_key||'', String(tcg), sx].join('§');
}
function _sameCartItem(a, b) { return _cartItemKey(a) === _cartItemKey(b); }

function addToCart(cardName, setName, cond, qty, price, imageUrl, avail, variantKey, variantLabel, tcgId, scrydexId) {
  variantKey = variantKey || '';
  const probe = { card_name: cardName, set_name: setName, condition: cond,
                  variant_key: variantKey, tcg_id: tcgId || '', scrydex_id: scrydexId || '' };
  const existing = _cart.find(c => _sameCartItem(c, probe));
  if (existing) {
    existing.qty = Math.min(existing.qty + qty, MAX);
    if (avail) existing.avail = avail;
  } else {
    _cart.push({ card_name: cardName, set_name: setName, condition: cond,
                 variant_key: variantKey, variant_label: variantLabel || '',
                 tcg_id: tcgId || '', scrydex_id: scrydexId || '',
                 qty, price, image_url: imageUrl, avail: avail || qty });
  }
  updateCartBadge();
  _saveCart();
}

function removeFromCart(cardName, setName, cond, variantKey, tcgId, scrydexId) {
  variantKey = variantKey || '';
  const probe = { card_name: cardName, set_name: setName, condition: cond,
                  variant_key: variantKey, tcg_id: tcgId || '', scrydex_id: scrydexId || '' };
  _cart = _cart.filter(c => !_sameCartItem(c, probe));
  updateCartBadge();
  _saveCart();
}

async function clearCart() {
  const ok = await themedConfirm('Clear All Picks?', 'This will remove all items from your selection.');
  if (!ok) return;
  _cart = [];
  updateCartBadge();
  _saveCart();
  renderCart(document.getElementById('cart-panel'));
}

function cartCount() { return _cart.reduce((s,c) => s + c.qty, 0); }

function updateCartBadge() {
  const n = cartCount();
  const badge = document.getElementById('cart-badge');
  badge.textContent = n;
  badge.classList.toggle('visible', n > 0);
}

function closeDetailPanel() {
  document.getElementById('detail-overlay').classList.remove('active');
  if (!document.getElementById('cart-overlay').classList.contains('active'))
    document.body.classList.remove('modal-open');
}

// ── Cart ──────────────────────────────────────────────────────────────────────
function openCart() {
  const panel = document.getElementById('cart-panel');
  renderCart(panel);
  document.getElementById('cart-overlay').classList.add('active');
  document.body.classList.add('modal-open');
}

function renderCart(panel) {
  const total = cartCount();
  const estimatedTotal = _cart.reduce((s,c) => s + (parseFloat(c.price)||0) * c.qty, 0);

  if (!_cart.length) {
    panel.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div class="panel-title">My Picks</div>
        <button class="btn btn-outline" style="min-width:44px;padding:0 12px;" onclick="closeCartPanel()">✕</button>
      </div>
      <div class="empty" style="padding:40px 0;">
        <div class="empty-icon">${ICON_CARD_STACK}</div>
        <p>No items selected yet.</p>
      </div>
      <button class="btn btn-outline" onclick="closeCartPanel()">Keep Browsing</button>
    `;
    return;
  }

  const items = _cart.map(c => {
    const kind = c.kind || 'raw';
    const price = parseFloat(c.price) || 0;
    const subtotal = price * c.qty;
    if (kind === 'sealed' || kind === 'slab') {
      const kindLabel = kind === 'slab' ? 'Slab' : 'Sealed';
      return `
      <div class="cart-item"
           data-kind="${kind}"
           data-variant-id="${esc(String(c.shopify_variant_id))}"
           data-avail="${c.avail || c.qty}">
        <div class="cart-item-info">
          <div class="cart-item-name">${esc(c.title)}</div>
          <div class="cart-item-sub">
            <span class="cond-pill" style="background:rgba(223,163,42,0.18);color:var(--accent);">${kindLabel}</span>
            · $${price.toFixed(2)} ea · <strong style="color:var(--accent);">$${subtotal.toFixed(2)}</strong>
          </div>
        </div>
        <div class="copy-qty-bar" style="flex-shrink:0;">
          <button class="qty-btn cart-qty-btn" data-delta="-1">−</button>
          <div class="qty-val">${c.qty}</div>
          <button class="qty-btn cart-qty-btn" data-delta="1">+</button>
        </div>
      </div>`;
    }
    // Raw card line (existing layout)
    const vBadge = c.variant_label ? `<span class="variant-badge" style="margin-left:6px;">${esc(c.variant_label)}</span>` : '';
    return `
    <div class="cart-item"
         data-kind="raw"
         data-card-name="${esc(c.card_name)}" data-set-name="${esc(c.set_name)}"
         data-condition="${c.condition}" data-variant-key="${esc(c.variant_key||'')}"
         data-tcg-id="${esc(String(c.tcg_id||''))}" data-scrydex-id="${esc(c.scrydex_id||'')}"
         data-avail="${c.avail || c.qty}">
      ${c.image_url ? `<img src="${esc(c.image_url)}" style="aspect-ratio:2.5/3.5;object-fit:contain;border-radius:4px;">` : ''}
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(c.card_name)}${vBadge}</div>
        <div class="cart-item-sub"><span class="cond-pill cond-${c.condition}">${c.condition}</span> · $${price.toFixed(2)} ea · <strong style="color:var(--accent);">$${subtotal.toFixed(2)}</strong></div>
      </div>
      <div class="copy-qty-bar" style="flex-shrink:0;">
        <button class="qty-btn cart-qty-btn" data-delta="-1">−</button>
        <div class="qty-val">${c.qty}</div>
        <button class="qty-btn cart-qty-btn" data-delta="1">+</button>
      </div>
    </div>
  `;
  }).join('');

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="panel-title">My Picks</div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" style="padding:0 14px;font-size:0.82rem;color:var(--red);border-color:var(--red);" onclick="clearCart()">Clear All</button>
        <button class="btn btn-outline" style="min-width:44px;padding:0 12px;" onclick="closeCartPanel()">✕</button>
      </div>
    </div>
    <div class="cart-limit">${total} of ${MAX} items selected</div>
    <div class="cart-items">${items}</div>
    <div class="cart-total-bar">
      <div class="cart-total-label">Estimated Total</div>
      <div class="cart-total-val">$${estimatedTotal.toFixed(2)}</div>
    </div>
    ${_champion && _champion.verified ? `
      <!-- Champion checkout -->
      <div style="background:rgba(223,163,42,0.08);border:1px solid rgba(223,163,42,0.25);border-radius:8px;padding:12px;margin-bottom:12px;">

            <button class="btn btn-outline" style="width:100%;" id="champ-verify-btn" onclick="verifyChampion()">Verify Champion Status</button>
          </div>
        </div>
      ` : ''}
      <div class="form-row">
        <label class="form-label">Your Name *</label>
        <input class="form-input" id="cust-name" type="text" placeholder="e.g. Mark" autocomplete="name">

      <div class="form-row">
        <label class="form-label">Phone Number (optional)</label>
        <input class="form-input" id="cust-phone" type="tel" placeholder="(555) 867-5309"
               autocomplete="tel" inputmode="numeric" maxlength="14"
               oninput="formatPhone(this)">
      </div>
      <div id="submit-error" style="display:none;" class="warning"></div>
      <div class="btn-row" style="margin-top:8px;">
        <button class="btn btn-outline" onclick="closeCartPanel()">Back</button>
        <button class="btn btn-gold" id="submit-btn" onclick="submitHold()">Request These Items →</button>
      </div>
    `}
  `;
}

async function submitHold() {
  const name  = (document.getElementById('cust-name')?.value || '').trim();
  const phone = (document.getElementById('cust-phone')?.value || '').replace(/\D/g, '');
  const errEl = document.getElementById('submit-error');
  const btn   = document.getElementById('submit-btn');

  if (!name) {
    errEl.textContent = 'Please enter your name.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Submitting…';
  errEl.style.display = 'none';

  const items = _cart.map(c => {
    const kind = c.kind || 'raw';
    if (kind === 'sealed' || kind === 'slab') {
      return {
        kind,
        shopify_variant_id: c.shopify_variant_id,
        sku:                c.sku,
        title:              c.title,
        unit_price:         c.unit_price ?? c.price ?? null,
        qty:                c.qty,
      };
    }
    return {
      kind:        'raw',
      card_name:   c.card_name,
      set_name:    c.set_name,
      condition:   c.condition,
      variant:     c.variant_key || '',
      tcgplayer_id: c.tcg_id || null,
      scrydex_id:   c.scrydex_id || null,
      qty:          c.qty,
    };
  });

  try {
    const d = await post('/api/hold', { customer_name: name, customer_phone: phone, items });
    showConfirmation(d, name);
    _cart = [];
    updateCartBadge();
    _saveCart();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Request These Items →';
    errEl.textContent = e.message || 'Something went wrong. Please ask a staff member.';
    errEl.style.display = 'block';
  }
}

function showConfirmation(d, name) {
  const panel = document.getElementById('cart-panel');
  const warnings = (d.warnings || []).length > 0
    ? `<div class="warning" style="text-align:left;margin-bottom:16px;">
        Some items weren't available: ${d.warnings.join('; ')}
       </div>` : '';
  panel.innerHTML = `
    <div class="confirm-screen">
      <div class="confirm-icon">✅</div>
      <div class="confirm-title">You're all set, ${name}!</div>
      <div class="confirm-ref">Ref: ${d.hold_id?.slice(0,8).toUpperCase()}</div>
      ${warnings}
      <div class="confirm-msg">
        A staff member will retrieve your ${d.assigned} item${d.assigned !== 1 ? 's' : ''} shortly.<br>
        Please stay nearby — we'll come find you!
      </div>
      <button class="btn btn-gold" onclick="closeCartPanel()">Continue Browsing</button>
    </div>
  `;
}

// ── Champion Login + Checkout ─────────────────────────────────────────────────
function showChampionLogin(e) {
  e.preventDefault();
  const form = document.getElementById('champion-login-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function verifyChampion() {
  const email = (document.getElementById('champ-email')?.value || '').trim().toLowerCase();
  const errEl = document.getElementById('champ-error');
  const btn = document.getElementById('champ-verify-btn');
  if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  errEl.style.display = 'none';

  try {
    const d = await post('/api/champion/identify', { email });
    if (d.verified) {
      _champion = { verified: true, first_name: d.first_name, customer_gid: d.customer_gid, email: d.email, checkout_enabled: d.checkout_enabled };
      _saveChampion();
      updateChampionUI();
      renderCart(document.getElementById('cart-panel'));  // re-render with Champion mode
    } else {
      errEl.textContent = d.reason || 'Not a Champion account.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Verify Champion Status';
    }
  } catch(e) {
    errEl.textContent = e.message || 'Verification failed.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Verify Champion Status';
  }
}

async function submitChampionCheckout() {
  const errEl = document.getElementById('submit-error');
  const btn = document.getElementById('submit-btn');

  if (!_champion || !_champion.verified) {
    errEl.textContent = 'Please sign in as a Champion first.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating checkout…';
  errEl.style.display = 'none';

  const items = _cart.map(c => ({
    card_name:    c.card_name,
    set_name:     c.set_name,
    condition:    c.condition,
    variant:      c.variant_key || '',
    tcgplayer_id: c.tcg_id || null,
    scrydex_id:   c.scrydex_id || null,
    qty:          c.qty,
  }));

  try {
    const d = await post('/api/checkout', {
      email: _champion.email,
      customer_gid: _champion.customer_gid,
      items
    });

    if (d.checkout_url) {
      // Clear cart before redirecting
      _cart = [];
      updateCartBadge();
      _saveCart();
      // Redirect to Shopify checkout
      window.location.href = d.checkout_url;
    } else {
      throw new Error('No checkout URL returned');
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Checkout on Shopify →';
    errEl.textContent = e.message || 'Checkout failed. Please try again.';
    errEl.style.display = 'block';
  }
}

function closeCartPanel() {
  document.getElementById('cart-overlay').classList.remove('active');
  if (!document.getElementById('detail-overlay').classList.contains('active'))
    document.body.classList.remove('modal-open');
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function _kioskHeaders() {
  const h = {};
  const key = localStorage.getItem('pf_kiosk_key');
  if (key) h['X-Kiosk-Key'] = key;
  if (_champion && _champion.verified && _champion.email) h['X-Champion-Email'] = _champion.email;
  return h;
}
async function get(url) {
  const r = await fetch(url, { headers: _kioskHeaders() });
  if (!r.ok) { const d = await r.json(); throw new Error(d.error || `HTTP ${r.status}`); }
  return r.json();
}
async function post(url, body) {
  const r = await fetch(url, { method: 'POST', headers: {..._kioskHeaders(), 'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('active')) {
      closeLightbox(null);
    } else {
      closeDetailPanel();
      closeCartPanel();
    }
  }
});

function formatPhone(input) {
  // Strip everything non-digit
  const digits = input.value.replace(/\D/g, '').slice(0, 10);
  let formatted = '';
  if (digits.length === 0) {
    formatted = '';
  } else if (digits.length <= 3) {
    formatted = `(${digits}`;
  } else if (digits.length <= 6) {
    formatted = `(${digits.slice(0,3)}) ${digits.slice(3)}`;
  } else {
    formatted = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  }
  input.value = formatted;
}

boot();
