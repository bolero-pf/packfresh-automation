<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pulls — Pack Fresh</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0B0B09;       /* cl-neutral-900 */
    --panel: #171514;    /* cl-neutral-800 */
    --border: #3B3938;   /* cl-neutral-600 */
    --text: #FDF5E4;     /* cl-gold-50 */
    --dim: #838180;      /* cl-neutral-300 */
    --accent: #DFA32A;   /* cl-gold-500 — Commonlands logo gold */
    --green: #1D9B79;    /* cl-teal-500 */
    --yellow: #FFB829;   /* cl-gold-400 */
    --red: #942120;      /* cl-red-500 */
    --blue: #1A488E;     /* cl-blue-500 */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    background: var(--panel);
  }
  header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
  header .spacer { flex: 1; }
  main { padding: 16px 20px; max-width: 1200px; margin: 0 auto; }
  .scan-bar {
    background: var(--panel);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    display: flex; gap: 10px; align-items: center;
  }
  .scan-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-size: 1.1rem;
    border-radius: 8px;
    outline: none;
  }
  .scan-bar input:focus { border-color: var(--accent); }
  .scan-status {
    margin-top: 8px; padding: 10px 14px;
    border-radius: 8px; font-weight: 600;
    display: none;
  }
  .scan-status.ok { background: rgba(29,155,121,0.15); color: var(--green); display: block; }
  .scan-status.err { background: rgba(148,33,32,0.15); color: var(--red); display: block; }
  .hold {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .hold-head {
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    display: flex; align-items: baseline; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .hold-head .name { font-weight: 700; }
  .hold-head .phone { color: var(--dim); font-size: 0.85rem; }
  .hold-head .time { color: var(--dim); font-size: 0.78rem; margin-left: auto; }
  .item {
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center; gap: 10px;
  }
  .item:last-child { border-bottom: 0; }
  .item .kind {
    font-size: 0.65rem; font-weight: 800;
    padding: 2px 7px; border-radius: 4px;
    background: var(--border); color: var(--dim);
    text-transform: uppercase;
    flex-shrink: 0; width: 50px; text-align: center;
  }
  .item .kind.raw    { background: rgba(26,72,142,0.2); color: var(--blue); }
  .item .kind.sealed { background: rgba(223,163,42,0.2); color: var(--accent); }
  .item .kind.slab   { background: rgba(29,155,121,0.2); color: var(--green); }
  .item .title { flex: 1; }
  .item .barcode { color: var(--dim); font-family: ui-monospace, monospace; font-size: 0.78rem; }
  .item .status {
    font-size: 0.7rem; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase;
  }
  .item .status.REQUESTED { background: rgba(255,184,41,0.2); color: var(--yellow); }
  .item .status.PULLED    { background: rgba(29,155,121,0.2); color: var(--green); }
  .item .status.UNRESOLVED { background: rgba(148,33,32,0.2); color: var(--red); }
  .empty {
    text-align: center; padding: 60px 20px; color: var(--dim);
  }
  .summary {
    color: var(--dim); font-size: 0.85rem; margin-bottom: 14px;
  }
</style>
</head>
<body>
<header>
  <h1>Staff Pulls</h1>
  <span class="spacer"></span>
  <span id="last-updated" style="color:var(--dim);font-size:0.78rem;"></span>
</header>
<main>
  <div class="scan-bar">
    <input id="scan-input" type="text" placeholder="Scan barcode or SKU…" autocomplete="off" autofocus>
  </div>
  <div id="scan-status" class="scan-status"></div>

  <div class="summary" id="summary"></div>
  <div id="holds-list"></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
  (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let _holds = [];

async function load() {
  try {
    const r = await fetch('/api/staff/pulls', { credentials: 'include' });
    if (!r.ok) {
      if (r.status === 401) {
        window.location.href = 'https://admin.pack-fresh.com/login?next=' + encodeURIComponent(window.location.href);
        return;
      }
      throw new Error('HTTP ' + r.status);
    }
    const d = await r.json();
    _holds = d.holds || [];
    render();
    $('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    $('summary').textContent = 'Failed to load: ' + e.message;
  }
}

function render() {
  if (!_holds.length) {
    $('holds-list').innerHTML = '<div class="empty">No active holds.</div>';
    $('summary').textContent = '';
    return;
  }
  let totalReq = 0, totalPull = 0, totalUnres = 0;
  for (const h of _holds) {
    for (const it of h.items) {
      if (it.status === 'REQUESTED') totalReq++;
      else if (it.status === 'PULLED') totalPull++;
      else if (it.status === 'UNRESOLVED') totalUnres++;
    }
  }
  $('summary').textContent =
    `${_holds.length} active hold(s) — ${totalReq} to pull, ${totalPull} on counter, ${totalUnres} unresolved`;

  $('holds-list').innerHTML = _holds.map(h => `
    <div class="hold">
      <div class="hold-head">
        <span class="name">${esc(h.customer_name)}</span>
        ${h.customer_phone ? `<span class="phone">${esc(h.customer_phone)}</span>` : ''}
        <span class="time">${esc(formatTime(h.created_at))}</span>
      </div>
      ${h.items.map(it => `
        <div class="item">
          <span class="kind ${esc(it.kind)}">${esc(it.kind)}</span>
          <div class="title">
            <div>${esc(it.title)}</div>
            <div class="barcode">${esc(it.barcode || it.sku || '')}</div>
          </div>
          <span class="status ${esc(it.status)}">${esc(it.status)}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function formatTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString();
  } catch (e) { return iso; }
}

function showStatus(msg, ok) {
  const el = $('scan-status');
  el.textContent = msg;
  el.className = 'scan-status ' + (ok ? 'ok' : 'err');
  setTimeout(() => { el.className = 'scan-status'; }, 4000);
}

async function processScan(scan) {
  // Decide endpoint based on what we know about this barcode locally
  let endpoint = '/api/staff/scan-out';
  for (const h of _holds) {
    for (const it of h.items) {
      if (it.barcode === scan || it.sku === scan) {
        if (it.status === 'PULLED' && (it.kind === 'sealed' || it.kind === 'slab')) {
          endpoint = '/api/staff/scan-return';
        }
        break;
      }
    }
  }
  try {
    const r = await fetch(endpoint, {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scan }),
    });
    const d = await r.json();
    if (!r.ok) {
      showStatus(d.error || 'Scan failed', false);
    } else {
      const action = endpoint.endsWith('scan-return') ? 'Returned' : 'Pulled';
      showStatus(`${action}: ${d.title || scan}`, true);
    }
  } catch (e) {
    showStatus('Network error: ' + e.message, false);
  }
  await load();
}

$('scan-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const v = e.target.value.trim();
    if (v) {
      processScan(v);
    }
    e.target.value = '';
  }
});

// Refocus scan input on any click — barcode scanners need the input focused
document.addEventListener('click', (e) => {
  if (e.target.tagName !== 'INPUT') $('scan-input').focus();
});

load();
setInterval(load, 8000);
</script>
</body>
</html>
