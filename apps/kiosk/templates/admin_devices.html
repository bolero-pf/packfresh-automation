<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kiosk Devices — Pack Fresh</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0B0B09;       /* cl-neutral-900 */
    --panel: #171514;    /* cl-neutral-800 */
    --border: #3B3938;   /* cl-neutral-600 */
    --text: #FDF5E4;     /* cl-gold-50 */
    --dim: #838180;      /* cl-neutral-300 */
    --accent: #DFA32A;   /* cl-gold-500 — Commonlands logo gold */
    --green: #1D9B79;    /* cl-teal-500 */
    --red: #942120;      /* cl-red-500 */
    --blue: #1A488E;     /* cl-blue-500 */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { margin: 0; font-size: 1.15rem; font-weight: 700; }
  main { padding: 20px; max-width: 880px; margin: 0 auto; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 18px;
  }
  .panel h2 { margin: 0 0 12px; font-size: 1rem; }
  label { display: block; font-size: 0.82rem; color: var(--dim); margin-bottom: 4px; }
  input[type=text] {
    width: 100%;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 12px;
    font-family: inherit; font-size: 0.95rem;
    outline: none;
  }
  input[type=text]:focus { border-color: var(--accent); }
  button {
    background: var(--accent); color: #0B0B09;
    border: none; border-radius: 6px;
    padding: 10px 18px;
    font-family: inherit; font-weight: 700; font-size: 0.92rem;
    cursor: pointer;
  }
  button.secondary {
    background: transparent; color: var(--dim);
    border: 1px solid var(--border);
  }
  button.danger {
    background: transparent; color: var(--red);
    border: 1px solid var(--red);
    padding: 6px 12px; font-size: 0.78rem;
  }
  .activation-result {
    margin-top: 14px; padding: 14px;
    background: rgba(29,155,121,0.08);
    border: 1px solid rgba(29,155,121,0.4);
    border-radius: 8px;
  }
  .activation-result code {
    display: block;
    background: var(--bg);
    padding: 10px 12px; border-radius: 6px;
    font-family: ui-monospace, monospace;
    font-size: 0.85rem; word-break: break-all;
    margin: 8px 0;
  }
  .device-row {
    display: flex; gap: 14px; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .device-row:last-child { border-bottom: 0; }
  .device-row .meta { flex: 1; }
  .device-row .label { font-weight: 700; }
  .device-row .id { font-family: ui-monospace, monospace; font-size: 0.78rem; color: var(--dim); }
  .device-row .stamp { font-size: 0.78rem; color: var(--dim); }
  .device-row.revoked .label { color: var(--dim); text-decoration: line-through; }
  .empty { color: var(--dim); padding: 14px 0; }
  .err { color: var(--red); margin-top: 8px; }
</style>
</head>
<body>
<header>
  <h1>Kiosk Devices</h1>
</header>
<main>
  <div class="panel">
    <h2>Activate a new iPad</h2>
    <p style="color:var(--dim);margin:0 0 12px;font-size:0.9rem;">
      Generate a one-time activation URL, then open it once in Kiosk Pro on the
      iPad. The URL sets a long-lived cookie; afterwards, set Kiosk Pro's home
      URL to plain <code>https://kiosk.pack-fresh.com/</code>.
    </p>
    <label for="label-input">Label (e.g. "Front register iPad")</label>
    <input id="label-input" type="text" value="Kiosk iPad">
    <div style="margin-top:12px;">
      <button id="mint-btn" onclick="mintToken()">Generate Activation URL</button>
    </div>
    <div id="mint-error" class="err" style="display:none;"></div>
    <div id="mint-result" class="activation-result" style="display:none;"></div>
  </div>

  <div class="panel">
    <h2>Active devices</h2>
    <div id="devices-list"><div class="empty">Loading…</div></div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g,
  (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function mintToken() {
  const btn = $('mint-btn');
  const errEl = $('mint-error');
  const resultEl = $('mint-result');
  errEl.style.display = 'none';
  resultEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Generating…';
  try {
    const label = ($('label-input').value || '').trim() || 'Kiosk iPad';
    const r = await fetch('/api/admin/mint-activation', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label }),
    });
    if (!r.ok) {
      if (r.status === 401) {
        window.location.href = 'https://admin.pack-fresh.com/login?next=' + encodeURIComponent(window.location.href);
        return;
      }
      const d = await r.json().catch(() => ({}));
      throw new Error(d.error || ('HTTP ' + r.status));
    }
    const d = await r.json();
    resultEl.innerHTML = `
      <div style="font-weight:700;margin-bottom:6px;">Activation URL — single-use, expires ${esc(d.expires_at.replace('T',' ').slice(0,16))} UTC</div>
      <code id="act-url">${esc(d.activation_url)}</code>
      <div style="display:flex;gap:8px;">
        <button class="secondary" onclick="copyUrl()">Copy URL</button>
        <button class="secondary" onclick="window.open('${esc(d.activation_url)}','_blank')">Open in new tab</button>
      </div>
      <div style="margin-top:10px;font-size:0.82rem;color:var(--dim);">
        On the iPad: open Kiosk Pro → Settings → Home URL → paste this URL → exit settings.
        After it loads once, change the Home URL to <code>https://kiosk.pack-fresh.com/</code>.
      </div>
    `;
    resultEl.style.display = 'block';
    loadDevices();
  } catch (e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Generate Activation URL';
  }
}

function copyUrl() {
  const code = $('act-url');
  if (!code) return;
  navigator.clipboard.writeText(code.textContent).then(() => {
    code.style.background = 'rgba(29,155,121,0.15)';
    setTimeout(() => { code.style.background = ''; }, 800);
  });
}

async function loadDevices() {
  try {
    const r = await fetch('/api/admin/devices', { credentials: 'include' });
    if (!r.ok) {
      if (r.status === 401) {
        window.location.href = 'https://admin.pack-fresh.com/login?next=' + encodeURIComponent(window.location.href);
        return;
      }
      throw new Error('HTTP ' + r.status);
    }
    const d = await r.json();
    const list = d.devices || [];
    if (!list.length) {
      $('devices-list').innerHTML = '<div class="empty">No iPads activated yet.</div>';
      return;
    }
    $('devices-list').innerHTML = list.map(dev => `
      <div class="device-row ${dev.revoked_at ? 'revoked' : ''}">
        <div class="meta">
          <div class="label">${esc(dev.label || 'Unnamed')}</div>
          <div class="id">${esc(dev.device_id.slice(0, 12))}…</div>
          <div class="stamp">
            Activated ${esc(formatStamp(dev.activated_at))}
            ${dev.last_seen_at ? ' · last seen ' + esc(formatStamp(dev.last_seen_at)) : ''}
            ${dev.revoked_at ? ' · revoked ' + esc(formatStamp(dev.revoked_at)) : ''}
          </div>
        </div>
        ${dev.revoked_at ? '' : `<button class="danger" onclick="revokeDevice('${esc(dev.device_id)}')">Revoke</button>`}
      </div>
    `).join('');
  } catch (e) {
    $('devices-list').innerHTML = `<div class="err">Failed to load: ${esc(e.message)}</div>`;
  }
}

function formatStamp(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
}

async function revokeDevice(deviceId) {
  if (!confirm('Revoke this device? The iPad will lose access until reactivated.')) return;
  try {
    const r = await fetch(`/api/admin/devices/${encodeURIComponent(deviceId)}/revoke`, {
      method: 'POST',
      credentials: 'include',
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    loadDevices();
  } catch (e) {
    alert('Revoke failed: ' + e.message);
  }
}

loadDevices();
</script>
</body>
</html>
