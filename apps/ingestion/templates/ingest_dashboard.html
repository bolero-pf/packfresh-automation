            <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; font-size:0.82rem;">
                <div style="color:var(--text-dim);">PSA 10</div>
                <div style="font-weight:600;">
                    ${econ.psa10_price ? '$'+econ.psa10_price.toFixed(2) : '—'}
                    ${econ.psa10_confidence ? `<span style="font-size:0.68rem; padding:1px 5px; border-radius:3px; margin-left:4px; background:${econ.psa10_confidence==='high'?'var(--green)22':'var(--orange)22'}; color:${econ.psa10_confidence==='high'?'var(--green)':'var(--orange)'};">${econ.psa10_confidence}</span>` : ''}
                </div>

                <div style="color:var(--text-dim);">PSA 9</div>
                <div style="font-weight:600;">
                    ${econ.psa9_price ? '$'+econ.psa9_price.toFixed(2) : '—'}
                    ${econ.psa9_confidence ? `<span style="font-size:0.68rem; padding:1px 5px; border-radius:3px; margin-left:4px; background:${econ.psa9_confidence==='high'?'var(--green)22':'var(--orange)22'}; color:${econ.psa9_confidence==='high'?'var(--green)':'var(--orange)'};">${econ.psa9_confidence}</span>` : ''}
                </div>
            </div>`;

        if (isEligible && econ.ev != null) {
            html += `<div style="margin-top:10px; padding-top:10px; border-top:1px solid var(--border); font-size:0.82rem;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px 16px;">
                    <div style="color:var(--text-dim);">EV</div>
                    <div style="font-weight:600;">0.60 &times; $${econ.psa10_price.toFixed(2)} + 0.40 &times; $${econ.psa9_price.toFixed(2)} = <strong>$${econ.ev.toFixed(2)}</strong></div>

                    <div style="color:var(--text-dim);">Total cost</div>
                    <div>$${price.toFixed(2)} + $${econ.grading_cost.toFixed(2)} = $${econ.total_cost.toFixed(2)}</div>

                    <div style="color:var(--text-dim);">Expected profit</div>
                    <div style="font-weight:700; color:${profitColor};">$${econ.expected_profit.toFixed(2)}</div>

                    <div style="color:var(--text-dim);">ROI</div>
                    <div style="font-weight:700; color:${roiColor};">${econ.roi_pct.toFixed(1)}%</div>
                </div>
            </div>`;

            // Verdict banner
            if (roiTier === 'definitely') {
                html += `<div style="margin-top:10px; padding:8px 12px; background:var(--green)15; border:1px solid var(--green)44; border-radius:6px; color:var(--green); font-weight:700; font-size:0.85rem; text-align:center;">
                    Definitely Grade Worthy &mdash; $${econ.expected_profit.toFixed(2)} profit at ${econ.roi_pct.toFixed(0)}% ROI
                </div>`;
            } else if (roiTier === 'potentially') {
                html += `<div style="margin-top:10px; padding:8px 12px; background:#e6a81715; border:1px solid #e6a81744; border-radius:6px; color:#e6a817; font-weight:700; font-size:0.85rem; text-align:center;">
                    Potentially Grade Worthy &mdash; $${econ.expected_profit.toFixed(2)} profit at ${econ.roi_pct.toFixed(0)}% ROI
                </div>`;
            } else {
                const reasons = [];
                if (econ.expected_profit < 40) reasons.push(`profit $${econ.expected_profit.toFixed(2)} < $40 min`);
                if (roi < 40) reasons.push(`ROI ${econ.roi_pct.toFixed(0)}% < 40%`);
                html += `<div style="margin-top:8px; font-size:0.75rem; color:var(--text-dim);">Not grade-worthy: ${reasons.join(', ')}</div>`;
            }
        } else if (econ.reason) {
            html += `<div style="margin-top:8px; font-size:0.78rem; color:var(--text-dim);">${econ.reason}</div>`;
            if (cond === 'LP') {
                html += `<div style="margin-top:4px; font-size:0.72rem; color:var(--accent2); font-style:italic;">LP cards may be worth grading if vintage — use [G] to override</div>`;

    const dests = [
        { key: 'display', label: 'Binder', shortcut: 'B', color: 'var(--green)' },
        { key: 'storage', label: 'Storage', shortcut: 'S', color: 'var(--accent)' },
        { key: 'grade', label: 'Grade', shortcut: 'G', color: 'var(--accent2)' },
        { key: 'bulk', label: 'Bulk', shortcut: 'K', color: 'var(--text-dim)' },
    ];

    html += `<div style="display:flex; gap:10px; justify-content:center; margin-top:24px; flex-wrap:wrap;">`;
    for (const d of dests) {
        const isCurrent = dest === d.key;
        html += `<button id="rs-btn-${d.key}" onclick="_rsSetDest('${d.key}')"
            style="font-size:1.1rem; font-weight:700; padding:16px 32px; min-width:120px;
                   border-radius:10px; cursor:pointer; transition:all 0.15s;
                   border:2px solid ${isCurrent ? d.color : 'var(--border)'};
                   background:${isCurrent ? d.color+'22' : 'var(--surface-2)'};
                   color:${isCurrent ? d.color : 'var(--text-dim)'};">
            <span style="font-size:0.7rem; opacity:0.7; display:block; margin-bottom:2px;">[${d.shortcut}]</span>
            ${d.label}
        </button>`;
    }
    html += `</div>`;

    // ── Accept + Nav ──
    html += `<div style="display:flex; justify-content:center; gap:12px; margin-top:16px; align-items:center;">
        <button class="btn btn-secondary" onclick="_rsNav(-1)" ${_rsIndex === 0 ? 'disabled' : ''} style="padding:8px 20px;">&larr; Prev</button>
        <button class="btn btn-success" onclick="_rsAccept()" style="padding:10px 36px; font-size:1.05rem; font-weight:700;">
            <span style="font-size:0.7rem; opacity:0.7; display:block; margin-bottom:1px;">[Space / Enter]</span>
            Accept
        </button>
        <button class="btn btn-secondary" onclick="_rsNav(1)" ${_rsIndex >= total - 1 ? 'disabled' : ''} style="padding:8px 20px;">Next &rarr;</button>
    </div>`;

    overlay.innerHTML = html;
}

async function _rsSetDest(destination) {
    const item = _rsItems[_rsIndex];
    if (!item) return;

    const oldDest = item.routing_destination || 'storage';
    const qty = item.quantity || 1;

    // Update local state immediately
    item.routing_destination = destination;
    _rsCounts[oldDest] = (_rsCounts[oldDest] || 0) - qty;
    _rsCounts[destination] = (_rsCounts[destination] || 0) + qty;

    // Also update _routeData for when we exit
    if (_routeData) {
        const ri = _routeData.items.find(i => i.id === item.id);
        if (ri) ri.routing_destination = destination;
        _routeData.by_destination = { ..._rsCounts };
    }

    // Flash the button
    const btn = document.getElementById(`rs-btn-${destination}`);
    if (btn) {
        btn.style.transform = 'scale(1.08)';
        setTimeout(() => { if (btn) btn.style.transform = ''; }, 150);
    }

    // Fire-and-forget server update
    fetch(`/api/ingest/session/${_rsSessionId}/route-card`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item_id: item.id, destination }),
    }).catch(e => console.error('Route save failed:', e));

    // Auto-advance after brief pause
    setTimeout(() => {
        if (_rsIndex < _rsItems.length - 1) {
            _rsIndex++;
            _renderSessionCard();
        } else {
            _showSessionComplete();
        }
    }, 200);
}

async function _rsSplitSingles() {
    const item = _rsItems[_rsIndex];
    if (!item || (item.quantity || 1) <= 1) return;

    try {
        const r = await fetch(`/api/ingest/session/${_rsSessionId}/split-singles`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ item_id: item.id }),
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'Split failed'); return; }

        const oldQty = item.quantity;
        // Update current item to qty=1
        item.quantity = 1;

        // Update counts (was counted as oldQty, now it's 1 for this item + (oldQty-1) new items = same total)
        // No count change needed since total qty stays the same

        // Insert (oldQty - 1) clones after current position
        const newItems = [];
        for (let i = 0; i < oldQty - 1; i++) {
            newItems.push({
                ...item,
                id: d.original_id + '_split_' + i,  // temp ID until reload
                quantity: 1,
                _enrichLoading: item._enrichLoading,
            });
        }
        _rsItems.splice(_rsIndex + 1, 0, ...newItems);

        _renderSessionCard();
    } catch(e) {
        alert('Split failed: ' + e.message);
    }
}

function _rsNav(delta) {
    const newIdx = _rsIndex + delta;
    if (newIdx < 0 || newIdx >= _rsItems.length) return;
    _rsIndex = newIdx;
    _renderSessionCard();
}

function _rsKeyHandler(e) {
    if (!_rsActive) return;
    // Don't capture if user is in an input
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

    const key = e.key.toLowerCase();
    if (key === ' ' || key === 'enter') { e.preventDefault(); _rsAccept(); }
    else if (key === 'b') { e.preventDefault(); _rsSetDest('display'); }
    else if (key === 's') { e.preventDefault(); _rsSetDest('storage'); }
    else if (key === 'g') { e.preventDefault(); _rsSetDest('grade'); }
    else if (key === 'k') { e.preventDefault(); _rsSetDest('bulk'); }
    else if (key === 'arrowleft') { e.preventDefault(); _rsNav(-1); }
    else if (key === 'arrowright') { e.preventDefault(); _rsNav(1); }
    else if (key === 'escape') { e.preventDefault(); exitRouteSession(); }
}

function _rsAccept() {
    // Accept the current destination as-is and advance (no server call needed — it's already set)
    const item = _rsItems[_rsIndex];
    if (!item) return;
    const dest = item.routing_destination || 'storage';

    // Flash the current button
    const btn = document.getElementById(`rs-btn-${dest}`);
    if (btn) {
        btn.style.transform = 'scale(1.08)';
        setTimeout(() => { if (btn) btn.style.transform = ''; }, 150);
    }

    setTimeout(() => {
        if (_rsIndex < _rsItems.length - 1) {
            _rsIndex++;
            _renderSessionCard();
        } else {
            _showSessionComplete();
        }
    }, 200);
}

function _showSessionComplete() {
    const overlay = document.getElementById('route-session-overlay');
    if (!overlay) return;

    overlay.innerHTML = `
    <div style="max-width:500px; margin:15vh auto; text-align:center;">
        <div style="font-size:1.4rem; font-weight:800; margin-bottom:16px;">Routing Complete</div>
        <div style="display:flex; gap:20px; justify-content:center; margin-bottom:24px; flex-wrap:wrap;">
            <div style="text-align:center;">
                <div style="font-size:2rem; font-weight:800; color:var(--green);">${_rsCounts.display||0}</div>
                <div style="font-size:0.82rem; color:var(--text-dim);">Binder</div>
            </div>
            <div style="text-align:center;">
                <div style="font-size:2rem; font-weight:800; color:var(--accent);">${_rsCounts.storage||0}</div>
                <div style="font-size:0.82rem; color:var(--text-dim);">Storage</div>
            </div>
            <div style="text-align:center;">
                <div style="font-size:2rem; font-weight:800; color:var(--accent2);">${_rsCounts.grade||0}</div>
                <div style="font-size:0.82rem; color:var(--text-dim);">Grade</div>
            </div>
            <div style="text-align:center;">
                <div style="font-size:2rem; font-weight:800; color:var(--text-dim);">${_rsCounts.bulk||0}</div>
                <div style="font-size:0.82rem; color:var(--text-dim);">Bulk</div>
            </div>
        </div>
        <button class="btn btn-primary" onclick="exitRouteSession()" style="font-size:1.1rem; padding:12px 36px;">Done</button>
    </div>`;
}

function exitRouteSession() {
    _rsActive = false;
    document.removeEventListener('keydown', _rsKeyHandler);
    const overlay = document.getElementById('route-session-overlay');
    if (overlay) overlay.style.display = 'none';
    // Re-render route list with updated data
    if (_routeData && _rsSessionId) {
        _routeData.by_destination = { ..._rsCounts };
        _renderRouteCards(_rsSessionId, _routeData);
    }
}


// ── PUSH STAGE ──────────────────────────────────────────────────────────
function _renderPushContent(data) {
    const { session: s, items } = data;
    const sessionId = s.id;
    const isActive = ['received', 'verified', 'breakdown_complete', 'partially_ingested'].includes(s.status);

    // Show final state items (good + damaged, not broken_down parents)
    const pushableItems = items.filter(i => ['good','damaged'].includes(i.item_status) && i.is_mapped && !i.pushed_at);
    const pushedItems = items.filter(i => i.pushed_at);

    // Consolidate by product identity (tcgplayer_id + damaged status)
    function _consolidateItems(itemList) {
        const map = {};
        for (const item of itemList) {
            const isDamaged = item.item_status === 'damaged';
            const key = (item.tcgplayer_id || item.id) + (isDamaged ? '_dmg' : '');
            if (!map[key]) {
                map[key] = {
                    ...item,
                    totalQty: 0,
                    totalCogs: 0,
                    itemIds: [],
                };
            }
            map[key].totalQty += (item.quantity || 1);
            map[key].totalCogs += (item.offer_price || 0);
            map[key].itemIds.push(item.id);
        }
        return Object.values(map);
    }

    const consolidated = _consolidateItems(pushableItems);
    const sorted = _sortItems(consolidated);
    const groups = _groupItems(sorted);
    const totalUnits = consolidated.reduce((s, c) => s + c.totalQty, 0);

    let html = `<div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
            <h2 style="margin:0;">Push Summary</h2>
            <span style="color:var(--text-dim); font-size:0.82rem;">${consolidated.length} products · ${totalUnits} units · ${pushedItems.length} already pushed</span>
        </div>
        ${_renderSortToolbar()}
        <div style="overflow-x:auto;">
        <table class="responsive-cards">
            <thead><tr>
                <th>Product</th><th>Qty</th><th>Type</th><th>Price</th><th>COGS</th>
            </tr></thead>
            <tbody>`;

    for (const group of groups) {
        if (group.label) {
            html += `<tr><td colspan="5" style="font-weight:700;font-size:0.85rem;background:var(--surface-2);padding:6px 10px;border-bottom:2px solid var(--border);">${group.label}</td></tr>`;
        }
        for (const item of group.items) {
            const isDamaged = item.item_status === 'damaged';
            const name = item.product_name || 'Unknown';
            const ptype = item.product_type || 'sealed';
            let badges = '';
            if (isDamaged) badges += ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.65rem;">DAMAGED</span>';
            // data attrs use first item's ID for pushLive DOM queries
            html += `<tr style="${isDamaged ? 'background:rgba(255,170,0,0.06);' : ''}" data-item-id="${item.itemIds[0]}" data-item-status="${item.item_status}" data-is-graded="${!!item.is_graded}" data-grade-company="${item.grade_company||''}" data-grade-value="${item.grade_value||''}" data-product-name="${name.replace(/"/g,'&quot;')}" data-price="${item.market_price||0}">
                <td data-label="">${name}${badges}${item.set_name ? '<br><small style="color:var(--text-dim);">' + item.set_name + '</small>' : ''}</td>
                <td data-label="Qty" style="font-weight:600;">${item.totalQty}</td>
                <td data-label="Type"><span class="badge badge-dim" style="font-size:0.65rem;">${ptype}</span></td>
                <td data-label="Price">${item.store_price != null ? '$' + item.store_price.toFixed(2) : '<span style="color:var(--text-dim);" title="Market price (not in store)">$' + (item.market_price || 0).toFixed(2) + ' <small>mkt</small></span>'}</td>
                <td data-label="COGS">$${item.totalCogs.toFixed(2)}${item.totalQty > 1 ? '<br><small style="color:var(--text-dim);">$' + (item.totalCogs / item.totalQty).toFixed(2) + '/ea</small>' : ''}</td>
            </tr>`;
        }
    }

    html += `</tbody></table></div></div>`;

    // Pushed items — collapsible history, consolidated
    if (pushedItems.length > 0) {
        const consolidatedPushed = _consolidateItems(pushedItems.filter(i => ['good','damaged'].includes(i.item_status)));
        const sortedPushed = _sortItems(consolidatedPushed);
        const pushedGroups = _groupItems(sortedPushed);
        const pushedUnits = consolidatedPushed.reduce((s, c) => s + c.totalQty, 0);
        html += `<div class="card">
        <details ${pushableItems.length === 0 ? 'open' : ''}>
            <summary style="cursor:pointer; font-weight:600; font-size:0.9rem; color:var(--green); padding:4px 0; user-select:none;">
                ✓ Already Pushed (${consolidatedPushed.length} products · ${pushedUnits} units)
            </summary>
            <div style="overflow-x:auto; margin-top:8px;">
            <table class="responsive-cards">
                <thead><tr>
                    <th>Product</th><th>Qty</th><th>Type</th><th>Price</th><th>COGS</th>
                </tr></thead>
                <tbody>`;
        for (const group of pushedGroups) {
            if (group.label) {
                html += `<tr><td colspan="5" style="font-weight:700;font-size:0.85rem;background:var(--surface-2);padding:6px 10px;border-bottom:2px solid var(--border);">${group.label}</td></tr>`;
            }
            for (const item of group.items) {
                const isDamaged = item.item_status === 'damaged';
                const name = item.product_name || 'Unknown';
                const ptype = item.product_type || 'sealed';
                let badges = '';
                if (isDamaged) badges += ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.65rem;">DAMAGED</span>';
                html += `<tr style="opacity:0.7;">
                    <td data-label="">${name}${badges}${item.set_name ? '<br><small style="color:var(--text-dim);">' + item.set_name + '</small>' : ''}</td>
                    <td data-label="Qty" style="font-weight:600;">${item.totalQty}</td>
                    <td data-label="Type"><span class="badge badge-dim" style="font-size:0.65rem;">${ptype}</span></td>
                    <td data-label="Price">${item.store_price != null ? '$' + item.store_price.toFixed(2) : '<span style="color:var(--text-dim);">$' + (item.market_price || 0).toFixed(2) + ' <small>mkt</small></span>'}</td>
                    <td data-label="COGS">$${item.totalCogs.toFixed(2)}${item.totalQty > 1 ? '<br><small style="color:var(--text-dim);">$' + (item.totalCogs / item.totalQty).toFixed(2) + '/ea</small>' : ''}</td>
                </tr>`;
            }
        }
        html += `</tbody></table></div>
        </details></div>`;
    }

    // Store check
    html += `<div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h2 style="margin:0;">🏪 Store Match Preview</h2>
            <button class="btn btn-secondary btn-sm" onclick="runStoreCheck('${sessionId}')">Check Store</button>
        </div>
        <div id="store-check-results">
            <p style="color:var(--text-dim);">Click "Check Store" to see what matches your Shopify inventory.</p>
        </div>
    </div>`;

    // Push Live
    if (isActive) {
        html += `<div class="card" style="border-color: var(--green); background: rgba(45,212,160,0.04);">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
                <div>
                    <h2 style="margin:0; color:var(--green);">🚀 Push Live</h2>
                    <p style="color:var(--text-dim); font-size:0.85rem; margin-top:4px;">
                        Increment inventory for matched items, create damaged listings, and mark session as ingested.
                    </p>
                </div>
                <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                    <button class="btn btn-secondary" onclick="pushDryRun('${sessionId}')" style="font-size:0.95rem; padding:10px 20px;">
                        🔍 Debug Dry Run
                    </button>
                    <button class="btn btn-success" id="push-live-btn" onclick="pushLive('${sessionId}')" style="font-size:1.05rem; padding:12px 28px;">
                        🚀 Push Live to Shopify
                    </button>
                    <button class="btn btn-sm" style="font-size:0.75rem; padding:6px 12px; background:var(--surface-2); color:var(--text-dim); border:1px solid var(--border);" onclick="forceIngested('${sessionId}')">
                        ⚡ Force Mark Ingested
                    </button>
                </div>
            </div>
            <div id="push-live-results" style="margin-top:16px;"></div>
        </div>`;
    }

    return html;
}

// ── BREAKDOWN SUMMARY ENRICHMENT (uses shared breakdown_inline.js) ──────────
async function _enrichBreakdownSummaries(items, sessionId, isReceived) {
    if (!isReceived) return;
    const tcgIds = [...new Set(items
        .filter(i => i.tcgplayer_id && i.item_status !== 'broken_down')
        .map(i => i.tcgplayer_id))];
    if (!tcgIds.length) return;

    try {
        const r = await fetch('/api/breakdown-cache/batch', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ tcgplayer_ids: tcgIds }),
        });
        const d = await r.json();
        const summaries = d.summaries || {};

        items.filter(i => i.tcgplayer_id && i.item_status !== 'broken_down').forEach(item => {
            const bd = summaries[item.tcgplayer_id];
            const cell = document.querySelector(`tr[data-item-id="${item.id}"] td.name-cell`);
            if (!cell) return;
            cell.querySelectorAll('.bd-badge, .bd-summary-badge').forEach(e => e.remove());
            if (!bd) return;
            renderBreakdownBadge(cell, bd, { market_price: item.market_price }, { priceMode: 'best' });
        });
    } catch(e) { /* silently ignore */ }
}

function renderItemRow(item, isReceived, sessionId, isChild = false) {
    const st = item.item_status || 'good';
    const isBroken = st === 'broken_down';
    const isDamaged = st === 'damaged';
    const name = item.product_name || 'Unknown';
    const escName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');

    let rowStyle = '';
    if (isBroken) rowStyle = 'opacity:0.35; text-decoration:line-through;';
    else if (isDamaged) rowStyle = 'background:rgba(255,170,0,0.06);';

    let badges = '';
    if (isDamaged) badges += ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.65rem;">DAMAGED</span>';
    if (isBroken) badges += ' <span class="badge badge-dim" style="font-size:0.65rem;">BROKEN DOWN</span>';
    if (isChild) badges += ' <span class="badge badge-blue" style="font-size:0.65rem;">FROM BREAKDOWN</span>';
    if (!item.is_mapped) badges += ' <span class="badge badge-amber" style="font-size:0.65rem;">UNMAPPED</span>';

    let actionCell = '';
    if (isReceived && !isBroken && !isChild) {
        const damageToggle = isDamaged

            : `<button onclick="markDamaged('${item.id}', '${sessionId}', ${item.quantity||1})">⚠️ Mark Damaged</button>`;
        actionCell = `
            <div style="display:flex; align-items:center; gap:6px;">
                <button class="btn btn-sm btn-primary" style="font-size:0.78rem;padding:3px 10px;" onclick="openBdModal('${item.id}', '${sessionId}', '${escName}', ${item.quantity||1}, ${item.tcgplayer_id||'null'}, ${item.market_price||0})">🔨 Break Down</button>
                <div class="action-dropdown-container" style="position:relative;display:inline-block;">
                    <button class="btn btn-sm btn-secondary action-trigger" style="font-size:0.78rem;padding:3px 8px;" onclick="toggleActionMenu(event, this.nextElementSibling)">⋯</button>
                    <div class="action-dropdown">
                        <button onclick="relinkItem('${item.id}', '${sessionId}')">🔗 Relink</button>
                        <button onclick="editItemQty('${item.id}', '${sessionId}', ${item.quantity||1})">✏️ Edit Qty</button>
                        ${damageToggle}
                        <hr>
                        <button class="danger" onclick="deleteItem('${item.id}', '${sessionId}', '${escName}')">✕ Delete</button>
                    </div>
                </div>
            </div>`;
    } else if (isReceived && isBroken) {
        actionCell = `<button class="btn btn-sm btn-secondary" style="font-size:0.72rem;padding:3px 8px;border-color:var(--amber);" onclick="undoBreakdown('${item.id}', '${sessionId}')">↩ Undo</button>`;
    } else if (isReceived && isChild) {
        const childBreakBtn = item.tcgplayer_id
            ? `<button class="btn btn-sm btn-primary" style="font-size:0.72rem;padding:3px 8px;" onclick="openBdModal('${item.id}', '${sessionId}', '${escName}', ${item.quantity||1}, ${item.tcgplayer_id||'null'}, ${item.market_price||0})">🔨 Break Down</button>`
            : '';
        actionCell = `<div style="display:flex;gap:6px;align-items:center;">
            ${childBreakBtn}
            <button class="btn btn-sm btn-secondary" style="font-size:0.72rem;padding:3px 8px;" onclick="editItemQty('${item.id}', '${sessionId}', ${item.quantity||1})">✏️ Qty</button>
            <button class="btn btn-sm" style="font-size:0.72rem;padding:3px 8px;color:var(--red);" onclick="deleteItem('${item.id}', '${sessionId}', '${escName}')">✕</button>
        </div>`;
    }

    const approvedStyle = '';
    return `<tr style="${rowStyle}${approvedStyle}" data-item-id="${item.id}" data-item-status="${st}" data-is-graded="${!!item.is_graded}" data-grade-company="${item.grade_company||''}" data-grade-value="${item.grade_value||''}" data-product-name="${(item.product_name||'').replace(/"/g,'&quot;')}" data-price="${item.market_price||0}">
        <td class="name-cell" data-label="">${isChild ? '<span style="color:var(--text-dim);">↳</span> ' : ''}${name}${badges}${item.set_name ? '<br><small style="color:var(--text-dim);">' + item.set_name + '</small>' : ''}${item.tcgplayer_id ? '<br><small style="color:var(--text-dim);">TCG#' + item.tcgplayer_id + '</small>' : ''}${(() => {
            const v = item.velocity;
            if (!v) return '';
            const sold = v.units_sold_90d || 0;
            const allTime = v.total_sold_all_time || 0;
            const doi = v.velocity_score || 9999;
            const qty = v.current_qty || 0;
            const oos = v.out_of_stock_days || 0;
            const dailyRate = sold > 0 ? (sold / 90).toFixed(1) : 0;
            let rateLabel, rateColor;
            if (sold === 0 && allTime === 0) { rateLabel = 'No Sales'; rateColor = 'var(--text-dim)'; }
            else if (sold === 0) { rateLabel = allTime + ' lifetime'; rateColor = 'var(--accent)'; }
            else if (dailyRate >= 5) { rateLabel = 'Very Fast'; rateColor = 'var(--green)'; }
            else if (dailyRate >= 1) { rateLabel = 'Fast'; rateColor = 'var(--green)'; }
            else if (dailyRate >= 0.3) { rateLabel = 'Medium'; rateColor = 'var(--amber)'; }
            else if (dailyRate >= 0.1) { rateLabel = 'Slow'; rateColor = 'var(--text-dim)'; }
            else { rateLabel = 'Very Slow'; rateColor = 'var(--text-dim)'; }
            const stockInfo = qty > 0 ? (doi < 9999 ? qty + ' stock (' + Math.round(doi) + 'd)' : qty + ' stock') : 'OOS';
            const stockColor = qty === 0 ? 'var(--red)' : doi <= 14 ? 'var(--amber)' : 'var(--text-dim)';
            const conf = oos > 0 ? '' : ' ⚠';
            return '<br><small>📊 <span style="color:' + rateColor + ';">' + sold + ' sold · ' + rateLabel + '</span> · <span style="color:' + stockColor + ';">' + stockInfo + '</span>' + conf + '</small>';
        })()}</td>
        <td data-label="Qty">${item.quantity || 1}</td>
        <td data-label="Status"><span class="badge ${isDamaged ? 'badge-amber' : isBroken ? 'badge-dim' : 'badge-green'}">${st}</span></td>
        <td data-label="Store">${item.store_price != null ? `$${item.store_price.toFixed(2)}` : `<span style="color:var(--text-dim);" title="Market price (not in store)">$${(item.market_price || 0).toFixed(2)} <small>mkt</small></span>`}</td>
        <td data-label="COGS">$${(item.offer_price || 0).toFixed(2)}${(item.quantity || 1) > 1 ? '<br><small style="color:var(--text-dim);">$' + ((item.offer_price || 0) / (item.quantity || 1)).toFixed(2) + '/ea</small>' : ''}</td>
        ${isReceived ? '<td data-label="">' + actionCell + '</td>' : ''}
    </tr>`;
}

async function markDamaged(itemId, sessionId, totalQty) {
    let damagedQty = totalQty;

    if (totalQty > 1) {
        const input = await themedPrompt(`Mark as Damaged`, `How many are damaged? (1–${totalQty})`, totalQty);
        if (input === null) return;
        damagedQty = parseInt(input);
        if (isNaN(damagedQty) || damagedQty < 1 || damagedQty > totalQty) {
            alert(`Must be between 1 and ${totalQty}`);
            return;
        }
    }

    const ok = await themedConfirm(
        'Mark as Damaged',
        damagedQty === totalQty
            ? `Mark all ${totalQty} unit(s) as damaged?`
            : `Split: ${damagedQty} damaged, ${totalQty - damagedQty} good.`,
    );
    if (!ok) return;

    try {
        const body = damagedQty < totalQty ? { damaged_qty: damagedQty } : {};
        await fetch(`/api/ingest/item/${itemId}/damage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function markGood(itemId, sessionId) {
    try {
        await fetch(`/api/ingest/item/${itemId}/mark-good`, { method: 'POST' });
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function undoBreakdown(itemId, sessionId) {
    const ok = await themedConfirm(
        '↩ Undo Breakdown',
        'This will delete all components from this breakdown and restore the original item.',
        { confirmText: 'Undo', dangerous: true }
    );
    if (!ok) return;
    try {
        const r = await fetch(`/api/ingest/item/${itemId}/undo-breakdown`, { method: 'POST' });
        const text = await r.text();
        let d;
        try { d = JSON.parse(text); } catch(e) { alert('Server error: ' + text.substring(0, 200)); return; }
        if (!r.ok) { alert(d.error || 'Undo failed'); return; }
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function addItemSearch(live) {
    const query = document.getElementById('add-item-search').value.trim();
    const resultsDiv = document.getElementById('add-item-search-results');
    if (!query) { resultsDiv.innerHTML = '<p style="color:var(--text-dim);">Enter a search term</p>'; return; }

    resultsDiv.innerHTML = `<div class="loading"><span class="spinner"></span> Searching${live ? ' PPT live' : ''}...</div>`;
    try {
        const body = { query };
        if (live) body.live = true;
        const sr = await fetch('/api/ppt/search-sealed', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        const sd = await sr.json();
        if (!sr.ok) { resultsDiv.innerHTML = `<div class="alert alert-error">${sd.error}</div>`; return; }
        const results = sd.results || [];

        if (!results.length) {
            // No PPT results — offer store search next

                </div>`;
            return;
        }

        let html = '<div style="max-height:350px; overflow-y:auto;">';
        html += results.slice(0, 10).map(p => {
            const name = p.name || p.productName || '';
            const tcgId = p.tcgplayer_id || p.tcgplayerId || p.tcgPlayerId || 0;
            const price = p.unopenedPrice || p.marketPrice || 0;
            const setName = p.setName || p.set_name || '';
            const img = p.imageCdnUrl400 || p.imageCdnUrl || p.imageCdnUrl800 || '';
            const src = p._price_source ? ({cache:'cache',ppt:'PPT',scrydex:'SDX'}[p._price_source]||p._price_source) : '';
            const nameLower = name.toLowerCase();
            const isBundle = ['art bundle','set of','bundle (','pack of','case','display'].some(kw => nameLower.includes(kw));
            const bundleStyle = isBundle ? ' opacity:0.6; border-left:3px solid var(--amber);' : '';

                + ' onmouseover="this.style.background=\'var(--surface-2)\'" onmouseout="this.style.background=\'transparent\'"'
                + ' onclick="addItemSelect(' + tcgId + ', \'' + name.replace(/'/g,"\\'") + '\', ' + price + ', \'' + setName.replace(/'/g,"\\'") + '\')">'

                + '<div style="flex:1; min-width:0;">'
                + '<div style="font-weight:600; font-size:0.9rem;">' + name + bundleTag + '</div>'
                + '<div style="font-size:0.8rem; color:var(--text-dim);">' + setName + ' · TCG#' + tcgId + '</div>'
                + '</div>'
                + '<div style="text-align:right; flex-shrink:0;">'
                + '<div style="font-weight:700;">$' + Number(price).toFixed(2) + '</div>'
                + '<div style="font-size:0.7rem; color:var(--text-dim);">' + src + '</div>'
                + '</div></div>';
        }).join('');
        html += '</div>';

    } catch(err) {
        resultsDiv.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }

    if (!tcgId) { alert('Enter a TCGPlayer ID'); return; }

    try {
        const lr = await fetch(`/api/ppt/lookup-by-id/${tcgId}`);
        const ld = await lr.json();

        if (ld.found) {
            // Found — submit directly
            const body = {
                product_name: ld.name,
                tcgplayer_id: parseInt(tcgId),
                market_price: ld.market_price || 0,
                set_name: ld.set_name || null,
                quantity: qty,
                product_type: ld.type === 'card' ? 'raw' : 'sealed',
            };
            if (ld.type === 'card') {
                body.condition = 'NM';
                body.card_number = ld.card_number || null;
                body.rarity = ld.rarity || null;
            }
            const r = await fetch(`/api/ingest/session/${_addItemSessionId}/add-item`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            const d = await r.json();
            if (!r.ok) { alert(d.error); return; }

            closeAddItem();
            viewSession(sid, true);

        // PPT error — show manual entry form
        _showManualEntryForm(tcgId, qty);

async function _loadOfferAdjustment(sessionId) {
    const card = document.getElementById('offer-adjustment-card');
    if (!card) return;
    try {
        const r = await fetch(`/api/ingest/session/${sessionId}/offer-summary`);
        const d = await r.json();
        if (!d.available || (d.delta === 0 && (!d.adjustments || !d.adjustments.length))) {
            card.innerHTML = '';
            return;
        }

        const deltaColor = d.delta < 0 ? 'var(--red)' : d.delta > 0 ? 'var(--green)' : 'var(--text-dim)';
        const deltaSign = d.delta > 0 ? '+' : '';

        let html = `<div class="card" style="border-color:${d.delta < 0 ? 'var(--amber)' : 'var(--green)'}; background:${d.delta < 0 ? 'rgba(255,170,0,0.04)' : 'rgba(45,212,160,0.04)'};">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
                <h2 style="margin:0;">📋 Offer Adjustment</h2>
                <span style="font-size:1.1rem; font-weight:700; color:${deltaColor};">${deltaSign}$${d.delta.toFixed(2)}</span>
            </div>
            <div class="stats" style="margin-bottom:12px;">
                <div class="stat">
                    <div class="stat-label">Original Offer</div>
                    <div class="stat-value">$${d.original_offer.toFixed(2)}</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Adjusted Offer</div>
                    <div class="stat-value" style="color:${deltaColor};">$${d.adjusted_offer.toFixed(2)}</div>
                </div>
            </div>`;

        if (d.adjustments && d.adjustments.length) {
            html += `<details style="font-size:0.85rem;">
                <summary style="cursor:pointer; color:var(--text-dim); margin-bottom:8px;">${d.adjustments.length} change(s) — click to expand</summary>
                <div style="display:flex; flex-direction:column; gap:4px;">`;
            d.adjustments.forEach(a => {
                const icon = a.type === 'damaged' ? '⚠️' : a.type === 'missing' ? '❌' : a.type === 'removed' ? '🗑' : a.type === 'added' ? '➕' : a.type === 'relinked' ? '🔗' : a.type === 'qty_changed' ? '✏️' : '💲';
                const amtColor = a.amount < 0 ? 'var(--red)' : a.amount > 0 ? 'var(--green)' : 'var(--text-dim)';
                const amtSign = a.amount > 0 ? '+' : '';
                html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:4px 8px; background:var(--surface-2); border-radius:4px;">
                    <span>${icon} ${a.description}</span>
                    <span style="color:${amtColor}; font-weight:600; font-family:monospace;">${amtSign}$${a.amount.toFixed(2)}</span>
                </div>`;
            });
            html += '</div></details>';
        }

        html += '</div>';
        card.innerHTML = html;
    } catch(err) {
        card.innerHTML = '';
    }
}

async function _pollPushJob(jobId, total, panel) {
    /**
     * Poll a background push job until it completes.
     * Shows progress bar in the panel. Returns the final job result or null on error.
     * Retries on transient failures — the backend keeps processing even if we lose connection briefly.
     */
    const startTime = Date.now();
    let consecutiveFailures = 0;
    const MAX_RETRIES = 10;
    while (true) {
        await new Promise(r => setTimeout(r, 2000));  // poll every 2s
        try {
            const r = await fetch(`/api/ingest/push-job/${jobId}`);
            if (!r.ok) {
                consecutiveFailures++;
                if (consecutiveFailures >= MAX_RETRIES) {
                    panel.innerHTML = `<div class="alert alert-error">Lost connection to push job after ${MAX_RETRIES} retries. The push may still be running in the background — reload the page to check session status.</div>`;
                    return null;
                }
                continue;
            }
            const d = await r.json();
            consecutiveFailures = 0;  // reset on success

            if (d.status === 'running') {
                const pct = total > 0 ? Math.round((d.progress / total) * 100) : 0;
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                panel.innerHTML = `
                    <div style="padding:16px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem;">
                            <span><span class="spinner" style="display:inline-block;width:14px;height:14px;margin-right:6px;"></span> Pushing to Shopify...</span>
                            <span style="color:var(--text-dim);">${d.progress}/${total} items · ${elapsed}s</span>
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width:${pct}%;"></div>
                        </div>
                    </div>`;
                continue;
            }

            // Job complete
            return d;
        } catch(err) {
            consecutiveFailures++;
            if (consecutiveFailures >= MAX_RETRIES) {
                panel.innerHTML = `<div class="alert alert-error">Connection lost after ${MAX_RETRIES} retries: ${err.message}. The push may still be running — reload the page to check session status.</div>`;
                return null;
            }
            // Show transient warning but keep polling
            const elapsed = Math.round((Date.now() - startTime) / 1000);
            panel.innerHTML = `
                <div style="padding:16px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem;">
                        <span><span class="spinner" style="display:inline-block;width:14px;height:14px;margin-right:6px;"></span> Pushing to Shopify... (reconnecting ${consecutiveFailures}/${MAX_RETRIES})</span>
                        <span style="color:var(--text-dim);">${elapsed}s</span>
                    </div>
                    <div class="progress-bar">
                        <div class="fill" style="width:0%;"></div>
                    </div>
                </div>`;
        }
    }
}


async function pushLive(sessionId) {
    // Count from session data, not DOM (Push tab has consolidated rows)
    const items = _currentSessionData ? _currentSessionData.items : [];
    const unpushed = items.filter(i => ['good','damaged'].includes(i.item_status) && i.is_mapped && !i.pushed_at);
    const gradedItems = unpushed.filter(i => i.is_graded);
    const sealedRawItems = unpushed.filter(i => !i.is_graded);
    const gradedIds = new Set(gradedItems.map(i => i.id));
    const totalPending = unpushed.length;

    const confirmMsg = `Push ${totalPending} items (${gradedItems.length} graded slabs, ${sealedRawItems.length} sealed/raw). Cannot be easily undone.`;

    const ok = await themedConfirm('🚀 Push Live', confirmMsg,
        { confirmText: `Push ${totalPending} Items`, dangerous: true });
    if (!ok) return;

    const panel = document.getElementById('push-live-results');

    // ── Step 1: Push sealed + raw items (background job with polling) ────────
    if (sealedRawItems.length > 0) {
        panel.innerHTML = '<div class="loading"><span class="spinner"></span> Starting push...</div>';
        try {
            // Send no item_ids — backend pushes all unpushed mapped items
            const body = JSON.stringify({});
            const r = await fetch(`/api/ingest/session/${sessionId}/push-live`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body,
            });
            const d = await r.json();
            if (!r.ok && !d.job_id) {
                panel.innerHTML = `<div class="alert alert-error">${d.error}</div>`;
                return;
            }

            // If server returned a job_id, poll for progress
            if (d.job_id) {
                const result = await _pollPushJob(d.job_id, d.total || 0, panel);
                if (!result) return;  // error already shown
                _renderSealedRawResults(result, sessionId, panel);
            } else {
                // Fallback: server returned immediate results (shouldn't happen but safe)
                _renderSealedRawResults(d, sessionId, panel);
            }
        } catch(err) {
            panel.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            return;
        }
    }

    // ── Step 2: Graded slabs — cert-entry UI ──────────────────────────────────
    if (gradedItems.length > 0) {
        await _showGradedCertPanel(sessionId, gradedItems.map(i => i.id), panel, sealedRawItems.length > 0);
    }
}

// Sort barcode cards using the current sort preference
function _sortBarcodeCards(cards) {
    const sorted = [...cards];
    if (_currentSortBy === 'alpha') sorted.sort((a, b) => (a.card_name || '').localeCompare(b.card_name || ''));
    else if (_currentSortBy === 'price-high') sorted.sort((a, b) => (b.current_price || 0) - (a.current_price || 0));
    else if (_currentSortBy === 'price-low') sorted.sort((a, b) => (a.current_price || 0) - (b.current_price || 0));
    return sorted;
}

    function _barcodeCardGrid(cards) {
        return cards.map(c => `
            <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:10px; display:flex; flex-direction:column; gap:6px;">
                <img src="/api/raw-cards/barcode/${c.barcode}.png" style="width:100%; border-radius:4px; background:#fff;" alt="barcode" loading="lazy">
                <div style="font-size:0.78rem; color:var(--text-dim);">
                    <strong style="color:var(--text);">${c.card_name||''}</strong><br>
                    ${c.set_name||''} · ${c.condition||''} · <span style="color:var(--accent); font-family:monospace;">${c.bin_label||'?'}</span>
                </div>
                <button class="btn btn-secondary btn-sm" style="font-size:0.72rem;" onclick="printOneBarcode('${c.barcode}')">🖨 Print</button>
            </div>
        `).join('');
    }

    // Store for stack printing
    window._sessionStorageCards = storageCards;
    window._sessionBinderCards = binderCards;

    const barcodeSection = document.createElement('div');
    barcodeSection.className = 'card barcode-session-section';
    let sectionHtml = `
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px;">
            <div style="font-weight:700; font-size:0.95rem;">🏷 Barcode Labels (${sorted.length})</div>
            <div style="display:flex; gap:8px; align-items:center;">
                <select onchange="_currentSortBy=this.value; _renderBarcodeSection(document.getElementById('session-barcode-section'), '${sessionId}');" style="font-size:0.82rem; padding:4px 8px;">
                    <option value="default" ${_currentSortBy==='default'?'selected':''}>Default</option>
                    <option value="alpha" ${_currentSortBy==='alpha'?'selected':''}>A→Z</option>
                    <option value="price-high" ${_currentSortBy==='price-high'?'selected':''}>Price ↓</option>
                    <option value="price-low" ${_currentSortBy==='price-low'?'selected':''}>Price ↑</option>
                </select>
            </div>
        </div>`;

    if (hasGroups) {
        // Show grouped with per-stack print buttons
        if (storageCards.length) {
            sectionHtml += `<div style="margin-bottom:14px;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                    <div style="font-weight:600; font-size:0.88rem; color:var(--accent);">Storage (${storageCards.length})</div>
                    <button class="btn btn-primary btn-sm" onclick="printSessionStack('storage')" style="font-size:0.75rem;">🖨 Print Storage</button>
                </div>
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px;">
                    ${_barcodeCardGrid(storageCards)}
                </div>
            </div>`;
        }
        if (binderCards.length) {
            sectionHtml += `<div style="margin-bottom:14px;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                    <div style="font-weight:600; font-size:0.88rem; color:var(--green);">Binder (${binderCards.length})</div>
                    <button class="btn btn-primary btn-sm" onclick="printSessionStack('binder')" style="font-size:0.75rem;">🖨 Print Binder</button>
                </div>
                <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px;">
                    ${_barcodeCardGrid(binderCards)}
                </div>
            </div>`;
        }
        sectionHtml += `<div style="text-align:center; margin-top:8px;">
            <button class="btn btn-secondary btn-sm" onclick="printBarcodesInOrder()" style="font-size:0.78rem;">🖨 Print All (${sorted.length})</button>
        </div>`;
    } else {
        // Single group — just show them all with a print button
        sectionHtml += `<div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px;">
            ${_barcodeCardGrid(sorted)}
        </div>`;
        if (sorted.length > 1) {
            sectionHtml += `<div style="text-align:center; margin-top:8px;">
                <button class="btn btn-primary btn-sm" onclick="printBarcodesInOrder()" style="font-size:0.78rem;">🖨 Print All (${sorted.length})</button>
            </div>`;
        }
    }

    barcodeSection.innerHTML = sectionHtml;

    const existing = panel.querySelector('.barcode-session-section');
    if (existing) existing.remove();
    panel.appendChild(barcodeSection);
}

function printBarcodesInOrder() {
    const sorted = _sortBarcodeCards(_sessionBarcodeCards);
    if (!sorted.length) return;
    const win = window.open('', '_blank');
    const imgs = sorted.map(c =>
        `<img src="/api/raw-cards/barcode/${c.barcode}.png" style="width:89mm; height:28mm; display:block; page-break-after:always;">`
    ).join('');
    win.document.write(`<html><head><style>@media print { @page { margin:0; size: 89mm 28mm landscape; } body { margin:0; } img { width:89mm; height:28mm; display:block; page-break-after:always; } }</style></head><body style="margin:0">${imgs}<script>window.onload=function(){window.print();window.close()}<\/script></body></html>`);
    win.document.close();
}

async function printAllBarcodesFromSession(sessionId) {
    // Legacy fallback — use sorted version if available
    if (_sessionBarcodeCards.length) {
        printBarcodesInOrder();
        return;
    }
    try {
        const r = await fetch(`/api/raw-cards/session/${sessionId}`);
        const d = await r.json();
        const cards = d.cards || [];
        if (!cards.length) return;
        const sorted = _sortBarcodeCards(cards);
        const win = window.open('', '_blank');
        const imgs = sorted.map(c =>
            `<img src="/api/raw-cards/barcode/${c.barcode}.png" style="width:89mm; height:28mm; display:block; page-break-after:always;">`
        ).join('');
        win.document.write(`<html><head><style>@media print { @page { margin:0; size: 89mm 28mm landscape; } body { margin:0; } img { width:89mm; height:28mm; display:block; page-break-after:always; } }</style></head><body style="margin:0">${imgs}<script>window.onload=function(){window.print();window.close()}<\/script></body></html>`);
        win.document.close();
    } catch(e) { alert('Failed to load barcodes: ' + e.message); }
}

function printOneBarcode(barcodeId) {
    const win = window.open('', '_blank');
    win.document.write(`<html><head><style>
        @media print { @page { margin:0; size: 89mm 28mm landscape; } }
        body { margin:0; }
        img { width:89mm; height:28mm; display:block; }
    </style></head><body>
        <img src="/api/raw-cards/barcode/${barcodeId}.png" onload="window.print();window.close()">
    </body></html>`);
    win.document.close();
}

function printAllBarcodes() {
    const barcodes = _sortBarcodeCards(window._lastBarcodes || []);
    if (!barcodes.length) return;
    const win = window.open('', '_blank');
    const imgs = barcodes.map(b =>
        `<img src="data:image/png;base64,${b.png_b64}" style="width:62mm; display:block; page-break-after:always;">`
    ).join('');
    win.document.write(`<html><head><style>@media print { @page { margin:0; size: 89mm 28mm landscape; } body { margin:0; } img { width:89mm; height:28mm; display:block; page-break-after:always; } }</style></head><body style="margin:0">${imgs}<script>window.onload=function(){window.print();window.close()}<\/script></body></html>`);
    win.document.close();
}

function printSessionStack(stack) {
    const cards = stack === 'storage' ? (window._sessionStorageCards || [])
                : stack === 'binder' ? (window._sessionBinderCards || [])
                : _sortBarcodeCards(_sessionBarcodeCards);
    if (!cards.length) return;
    const win = window.open('', '_blank');
    const imgs = cards.map(c =>
        `<img src="/api/raw-cards/barcode/${c.barcode}.png" style="width:89mm; height:28mm; display:block; page-break-after:always;">`
    ).join('');
    win.document.write(`<html><head><style>@media print { @page { margin:0; size: 89mm 28mm landscape; } body { margin:0; } img { width:89mm; height:28mm; display:block; page-break-after:always; } }</style></head><body style="margin:0">${imgs}<script>window.onload=function(){window.print();window.close()}<\/script></body></html>`);
    win.document.close();
}

function printBarcodeStack(stack) {
    const barcodes = stack === 'storage' ? (window._storageBarcodes || [])
                   : stack === 'binder' ? (window._binderBarcodes || [])
                   : (window._lastBarcodes || []);
    if (!barcodes.length) return;
    const win = window.open('', '_blank');
    const imgs = barcodes.map(b =>
        `<img src="data:image/png;base64,${b.png_b64}" style="width:89mm; height:28mm; display:block; page-break-after:always;">`
    ).join('');
    win.document.write(`<html><head><style>@media print { @page { margin:0; size: 89mm 28mm landscape; } body { margin:0; } img { width:89mm; height:28mm; display:block; page-break-after:always; } }</style></head><body style="margin:0">${imgs}<script>window.onload=function(){window.print();window.close()}<\/script></body></html>`);
    win.document.close();
}

async function _showGradedCertPanel(sessionId, gradedItemIds, panel, append) {
    // Build cert-entry cards from session data (not DOM — Push tab has consolidated rows)
    const itemsMap = {};
    if (_currentSessionData) {
        _currentSessionData.items.forEach(i => { itemsMap[i.id] = i; });
    }
    const gradedRows = gradedItemIds.map(id => {
        const item = itemsMap[id];
        if (!item) return null;
        return {
            id,
            name:    item.product_name || 'Unknown',
            company: item.grade_company || 'PSA',
            grade:   item.grade_value || '?',
            price:   item.market_price || '0',
        };
    }).filter(Boolean);

    const certPanel = document.createElement('div');
    certPanel.style.cssText = 'margin-top:16px; border-top:2px solid var(--border); padding-top:16px;';
    certPanel.innerHTML = `
        <div style="font-size:1rem;font-weight:700;margin-bottom:12px;">🏅 Graded Slabs — Enter Cert Numbers</div>
        <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:14px;">
            Enter the cert number for each slab, then push individually. You can skip any and push them later.
        </p>
        ${gradedRows.map(item => `
            <div id="graded-row-${item.id}" style="display:flex;gap:10px;align-items:center;padding:10px;background:var(--surface-2);border-radius:8px;margin-bottom:8px;flex-wrap:wrap;">
                <div style="flex:1;min-width:200px;">
                    <div style="font-weight:600;font-size:0.9rem;">${item.name}</div>
                    <div style="font-size:0.78rem;color:var(--text-dim);">${item.company} ${item.grade} · $${parseFloat(item.price).toFixed(2)}</div>
                </div>
                <input type="text" id="cert-input-${item.id}" placeholder="Cert # (e.g. 12345678)"
                    style="width:170px;font-size:0.85rem;"
                    onkeydown="if(event.key==='Enter') pushGradedSlab('${item.id}','${sessionId}')">
                <button class="btn btn-primary btn-sm" id="cert-btn-${item.id}"
                    onclick="pushGradedSlab('${item.id}','${sessionId}')"
                    style="font-size:0.78rem;white-space:nowrap;">
                    Push Slab
                </button>
                <div id="cert-result-${item.id}" style="font-size:0.8rem;min-width:100px;"></div>
            </div>
        `).join('')}
    `;

    if (append) {
        panel.appendChild(certPanel);
    } else {
        panel.innerHTML = '';
        panel.appendChild(certPanel);
    }
}

async function pushGradedSlab(itemId, sessionId) {
    const certInput = document.getElementById(`cert-input-${itemId}`);
    const btn       = document.getElementById(`cert-btn-${itemId}`);
    const resultEl  = document.getElementById(`cert-result-${itemId}`);
    const cert      = (certInput?.value || '').trim();

    if (!cert) { resultEl.innerHTML = '<span style="color:var(--red);">Enter cert #</span>'; return; }

    btn.disabled = true;
    btn.textContent = '⟳';
    resultEl.innerHTML = '<span style="color:var(--text-dim);">Pushing...</span>';

    try {
        const r = await fetch(`/api/ingest/item/${itemId}/push-graded`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cert_number: cert, session_id: sessionId }),
        });
        const d = await r.json();
        if (!r.ok) {
            btn.disabled = false; btn.textContent = 'Push Slab';
            resultEl.innerHTML = `<span style="color:var(--red);">❌ ${d.error||'Failed'}</span>`;
            return;
        }

        // Success — lock row
        const row = document.getElementById(`graded-row-${itemId}`);
        if (row) {
            const actionLabel = d.action === 'added_variant' ? '✅ Added variant' : '🆕 New listing';
            row.style.opacity = '0.6';
            row.innerHTML = `
                <div style="flex:1;">
                    <div style="font-weight:600;font-size:0.9rem;">${d.title || 'Slab'}</div>
                    <div style="font-size:0.78rem;color:var(--text-dim);">Cert: ${cert}</div>
                </div>
                <span style="color:var(--green);font-size:0.85rem;">${actionLabel}</span>
            `;
        }
        _pushedItemIds.add(itemId);
    } catch(err) {
        btn.disabled = false; btn.textContent = 'Push Slab';
        resultEl.innerHTML = `<span style="color:var(--red);">❌ ${err.message}</span>`;
    }
}

async function showBreakdownLibrary() {
    document.getElementById('library-modal').classList.add('active');
    await loadLibrary();
}

function closeLibrary() {
    document.getElementById('library-modal').classList.remove('active');
}

async function loadLibrary() {
    const body = document.getElementById('library-body');
    body.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
    try {
        const r = await fetch('/api/breakdown-cache');
        const d = await r.json();
        if (!r.ok) { body.innerHTML = `<div class="alert alert-error">${d.error}</div>`; return; }
        const caches = d.caches || [];
        if (!caches.length) {
            body.innerHTML = '<p style="color:var(--text-dim);">No breakdown recipes saved yet. Break down a sealed product and check "Save recipe to cache".</p>';
            return;
        }
        body.innerHTML = `
            <p style="font-size:0.82rem; color:var(--text-dim); margin-bottom:12px;">${caches.length} products cached</p>
            <div style="overflow-x:auto;">
            <table style="font-size:0.85rem;">
                <thead><tr>
                    <th>Product</th><th>TCG ID</th><th>Configs</th><th>Best Value</th><th>Used</th><th>Updated</th><th></th>
                </tr></thead>
                <tbody>
                ${caches.map(c => {
                    const age = c.last_updated ? new Date(c.last_updated).toLocaleDateString() : '—';
                    return `<tr>
                        <td>
                            <strong>${c.product_name}</strong>
                            ${c.variant_names ? `<br><small style="color:var(--text-dim);">${c.variant_names}</small>` : ''}
                        </td>
                        <td style="color:var(--text-dim);">${c.tcgplayer_id || '—'}</td>
                        <td>${c.variant_count || 1}</td>
                        <td>$${(c.best_variant_market||0).toFixed(2)}</td>
                        <td style="color:var(--text-dim);">${c.use_count || 0}x</td>
                        <td style="color:var(--text-dim);">${age}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" style="font-size:0.72rem; padding:2px 8px;"
                                onclick="viewLibraryEntry(${c.tcgplayer_id})">View</button>
                            <button class="btn btn-sm" style="font-size:0.72rem; padding:2px 8px; color:var(--red);"
                                onclick="deleteLibraryEntry(${c.tcgplayer_id}, '${(c.product_name||'').replace(/'/g,'')}')">&#x1F5D1;</button>
                        </td>
                    </tr>`;
                }).join('')}
                </tbody>
            </table>
            </div>
        `;
    } catch(err) {
        body.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

async function viewLibraryEntry(tcgId) {
    const body = document.getElementById('library-body');
    try {
        const r = await fetch(`/api/breakdown-cache/${tcgId}`);
        const d = await r.json();
        if (!d.found) { alert('Not found'); return; }
        const cache = d.cache;
        const variants = cache.variants || [];

        body.innerHTML = `
            <button class="btn btn-secondary btn-sm" onclick="loadLibrary()" style="margin-bottom:12px;">← Back</button>
            <div style="display:flex; gap:8px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; margin-bottom:12px;">
                <div>
                    <strong style="font-size:1rem;">${cache.product_name}</strong>
                    <span style="font-size:0.78rem; color:var(--text-dim); margin-left:8px;">TCG#${cache.tcgplayer_id}</span>
                </div>
                <div style="font-size:0.82rem; color:var(--text-dim);">Used ${cache.use_count||0}x &middot; Updated ${new Date(cache.last_updated).toLocaleDateString()}</div>
            </div>

            ${variants.map((v, vi) => {
                const comps = v.components || [];
                const totalMkt = comps.reduce((s,c) => s + (c.market_price||0)*(c.quantity_per_parent||1), 0);
                return `
                <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px;">
                        <div>
                            <strong style="font-size:0.95rem;">${v.variant_name}</strong>
                            ${v.notes ? `<span style="font-size:0.78rem; color:var(--amber); margin-left:8px;">&#x1F4DD; ${v.notes}</span>` : ''}
                        </div>
                        <div style="display:flex; gap:6px; align-items:center;">
                            <span style="font-size:0.82rem; color:var(--text-dim);">$${totalMkt.toFixed(2)} total</span>
                            <button class="btn btn-sm" style="font-size:0.72rem; padding:2px 8px; color:var(--red);"
                                onclick="deleteLibraryVariant('${v.id}', '${v.variant_name.replace(/'/g,'')}', ${tcgId})">&#x1F5D1; Delete config</button>
                        </div>
                    </div>
                    <table style="font-size:0.82rem;">
                        <thead><tr><th>Component</th><th>TCG ID</th><th>Qty/Unit</th><th>Market</th><th>Subtotal</th></tr></thead>
                        <tbody>
                        ${comps.map(c => `<tr>
                            <td>${c.product_name}${c.set_name ? '<br><small style="color:var(--text-dim);">'+c.set_name+'</small>' : ''}</td>
                            <td style="color:var(--text-dim);">${c.tcgplayer_id || '—'}</td>
                            <td>${c.quantity_per_parent}</td>
                            <td>$${(c.market_price||0).toFixed(2)}</td>
                            <td>$${((c.market_price||0)*(c.quantity_per_parent||1)).toFixed(2)}</td>
                        </tr>`).join('')}
                        <tr style="font-weight:600; border-top:2px solid var(--border);">
                            <td colspan="4" style="text-align:right;">Total:</td>
                            <td>$${totalMkt.toFixed(2)}</td>
                        </tr>
                        </tbody>
                    </table>
                </div>`;
            }).join('')}

            <button class="btn btn-sm" style="color:var(--red); font-size:0.78rem;" onclick="deleteLibraryEntry(${cache.tcgplayer_id}, '${(cache.product_name||'').replace(/'/g,'')}')">&#x1F5D1; Delete all configs</button>
        `;
    } catch(err) { body.innerHTML = `<div class="alert alert-error">${err.message}</div>`; }
}

async function deleteLibraryVariant(variantId, name, tcgId) {
    const ok = await themedConfirm('Delete Config', `Remove the "${name}" config?`, { dangerous: true });
    if (!ok) return;
    const r = await fetch(`/api/breakdown-cache/variant/${variantId}`, { method: 'DELETE' });
    const d = await r.json();
    if (!d.cache) {
        // Parent was also deleted, go back to library
        await loadLibrary();
    } else {
        // Reload this entry
        await viewLibraryEntry(tcgId);
    }
}

async function deleteLibraryEntry(tcgId, name) {
    const ok = await themedConfirm('Delete Recipe', `Remove all breakdown configs for "${name}"?`, { dangerous: true });
    if (!ok) return;
    await fetch(`/api/breakdown-cache/${tcgId}`, { method: 'DELETE' });
    await loadLibrary();
}
