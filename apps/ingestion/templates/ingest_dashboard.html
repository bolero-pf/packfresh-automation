<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Fresh — Ingest</title>
    <link rel="stylesheet" href="/pf-static/pf_theme.css">
    <script src="/pf-static/pf_ui.js"></script>
    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ─── HEADER ─── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 0; margin-bottom: 24px;
        }
        header .container { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--green); }
        header .status { margin-left: auto; font-size: 0.85rem; color: var(--text-dim); }

        /* ─── CARDS ─── */
        .card h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; }

        /* ─── STATS ─── */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat {
            background: var(--surface-2); border-radius: 8px; padding: 16px;
            border: 1px solid var(--border);
        }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }
        .stat-value { font-size: 1.6rem; font-weight: 700; }

        .action-dropdown {
            display: none; position: fixed;
            z-index: 1050; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 6px; padding: 4px; min-width: 180px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .action-dropdown.show { display: block !important; }
        .action-dropdown button {
            display: block; width: 100%; text-align: left; font-size: 0.8rem;
            background: none; color: var(--text); padding: 8px 10px;
            border: none; border-radius: 4px; cursor: pointer; white-space: nowrap;
        }
        .action-dropdown button:hover { background: var(--surface); }
        .action-dropdown button.danger { color: var(--red); }
        .action-dropdown hr { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

        /* ─── MODAL ─── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 1000;
            align-items: flex-start; justify-content: center;
            backdrop-filter: blur(4px); padding: 40px 20px; overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 28px; width: 90%; max-width: 800px;
            max-height: 85vh; overflow-y: auto; position: relative;
        }
        .modal-close-sticky {
            position: sticky; top: 0; float: right;
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text); font-size: 1.3rem; cursor: pointer;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; margin-top: -8px; margin-right: -8px;
            transition: all 0.15s;
        }
        .modal-close-sticky:hover { background: var(--red); color: #fff; border-color: var(--red); }

        /* ─── CONFIRM / PROMPT DIALOG ─── */
        .confirm-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; width: 90%; max-width: 420px;
        }
        .confirm-box h3 { margin-bottom: 8px; }
        .confirm-box p { color: var(--text-dim); margin-bottom: 16px; font-size: 0.9rem; }
        .confirm-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

        /* ─── LOADING ─── */
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── TABS ─── */
        .tab-btn {
            background: none; border: none; padding: 8px 16px;
            font-size: 0.9rem; color: var(--text-dim); cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.15s;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        /* ─── SESSION LIST ─── */
        .session-row {
            display: grid; grid-template-columns: 1fr auto auto auto;
            gap: 16px; align-items: center;
            padding: 14px 16px; border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 8px;
            cursor: pointer; transition: all 0.15s;
        }
        .session-row:hover { border-color: var(--accent); background: var(--surface-2); }
        .session-row .name { font-weight: 600; }
        .session-row .meta { font-size: 0.82rem; color: var(--text-dim); }

        /* ─── SEARCH RESULT ITEMS ─── */
        .search-result {
            cursor: pointer; padding: 10px 12px;
            border: 1px solid var(--border); border-radius: 6px;
            margin-bottom: 4px; transition: all 0.15s;
        }
        .search-result:hover { border-color: var(--accent); background: var(--surface-2); }

        /* ─── PROGRESS BAR ─── */
        .progress-bar {
            height: 6px; background: var(--border); border-radius: 3px;
            overflow: hidden; margin: 8px 0;
        }
        .progress-bar .fill {
            height: 100%; background: var(--green); border-radius: 3px;
            transition: width 0.3s;
        }

        /* ─── FILTER BUTTONS ─── */
        .filter-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
        .filter-btn {
            padding: 5px 12px; border: 1px solid var(--border); border-radius: 16px;
            background: none; color: var(--text-dim); font-size: 0.78rem;
            cursor: pointer; transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ─── MOBILE ─── */
        @media (max-width: 768px) {
            .container { padding: 10px; }

            /* Header */
            header .container { flex-wrap: wrap; gap: 8px; }
            .logo { font-size: 1.2rem; }
            header .status { font-size: 0.78rem; }

            /* Tabs */
            .tab-btn { padding: 10px 14px; min-height: 44px; font-size: 0.85rem; }

            /* Session rows: 2-col wrap */
            .session-row {
                grid-template-columns: 1fr auto;
                gap: 8px 12px;
                padding: 14px;
            }

            /* Filter buttons */
            .filter-btn { min-height: 38px; padding: 8px 14px; font-size: 0.82rem; }

            /* Stats grid: 2-col */
            .stats { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat { padding: 12px; }
            .stat-value { font-size: 1.3rem; }

            /* Action dropdown → bottom sheet */
            .action-dropdown {
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                top: auto !important;
                border-radius: 12px 12px 0 0;
                min-width: auto;
                padding: 8px 8px 20px;
                max-height: 60vh;
                overflow-y: auto;
                box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
            }
            .action-dropdown button {
                padding: 14px 12px;
                font-size: 0.9rem;
                min-height: 48px;
            }

            /* Item card actions: consistent row on mobile */
            td[data-label=""] > div {
                flex-wrap: wrap !important;
                gap: 8px !important;
            }
            td[data-label=""] > div > .approve-mobile {
                min-height: 44px !important;
                min-width: 44px !important;
                width: 44px !important;
                flex: 0 0 44px !important;
                font-size: 1.1rem !important;
            }
            td[data-label=""] > div > .btn-primary {
                flex: 1 1 auto !important;
                min-height: 44px !important;
                font-size: 0.85rem !important;
                padding: 8px 12px !important;
            }
            td[data-label=""] > div > .action-dropdown-container {
                flex: 0 0 auto;
            }
            td[data-label=""] > div > .action-dropdown-container > .action-trigger {
                min-height: 44px !important;
                min-width: 44px !important;
                font-size: 1.1rem !important;
                padding: 8px !important;
            }

            /* Modals: near-fullscreen */
            .modal-overlay { padding: 8px 4px; }
            .modal { max-width: 100%; width: 100%; padding: 16px; }
            .modal-close-sticky { width: 40px; height: 40px; font-size: 1.4rem; }

            /* Card headers */
            .card h2 { font-size: 1.05rem; }

            /* Search results: bigger touch targets */
            .search-result { padding: 12px; min-height: 44px; }

            /* Push section: full-width buttons */
            .card .btn-danger,
            .card .btn-primary { width: 100%; text-align: center; margin-bottom: 8px; }
        }

        @media (max-width: 480px) {
            /* Stats: single column */
            .stats { grid-template-columns: 1fr; }

            /* Session rows: single column */
            .session-row { grid-template-columns: 1fr; gap: 6px; }

            /* Stage bar: hide numbers, just show text */
            .stage-tab .stage-num { display: none; }
            .stage-tab { font-size: 0.82rem; padding: 12px 4px; }
        }
        /* ─── STAGE STEPPER ─── */
        .stage-bar {
            display: flex; gap: 0; margin-bottom: 20px;
            border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
        }
        .stage-tab {
            flex: 1; padding: 12px 16px; text-align: center;
            background: var(--surface); border: none; cursor: pointer;
            font-size: 0.9rem; color: var(--text-dim);
            border-right: 1px solid var(--border);
            transition: all 0.15s; position: relative;
        }
        .stage-tab:last-child { border-right: none; }
        .stage-tab:hover { background: var(--surface-2); }
        .stage-tab.active { background: var(--accent); color: #fff; font-weight: 600; }
        .stage-tab.completed { background: rgba(45,212,160,0.1); color: var(--green); }
        .stage-tab.disabled { opacity: 0.4; cursor: not-allowed; }
        .stage-tab .stage-num {
            display: inline-block; width: 22px; height: 22px; line-height: 22px;
            border-radius: 50%; font-size: 0.75rem; font-weight: 700;
            background: var(--border); color: var(--text-dim); margin-right: 6px;
        }
        .stage-tab.active .stage-num { background: rgba(255,255,255,0.3); color: #fff; }
        .stage-tab.completed .stage-num { background: var(--green); color: #fff; }

        /* ─── SORT/GROUP TOOLBAR ─── */
        .sort-toolbar {
            display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
            flex-wrap: wrap; font-size: 0.82rem;
        }
        .sort-toolbar label { color: var(--text-dim); }
        .sort-toolbar select {
            font-size: 0.82rem; padding: 4px 8px;
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text); border-radius: 4px;
        }

        /* ─── VERIFY BUTTONS ─── */
        .verify-btn-group { display: flex; gap: 4px; align-items: center; }
        .verify-btn {
            padding: 4px 10px; border-radius: 4px; font-size: 0.78rem;
            border: 1px solid var(--border); background: none; cursor: pointer;
            transition: all 0.15s; min-height: 32px;
        }
        .verify-btn:hover { background: var(--surface-2); }
        .verify-btn.action-trigger {
            min-width: 40px; min-height: 40px; padding: 8px 12px;
            font-size: 1.1rem; font-weight: 700; letter-spacing: 2px;
            border: 1.5px solid var(--border); color: var(--text);
        }
        .verify-btn.action-trigger:hover { background: var(--surface-2); border-color: var(--text-dim); }
        .verify-btn.here { color: var(--green); border-color: var(--green); }
        .verify-btn.here:hover { background: rgba(45,212,160,0.1); }
        .verify-btn.missing { color: var(--red); border-color: var(--red); }
        .verify-btn.missing:hover { background: rgba(240,82,82,0.1); }
        .verify-btn.damaged { color: var(--amber); border-color: var(--amber); }
        .verify-btn.damaged:hover { background: rgba(245,166,35,0.1); }
        .verify-btn.verified {
            background: var(--green); color: #fff; border-color: var(--green);
        }
        .verify-btn.verified-damaged {
            background: var(--amber); color: #fff; border-color: var(--amber);
        }
        .verify-btn.verified-missing {
            background: var(--red); color: #fff; border-color: var(--red);
        }

        /* ─── COMPLETE STAGE BUTTON ─── */
        .complete-stage-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; width: 100%; padding: 14px;
            font-size: 1rem; font-weight: 600;
            border: 2px solid var(--green); border-radius: 8px;
            background: rgba(45,212,160,0.08); color: var(--green);
            cursor: pointer; transition: all 0.15s; margin-top: 16px;
        }
        .complete-stage-btn:hover { background: rgba(45,212,160,0.15); }
        .complete-stage-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @media (max-width: 768px) {
            .stage-bar { font-size: 0.82rem; }
            .stage-tab { padding: 10px 6px; font-size: 0.78rem; }
            .stage-tab .stage-num { width: 20px; height: 20px; line-height: 20px; font-size: 0.7rem; margin-right: 4px; }

            /* Verify buttons: stack vertically for fat thumbs */
            .verify-btn-group { flex-direction: column; width: 100%; }
            .verify-btn { min-height: 44px; padding: 10px 14px; font-size: 0.85rem; width: 100%; text-align: center; }

            /* Sort toolbar: wrap nicely */
            .sort-toolbar { gap: 6px; }
            .sort-toolbar select { flex: 1; min-width: 0; }

            .complete-stage-btn { min-height: 52px; font-size: 1.05rem; }
        }
    </style>
    <link rel="stylesheet" href="/api/breakdown-cache/bd-static/breakdown_modal.css">
</head>
<body>

<header>
    <div class="container">
        <div class="logo">Pack Fresh <span>Ingest</span></div>
        <div class="status" id="header-status"></div>
    </div>
</header>

<div class="container">
    <!-- Session List -->
    <div id="session-list-view">
        <div class="card">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap;">
                <h2 style="margin-bottom:0;">📦 Ingest Queue</h2>
                <button class="btn btn-secondary btn-sm" onclick="showBreakdownLibrary()" style="margin-left:auto; font-size:0.8rem;">📚 Breakdown Library</button>
            </div>
            <div style="display:flex; gap:2px; margin-bottom:16px; border-bottom:1px solid var(--border);">
                <button class="tab-btn active" id="tab-btn-pending" onclick="switchQueueTab('pending')">📥 Ready to Ingest</button>
                <button class="tab-btn" id="tab-btn-completed" onclick="switchQueueTab('completed')">✅ Completed</button>
            </div>
            <div id="tab-pending">
                <div id="sessions-list">
                    <div class="loading"><span class="spinner"></span> Loading sessions...</div>
                </div>
            </div>
            <div id="tab-completed" style="display:none;">
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
                    <div style="flex:1; min-width:180px; position:relative;">
                        <input type="text" id="completed-search" placeholder="Search products..."
                               style="width:100%; font-size:0.85rem; padding:6px 10px;"
                               onkeydown="if(event.key==='Enter') loadCompletedSessions()">
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="loadCompletedSessions()" style="height:34px; font-size:0.82rem;">Search</button>
                    <select id="completed-days" onchange="loadCompletedSessions()" style="font-size:0.85rem; padding:4px 8px;">
                        <option value="7">Last 7 days</option>
                        <option value="14">Last 14 days</option>
                        <option value="30" selected>Last 30 days</option>
                        <option value="90">Last 90 days</option>
                        <option value="">All time</option>
                    </select>
                    <span id="completed-count" style="font-size:0.8rem; color:var(--text-dim);"></span>
                </div>
                <div id="completed-sessions-list">
                    <div class="loading"><span class="spinner"></span> Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Session Detail (hidden until clicked) -->
    <div id="session-detail-view" style="display:none;">
        <div style="margin-bottom:16px;">
            <button class="btn btn-secondary btn-sm" onclick="showList()">← Back to Queue</button>
        </div>
        <div id="session-detail-content"></div>
    </div>
</div>

<!-- Breakdown Library Modal -->
<div id="library-modal" class="modal-overlay">
    <div class="modal" style="max-width:800px;">
        <button class="modal-close-sticky" onclick="closeLibrary()">×</button>
        <h3 style="margin-bottom:4px;">📚 Breakdown Library</h3>
        <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:16px;">Saved breakdown recipes. Click a product to load it.</p>
        <div id="library-body"><div class="loading"><span class="spinner"></span></div></div>
    </div>
</div>

<!-- Breakdown modal now served by shared breakdown_modal.js -->

<!-- Relink Modal -->
<div id="relink-modal" class="modal-overlay">
    <div class="modal" style="max-width:600px;">
        <button class="modal-close-sticky" onclick="closeRelink()">×</button>
        <div id="relink-body"></div>
    </div>
</div>

<!-- Add Item Modal -->
<div id="add-item-modal" class="modal-overlay">
    <div class="modal" style="max-width:600px;">
        <button class="modal-close-sticky" onclick="closeAddItem()">×</button>
        <div id="add-item-body"></div>
    </div>
</div>

<!-- Confirm dialog now provided by shared pf_ui.js (themedConfirm) -->

<div id="prompt-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9000; align-items:center; justify-content:center;">
    <div class="confirm-box" style="min-width:280px;">
        <h3 id="prompt-title"></h3>
        <p id="prompt-msg" style="color:var(--text-dim); font-size:0.9rem; margin-bottom:12px;"></p>
        <div id="prompt-input-area"></div>
        <div class="btn-row" style="margin-top:12px;">
            <button class="btn btn-secondary btn-sm" id="prompt-cancel">Cancel</button>
            <button class="btn btn-primary btn-sm" id="prompt-ok">OK</button>
        </div>
    </div>
</div>

<script>

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════

let _currentSessionId = null;

// themedConfirm is now provided by shared pf_ui.js

function themedPrompt(title, msg, defaultVal = '', inputType = 'number') {
    return new Promise(resolve => {
        const overlay = document.getElementById('prompt-overlay');
        document.getElementById('prompt-title').textContent = title;
        document.getElementById('prompt-msg').textContent = msg;
        const area = document.getElementById('prompt-input-area');
        area.innerHTML = `<input id="prompt-input" type="${inputType}" value="${defaultVal}" style="width:100%;">`;
        overlay.style.display = 'flex';
        const input = document.getElementById('prompt-input');
        setTimeout(() => { input.focus(); input.select(); }, 50);

        const cleanup = (val) => {
            overlay.style.display = 'none';
            document.getElementById('prompt-ok').onclick = null;
            document.getElementById('prompt-cancel').onclick = null;
            resolve(val);
        };
        document.getElementById('prompt-ok').onclick = () => cleanup(input.value);
        document.getElementById('prompt-cancel').onclick = () => cleanup(null);
        input.onkeydown = (e) => {
            if (e.key === 'Enter') cleanup(input.value);
            if (e.key === 'Escape') cleanup(null);
        };
    });
}

// ═══════════════════════════════════════════════════════════════════
// ACTION DROPDOWN
// ═══════════════════════════════════════════════════════════════════

function toggleActionMenu(event, dd) {
    if (event) event.stopPropagation();
    document.querySelectorAll('.action-dropdown.show').forEach(d => { if (d !== dd) d.classList.remove('show'); });
    if (window.innerWidth > 768) {
        const btn = dd.previousElementSibling;
        const rect = btn.getBoundingClientRect();
        const spaceBelow = window.innerHeight - rect.bottom;
        const dropH = 200;
        dd.style.left = Math.max(8, rect.right - 180) + 'px';
        dd.style.top = spaceBelow > dropH ? (rect.bottom + 4) + 'px' : Math.max(4, rect.top - dropH) + 'px';
    } else {
        dd.style.left = ''; dd.style.top = '';
    }
    dd.classList.toggle('show');
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.action-dropdown') && !e.target.closest('.action-trigger')) {
        document.querySelectorAll('.action-dropdown.show').forEach(d => d.classList.remove('show'));
    }
});

window.addEventListener('resize', () => {
    document.querySelectorAll('.action-dropdown.show').forEach(d => d.classList.remove('show'));
});

// ═══════════════════════════════════════════════════════════════════
// SESSION LIST
// ═══════════════════════════════════════════════════════════════════

function switchQueueTab(tab) {
    document.getElementById('tab-pending').style.display = tab === 'pending' ? '' : 'none';
    document.getElementById('tab-completed').style.display = tab === 'completed' ? '' : 'none';
    document.getElementById('tab-btn-pending').classList.toggle('active', tab === 'pending');
    document.getElementById('tab-btn-completed').classList.toggle('active', tab === 'completed');
    if (tab === 'completed') loadCompletedSessions();
    else loadSessions();
}

async function loadSessions() {
    const el = document.getElementById('sessions-list');
    try {
        const r = await fetch('/api/ingest/sessions?status=pending');
        const sessions = await r.json();
        if (!sessions.length) {
            el.innerHTML = '<p style="color:var(--text-dim); text-align:center; padding:20px;">No sessions waiting to be ingested.</p>';
            return;
        }
        el.innerHTML = sessions.map(s => {
            const status = s.status;
            const badgeClass = status === 'received' ? 'badge-amber'
                : status === 'verified' ? 'badge-blue'
                : status === 'breakdown_complete' ? 'badge-green'
                : 'badge-blue';
            const badgeLabel = status === 'received' ? 'Verify'
                : status === 'verified' ? 'Breakdown'
                : status === 'breakdown_complete' ? 'Ready to Push'
                : '📦 Partial';
            const date = new Date(s.created_at).toLocaleDateString();
            return `<div class="session-row" onclick="viewSession('${s.id}')">
                <div>
                    <div class="name">${s.customer_name || 'Unknown'}</div>
                    <div class="meta">${s.session_type || 'sealed'} · ${date}</div>
                </div>
                <div><span class="badge ${badgeClass}">${badgeLabel}</span></div>
                <div style="text-align:right;">
                    <div style="font-weight:600;">${s.item_count || 0} items</div>
                    <div class="meta">${s.total_qty || 0} units</div>
                </div>
                <div style="font-weight:700; font-size:1.1rem;">$${(s.total_offer_amount || 0).toFixed(2)}</div>
            </div>`;
        }).join('');
    } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

async function loadCompletedSessions() {
    const el = document.getElementById('completed-sessions-list');
    const countEl = document.getElementById('completed-count');
    const days = document.getElementById('completed-days').value;
    const search = (document.getElementById('completed-search')?.value || '').trim();
    el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
    try {
        const url = `/api/ingest/sessions?status=completed&limit=100${days ? '&days=' + days : ''}${search ? '&search=' + encodeURIComponent(search) : ''}`;
        const r = await fetch(url);
        const sessions = await r.json();
        if (countEl) countEl.textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;
        if (!sessions.length) {
            el.innerHTML = '<p style="color:var(--text-dim); text-align:center; padding:20px;">No completed sessions in this period.</p>';
            return;
        }
        el.innerHTML = `<table style="width:100%; font-size:0.85rem;">
            <thead><tr>
                <th style="text-align:left;">Customer</th>
                <th style="text-align:left;">Type</th>
                <th>Items</th>
                <th>Offer</th>
                <th>Ingested</th>
                <th></th>

            <tbody>${sessions.map(s => {
                const ingestedDate = s.ingested_at ? new Date(s.ingested_at).toLocaleDateString() : '—';
                return `<tr>
                    <td style="font-weight:600;">${s.customer_name || 'Unknown'}</td>
                    <td style="color:var(--text-dim);">${s.session_type || 'sealed'}</td>
                    <td style="text-align:center;">${s.item_count || 0} <small style="color:var(--text-dim);">(${s.total_qty || 0} units)</small></td>
                    <td style="text-align:center; font-weight:600;">$${(s.total_offer_amount || 0).toFixed(2)}</td>
                    <td style="text-align:center; color:var(--text-dim);">${ingestedDate}</td>

}

function showList() {
    document.getElementById('session-list-view').style.display = '';
    document.getElementById('session-detail-view').style.display = 'none';
    _currentSessionId = null;
    loadSessions();
}

// ═══════════════════════════════════════════════════════════════════
// SESSION DETAIL
// ═══════════════════════════════════════════════════════════════════

// ── STAGE STATE ──────────────────────────────────────────────────────────
let _currentStage = 'verify';  // 'verify' | 'breakdown' | 'route' | 'push'
let _currentSessionData = null;
let _currentSortBy = 'default';  // 'default' | 'alpha' | 'price-high' | 'price-low'
let _currentGroupBy = 'none';    // 'none' | 'type' | 'set'

function _classifyProductType(item) {
    // Product type first
    const ptype = (item.product_type || '').toLowerCase();
    if (ptype === 'raw') return 'Raw';
    if (item.is_graded) return 'Graded';
    // Fallback: parse name
    const n = (item.product_name || '').toLowerCase();
    if (n.includes('elite trainer box') || n.includes(' etb')) return 'ETB';
    if (n.includes('booster box') || n.includes('bb ')) return 'Booster Box';
    if (n.includes('booster pack') || n.includes('sleeved booster')) return 'Booster Pack';
    if (n.includes(' tin') || n.includes('tin ')) return 'Tin';
    if (n.includes('bundle') || n.includes('trainer kit')) return 'Bundle';
    if (n.includes('collection') || n.includes('premium collection') || n.includes('ultra premium')) return 'Collection';
    if (n.includes('blister')) return 'Blister';
    return 'Other';
}

function _sortItems(items) {
    const sorted = [...items];
    if (_currentSortBy === 'alpha') sorted.sort((a, b) => (a.product_name || '').localeCompare(b.product_name || ''));
    else if (_currentSortBy === 'price-high') sorted.sort((a, b) => (b.market_price || 0) - (a.market_price || 0));
    else if (_currentSortBy === 'price-low') sorted.sort((a, b) => (a.market_price || 0) - (b.market_price || 0));
    return sorted;
}

function _groupItems(items) {
    if (_currentGroupBy === 'none') return [{ label: null, items }];
    const groups = {};
    items.forEach(i => {
        const key = _currentGroupBy === 'type' ? _classifyProductType(i) : (i.set_name || 'Unknown Set');
        if (!groups[key]) groups[key] = [];
        groups[key].push(i);
    });
    return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0])).map(([label, items]) => ({ label, items }));
}

function _renderSortToolbar() {
    return `<div class="sort-toolbar">
        <label>Group:</label>
        <select onchange="_currentGroupBy=this.value; _rerenderStage();">
            <option value="none" ${_currentGroupBy==='none'?'selected':''}>None</option>
            <option value="type" ${_currentGroupBy==='type'?'selected':''}>Product Type</option>
            <option value="set" ${_currentGroupBy==='set'?'selected':''}>Set</option>
        </select>
        <label style="margin-left:8px;">Sort:</label>
        <select onchange="_currentSortBy=this.value; _rerenderStage();">
            <option value="default" ${_currentSortBy==='default'?'selected':''}>Default</option>
            <option value="alpha" ${_currentSortBy==='alpha'?'selected':''}>Alphabetical</option>
            <option value="price-high" ${_currentSortBy==='price-high'?'selected':''}>Price (High→Low)</option>
            <option value="price-low" ${_currentSortBy==='price-low'?'selected':''}>Price (Low→High)</option>
        </select>
    </div>`;
}

function _rerenderStage() {
    if (!_currentSessionData) return;
    const container = document.getElementById('stage-content');
    if (!container) return;
    if (_currentStage === 'verify') container.innerHTML = _renderVerifyContent(_currentSessionData);
    else if (_currentStage === 'breakdown') container.innerHTML = _renderBreakdownContent(_currentSessionData);
    else if (_currentStage === 'route') container.innerHTML = _renderRouteContent(_currentSessionData);
    else if (_currentStage === 'push') container.innerHTML = _renderPushContent(_currentSessionData);
    _postRenderStage();
}

function _postRenderStage() {
    if (!_currentSessionData) return;
    const { session: s, items } = _currentSessionData;
    const sessionId = s.id;
    if (_currentStage === 'breakdown') {
        _lastRenderedItems = items;
        _enrichBreakdownSummaries(items, sessionId, true);
    }
    if (_currentStage === 'route') {
        _loadRouteData(s.id);
    }
    if (_currentStage === 'push') {
        _loadSessionBarcodes(sessionId);
    }
}

function switchStage(stage) {
    if (!_currentSessionData) return;
    // All tabs always navigable — Complete buttons are bookmarks, not gates
    _currentStage = stage;
    _rerenderStage();
    _updateStageTabs();
}

function _updateStageTabs() {
    if (!_currentSessionData) return;
    const s = _currentSessionData.session;
    const statusToStage = { received: 0, verified: 1, breakdown_complete: 2, partially_ingested: 3, ingested: 3 };
    const maxStage = statusToStage[s.status] ?? 0;
    const stageOrder = { verify: 0, breakdown: 1, route: 2, push: 3 };

    document.querySelectorAll('.stage-tab').forEach(tab => {
        const stage = tab.dataset.stage;
        const idx = stageOrder[stage];
        tab.classList.remove('active', 'completed');
        if (stage === _currentStage) tab.classList.add('active');
        else if (idx < maxStage) tab.classList.add('completed');
    });
}

async function viewSession(sessionId, _preserveScroll) {
    _currentSessionId = sessionId;
    document.getElementById('session-list-view').style.display = 'none';
    document.getElementById('session-detail-view').style.display = '';
    const el = document.getElementById('session-detail-content');
    const scrollY = _preserveScroll ? window.scrollY : 0;
    el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading session...</div>';

    try {
        const r = await fetch(`/api/ingest/session/${sessionId}`);
        const data = await r.json();
        const s = data.session;
        const items = data.items;

        _currentSessionData = data;

        // Track pushed items
        _pushedItemIds = new Set(items.filter(i => i.pushed_at).map(i => i.id));

        // Determine default stage from session status
        const statusToStage = {
            received: 'verify',
            verified: 'breakdown',
            breakdown_complete: 'route',
            partially_ingested: 'push',
            ingested: 'push',
        };
        if (!_preserveScroll) {
            _currentStage = statusToStage[s.status] || 'verify';
            // Skip Route stage for sessions with no raw cards
            if (_currentStage === 'route') {
                const hasRawCards = items.some(i =>
                    i.product_type === 'raw' && !i.is_graded &&
                    ['good','damaged'].includes(i.item_status) && i.is_mapped && !i.pushed_at
                );
                if (!hasRawCards) _currentStage = 'push';
            }
        }

        const activeItems = items.filter(i => ['good','damaged'].includes(i.item_status || 'good'));
        const totalQty = activeItems.reduce((sum, i) => sum + (i.quantity || 1), 0);

        const statusBadge = {
            received: { cls: 'badge-amber', label: 'Verify' },
            verified: { cls: 'badge-blue', label: 'Breakdown' },
            breakdown_complete: { cls: 'badge-accent', label: 'Route' },
            partially_ingested: { cls: 'badge-blue', label: '📦 Partial' },
            ingested: { cls: 'badge-green', label: 'Ingested' },
        }[s.status] || { cls: 'badge-dim', label: s.status };

        let html = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px;">
                    <h2 style="margin:0;">${s.customer_name || 'Unknown'} <small style="color:var(--text-dim);font-weight:400;font-size:0.8rem;">${s.session_type || 'sealed'}</small></h2>
                    <span class="badge ${statusBadge.cls}">${statusBadge.label}</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Items</div>
                        <div class="stat-value">${activeItems.length}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Total Units</div>
                        <div class="stat-value">${totalQty}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Offer Total</div>
                        <div class="stat-value">$${(s.total_offer_amount || 0).toFixed(2)}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Market Value</div>
                        <div class="stat-value">$${(s.total_market_value || 0).toFixed(2)}</div>
                    </div>
                </div>
            </div>

            <div id="offer-adjustment-card"></div>

            <div class="stage-bar">
                <button class="stage-tab" data-stage="verify" onclick="switchStage('verify')">
                    <span class="stage-num">1</span> Verify
                </button>
                <button class="stage-tab" data-stage="breakdown" onclick="switchStage('breakdown')">
                    <span class="stage-num">2</span> Breakdown
                </button>
                <button class="stage-tab" data-stage="route" onclick="switchStage('route')">
                    <span class="stage-num">3</span> Route
                </button>
                <button class="stage-tab" data-stage="push" onclick="switchStage('push')">
                    <span class="stage-num">4</span> Push
                </button>
            </div>

            <div id="stage-content"></div>
            <div id="session-barcode-section"></div>`;

        el.innerHTML = html;
        _updateStageTabs();
        _rerenderStage();

        if (scrollY) requestAnimationFrame(() => window.scrollTo(0, scrollY));
        _loadOfferAdjustment(sessionId);
        _loadSessionBarcodes(sessionId);
    } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

// ── VERIFY STAGE ──────────────────────────────────────────────────────────
function _renderVerifyContent(data) {
    const { session: s, items } = data;
    const sessionId = s.id;
    // Show all items including missing for verify
    const allItems = items.filter(i => i.item_status !== 'rejected' && !i.parent_item_id);
    const sorted = _sortItems(allItems);
    const groups = _groupItems(sorted);

    const isItemVerified = i => i.verified_at || i.item_status === 'missing' || i.item_status === 'broken_down' || i.pushed_at;
    const verifiedCount = allItems.filter(isItemVerified).length;
    const totalCount = allItems.length;
    const pct = totalCount > 0 ? Math.round((verifiedCount / totalCount) * 100) : 0;
    const allVerified = verifiedCount === totalCount && totalCount > 0;

    // Split into unverified and verified
    const unverifiedItems = allItems.filter(i => !isItemVerified(i));
    const verifiedItems = allItems.filter(isItemVerified);
    const sortedUnverified = _sortItems(unverifiedItems);
    const sortedVerified = _sortItems(verifiedItems);
    const unverifiedGroups = _groupItems(sortedUnverified);
    const verifiedGroups = _groupItems(sortedVerified);

    let html = `<div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 style="margin:0;">Verify Items</h2>
                <button class="btn btn-sm btn-secondary" style="font-size:0.78rem;padding:3px 10px;" onclick="openAddItem('${sessionId}')">➕ Unexpected Item</button>
            </div>
            <span style="color:${allVerified ? 'var(--green)' : 'var(--text-dim)'}; font-size:0.85rem; font-weight:600;">${verifiedCount}/${totalCount} verified</span>
        </div>
        <div class="progress-bar" style="margin-bottom:12px;">
            <div class="fill" style="width:${pct}%; background:${allVerified ? 'var(--green)' : 'var(--accent)'};"></div>
        </div>
        ${_renderSortToolbar()}`;

    // Unverified items — always visible
    if (unverifiedItems.length > 0) {
        html += `<div style="overflow-x:auto;">
        <table class="responsive-cards">
            <thead><tr>
                <th>Product</th><th>Qty</th><th>Type</th><th>Price</th><th>COGS</th><th>Verify</th>
            </tr></thead>
            <tbody>`;
        for (const group of unverifiedGroups) {
            if (group.label) {
                html += `<tr><td colspan="6" style="font-weight:700;font-size:0.85rem;background:var(--surface-2);padding:6px 10px;border-bottom:2px solid var(--border);">${group.label}</td></tr>`;
            }
            for (const item of group.items) {
                html += _renderVerifyRow(item, sessionId);
            }
        }
        html += `</tbody></table></div>`;
    } else if (allVerified) {
        html += `<div style="text-align:center; padding:20px; color:var(--green); font-weight:600;">All items verified</div>`;
    }

    // Verified items — collapsible
    if (verifiedItems.length > 0) {
        html += `<details style="margin-top:12px;" ${unverifiedItems.length === 0 ? 'open' : ''}>
            <summary style="cursor:pointer; font-weight:600; font-size:0.9rem; color:var(--green); padding:8px 0; user-select:none;">
                ✓ Verified (${verifiedItems.length}) — click to ${unverifiedItems.length === 0 ? 'collapse' : 'expand'}
            </summary>
            <div style="overflow-x:auto;">
            <table class="responsive-cards">
                <thead><tr>
                    <th>Product</th><th>Qty</th><th>Type</th><th>Price</th><th>COGS</th><th>Verify</th>
                </tr></thead>
                <tbody>`;
        for (const group of verifiedGroups) {
            if (group.label) {
                html += `<tr><td colspan="6" style="font-weight:700;font-size:0.85rem;background:var(--surface-2);padding:6px 10px;border-bottom:2px solid var(--border);">${group.label}</td></tr>`;
            }
            for (const item of group.items) {
                html += _renderVerifyRow(item, sessionId);
            }
        }
        html += `</tbody></table></div>
        </details>`;
    }

    html += `</div>`;

    // Complete button — show unless already ingested
    if (s.status !== 'ingested') {
        if (allVerified) {
            html += `<button class="complete-stage-btn" onclick="completeVerify('${sessionId}')">
                ✓ Complete Verification → Breakdown
            </button>`;
        } else {
            html += `<div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;">
                <button class="complete-stage-btn" style="flex:1; border-color:var(--accent); background:rgba(124,147,245,0.08); color:var(--accent);" onclick="switchStage('breakdown')">
                    Skip to Breakdown → (${verifiedCount}/${totalCount} verified)
                </button>
            </div>`;
        }
    }

    return html;
}

function _renderVerifyRow(item, sessionId) {
    const st = item.item_status || 'good';
    const isMissing = st === 'missing';
    const isDamaged = st === 'damaged';
    const isVerified = !!item.verified_at;
    const name = item.product_name || 'Unknown';
    const escName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const ptype = item.product_type || 'sealed';

    let rowStyle = '';
    if (isMissing) rowStyle = 'opacity:0.4; text-decoration:line-through;';
    else if (isDamaged) rowStyle = 'background:rgba(255,170,0,0.06);';
    else if (isVerified) rowStyle = 'background:rgba(45,212,160,0.04);';

    const isPushed = !!item.pushed_at;
    const isBrokenDown = (item.item_status === 'broken_down');
    const isLocked = isPushed || isBrokenDown;
    let verifyCell = '';
    if (isLocked) {
        // Pushed or broken-down items are locked
        const label = isBrokenDown ? '🔨 Broken Down' : isMissing ? '✗ Missing' : isDamaged ? '⚠ Damaged' : '✓ Pushed';
        const cls = isBrokenDown ? 'verified' : isMissing ? 'verified-missing' : isDamaged ? 'verified-damaged' : 'verified';
        verifyCell = `<span class="verify-btn ${cls}" style="cursor:default; opacity:0.6;" title="${isBrokenDown ? 'Broken down into components' : 'Already pushed to Shopify'}">${label} 🔒</span>`;
    } else if (isMissing) {
        verifyCell = `<button class="verify-btn verified-missing" onclick="undoVerify('${item.id}', '${sessionId}')" title="Click to undo">✗ Missing</button>`;
    } else if (isDamaged && isVerified) {
        verifyCell = `<div style="display:flex;gap:4px;align-items:center;">
            <span class="verify-btn verified-damaged" style="cursor:default;">⚠ Damaged</span>
            <div class="action-dropdown-container" style="position:relative;display:inline-block;">
                <button class="verify-btn action-trigger" onclick="toggleActionMenu(event, this.nextElementSibling)">⋯</button>
                <div class="action-dropdown">
                    <button onclick="undoVerify('${item.id}', '${sessionId}')">↩ Undo</button>
                </div>
            </div>
        </div>`;
    } else if (isVerified && item.is_graded) {
        const co = item.grade_company || 'PSA';
        const gr = item.grade_value || '?';
        verifyCell = `<div style="display:flex;gap:4px;align-items:center;">
            <span class="verify-btn verified" style="cursor:default;">✓ ${co} ${gr}</span>
            <div class="action-dropdown-container" style="position:relative;display:inline-block;">
                <button class="verify-btn action-trigger" onclick="toggleActionMenu(event, this.nextElementSibling)">⋯</button>
                <div class="action-dropdown">
                    <button onclick="verifyGradedSlab('${item.id}', '${sessionId}', '${co}', '${gr}')">✏️ Change Grade</button>
                    <button onclick="undoVerify('${item.id}', '${sessionId}')">↩ Undo</button>
                </div>
            </div>
        </div>`;
    } else if (isVerified && ptype === 'raw') {
        const cond = item.condition || 'NM';
        verifyCell = `<div style="display:flex;gap:4px;align-items:center;">
            <span class="verify-btn verified" style="cursor:default;">✓ ${cond}</span>
            <div class="action-dropdown-container" style="position:relative;display:inline-block;">
                <button class="verify-btn action-trigger" onclick="toggleActionMenu(event, this.nextElementSibling)">⋯</button>
                <div class="action-dropdown">
                    <button onclick="verifyRawCard('${item.id}', '${sessionId}', ${item.quantity||1})">✏️ Change Condition</button>
                    <button onclick="undoVerify('${item.id}', '${sessionId}')">↩ Undo</button>
                </div>
            </div>
        </div>`;
    } else if (isVerified) {
        verifyCell = `<div style="display:flex;gap:4px;align-items:center;">
            <span class="verify-btn verified" style="cursor:default;">✓ Here</span>
            <div class="action-dropdown-container" style="position:relative;display:inline-block;">
                <button class="verify-btn action-trigger" onclick="toggleActionMenu(event, this.nextElementSibling)">⋯</button>
                <div class="action-dropdown">
                    <button onclick="undoVerify('${item.id}', '${sessionId}')">↩ Undo</button>
                </div>
            </div>
        </div>`;
    } else {
        // Primary action: one-tap confirm
        const confirmBtn = `<button class="verify-btn here" onclick="verifyItem('${item.id}', '${sessionId}', 'here', ${item.quantity||1})">✓</button>`;
        // Secondary actions in a dropdown
        let extraActions = '';
        if (item.is_graded) {
            extraActions = `
                <button onclick="verifyGradedSlab('${item.id}', '${sessionId}', '${item.grade_company||'PSA'}', '${item.grade_value||''}')">✏️ Change Grade</button>
                <button onclick="editVerifyQty('${item.id}', '${sessionId}', ${item.quantity||1})">📦 Edit Qty</button>
                <button onclick="verifyItem('${item.id}', '${sessionId}', 'missing', ${item.quantity||1})">✗ Missing</button>`;
        } else if (ptype === 'raw') {
            extraActions = `
                <button onclick="verifyRawCard('${item.id}', '${sessionId}', ${item.quantity||1})">✏️ Change Condition</button>
                <button onclick="editVerifyQty('${item.id}', '${sessionId}', ${item.quantity||1})">📦 Edit Qty</button>
                <button onclick="verifyItem('${item.id}', '${sessionId}', 'missing', ${item.quantity||1})">✗ Missing</button>`;
        } else {
            extraActions = `
                <button onclick="editVerifyQty('${item.id}', '${sessionId}', ${item.quantity||1})">📦 Edit Qty</button>
                <button onclick="verifyItem('${item.id}', '${sessionId}', 'damaged', ${item.quantity||1})">⚠️ Damaged</button>
                <button onclick="verifyItem('${item.id}', '${sessionId}', 'missing', ${item.quantity||1})">✗ Missing</button>`;
        }
        verifyCell = `<div class="verify-btn-group" style="flex-direction:row;">
            ${confirmBtn}
            <div class="action-dropdown-container" style="position:relative;display:inline-block;">
                <button class="verify-btn action-trigger" onclick="toggleActionMenu(event, this.nextElementSibling)">⋯</button>
                <div class="action-dropdown">
                    ${extraActions}
                </div>
            </div>
        </div>`;
    }

    // Show condition/grade inline — graded check first (graded items have product_type='raw')
    let typeLabel = ptype.toUpperCase();
    if (item.is_graded) {
        typeLabel = `${item.grade_company || 'PSA'} ${item.grade_value || '?'}`;
    } else if (ptype === 'raw') {
        const cond = item.condition || 'NM';
        const condColor = cond === 'NM' ? 'var(--green)' : cond === 'LP' ? 'var(--accent)' : cond === 'MP' ? 'var(--amber)' : 'var(--red)';
        typeLabel = `<span style="color:${condColor};">${cond}</span>`;
    }

    return `<tr style="${rowStyle}" data-item-id="${item.id}">
        <td class="name-cell" data-label="">${name}${item.set_name ? '<br><small style="color:var(--text-dim);">' + item.set_name + '</small>' : ''}${item.tcgplayer_id ? '<br><small style="color:var(--text-dim);">TCG#' + item.tcgplayer_id + '</small>' : ''}</td>
        <td data-label="Qty">${item.quantity || 1}</td>
        <td data-label="Type"><span class="badge badge-dim" style="font-size:0.65rem;">${typeLabel}</span></td>
        <td data-label="Store">${item.store_price != null ? '$' + item.store_price.toFixed(2) : '<span style="color:var(--text-dim);" title="Market price (not in store)">$' + (item.market_price || 0).toFixed(2) + ' <small>mkt</small></span>'}</td>
        <td data-label="COGS">$${(item.offer_price || 0).toFixed(2)}</td>
        <td data-label="Verify">${verifyCell}</td>
    </tr>`;
}

// Update local session data for an item (avoids full reload)
function _updateLocalItem(itemId, updates) {
    if (!_currentSessionData) return;
    const item = _currentSessionData.items.find(i => i.id === itemId);
    if (item) Object.assign(item, updates);
}

async function editVerifyQty(itemId, sessionId, currentQty) {
    const input = await themedPrompt('Edit Quantity', `Current quantity: ${currentQty}. Enter new quantity:`, String(currentQty));
    if (input === null) return;
    const newQty = parseInt(input);
    if (isNaN(newQty) || newQty < 1) { alert('Quantity must be at least 1'); return; }
    if (newQty === currentQty) return;

    try {
        const r = await fetch(`/api/ingest/item/${itemId}/update-qty`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ quantity: newQty }),
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'Failed to update quantity'); return; }
        viewSession(sessionId, true);
    } catch(e) { alert(e.message); }
}

async function verifyItem(itemId, sessionId, status, totalQty) {
    try {
        // Simple confirm (here, qty=1, no split) → optimistic local update
        if (status === 'here' && totalQty <= 1) {
            // Fire-and-forget API call
            fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'here' }),
            });
            // Optimistic: mark verified locally and re-render in place
            _updateLocalItem(itemId, { verified_at: new Date().toISOString() });
            _rerenderStage();
            return;
        }

        // Simple confirm with qty > 1 but full qty confirmed
        if (status === 'here' && totalQty > 1) {
            const input = await themedPrompt('Verify Quantity', `How many are here? (expected: ${totalQty})`, totalQty);
            if (input === null) return;
            const confirmed = parseInt(input);
            if (isNaN(confirmed) || confirmed < 0 || confirmed > totalQty) {
                alert(`Must be between 0 and ${totalQty}`);
                return;
            }
            if (confirmed === totalQty) {
                // Full qty — optimistic update
                fetch(`/api/ingest/item/${itemId}/verify`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: 'here', qty_confirmed: confirmed }),
                });
                _updateLocalItem(itemId, { verified_at: new Date().toISOString() });
                _rerenderStage();
                return;
            }
            // Partial qty — server creates new items, need full reload
            await fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'here', qty_confirmed: confirmed }),
            });
            viewSession(sessionId, true);
            return;
        }

        // Missing with qty > 1 — may split, need reload
        if (status === 'missing' && totalQty > 1) {
            const input = await themedPrompt('Missing Quantity', `How many are missing? (of ${totalQty})`, totalQty);
            if (input === null) return;
            const missing = parseInt(input);
            if (isNaN(missing) || missing < 1 || missing > totalQty) {
                alert(`Must be between 1 and ${totalQty}`);
                return;
            }
            await fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'missing', missing_qty: missing }),
            });
            viewSession(sessionId, true);
            return;
        }

        // Missing qty=1 — optimistic
        if (status === 'missing' && totalQty <= 1) {
            fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'missing' }),
            });
            _updateLocalItem(itemId, { item_status: 'missing', verified_at: new Date().toISOString(), offer_price: 0 });
            _rerenderStage();
            return;
        }

        // Damaged — may split, always reload
        if (status === 'damaged') {
            let damaged_qty = null;
            if (totalQty > 1) {
                const input = await themedPrompt('Damaged Quantity', `How many are damaged? (1–${totalQty})`, totalQty);
                if (input === null) return;
                damaged_qty = parseInt(input);
                if (isNaN(damaged_qty) || damaged_qty < 1 || damaged_qty > totalQty) {
                    alert(`Must be between 1 and ${totalQty}`);
                    return;
                }
            }
            const body = { status: 'damaged' };
            if (damaged_qty !== null) body.damaged_qty = damaged_qty;
            await fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            viewSession(sessionId, true);
            return;
        }

        // Fallback
        await fetch(`/api/ingest/item/${itemId}/verify`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ status }),
        });
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

// ── BREAKDOWN STAGE ──────────────────────────────────────────────────────────
function _renderBreakdownContent(data) {
    const { session: s, items } = data;
    const sessionId = s.id;
    // Show unpushed items only. For broken_down parents, check if all children are pushed.
    const childrenByParent = {};
    items.forEach(i => {
        if (i.parent_item_id) {
            if (!childrenByParent[i.parent_item_id]) childrenByParent[i.parent_item_id] = [];
            childrenByParent[i.parent_item_id].push(i);
        }
    });
    // Recursively check if a breakdown family is fully pushed
    function _isFullyPushed(itemId) {
        const kids = childrenByParent[itemId] || [];
        if (kids.length === 0) return false;
        return kids.every(k => k.pushed_at || (k.item_status === 'broken_down' && _isFullyPushed(k.id)));
    }

    const activeItems = items.filter(i => {
        if (!['good','damaged','broken_down'].includes(i.item_status)) return false;
        if (i.pushed_at) return false;
        // Raw cards and graded slabs don't get broken down
        if (i.item_status !== 'broken_down' && (i.product_type === 'raw' || i.is_graded)) return false;
        // Must be verified (or broken_down which implies it was)
        if (i.item_status !== 'broken_down' && !i.verified_at) return false;
        // Hide broken_down items whose entire tree is pushed
        if (i.item_status === 'broken_down' && _isFullyPushed(i.id)) return false;
        return true;
    });

    // Build child map
    const childrenOf = {};
    activeItems.forEach(i => {
        if (i.parent_item_id) {
            if (!childrenOf[i.parent_item_id]) childrenOf[i.parent_item_id] = [];
            childrenOf[i.parent_item_id].push(i);
        }
    });

    const topLevel = activeItems.filter(i => !i.parent_item_id);
    const sorted = _sortItems(topLevel);
    const groups = _groupItems(sorted);

    let html = `<div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 style="margin:0;">Breakdown Decisions</h2>
            </div>
            <span style="color:var(--text-dim); font-size:0.82rem;">Break down what you want, skip the rest</span>
        </div>
        ${_renderSortToolbar()}
        <div style="overflow-x:auto;">
        <table class="responsive-cards">
            <thead><tr>
                <th>Product</th><th>Qty</th><th>Status</th><th>Price</th><th>COGS</th><th>Actions</th>
            </tr></thead>
            <tbody>`;

    for (const group of groups) {
        if (group.label) {
            html += `<tr><td colspan="6" style="font-weight:700;font-size:0.85rem;background:var(--surface-2);padding:6px 10px;border-bottom:2px solid var(--border);">${group.label}</td></tr>`;
        }
        for (const item of group.items) {
            html += renderItemRow(item, true, sessionId, false);
            // Render children
            const kids = childrenOf[item.id] || [];
            for (const kid of kids) {
                html += renderItemRow(kid, true, sessionId, true);
                // Nested children
                const grandkids = childrenOf[kid.id] || [];
                for (const gk of grandkids) {
                    html += renderItemRow(gk, true, sessionId, true);
                }
            }
        }
    }

    html += `</tbody></table></div></div>`;

    // Complete button — show unless already past breakdown or ingested
    if (['received', 'verified'].includes(s.status)) {
        html += `<button class="complete-stage-btn" onclick="completeBreakdown('${sessionId}')">
            ✓ Done with Breakdowns → Push
        </button>`;
    }

    return html;
}

// ── ROUTE STAGE ─────────────────────────────────────────────────────────
let _routeData = null;  // { items, by_destination, binder_capacity }

async function _loadRouteData(sessionId) {
    const container = document.getElementById('stage-content');
    if (!container) return;

    // Check if session has raw items
    const rawItems = (_currentSessionData?.items || []).filter(i =>
        i.product_type === 'raw' && !i.is_graded &&
        ['good','damaged'].includes(i.item_status) && i.is_mapped && !i.pushed_at
    );

    if (!rawItems.length) {
        container.innerHTML = `<div class="card">
            <p style="color:var(--text-dim);">No raw cards to route in this session.</p>
            <button class="btn btn-primary" onclick="switchStage('push')">Continue to Push</button>
        </div>`;
        return;
    }

    container.innerHTML = '<div class="loading"><span class="spinner"></span> Loading routing data...</div>';

    try {
        // Auto-route first (sets defaults), then get summary
        const autoR = await fetch(`/api/ingest/session/${sessionId}/auto-route`, { method: 'POST' });
        if (!autoR.ok) {
            const err = await autoR.json().catch(() => ({}));
            console.warn('Auto-route returned', autoR.status, err);
            // Non-fatal — items may just not have routing_destination set yet
        }
        const r = await fetch(`/api/ingest/session/${sessionId}/route-summary`);
        if (!r.ok) {
            const err = await r.json().catch(() => ({}));
            container.innerHTML = `<div class="alert alert-error">Route summary failed (${r.status}): ${err.error || 'Unknown error'}</div>`;
            return;
        }
        const data = await r.json();
        if (!data.items || !data.items.length) {
            // Debug: show what the backend sees vs what the client sees
            const clientRaw = (_currentSessionData?.items || []).filter(i =>
                i.product_type === 'raw' && !i.is_graded
            );
            container.innerHTML = `<div class="card">
                <p style="color:var(--text-dim);">Backend found 0 routable raw items.</p>
                <p style="font-size:0.8rem; color:var(--text-dim);">Client sees ${clientRaw.length} raw items.
                ${clientRaw.length ? 'First item product_type: "' + clientRaw[0].product_type + '", is_mapped: ' + clientRaw[0].is_mapped + ', item_status: "' + clientRaw[0].item_status + '"' : ''}</p>
                <button class="btn btn-primary" onclick="switchStage('push')" style="margin-top:8px;">Continue to Push</button>
            </div>`;
            return;
        }
        _routeData = data;
        _renderRouteCards(sessionId, data);
    } catch(e) {
        container.innerHTML = `<div class="alert alert-error">Failed to load routing: ${e.message}</div>`;
    }
}

function _renderRouteContent(data) {
    // Placeholder — real content loaded by _loadRouteData via _postRenderStage
    return `<div class="loading"><span class="spinner"></span> Loading routing...</div>`;
}

    const colors = { bulk: 'var(--text-dim)', display: 'var(--green)', storage: 'var(--accent)', grade: 'var(--accent2)' };
    const color = colors[value] || 'var(--text)';
    return `<label style="display:flex; align-items:center; gap:3px; font-size:0.72rem; padding:4px 8px;
                border-radius:6px; cursor:pointer; min-height:36px;
                background:${checked ? color+'22' : 'transparent'};
                border:1.5px solid ${checked ? color : 'var(--border)'};
                color:${checked ? color : 'var(--text-dim)'};"
                onclick="event.preventDefault(); _setRoute('${sessionId}','${itemId}','${value}');">
        <input type="radio" name="route-${itemId}" value="${value}" ${checked?'checked':''}
            style="display:none;">
        <span style="font-weight:${checked?'700':'400'};">${label}</span>
    </label>`;
}

function _showSplitRoute(sessionId, itemId, totalQty) {
    const form = document.getElementById('split-form-' + itemId);
    if (!form) return;
    if (form.style.display !== 'none') { form.style.display = 'none'; return; }
    form.style.display = 'block';
    form.innerHTML = `<div style="margin-top:6px; padding:8px 10px; background:var(--surface-2); border-radius:6px; border:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <span style="font-size:0.78rem; color:var(--text-dim);">Split</span>
        <input type="number" id="split-qty-${itemId}" min="1" max="${totalQty - 1}" value="1" style="width:55px; padding:4px 6px; font-size:0.82rem;">
        <span style="font-size:0.78rem; color:var(--text-dim);">of ${totalQty} →</span>
        <select id="split-dest-${itemId}" style="padding:4px 6px; font-size:0.82rem; background:var(--surface); border:1px solid var(--border); border-radius:4px; color:var(--text);">
            <option value="grade">Grade</option>
            <option value="storage">Storage</option>
            <option value="display">Binder</option>
            <option value="bulk">Bulk</option>
        </select>
        <button class="btn btn-sm btn-primary" style="font-size:0.75rem; padding:3px 10px;" onclick="_doSplitRoute('${sessionId}','${itemId}')">Split</button>
        <button class="btn btn-sm btn-secondary" style="font-size:0.75rem; padding:3px 8px;" onclick="document.getElementById('split-form-${itemId}').style.display='none'">Cancel</button>
    </div>`;
}

async function _doSplitRoute(sessionId, itemId) {
    const qtyEl = document.getElementById('split-qty-' + itemId);
    const destEl = document.getElementById('split-dest-' + itemId);
    if (!qtyEl || !destEl) return;
    const splitQty = parseInt(qtyEl.value);
    const dest = destEl.value;
    if (!splitQty || splitQty < 1) return;

    try {
        const r = await fetch(`/api/ingest/session/${sessionId}/split-route`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ item_id: itemId, split_qty: splitQty, destination: dest }),
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'Split failed'); return; }

        // Reload routing data to pick up the new split item
        _loadRouteData(sessionId);
    } catch(e) {
        alert('Split failed: ' + e.message);
    }
}

async function _splitAllSingles(sessionId, itemId, qty) {
    if (!confirm(`Split into ${qty} individual cards? Each will get its own routing decision.`)) return;
    try {
        const r = await fetch(`/api/ingest/session/${sessionId}/split-singles`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ item_id: itemId }),
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'Split failed'); return; }
        _loadRouteData(sessionId);
    } catch(e) {
        alert('Split failed: ' + e.message);
    }
}

async function _setRoute(sessionId, itemId, destination) {
    try {
        await fetch(`/api/ingest/session/${sessionId}/route-card`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ item_id: itemId, destination }),
        });
        // Update local data and re-render
        if (_routeData) {
            const item = _routeData.items.find(i => i.id === itemId);
            if (item) {
                const oldDest = item.routing_destination || 'storage';
                const qty = item.quantity || 1;
                item.routing_destination = destination;
                // Update counts
                _routeData.by_destination[oldDest] = (_routeData.by_destination[oldDest] || 0) - qty;
                _routeData.by_destination[destination] = (_routeData.by_destination[destination] || 0) + qty;
            }
            _renderRouteCards(sessionId, _routeData);
        }
    } catch(e) {
        console.error('Route failed:', e);
    }
}


// ── ROUTING SESSION (card-by-card) ──────────────────────────────────────
let _rsActive = false;
let _rsItems = [];       // enriched items array
let _rsIndex = 0;        // current card position
let _rsSessionId = null;
let _rsCounts = { storage: 0, display: 0, grade: 0, bulk: 0 };

let _rsEnrichJobId = null;
let _rsEnrichDone = false;

async function startRouteSession(sessionId) {
    _rsSessionId = sessionId;
    _rsEnrichDone = false;

    // Create overlay if it doesn't exist
    let overlay = document.getElementById('route-session-overlay');
    if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'route-session-overlay';
        overlay.style.cssText = 'display:none; position:fixed; inset:0; background:var(--bg); z-index:10000; overflow-y:auto; padding:16px; padding-top:48px;';
        document.body.appendChild(overlay);
    }
    overlay.style.display = 'block';
    overlay.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh;">
        <div class="spinner" style="margin-bottom:12px;"></div>
        <div style="font-size:1rem; color:var(--text-dim);">Loading cards...</div>
        <button class="btn btn-secondary" onclick="exitRouteSession()" style="margin-top:24px;">Cancel</button>
    </div>`;

    _rsActive = true;
    document.addEventListener('keydown', _rsKeyHandler);

    try {
        // Load basic route data immediately (no PPT needed)
        const r = await fetch(`/api/ingest/session/${sessionId}/route-summary`);
        if (!r.ok) throw new Error('Failed to load route data');
        const data = await r.json();

        _rsItems = _sortItems((data.items || []).map(item => ({
            ...item,
            image_url: null,
            graded_prices: {},
            grading_economics: {},
            _enrichLoading: true,  // flag: PPT data not yet loaded
        })));
        _rsIndex = 0;

        _rsCounts = { storage: 0, display: 0, grade: 0, bulk: 0 };
        for (const item of _rsItems) {
            const dest = item.routing_destination || 'storage';
            _rsCounts[dest] = (_rsCounts[dest] || 0) + (item.quantity || 1);
        }

        if (!_rsItems.length) {
            overlay.innerHTML = `<div class="card" style="max-width:500px; margin:20vh auto; text-align:center;">
                <p>No cards to route.</p>
                <button class="btn btn-primary" onclick="exitRouteSession()">Close</button>
            </div>`;
            return;
        }

        // Start showing cards immediately
        _renderSessionCard();

        // Kick off enrichment in background
        const er = await fetch(`/api/ingest/session/${sessionId}/enrich-route`, { method: 'POST' });
        const ej = await er.json();

        if (ej.status === 'complete' && !ej.job_id) {
            // Cache already exists — merge immediately
            _rsEnrichDone = true;
            await _rsMergeEnrichment();
        } else if (ej.job_id) {
            _rsEnrichJobId = ej.job_id;
            // Poll in background — don't block the session
            _pollAndMergeEnrichment(ej.job_id, ej.total);
        }
    } catch(e) {
        overlay.innerHTML = `<div class="card" style="max-width:500px; margin:20vh auto; text-align:center;">
            <div class="alert alert-error">Failed to start session: ${e.message}</div>
            <button class="btn btn-primary" onclick="exitRouteSession()" style="margin-top:12px;">Close</button>
        </div>`;
    }
}

async function _pollAndMergeEnrichment(jobId, total) {
    while (_rsActive) {
        await new Promise(r => setTimeout(r, 1000));
        try {
            const r = await fetch(`/api/ingest/enrich-job/${jobId}`);
            const j = await r.json();
            // Periodically merge whatever's been fetched so far
            await _rsMergeEnrichment();
            if (j.status === 'complete') {
                _rsEnrichDone = true;
                break;
            }
        } catch(e) { break; }
    }
}

async function _rsMergeEnrichment() {
    if (!_rsSessionId || !_rsActive) return;
    try {
        const r = await fetch(`/api/ingest/session/${_rsSessionId}/route-enriched`);
        if (!r.ok) return;
        const data = await r.json();
        const enrichedMap = {};
        for (const item of (data.items || [])) {
            enrichedMap[item.id] = item;
        }
        // Merge enrichment data into existing items
        let changed = false;
        for (const item of _rsItems) {
            const enriched = enrichedMap[item.id];
            if (enriched && item._enrichLoading && enriched._enriched) {
                item.image_url = enriched.image_url;
                item.graded_prices = enriched.graded_prices || {};
                item.grading_economics = enriched.grading_economics || {};
                item._enrichLoading = false;
                changed = true;
            }
        }
        // Re-render current card if anything changed (current card may have gotten data)
        if (changed) {
            _renderSessionCard();
        }
    } catch(e) { /* silent */ }
}

function _renderSessionCard() {
    const overlay = document.getElementById('route-session-overlay');
    if (!overlay || !_rsItems.length) return;

    const item = _rsItems[_rsIndex];
    const total = _rsItems.length;
    const price = parseFloat(item.market_price || 0);

    // Condition colors
    const condColors = { 'NM': 'var(--green)', 'LP': '#e6a817', 'MP': 'var(--orange)', 'HP': 'var(--red)', 'DMG': 'var(--red)' };

    const progPct = Math.round(((_rsIndex + 1) / total) * 100);

    let html = '';

    // ── Top bar ──
    html += `<div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap;">

            <span style="color:var(--green);">B:${_rsCounts.display||0}</span>

        <div style="display:flex; align-items:center; gap:8px;">

        </div>
    </div>
    <div style="width:100%; height:6px; background:var(--surface-2); border-radius:3px; margin-bottom:16px; overflow:hidden;">
        <div style="width:${progPct}%; height:100%; background:var(--accent); border-radius:3px; transition:width 0.2s;"></div>
    </div>`;

    // ── Card display ──
    html += `<div style="display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; justify-content:center;">`;

    if (imgUrl) {
        html += `<img src="${imgUrl}" style="width:260px; max-height:360px; object-fit:contain; border-radius:8px; flex-shrink:0;" alt="card image">`;
    } else if (item._enrichLoading) {
        html += `<div style="width:260px; height:360px; background:var(--surface-2); border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:0.85rem; flex-direction:column; gap:8px;">
            <span class="spinner" style="width:20px; height:20px;"></span> Loading...
        </div>`;
    } else {
        html += `<div style="width:260px; height:360px; background:var(--surface-2); border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:0.85rem;">No image</div>`;
    }

    // Info panel
    html += `<div style="flex:1; min-width:280px; max-width:500px;">
        <div style="font-size:1.3rem; font-weight:700; margin-bottom:4px; line-height:1.3;">${item.product_name || 'Unknown'}</div>
        <div style="font-size:0.9rem; color:var(--text-dim); margin-bottom:12px;">
            ${item.set_name||''} ${item.card_number ? '#'+item.card_number : ''} ${item.variant ? '· '+item.variant : ''}
        </div>
        <div style="display:flex; gap:16px; align-items:center; margin-bottom:16px; flex-wrap:wrap;">
            <div style="font-size:0.85rem; padding:4px 10px; border-radius:6px; font-weight:700; background:${condColor}22; color:${condColor}; border:1px solid ${condColor}44;">
                ${cond}
            </div>
            <div style="font-size:1.6rem; font-weight:800; color:var(--text);">$${price.toFixed(2)}</div>
            <div style="font-size:0.78rem; color:var(--text-dim);">raw market</div>
            ${(item.quantity || 1) > 1 ? `<div style="margin-left:auto; display:flex; align-items:center; gap:6px;">
                <span style="font-size:1rem; font-weight:700; color:var(--accent);">x${item.quantity}</span>
                <button class="btn btn-sm" onclick="_rsSplitSingles()" style="font-size:0.72rem; padding:3px 8px; color:var(--accent2,#c084fc); border:1px solid var(--accent2,#c084fc)44;">→ Singles</button>
            </div>` : ''}
        </div>`;

    // ── Grading economics panel ──
    const _enrichLoading = item._enrichLoading;
    if (_enrichLoading) {
        html += `<div style="background:var(--surface-2); border-radius:10px; padding:14px; margin-bottom:16px;">
            <div style="display:flex; align-items:center; gap:8px; color:var(--text-dim); font-size:0.85rem;">

            </div>

    } else if (econ.psa10_price || econ.psa9_price) {
        const isEligible = econ.eligible;
        const dimmed = !isEligible;

        // ROI tier: red <40%, amber 40-60%, green 60%+
        const roi = econ.roi_pct || 0;
        const roiColor = roi >= 60 ? 'var(--green)' : roi >= 40 ? '#e6a817' : 'var(--red)';
        const roiTier = roi >= 60 ? 'definitely' : roi >= 40 ? 'potentially' : 'not';
        const profitColor = econ.expected_profit >= 40 ? 'var(--green)' : econ.expected_profit >= 20 ? '#e6a817' : 'var(--red)';

        // Header label based on tier
        const headerLabel = !isEligible ? 'Grading Analysis'
            : roiTier === 'definitely' ? 'Definitely Grade Worthy'
            : roiTier === 'potentially' ? 'Potentially Grade Worthy'
            : 'Not Grade Worthy';
        const headerColor = !isEligible ? 'var(--text-dim)' : roiColor;

        html += `<div style="background:var(--surface-2); border-radius:10px; padding:14px; margin-bottom:16px; ${dimmed ? 'opacity:0.6;' : ''}">
            <div style="font-size:0.82rem; font-weight:700; margin-bottom:10px; color:${headerColor};">
                ${headerLabel}
