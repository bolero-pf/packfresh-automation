async function showBreakdownLibrary() {
    document.getElementById('library-modal').classList.add('active');
    await loadLibrary();
}

function closeLibrary() {
    document.getElementById('library-modal').classList.remove('active');
}

async function loadLibrary() {
    const body = document.getElementById('library-body');
    body.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
    try {
        const r = await fetch('/api/breakdown-cache');
        const d = await r.json();
        if (!r.ok) { body.innerHTML = `<div class="alert alert-error">${d.error}</div>`; return; }
        const caches = d.caches || [];
        if (!caches.length) {
            body.innerHTML = '<p style="color:var(--text-dim);">No breakdown recipes saved yet. Break down a sealed product and check "Save recipe to cache".</p>';
            return;
        }
        body.innerHTML = `
            <p style="font-size:0.82rem; color:var(--text-dim); margin-bottom:12px;">${caches.length} products cached</p>
            <div style="overflow-x:auto;">
            <table style="font-size:0.85rem;">
                <thead><tr>
                    <th>Product</th><th>TCG ID</th><th>Configs</th><th>Best Value</th><th>Used</th><th>Updated</th><th></th>
                </tr></thead>
                <tbody>
                ${caches.map(c => {
                    const age = c.last_updated ? new Date(c.last_updated).toLocaleDateString() : '—';
                    return `<tr>
                        <td>
                            <strong>${c.product_name}</strong>
                            ${c.variant_names ? `<br><small style="color:var(--text-dim);">${c.variant_names}</small>` : ''}
                        </td>
                        <td style="color:var(--text-dim);">${c.tcgplayer_id || '—'}</td>
                        <td>${c.variant_count || 1}</td>
                        <td>$${(c.best_variant_market||0).toFixed(2)}</td>
                        <td style="color:var(--text-dim);">${c.use_count || 0}x</td>
                        <td style="color:var(--text-dim);">${age}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" style="font-size:0.72rem; padding:2px 8px;"
                                onclick="viewLibraryEntry(${c.tcgplayer_id})">View</button>
                            <button class="btn btn-sm" style="font-size:0.72rem; padding:2px 8px; color:var(--red);"
                                onclick="deleteLibraryEntry(${c.tcgplayer_id}, '${(c.product_name||'').replace(/'/g,'')}')">&#x1F5D1;</button>
                        </td>
                    </tr>`;
                }).join('')}
                </tbody>
            </table>
            </div>
        `;
    } catch(err) {
        body.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

async function viewLibraryEntry(tcgId) {
    const body = document.getElementById('library-body');
    try {
        const r = await fetch(`/api/breakdown-cache/${tcgId}`);
        const d = await r.json();
        if (!d.found) { alert('Not found'); return; }
        const cache = d.cache;
        const variants = cache.variants || [];

        body.innerHTML = `
            <button class="btn btn-secondary btn-sm" onclick="loadLibrary()" style="margin-bottom:12px;">← Back</button>
            <div style="display:flex; gap:8px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; margin-bottom:12px;">
                <div>
                    <strong style="font-size:1rem;">${cache.product_name}</strong>
                    <span style="font-size:0.78rem; color:var(--text-dim); margin-left:8px;">TCG#${cache.tcgplayer_id}</span>
                </div>
                <div style="font-size:0.82rem; color:var(--text-dim);">Used ${cache.use_count||0}x &middot; Updated ${new Date(cache.last_updated).toLocaleDateString()}</div>
            </div>

            ${variants.map((v, vi) => {
                const comps = v.components || [];
                const totalMkt = comps.reduce((s,c) => s + (c.market_price||0)*(c.quantity_per_parent||1), 0);
                return `
                <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px;">
                        <div>
                            <strong style="font-size:0.95rem;">${v.variant_name}</strong>
                            ${v.notes ? `<span style="font-size:0.78rem; color:var(--amber); margin-left:8px;">&#x1F4DD; ${v.notes}</span>` : ''}
                        </div>
                        <div style="display:flex; gap:6px; align-items:center;">
                            <span style="font-size:0.82rem; color:var(--text-dim);">$${totalMkt.toFixed(2)} total</span>
                            <button class="btn btn-sm" style="font-size:0.72rem; padding:2px 8px; color:var(--red);"
                                onclick="deleteLibraryVariant('${v.id}', '${v.variant_name.replace(/'/g,'')}', ${tcgId})">&#x1F5D1; Delete config</button>
                        </div>
                    </div>
                    <table style="font-size:0.82rem;">
                        <thead><tr><th>Component</th><th>TCG ID</th><th>Qty/Unit</th><th>Market</th><th>Subtotal</th></tr></thead>
                        <tbody>
                        ${comps.map(c => `<tr>
                            <td>${c.product_name}${c.set_name ? '<br><small style="color:var(--text-dim);">'+c.set_name+'</small>' : ''}</td>
                            <td style="color:var(--text-dim);">${c.tcgplayer_id || '—'}</td>
                            <td>${c.quantity_per_parent}</td>
                            <td>$${(c.market_price||0).toFixed(2)}</td>
                            <td>$${((c.market_price||0)*(c.quantity_per_parent||1)).toFixed(2)}</td>
                        </tr>`).join('')}
                        <tr style="font-weight:600; border-top:2px solid var(--border);">
                            <td colspan="4" style="text-align:right;">Total:</td>
                            <td>$${totalMkt.toFixed(2)}</td>
                        </tr>
                        </tbody>
                    </table>
                </div>`;
            }).join('')}

            <button class="btn btn-sm" style="color:var(--red); font-size:0.78rem;" onclick="deleteLibraryEntry(${cache.tcgplayer_id}, '${(cache.product_name||'').replace(/'/g,'')}')">&#x1F5D1; Delete all configs</button>
        `;
    } catch(err) { body.innerHTML = `<div class="alert alert-error">${err.message}</div>`; }
}

async function deleteLibraryVariant(variantId, name, tcgId) {
    const ok = await themedConfirm('Delete Config', `Remove the "${name}" config?`, { dangerous: true });
    if (!ok) return;
    const r = await fetch(`/api/breakdown-cache/variant/${variantId}`, { method: 'DELETE' });
    const d = await r.json();
    if (!d.cache) {
        // Parent was also deleted, go back to library
        await loadLibrary();
    } else {
        // Reload this entry
        await viewLibraryEntry(tcgId);
    }
}

async function deleteLibraryEntry(tcgId, name) {
    const ok = await themedConfirm('Delete Recipe', `Remove all breakdown configs for "${name}"?`, { dangerous: true });
    if (!ok) return;
    await fetch(`/api/breakdown-cache/${tcgId}`, { method: 'DELETE' });
    await loadLibrary();
}
