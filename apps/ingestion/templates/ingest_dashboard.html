<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Fresh — Ingest</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #22263a;
            --border: #2d3148;
            --text: #e8eaf0;
            --text-dim: #8b90a5;
            --accent: #4f7df9;
            --accent-hover: #3b6ae8;
            --green: #2dd4a0;
            --green-bg: rgba(45, 212, 160, 0.12);
            --amber: #f5a623;
            --amber-bg: rgba(245, 166, 35, 0.12);
            --red: #f05252;
            --red-bg: rgba(240, 82, 82, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.55;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ─── HEADER ─── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 0; margin-bottom: 24px;
        }
        header .container { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--green); }
        header .status { margin-left: auto; font-size: 0.85rem; color: var(--text-dim); }

        /* ─── CARDS ─── */
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 24px; margin-bottom: 20px;
        }
        .card h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; }

        /* ─── BUTTONS ─── */
        .btn {
            padding: 10px 20px; border: none; border-radius: 6px;
            font-size: 0.9rem; font-weight: 500; cursor: pointer;
            transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); }
        .btn-success { background: var(--green); color: #000; font-weight: 600; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm { padding: 6px 12px; font-size: 0.82rem; }

        /* ─── STATS ─── */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat {
            background: var(--surface-2); border-radius: 8px; padding: 16px;
            border: 1px solid var(--border);
        }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }
        .stat-value { font-size: 1.6rem; font-weight: 700; }

        /* ─── BADGES ─── */
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 10px;
            font-size: 0.78rem; font-weight: 600;
        }
        .badge-green { background: var(--green-bg); color: var(--green); }
        .badge-amber { background: var(--amber-bg); color: var(--amber); }
        .badge-blue { background: rgba(79,125,249,0.12); color: var(--accent); }
        .badge-red { background: var(--red-bg); color: var(--red); }
        .badge-dim { background: var(--surface-2); color: var(--text-dim); }

        .action-dropdown {
            display: none; position: fixed;
            z-index: 1050; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 6px; padding: 4px; min-width: 180px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .action-dropdown.show { display: block !important; }
        .action-dropdown button {
            display: block; width: 100%; text-align: left; font-size: 0.8rem;
            background: none; color: var(--text); padding: 8px 10px;
            border: none; border-radius: 4px; cursor: pointer; white-space: nowrap;
        }
        .action-dropdown button:hover { background: var(--surface); }
        .action-dropdown button.danger { color: var(--red); }
        .action-dropdown hr { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

        /* ─── ALERTS ─── */
        .alert {
            padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
            font-size: 0.9rem; border: 1px solid;
        }
        .alert-success { background: var(--green-bg); border-color: var(--green); color: var(--green); }
        .alert-warning { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
        .alert-error { background: var(--red-bg); border-color: var(--red); color: var(--red); }

        /* ─── TABLE ─── */
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
        th { font-weight: 600; color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background: rgba(255,255,255,0.02); }

        /* ─── MODAL ─── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 1000;
            align-items: flex-start; justify-content: center;
            backdrop-filter: blur(4px); padding: 40px 20px; overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 28px; width: 90%; max-width: 800px;
            max-height: 85vh; overflow-y: auto; position: relative;
        }
        .modal-close-sticky {
            position: sticky; top: 0; float: right;
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text); font-size: 1.3rem; cursor: pointer;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; margin-top: -8px; margin-right: -8px;
            transition: all 0.15s;
        }
        .modal-close-sticky:hover { background: var(--red); color: #fff; border-color: var(--red); }

        /* ─── CONFIRM DIALOG ─── */
        #confirm-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 2000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        #confirm-overlay.active { display: flex; }
        .confirm-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; width: 90%; max-width: 420px;
        }
        .confirm-box h3 { margin-bottom: 8px; }
        .confirm-box p { color: var(--text-dim); margin-bottom: 16px; font-size: 0.9rem; }
        .confirm-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

        /* ─── LOADING ─── */
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── SESSION LIST ─── */
        .session-row {
            display: grid; grid-template-columns: 1fr auto auto auto;
            gap: 16px; align-items: center;
            padding: 14px 16px; border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 8px;
            cursor: pointer; transition: all 0.15s;
        }
        .session-row:hover { border-color: var(--accent); background: var(--surface-2); }
        .session-row .name { font-weight: 600; }
        .session-row .meta { font-size: 0.82rem; color: var(--text-dim); }

        /* ─── SEARCH RESULT ITEMS ─── */
        .search-result {
            cursor: pointer; padding: 10px 12px;
            border: 1px solid var(--border); border-radius: 6px;
            margin-bottom: 4px; transition: all 0.15s;
        }
        .search-result:hover { border-color: var(--accent); background: var(--surface-2); }

        /* ─── PROGRESS BAR ─── */
        .progress-bar {
            height: 6px; background: var(--border); border-radius: 3px;
            overflow: hidden; margin: 8px 0;
        }
        .progress-bar .fill {
            height: 100%; background: var(--green); border-radius: 3px;
            transition: width 0.3s;
        }

        /* ─── FILTER BUTTONS ─── */
        .filter-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
        .filter-btn {
            padding: 5px 12px; border: 1px solid var(--border); border-radius: 16px;
            background: none; color: var(--text-dim); font-size: 0.78rem;
            cursor: pointer; transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="logo">Pack Fresh <span>Ingest</span></div>
        <div class="status" id="header-status"></div>
    </div>
</header>

<div class="container">
    <!-- Session List -->
    <div id="session-list-view">
        <div class="card">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
                <h2 style="margin-bottom:0;">📦 Ingest Queue</h2>
                <button class="btn btn-secondary btn-sm" onclick="showBreakdownLibrary()" style="margin-left:auto; font-size:0.8rem;">📚 Breakdown Library</button>
            </div>
            <p style="color:var(--text-dim); margin-bottom:16px;">Sessions ready for warehouse processing. Click to open.</p>
            <div id="sessions-list">
                <div class="loading"><span class="spinner"></span> Loading sessions...</div>
            </div>
        </div>
    </div>

    <!-- Session Detail (hidden until clicked) -->
    <div id="session-detail-view" style="display:none;">
        <div style="margin-bottom:16px;">
            <button class="btn btn-secondary btn-sm" onclick="showList()">← Back to Queue</button>
        </div>
        <div id="session-detail-content"></div>
    </div>
</div>

<!-- Breakdown Library Modal -->
<div id="library-modal" class="modal-overlay">
    <div class="modal" style="max-width:800px;">
        <button class="modal-close-sticky" onclick="closeLibrary()">×</button>
        <h3 style="margin-bottom:4px;">📚 Breakdown Library</h3>
        <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:16px;">Saved breakdown recipes. Click a product to load it.</p>
        <div id="library-body"><div class="loading"><span class="spinner"></span></div></div>
    </div>
</div>

<!-- Break Down Modal -->
<div id="breakdown-modal" class="modal-overlay">
    <div class="modal" style="max-width:700px;">
        <button class="modal-close-sticky" onclick="closeBreakdown()">×</button>
        <div id="breakdown-body"></div>
    </div>
</div>

<!-- Relink Modal -->
<div id="relink-modal" class="modal-overlay">
    <div class="modal" style="max-width:600px;">
        <button class="modal-close-sticky" onclick="closeRelink()">×</button>
        <div id="relink-body"></div>
    </div>
</div>

<!-- Confirm Dialog -->
<div id="confirm-overlay">
    <div class="confirm-box">
        <h3 id="confirm-title"></h3>
        <p id="confirm-msg"></p>
        <div class="btn-row">
            <button class="btn btn-secondary btn-sm" id="confirm-cancel">Cancel</button>
            <button class="btn btn-sm" id="confirm-ok">OK</button>
        </div>
    </div>
</div>

<div id="prompt-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9000; align-items:center; justify-content:center;">
    <div class="confirm-box" style="min-width:280px;">
        <h3 id="prompt-title"></h3>
        <p id="prompt-msg" style="color:var(--text-dim); font-size:0.9rem; margin-bottom:12px;"></p>
        <div id="prompt-input-area"></div>
        <div class="btn-row" style="margin-top:12px;">
            <button class="btn btn-secondary btn-sm" id="prompt-cancel">Cancel</button>
            <button class="btn btn-primary btn-sm" id="prompt-ok">OK</button>
        </div>
    </div>
</div>

<script>

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════

let _currentSessionId = null;
let _breakDownComponents = [];
let _breakDownItemId = null;

// ═══════════════════════════════════════════════════════════════════
// CONFIRM DIALOG
// ═══════════════════════════════════════════════════════════════════

function themedConfirm(title, msg, opts = {}) {
    return new Promise(resolve => {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-msg').textContent = msg;
        const okBtn = document.getElementById('confirm-ok');
        okBtn.textContent = opts.confirmText || 'Confirm';
        okBtn.className = opts.dangerous ? 'btn btn-danger btn-sm' : 'btn btn-primary btn-sm';
        document.getElementById('confirm-overlay').classList.add('active');

        const cleanup = (val) => {
            document.getElementById('confirm-overlay').classList.remove('active');
            okBtn.onclick = null;
            document.getElementById('confirm-cancel').onclick = null;
            resolve(val);
        };
        okBtn.onclick = () => cleanup(true);
        document.getElementById('confirm-cancel').onclick = () => cleanup(false);
    });
}

function themedPrompt(title, msg, defaultVal = '', inputType = 'number') {
    return new Promise(resolve => {
        const overlay = document.getElementById('prompt-overlay');
        document.getElementById('prompt-title').textContent = title;
        document.getElementById('prompt-msg').textContent = msg;
        const area = document.getElementById('prompt-input-area');
        area.innerHTML = `<input id="prompt-input" type="${inputType}" value="${defaultVal}" style="width:100%;">`;
        overlay.style.display = 'flex';
        const input = document.getElementById('prompt-input');
        setTimeout(() => { input.focus(); input.select(); }, 50);

        const cleanup = (val) => {
            overlay.style.display = 'none';
            document.getElementById('prompt-ok').onclick = null;
            document.getElementById('prompt-cancel').onclick = null;
            resolve(val);
        };
        document.getElementById('prompt-ok').onclick = () => cleanup(input.value);
        document.getElementById('prompt-cancel').onclick = () => cleanup(null);
        input.onkeydown = (e) => {
            if (e.key === 'Enter') cleanup(input.value);
            if (e.key === 'Escape') cleanup(null);
        };
    });
}

// ═══════════════════════════════════════════════════════════════════
// ACTION DROPDOWN
// ═══════════════════════════════════════════════════════════════════

function toggleActionMenu(event, dd) {
    if (event) event.stopPropagation();
    document.querySelectorAll('.action-dropdown.show').forEach(d => { if (d !== dd) d.classList.remove('show'); });
    const btn = dd.previousElementSibling;
    const rect = btn.getBoundingClientRect();
    const spaceBelow = window.innerHeight - rect.bottom;
    const dropH = 200;
    dd.style.left = Math.max(8, rect.right - 180) + 'px';
    dd.style.top = spaceBelow > dropH ? (rect.bottom + 4) + 'px' : Math.max(4, rect.top - dropH) + 'px';
    dd.classList.toggle('show');
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.action-dropdown') && !e.target.closest('.action-trigger')) {
        document.querySelectorAll('.action-dropdown.show').forEach(d => d.classList.remove('show'));
    }
});

// ═══════════════════════════════════════════════════════════════════
// SESSION LIST
// ═══════════════════════════════════════════════════════════════════

async function loadSessions() {
    const el = document.getElementById('sessions-list');
    try {
        const r = await fetch('/api/ingest/sessions');
        const sessions = await r.json();
        if (!sessions.length) {
            el.innerHTML = '<p style="color:var(--text-dim); text-align:center; padding:20px;">No sessions in queue.</p>';
            return;
        }
        el.innerHTML = sessions.map(s => {
            const status = s.status;
            const badgeClass = status === 'received' ? 'badge-amber' : status === 'partially_ingested' ? 'badge-blue' : 'badge-green';
            const badgeLabel = status === 'received' ? 'Ready' : status === 'partially_ingested' ? '📦 Partial' : 'Ingested';
            const date = new Date(s.created_at).toLocaleDateString();
            return `<div class="session-row" onclick="viewSession('${s.id}')">
                <div>
                    <div class="name">${s.customer_name || 'Unknown'}</div>
                    <div class="meta">${s.session_type || 'sealed'} · ${date}</div>
                </div>
                <div><span class="badge ${badgeClass}">${badgeLabel}</span></div>
                <div style="text-align:right;">
                    <div style="font-weight:600;">${s.item_count || 0} items</div>
                    <div class="meta">${s.total_qty || 0} units</div>
                </div>
                <div style="font-weight:700; font-size:1.1rem;">$${(s.total_offer_amount || 0).toFixed(2)}</div>
            </div>`;
        }).join('');
    } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

function showList() {
    document.getElementById('session-list-view').style.display = '';
    document.getElementById('session-detail-view').style.display = 'none';
    _currentSessionId = null;
    loadSessions();
}

// ═══════════════════════════════════════════════════════════════════
// SESSION DETAIL
// ═══════════════════════════════════════════════════════════════════

async function viewSession(sessionId, _preserveScroll) {
    _currentSessionId = sessionId;
    document.getElementById('session-list-view').style.display = 'none';
    document.getElementById('session-detail-view').style.display = '';
    const el = document.getElementById('session-detail-content');
    const scrollY = _preserveScroll ? window.scrollY : 0;
    el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading session...</div>';

    try {
        const r = await fetch(`/api/ingest/session/${sessionId}`);
        const data = await r.json();
        const s = data.session;
        const items = data.items;

        const isReceived = s.status === 'received' || s.status === 'partially_ingested';
        const activeItems = items.filter(i => ['good','damaged'].includes(i.item_status || 'good'));
        const brokenItems = items.filter(i => i.item_status === 'broken_down');
        const childItems = items.filter(i => i.parent_item_id);
        const totalQty = activeItems.reduce((sum, i) => sum + (i.quantity || 1), 0);

        // Pre-populate approvals from DB: items already pushed get a locked ✓
        // Items approved in this session (preserve-scroll reload) keep their state
        if (!_preserveScroll) {
            // Fresh load — seed from pushed_at (persists across sessions/refreshes)
            _approvedItems.clear();
            items.forEach(i => { if (i.pushed_at) _approvedItems.add(i.id); });
        }
        // Track which IDs are locked (already pushed to Shopify)
        _pushedItemIds = new Set(items.filter(i => i.pushed_at).map(i => i.id));

        let html = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px;">
                    <h2 style="margin:0;">${s.customer_name || 'Unknown'}</h2>
                    <span class="badge ${s.status === 'received' ? 'badge-amber' : s.status === 'partially_ingested' ? 'badge-blue' : 'badge-green'}">${s.status === 'received' ? 'Ready to Ingest' : s.status === 'partially_ingested' ? '📦 Partially Ingested' : 'Ingested'}</span>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Items</div>
                        <div class="stat-value">${activeItems.length}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Total Units</div>
                        <div class="stat-value">${totalQty}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Offer Total</div>
                        <div class="stat-value">$${(s.total_offer_amount || 0).toFixed(2)}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Market Value</div>
                        <div class="stat-value">$${(s.total_market_value || 0).toFixed(2)}</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
                    <h2 style="margin:0;">📦 Items</h2>
                    ${isReceived ? `<div style="display:flex; align-items:center; gap:12px; font-size:0.82rem;">
                        <span id="approve-stats" style="color:var(--text-dim);">0/${activeItems.length} approved</span>
                        <label style="display:flex; align-items:center; gap:6px; color:var(--text-dim); cursor:pointer;">
                            <input type="checkbox" onchange="toggleHideApproved(this)"> Hide approved
                        </label>
                    </div>` : ''}
                </div>
                <div style="overflow-x:auto;">
                <table>
                    <thead><tr>
                        <th>Product</th><th>Qty</th><th>Status</th><th>Market</th><th>COGS</th>
                        ${isReceived ? '<th>Actions</th>' : ''}
                    </tr></thead>
                    <tbody>`;

        // Show items — parents first, then all descendants grouped
        // Build a map for fast child lookup
        const childrenOf = {};
        items.forEach(i => {
            if (i.parent_item_id) {
                if (!childrenOf[i.parent_item_id]) childrenOf[i.parent_item_id] = [];
                childrenOf[i.parent_item_id].push(i);
            }
        });

        // Recursively render an item and all its descendants
        function renderWithDescendants(item, depth) {
            const isChild = depth > 0;
            let rows = renderItemRow(item, isReceived, sessionId, isChild);
            const kids = childrenOf[item.id] || [];
            for (const kid of kids) {
                rows += renderWithDescendants(kid, depth + 1);
            }
            return rows;
        }

        const topLevel = items.filter(i => !i.parent_item_id);
        for (const item of topLevel) {
            html += renderWithDescendants(item, 0);
        }

        html += `</tbody></table></div></div>`;

        // Store Check section
        html += `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <h2 style="margin:0;">🏪 Store Match Preview</h2>
                    <button class="btn btn-secondary btn-sm" onclick="runStoreCheck('${sessionId}')">Check Store</button>
                </div>
                <div id="store-check-results">
                    <p style="color:var(--text-dim);">Click "Check Store" to see what matches your Shopify inventory.</p>
                </div>
            </div>`;

        // Push Live button (only for received)
        if (isReceived) {
            html += `
                <div class="card" style="border-color: var(--green); background: rgba(45,212,160,0.04);">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
                        <div>
                            <h2 style="margin:0; color:var(--green);">🚀 Push Live</h2>
                            <p style="color:var(--text-dim); font-size:0.85rem; margin-top:4px;">
                                Increment inventory for matched items, create damaged listings, and mark session as ingested.
                            </p>
                        </div>
                        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                            <button class="btn btn-secondary" onclick="pushDryRun('${sessionId}')" style="font-size:0.95rem; padding:10px 20px;">
                                🔍 Debug Dry Run
                            </button>

// ── APPROVE SYSTEM ──────────────────────────────────────────────────────────
let _approvedItems = new Set();
let _pushedItemIds = new Set();
let _hideApproved = false;

function toggleApproved(itemId) {
    if (_approvedItems.has(itemId)) {
        _approvedItems.delete(itemId);
    } else {
        _approvedItems.add(itemId);
    }
    _refreshApprovedVisibility();
    _updateApproveStats();
}

function _refreshApprovedVisibility() {
    document.querySelectorAll('tr[data-item-id]').forEach(row => {
        const id = row.dataset.itemId;
        if (_hideApproved && _approvedItems.has(id)) {
            row.style.display = 'none';
        } else {
            row.style.display = '';
        }
    });
}

function _updateApproveStats() {
    const el = document.getElementById('approve-stats');
    if (!el) return;
    const total = document.querySelectorAll('tr[data-item-id]').length;
    const pushed = _pushedItemIds.size;
    const approved = _approvedItems.size - pushed; // pending approvals not yet pushed
    const totalApproved = _approvedItems.size;
    if (pushed > 0) {
        el.innerHTML = `<span style="color:var(--green)">✓${pushed} pushed</span> · ${approved} pending · ${total - totalApproved} unapproved`;
    } else {
        el.textContent = `${totalApproved}/${total} approved`;
    }
    el.style.color = totalApproved === total ? 'var(--green)' : 'var(--text-dim)';
}

function toggleHideApproved(cb) {
    _hideApproved = cb.checked;
    _refreshApprovedVisibility();
}

// ── BREAKDOWN SUMMARY ENRICHMENT (runs after render) ────────────────────────
async function _enrichBreakdownSummaries(items, sessionId, isReceived) {
    if (!isReceived) return;
    const tcgIds = [...new Set(items
        .filter(i => i.tcgplayer_id && !i.parent_item_id && i.item_status !== 'broken_down')
        .map(i => i.tcgplayer_id))];
    if (!tcgIds.length) return;

    try {
        const r = await fetch('/api/breakdown-cache/batch', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ tcgplayer_ids: tcgIds }),
        });
        const d = await r.json();
        const summaries = d.summaries || {};

        // Update each item row with breakdown info
        items.filter(i => i.tcgplayer_id && !i.parent_item_id).forEach(item => {
            const bd = summaries[item.tcgplayer_id];
            const cell = document.querySelector(`tr[data-item-id="${item.id}"] td.name-cell`);
            if (!cell) return;
            cell.querySelectorAll('.bd-summary-badge').forEach(e => e.remove());
            if (!bd) return;

            const parentStore  = bd.parent_store_price ? parseFloat(bd.parent_store_price) : null;
            const childStore   = bd.best_variant_store  ? parseFloat(bd.best_variant_store)  : null;
            const childMkt     = parseFloat(bd.best_variant_market) || 0;
            const itemMkt      = parseFloat(item.market_price) || 0;

            // Four cases — determine reference sell price vs breakdown sell price
            let sellSealed, sellBroken, caseLabel;

            if (parentStore !== null && childStore !== null) {
                // Case 1: both in store — pure store comparison
                sellSealed = parentStore;
                sellBroken = childStore;
                caseLabel  = `store $${childStore.toFixed(2)} vs sealed $${parentStore.toFixed(2)}`;
            } else if (parentStore !== null && childStore === null) {
                // Case 2: parent in store, children not — children market vs parent store
                sellSealed = parentStore;
                sellBroken = childMkt;
                caseLabel  = `mkt $${childMkt.toFixed(2)} vs sealed store $${parentStore.toFixed(2)} ⚠ children not listed`;
            } else if (parentStore === null && childStore !== null) {
                // Case 3: children in store, parent not — children store vs parent market
                sellSealed = itemMkt || childMkt;  // use item market as best proxy for parent
                sellBroken = childStore;
                caseLabel  = `store $${childStore.toFixed(2)} vs sealed mkt $${(itemMkt||childMkt).toFixed(2)} ⚠ parent not listed`;
            } else {
                // Case 4: neither in store — full market comparison
                sellSealed = itemMkt;
                sellBroken = childMkt;
                caseLabel  = `mkt $${childMkt.toFixed(2)} vs sealed mkt $${itemMkt.toFixed(2)} (no store data)`;
            }

            if (sellBroken <= 0) return; // no useful data

            const diff = sellBroken - sellSealed;
            const pct  = sellSealed > 0 ? (diff / sellSealed * 100) : 0;
            const color = pct > 5 ? 'var(--green)' : pct >= -10 ? 'var(--amber)' : 'var(--red)';
            const arrow = diff > 0 ? '▲' : diff < 0 ? '▼' : '=';
            const sign  = diff >= 0 ? '+' : '';

            const configLabel = bd.variant_count > 1
                ? `${bd.variant_count} configs`
                : (bd.variant_names || 'Standard');

            const badge = document.createElement('small');
            badge.className = 'bd-summary-badge';
            badge.style.cssText = `display:block; color:${color}; font-size:0.75rem; margin-top:2px; cursor:default;`;
            badge.title = caseLabel;
            badge.innerHTML = `📦 ${configLabel}: ${arrow} ${sign}$${Math.abs(diff).toFixed(2)} (${sign}${pct.toFixed(1)}%)`;
            cell.appendChild(badge);
        });
    } catch(e) { /* silently ignore */ }
}

function renderItemRow(item, isReceived, sessionId, isChild = false) {
    const st = item.item_status || 'good';
    const isBroken = st === 'broken_down';
    const isDamaged = st === 'damaged';
    const name = item.product_name || 'Unknown';
    const escName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');

    let rowStyle = '';
    if (isBroken) rowStyle = 'opacity:0.35; text-decoration:line-through;';
    else if (isDamaged) rowStyle = 'background:rgba(255,170,0,0.06);';

    let badges = '';
    if (isDamaged) badges += ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.65rem;">DAMAGED</span>';
    if (isBroken) badges += ' <span class="badge badge-dim" style="font-size:0.65rem;">BROKEN DOWN</span>';
    if (isChild) badges += ' <span class="badge badge-blue" style="font-size:0.65rem;">FROM BREAKDOWN</span>';
    if (!item.is_mapped) badges += ' <span class="badge badge-amber" style="font-size:0.65rem;">UNMAPPED</span>';

    let actionCell = '';
    if (isReceived && !isBroken && !isChild) {
        const isPushed = _pushedItemIds.has(item.id);
        const isApproved = _approvedItems.has(item.id);
        const approveStyle = isPushed
            ? 'background:var(--green);color:#000;border-color:var(--green);width:32px;opacity:0.6;cursor:default;'
            : isApproved
                ? 'background:var(--green);color:#000;border-color:var(--green);width:32px;'
                : 'color:var(--text-dim);border-color:var(--border);width:32px;';
        const approveBtn = isPushed
            ? `<button class="btn btn-sm" style="${approveStyle}" title="Already pushed to Shopify" disabled>✓</button>`
            : `<button class="btn btn-sm" style="${approveStyle}" onclick="toggleApproved('${item.id}')" title="Mark as reviewed">✓</button>`;
        const damageToggle = isDamaged
            ? `<button onclick="markGood('${item.id}', '${sessionId}')">✅ Mark Good</button>`
            : `<button onclick="markDamaged('${item.id}', '${sessionId}', ${item.quantity||1})">⚠️ Mark Damaged</button>`;
        actionCell = `
            <div style="display:flex; align-items:center; gap:6px;">
                ${approveBtn}
                <button class="btn btn-sm btn-primary" style="font-size:0.78rem;padding:3px 10px;" onclick="openBreakdown('${item.id}', '${sessionId}', '${escName}', ${item.quantity||1}, ${item.tcgplayer_id||'null'}, ${item.market_price||0})">🔨 Break Down</button>
                <div class="action-dropdown-container" style="position:relative;display:inline-block;">
                    <button class="btn btn-sm btn-secondary action-trigger" style="font-size:0.78rem;padding:3px 8px;" onclick="toggleActionMenu(event, this.nextElementSibling)">⋯</button>
                    <div class="action-dropdown">
                        <button onclick="relinkItem('${item.id}', '${sessionId}')">🔗 Relink</button>
                        <button onclick="editItemQty('${item.id}', '${sessionId}', ${item.quantity||1})">✏️ Edit Qty</button>
                        ${damageToggle}
                        <hr>
                        <button class="danger" onclick="deleteItem('${item.id}', '${sessionId}', '${escName}')">✕ Delete</button>
                    </div>
                </div>
            </div>`;
    } else if (isReceived && isBroken) {
        actionCell = `<button class="btn btn-sm btn-secondary" style="font-size:0.72rem;padding:3px 8px;border-color:var(--amber);" onclick="undoBreakdown('${item.id}', '${sessionId}')">↩ Undo</button>`;
    } else if (isReceived && isChild) {
        const isPushed = _pushedItemIds.has(item.id);
        const isApproved = _approvedItems.has(item.id);
        const approveStyle = isPushed
            ? 'background:var(--green);color:#000;border-color:var(--green);width:32px;opacity:0.6;cursor:default;'
            : isApproved
                ? 'background:var(--green);color:#000;border-color:var(--green);width:32px;'
                : 'color:var(--text-dim);border-color:var(--border);width:32px;';
        const approveBtn = isPushed
            ? `<button class="btn btn-sm" style="${approveStyle}" title="Already pushed to Shopify" disabled>✓</button>`
            : `<button class="btn btn-sm" style="${approveStyle}" onclick="toggleApproved('${item.id}')" title="Mark as reviewed">✓</button>`;
        actionCell = `<div style="display:flex;gap:6px;align-items:center;">
            ${approveBtn}
            <button class="btn btn-sm btn-secondary" style="font-size:0.72rem;padding:3px 8px;" onclick="editItemQty('${item.id}', '${sessionId}', ${item.quantity||1})">✏️ Qty</button>
            <button class="btn btn-sm" style="font-size:0.72rem;padding:3px 8px;color:var(--red);" onclick="deleteItem('${item.id}', '${sessionId}', '${escName}')">✕</button>
        </div>`;
    }

    const approvedStyle = _approvedItems.has(item.id) ? 'opacity:0.5;' : '';
    return `<tr style="${rowStyle}${approvedStyle}" data-item-id="${item.id}">
        <td class="name-cell">${isChild ? '<span style="color:var(--text-dim);">↳</span> ' : ''}${name}${badges}${item.set_name ? '<br><small style="color:var(--text-dim);">' + item.set_name + '</small>' : ''}${item.tcgplayer_id ? '<br><small style="color:var(--text-dim);">TCG#' + item.tcgplayer_id + '</small>' : ''}</td>
        <td>${item.quantity || 1}</td>
        <td><span class="badge ${isDamaged ? 'badge-amber' : isBroken ? 'badge-dim' : 'badge-green'}">${st}</span></td>
        <td>$${(item.market_price || 0).toFixed(2)}</td>
        <td>$${(item.offer_price || 0).toFixed(2)}${(item.quantity || 1) > 1 ? '<br><small style="color:var(--text-dim);">$' + ((item.offer_price || 0) / (item.quantity || 1)).toFixed(2) + '/ea</small>' : ''}</td>
        ${isReceived ? '<td>' + actionCell + '</td>' : ''}
    </tr>`;
}

async function markDamaged(itemId, sessionId, totalQty) {
    let damagedQty = totalQty;

    if (totalQty > 1) {
        const input = await themedPrompt(`Mark as Damaged`, `How many are damaged? (1–${totalQty})`, totalQty);
        if (input === null) return;
        damagedQty = parseInt(input);
        if (isNaN(damagedQty) || damagedQty < 1 || damagedQty > totalQty) {
            alert(`Must be between 1 and ${totalQty}`);
            return;
        }
    }

    const ok = await themedConfirm(
        'Mark as Damaged',
        damagedQty === totalQty
            ? `Mark all ${totalQty} unit(s) as damaged?`
            : `Split: ${damagedQty} damaged, ${totalQty - damagedQty} good.`,
    );
    if (!ok) return;

    try {
        const body = damagedQty < totalQty ? { damaged_qty: damagedQty } : {};
        await fetch(`/api/ingest/item/${itemId}/damage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function markGood(itemId, sessionId) {
    try {
        await fetch(`/api/ingest/item/${itemId}/mark-good`, { method: 'POST' });
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function undoBreakdown(itemId, sessionId) {
    const ok = await themedConfirm(
        '↩ Undo Breakdown',
        'This will delete all components from this breakdown and restore the original item.',
        { confirmText: 'Undo', dangerous: true }
    );
    if (!ok) return;
    try {
        const r = await fetch(`/api/ingest/item/${itemId}/undo-breakdown`, { method: 'POST' });
        const text = await r.text();
        let d;
        try { d = JSON.parse(text); } catch(e) { alert('Server error: ' + text.substring(0, 200)); return; }
        if (!r.ok) { alert(d.error || 'Undo failed'); return; }
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

    _relinkSessionId = null;

async function relinkSearch() {
    const query = document.getElementById('relink-search').value.trim();
    const resultsDiv = document.getElementById('relink-search-results');
    if (!query) { resultsDiv.innerHTML = '<p style="color:var(--text-dim);">Enter a search term</p>'; return; }

    resultsDiv.innerHTML = '<div class="loading"><span class="spinner"></span> Searching...</div>';
    try {
        const sr = await fetch('/api/ppt/search-sealed', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query }),
        });
        const sd = await sr.json();
        if (!sr.ok) { resultsDiv.innerHTML = `<div class="alert alert-error">${sd.error}</div>`; return; }
        const results = sd.results || [];
        if (!results.length) { resultsDiv.innerHTML = '<div class="alert alert-warning">No results found</div>'; return; }

        resultsDiv.innerHTML = '<div style="max-height:350px; overflow-y:auto;">' + results.slice(0, 10).map(p => {
            const name = p.name || p.productName || '';
            const tcgId = p.tcgplayer_id || p.tcgplayerId || p.tcgPlayerId || 0;
            const price = p.unopenedPrice || p.marketPrice || 0;
            const setName = p.setName || p.set_name || '';
            return `<div class="search-result" style="padding:10px 12px; border:1px solid var(--border); border-radius:6px; margin-bottom:6px; cursor:pointer; transition:background 0.15s;"
                         onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='transparent'"
                         onclick="relinkSelect(${tcgId}, '${name.replace(/'/g,"\\'")}', ${price}, '${setName.replace(/'/g,"\\'")}')">
                <div style="font-weight:600;">${name}</div>
                <div style="font-size:0.8rem; color:var(--text-dim);">${setName} · TCG#${tcgId} · $${Number(price).toFixed(2)}</div>
            </div>`;
        }).join('') + '</div>';
    } catch(err) {
        resultsDiv.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

async function relinkSelect(tcgId, name, price, setName) {
    try {
        const r = await fetch(`/api/ingest/item/${_relinkItemId}/relink`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                product_name: name,
                tcgplayer_id: tcgId,
                market_price: price,
                set_name: setName || null,

        if (!r.ok) { alert(d.error); return; }
        const sid = _relinkSessionId;

        viewSession(sid, true);

}

async function relinkManual() {

                <label style="font-size:0.8rem; color:var(--text-dim);">Add Component (search PPT)</label>
                <input type="text" id="bd-search" placeholder="e.g. Booster Pack, ETB, Promo..."
                       style="width:100%; margin-top:4px;"
                       onkeydown="if(event.key==='Enter') bdSearch()">
            </div>
            <button class="btn btn-primary btn-sm" onclick="bdSearch()" style="height:40px;">Search</button>
        </div>
        <div id="bd-search-results" style="max-height:200px; overflow-y:auto; margin-bottom:12px;"></div>

        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; gap:8px; flex-wrap:wrap;">
            <h4 style="font-size:0.9rem;">Components</h4>
            <div id="bd-value-summary" style="font-size:0.82rem; color:var(--text-dim);"></div>
        </div>
        <div id="bd-components-list"><p style="color:var(--text-dim); font-size:0.85rem;">No components added yet. Search above.</p></div>

        <div id="bd-promo-row" style="margin-top:14px; display:none;">
            <label style="font-size:0.8rem; color:var(--text-dim);">Notes for this config (optional)</label>
            <input type="text" id="bd-promo-notes" placeholder="e.g. Dark Sylveon alt art variant"
                   style="width:100%; margin-top:4px; font-size:0.85rem;">
        </div>

        <div style="margin-top:16px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <button class="btn btn-success" onclick="submitBreakDown()">&#x2705; Confirm Break Down</button>
            <button class="btn btn-secondary" onclick="saveRecipeOnly()" title="Save this config to the recipe cache without breaking down the item">&#x1F4BE; Save Recipe Only</button>
            <button class="btn btn-secondary" onclick="closeBreakdown()">Cancel</button>
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('bd-promo-row').style.display='block'; document.getElementById('bd-promo-notes').focus();" style="font-size:0.75rem; padding:3px 8px; margin-left:auto;">+ Notes</button>
        </div>
    `;

    modal.classList.add('active');
    setTimeout(() => document.getElementById('bd-search')?.focus(), 100);

    if (parentTcgId) {
        bdLoadVariants(parentTcgId);
        bdFetchStorePrices(); // fetch parent store price immediately, even if no components yet
    }
}

async function bdLoadVariants(tcgId) {
    const banner = document.getElementById('bd-variants-banner');
    if (!banner) return;
    try {
        const r = await fetch(`/api/breakdown-cache/${tcgId}`);
        const d = await r.json();
        if (!d.found || !d.cache) return;
        const cache = d.cache;
        const variants = cache.variants || [];
        if (!variants.length) return;

        const age = cache.last_updated ? new Date(cache.last_updated).toLocaleDateString() : '?';
        banner.innerHTML = `
            <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:10px 14px;">
                <div style="font-size:0.78rem; color:var(--green); font-weight:600; margin-bottom:8px;">
                    &#x1F4BE; ${variants.length} cached config${variants.length>1?'s':''} &middot; last saved ${age}
                </div>
                <div style="display:flex; gap:8px; flex-wrap:wrap;">
                ${variants.map(v => `
                    <div style="background:var(--surface-1); border:1px solid var(--border); border-radius:6px; padding:8px 12px; min-width:160px;">
                        <div style="font-size:0.85rem; font-weight:600; margin-bottom:2px;">${v.variant_name}</div>
                        <div style="font-size:0.78rem; color:var(--text-dim);">${v.component_count} components &middot; $${(v.total_component_market||0).toFixed(2)}</div>
                        ${v.notes ? `<div style="font-size:0.75rem; color:var(--amber); margin-top:2px;">&#x1F4DD; ${v.notes}</div>` : ''}
                        <div style="display:flex; gap:6px; margin-top:8px;">
                            <button class="btn btn-primary btn-sm" style="font-size:0.72rem; padding:2px 8px;"
                                onclick="bdApplyVariant(${JSON.stringify(v).replace(/"/g,'&quot;')})">&#x2B07; Load</button>
                            <button class="btn btn-secondary btn-sm" style="font-size:0.72rem; padding:2px 8px; color:var(--red);"
                                onclick="bdDeleteVariant('${v.id}', '${v.variant_name.replace(/'/g,'').replace(/"/g,'')}')">&#x1F5D1;</button>
                        </div>
                    </div>
                `).join('')}
                </div>
            </div>
        `;
        banner._cacheData = cache;
    } catch(e) { /* silent */ }
}

function bdApplyVariant(v) {
    if (typeof v === 'string') v = JSON.parse(v.replace(/&quot;/g, '"'));
    _bdVariantId = v.id;
    _bdVariantName = v.variant_name;
    const nameEl = document.getElementById('bd-variant-name');
    if (nameEl) nameEl.value = v.variant_name;
    _breakDownComponents = (v.components || []).map(c => ({
        product_name: c.product_name,
        set_name: c.set_name || '',
        tcgplayer_id: c.tcgplayer_id,
        market_price: parseFloat(c.market_price) || 0,
        quantity: parseInt(c.quantity_per_parent) || 1,
    }));
    if (v.notes) {
        const pn = document.getElementById('bd-promo-notes');
        if (pn) { pn.value = v.notes; document.getElementById('bd-promo-row').style.display = 'block'; }
    }
    bdRenderComponents();
    bdFetchStorePrices();
    if (banner) {
        const note = document.createElement('div');
        note.style.cssText = 'font-size:0.8rem; color:var(--green); padding:6px 0;';
        note.innerHTML = `&#x2713; Loaded config: <strong>${v.variant_name}</strong> (${_breakDownComponents.length} components). Edit below or confirm as-is.`;
        banner.insertAdjacentElement('afterend', note);
        setTimeout(() => note.remove(), 5000);
    }
}

async function bdDeleteVariant(variantId, name) {
    const ok = await themedConfirm('Delete Config', `Remove the "${name}" config?`, { dangerous: true });
    if (!ok) return;
    await fetch(`/api/breakdown-cache/variant/${variantId}`, { method: 'DELETE' });
    if (_breakDownParentTcgId) bdLoadVariants(_breakDownParentTcgId);
}

function closeBreakdown(_didSave) {
    document.getElementById('breakdown-modal').classList.remove('active');
    // If a recipe was saved, refresh breakdown badges without full reload
    if (_didSave && _currentSessionId) {
        fetch(`/api/ingest/session/${_currentSessionId}`)
            .then(r => r.json())
            .then(d => _enrichBreakdownSummaries(d.items || [], _currentSessionId, true))
            .catch(() => {});
    }
}

async function bdSearch() {
    const q = document.getElementById('bd-search')?.value.trim();
    if (!q) return;
    const panel = document.getElementById('bd-search-results');
    panel.innerHTML = '<div class="loading"><span class="spinner"></span></div>';
    try {
        const r = await fetch('/api/ppt/search-sealed', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query: q }),
        });
        const d = await r.json();
        if (!r.ok) { panel.innerHTML = `<div class="alert alert-error">${d.error}</div>`; return; }
        const results = d.results || [];
        if (!results.length) { panel.innerHTML = '<p style="color:var(--text-dim); font-size:0.85rem;">No results found</p>'; return; }
        panel.innerHTML = results.slice(0, 15).map((p, idx) => {
            const name = p.name || p.productName || '';
            const setName = p.setName || p.set_name || '';
            const tcgId = p.tcgplayer_id || p.tcgplayerId || p.tcgPlayerId || p.id || 0;
            const price = p.unopenedPrice || p.marketPrice || 0;
            window._bdSearchResults = window._bdSearchResults || {};
            window._bdSearchResults[idx] = { tcgId, name, setName, price };
            return `<div class="search-result" onclick="bdAddByIdx(${idx})">
                <strong style="font-size:0.88rem;">${p.name || p.productName}</strong>
                <br><small style="color:var(--text-dim);">${p.setName || ''} &middot; TCG#${tcgId} &middot; $${(price||0).toFixed(2)}</small>
            </div>`;
        }).join('');
    } catch(err) { panel.innerHTML = `<div class="alert alert-error">${err.message}</div>`; }
}

function bdAddByIdx(idx) {
    const r = (window._bdSearchResults || {})[idx];
    if (r) bdAddComponent(r.tcgId, r.name, r.setName, r.price);
}

function bdAddComponent(tcgId, name, setName, price) {
    const existing = _breakDownComponents.find(c => c.tcgplayer_id && c.tcgplayer_id === tcgId);
    if (existing) { existing.quantity += 1; }
    else { _breakDownComponents.push({ product_name: name, set_name: setName, tcgplayer_id: tcgId, market_price: price, quantity: 1 }); }
    bdRenderComponents();
    bdFetchStorePrices();
    document.getElementById('bd-search-results').innerHTML = '';
    document.getElementById('bd-search').value = '';
    document.getElementById('bd-search').focus();
}

function bdUpdateValueSummary() {
    const el = document.getElementById('bd-value-summary');
    if (!el) return;
    const totalMkt = _breakDownComponents.reduce((s, c) => s + (parseFloat(c.market_price)||0) * (parseInt(c.quantity)||1), 0);
    const parentMkt = _breakDownParentMarket;

    // Store totals
    const storeComps = _breakDownComponents.filter(c => c.tcgplayer_id && _bdStorePrices[c.tcgplayer_id]);
    const totalStore = storeComps.reduce((s, c) => s + (parseFloat(_bdStorePrices[c.tcgplayer_id].shopify_price)||0) * (parseInt(c.quantity)||1), 0);
    const allHaveStore = _breakDownComponents.length > 0 && storeComps.length === _breakDownComponents.length;
    const parentStoreEntry = _breakDownParentTcgId ? _bdStorePrices[_breakDownParentTcgId] : null;
    const parentStore = parentStoreEntry ? parseFloat(parentStoreEntry.shopify_price) || 0 : 0;

    // Best available parent reference for store comparison:
    //   1) store-children vs store-parent  (ideal — apples to apples)
    //   2) store-children vs market-parent (fallback — parent not in store)
    //   3) no store children — omit store line entirely
    let storeRef = null, storeRefLabel = null;
    if (totalStore > 0) {
        if (parentStore > 0) {
            storeRef = parentStore;
            storeRefLabel = `store parent ($${parentStore.toFixed(2)})`;
        } else if (parentMkt > 0) {
            storeRef = parentMkt;
            storeRefLabel = `mkt parent ($${parentMkt.toFixed(2)})`;
        }
    }

    let html = `<span style="color:var(--text);">Market total: <strong>$${totalMkt.toFixed(2)}</strong></span>`;
    if (parentMkt > 0 && totalMkt > 0) {
        const diff = totalMkt - parentMkt;
        const col = diff >= 0 ? 'var(--green)' : 'var(--red)';
        html += ` <span style="color:${col}; margin-left:8px;">${diff >= 0 ? '+' : ''}$${diff.toFixed(2)} vs mkt parent</span>`;
    }
    if (totalStore > 0) {
        const diff = storeRef !== null ? totalStore - storeRef : null;
        const storeCol = diff !== null ? (diff >= 0 ? 'var(--green)' : diff >= -storeRef * 0.1 ? 'var(--amber)' : 'var(--red)') : 'var(--text-dim)';
        const diffStr = diff !== null ? ` <small style="color:${diff >= 0 ? 'var(--green)' : 'var(--red)'};">(${diff >= 0 ? '+' : ''}$${diff.toFixed(2)} vs ${storeRefLabel})</small>` : '';
        const coverageStr = !allHaveStore ? ` <small style="color:var(--text-dim);">(${storeComps.length}/${_breakDownComponents.length} comps in store)</small>` : '';
        html += `<span style="color:${storeCol}; margin-left:12px;">Store total: <strong>$${totalStore.toFixed(2)}</strong>${diffStr}${coverageStr}</span>`;
    }
    if (_bdSaveToCache) html += `<span style="color:var(--green); margin-left:8px; font-size:0.75rem;">&#x1F4BE;</span>`;
    el.innerHTML = html;
}

async function bdFetchStorePrices() {
    const compIds = _breakDownComponents.map(c => c.tcgplayer_id).filter(Boolean);
    const allIds = _breakDownParentTcgId ? [...new Set([_breakDownParentTcgId, ...compIds])] : compIds;
    if (!allIds.length) return;
    try {
        const r = await fetch('/api/store-prices', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ tcgplayer_ids: allIds })
        });
        const d = await r.json();
        _bdStorePrices = d.prices || {};
    } catch(e) { _bdStorePrices = {}; }
    bdRenderComponents();
}

function bdRenderComponents() {
    const el = document.getElementById('bd-components-list');
    if (!el) return;
    if (!_breakDownComponents.length) {
        el.innerHTML = '<p style="color:var(--text-dim); font-size:0.85rem;">No components added yet.</p>';
        bdUpdateValueSummary();
        return;
    }
    const hasStore = Object.keys(_bdStorePrices).length > 0;
    el.innerHTML = `<div style="overflow-x:auto;"><table style="font-size:0.85rem;"><thead><tr>
        <th>Component</th>
        <th style="width:70px;">Qty</th>
        <th style="width:90px;">Market</th>
        ${hasStore ? '<th style="width:90px; color:var(--accent);">Store ↗</th>' : ''}
        <th style="width:30px;"></th>
    </tr></thead><tbody>` +
        _breakDownComponents.map((c, idx) => {
            const sp = c.tcgplayer_id ? _bdStorePrices[c.tcgplayer_id] : null;
            const storeCell = hasStore
                ? `<td style="color:${sp ? 'var(--green)' : 'var(--text-dim)'}; font-size:0.8rem;">${sp ? '$' + parseFloat(sp.shopify_price).toFixed(2) + (sp.shopify_qty === 0 ? '<br><small style="color:var(--red);">qty 0</small>' : '') : '—'}</td>`
                : '';
            return `<tr>
                <td>
                    <span>${c.product_name}</span><br>
                    <small style="color:${c.tcgplayer_id ? 'var(--text-dim)' : 'var(--red)'};">
                        ${c.tcgplayer_id ? 'TCG#' + c.tcgplayer_id : '&#x26A0; No TCG ID'}
                        ${c.set_name ? ' &middot; ' + c.set_name : ''}
                    </small>
                </td>
                <td><input type="number" value="${c.quantity}" min="1" style="width:55px;"
                    onchange="_breakDownComponents[${idx}].quantity = parseInt(this.value)||1; bdUpdateValueSummary();"></td>
                <td><input type="number" value="${(c.market_price||0).toFixed(2)}" min="0" step="0.01" style="width:80px;"
                    onchange="_breakDownComponents[${idx}].market_price = parseFloat(this.value)||0; bdUpdateValueSummary();"></td>
                ${storeCell}
                <td><button class="btn btn-sm" style="color:var(--red);font-size:0.72rem;padding:2px 6px;"
                    onclick="_breakDownComponents.splice(${idx},1); _bdStorePrices={}; bdRenderComponents();">&#x2715;</button></td>
            </tr>`;
        }).join('') + '</tbody></table></div>';
    bdUpdateValueSummary();
}

async function saveRecipeOnly() {
    if (!_breakDownComponents.length) { alert('Add at least one component before saving the recipe.'); return; }
    const variantName = document.getElementById('bd-variant-name')?.value.trim() || 'Standard';
    const variantNotes = document.getElementById('bd-promo-notes')?.value.trim() || null;

    const ok = await themedConfirm('Save Recipe', `Save config "${variantName}" to cache without breaking down the item?`);
    if (!ok) return;

    try {
        const payload = {
            tcgplayer_id: _breakDownParentTcgId,
            product_name: _breakDownParentName,
            variant_name: variantName,
            notes: variantNotes || '',
            components: _breakDownComponents.map(c => ({
                tcgplayer_id: c.tcgplayer_id,
                product_name: c.product_name,
                set_name: c.set_name || '',
                quantity_per_parent: c.quantity || 1,
                market_price: c.market_price,
            })),
        };
        const r = await fetch(`/api/breakdown-cache/${_breakDownParentTcgId}/variant`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'Save failed'); return; }
        closeBreakdown(true);
    } catch(err) { alert(err.message); }
}

async function submitBreakDown() {
    if (!_breakDownComponents.length) { alert('Add at least one component.'); return; }
    const totalMkt = _breakDownComponents.reduce((s, c) => s + (parseFloat(c.market_price)||0) * (parseInt(c.quantity)||1), 0);
    const parentMkt = _breakDownParentMarket;
    const qty = _bdQtyToBreak || _breakDownParentQty;
    const variantName = document.getElementById('bd-variant-name')?.value.trim() || 'Standard';
    const variantNotes = document.getElementById('bd-promo-notes')?.value.trim() || null;

    let confirmMsg = `Break down ${qty} unit(s) of "${_breakDownParentName}" into ${_breakDownComponents.length} component type(s)?`;
    if (_breakDownParentQty > 1 && qty < _breakDownParentQty) {
        confirmMsg += `\n\n${_breakDownParentQty - qty} unit(s) will remain as a separate line item.`;
    }
    if (parentMkt > 0) {
        const pct = ((totalMkt - parentMkt) / parentMkt * 100);
        confirmMsg += `\n\nBreakdown value: $${totalMkt.toFixed(2)} (${pct >= 0 ? '+' : ''}${pct.toFixed(1)}% vs parent $${parentMkt.toFixed(2)})`;
    }
    if (_bdSaveToCache) confirmMsg += `\n\nConfig "${variantName}" will be saved to cache.`;
    const ok = await themedConfirm('Confirm Break Down', confirmMsg);
    if (!ok) return;

    try {
        const payload = {
            components: _breakDownComponents,
            save_to_cache: _bdSaveToCache,
            variant_name: variantName,
            variant_notes: variantNotes,
        };
        if (_bdVariantId) payload.variant_id = _bdVariantId;
        if (qty < _breakDownParentQty) payload.qty_to_break = qty;

        const r = await fetch(`/api/ingest/item/${_breakDownItemId}/break-down`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
        });
        const text = await r.text();
        let d;
        try { d = JSON.parse(text); } catch(e) {
            alert('Server error. Have you run migrate_breakdown_cache.py? Raw: ' + text.substring(0, 200));
            return;
        }
        if (!r.ok) { alert(d.error || 'Break down failed'); return; }
        closeBreakdown(true);
        viewSession(_currentSessionId, true);
    } catch(err) { alert(err.message); }
}

async function runStoreCheck(sessionId) {
    const el = document.getElementById('store-check-results');
    el.innerHTML = '<div class="loading"><span class="spinner"></span> Checking Shopify...</div>';

    try {
        const r = await fetch(`/api/ingest/session/${sessionId}/store-check`);
        const d = await r.json();
        if (!r.ok) { el.innerHTML = `<div class="alert alert-error">${d.error}</div>`; return; }

        const results = d.results || [];
        let html = `
            <div class="stats" style="margin-bottom:12px;">
                <div class="stat"><div class="stat-label">In Store</div><div class="stat-value" style="color:var(--green);">${d.in_store}</div></div>
                <div class="stat"><div class="stat-label">Needs Listing</div><div class="stat-value" style="color:${d.needs_listing > 0 ? 'var(--amber)' : 'var(--text-dim)'};">${d.needs_listing}</div></div>
            </div>
        `;

        if (results.length) {
            html += '<table><thead><tr><th>Product</th><th>TCG ID</th><th>Qty to Add</th><th>Store Status</th><th>Store Price</th><th>Store Qty</th></tr></thead><tbody>';
            html += results.map(r => {
                const badge = r.in_store
                    ? '<span class="badge badge-green">In Store</span>'
                    : r.needs_listing
                        ? '<span class="badge badge-amber">Needs Listing</span>'
                        : '<span class="badge badge-red">Not Found</span>';
                return `<tr>
                    <td>${r.product_name || ''}${r.is_damaged ? ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.6rem;">DMG</span>' : ''}${r.consolidated_from > 1 ? ' <span class="badge badge-dim" style="font-size:0.6rem;">×' + r.consolidated_from + ' items</span>' : ''}</td>
                    <td style="font-size:0.8rem; color:var(--text-dim);">${r.tcgplayer_id || '—'}</td>
                    <td>${r.quantity}</td>
                    <td>${badge}${r.store_note ? '<br><small style="color:var(--text-dim);">' + r.store_note + '</small>' : ''}</td>
                    <td>${r.shopify_price != null ? '$' + r.shopify_price.toFixed(2) : '—'}</td>
                    <td>${r.in_store ? r.shopify_qty : '—'}</td>
                </tr>`;
            }).join('');
            html += '</tbody></table>';
        }

        el.innerHTML = html;
    } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}
