async function pushDryRun(sessionId) {
    const panel = document.getElementById('push-live-results');
    panel.innerHTML = '<div class="loading"><span class="spinner"></span> Running dry run...</div>';

    try {
        const pendingApproved = [..._approvedItems].filter(id => !_pushedItemIds.has(id));
        const bodyData = pendingApproved.length > 0 ? { item_ids: pendingApproved } : {};
        const r = await fetch(`/api/ingest/session/${sessionId}/push-dry-run`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(bodyData),
        });
        const d = await r.json();
        if (!r.ok) { panel.innerHTML = `<div class="alert alert-error">${d.error}</div>`; return; }

        const scopeNote = pendingApproved.length > 0
            ? ` Scoped to <strong>${pendingApproved.length}</strong> approved item(s).`
            : ' All items included (none specifically approved).';

        let html = `<div class="alert" style="background:rgba(79,125,249,0.1); border-color:var(--accent); color:var(--accent);">🔍 <strong>DRY RUN</strong> — No changes made.${scopeNote}</div>`;

        html += `<div class="stats" style="margin-bottom:12px;">
            <div class="stat"><div class="stat-label">Would Increment</div><div class="stat-value" style="color:var(--green);">${d.would_increment || 0}</div></div>
            <div class="stat"><div class="stat-label">Would Create Damaged</div><div class="stat-value">${d.would_create_damaged || 0}</div></div>
            <div class="stat"><div class="stat-label">Would Create Listing</div><div class="stat-value" style="color:var(--accent);">${d.would_create_listing || 0}</div></div>
        </div>`;

        const results = d.results || [];
        if (results.length) {
            html += '<table><thead><tr><th>Product</th><th>Qty</th><th>Action</th><th>Details</th></tr></thead><tbody>';
            html += results.map(r => {
                let actionLabel, color, details = '';
                if (r.action === 'would_increment') {
                    actionLabel = '✅ Increment Inventory';
                    color = 'var(--green)';
                    details = `${r.shopify_title || ''}<br><small>Qty: ${r.current_qty} → <strong>${r.new_qty}</strong></small>`;
                } else if (r.action === 'would_create_damaged') {
                    actionLabel = '🆕 Create Damaged Listing';
                    color = 'var(--accent)';
                    details = `"${r.damaged_title}"<br><small>Price: $${r.store_price?.toFixed(2)} (same — site auto-discounts via tag)</small>`;
                } else if (r.action === 'would_create_listing') {
                    actionLabel = '🆕 Create New Listing';
                    color = 'var(--accent)';
                    details = `"${r.new_title}"<br><small>Price: $${r.listing_price?.toFixed(2)} · Qty: ${r.quantity}</small>`;
                }
                return `<tr>
                    <td>${r.product_name || ''}${r.is_damaged ? ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.6rem;">DMG</span>' : ''}${r.consolidated_from > 1 ? ' <span class="badge badge-dim" style="font-size:0.6rem;">×' + r.consolidated_from + ' items</span>' : ''}</td>
                    <td>${r.quantity}</td>
                    <td style="color:${color};font-size:0.85rem;">${actionLabel}</td>
                    <td style="font-size:0.82rem;">${details}</td>
                </tr>`;
            }).join('');
            html += '</tbody></table>';
        }

        panel.innerHTML = html;
    } catch(err) {
        panel.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}


// ═══════════════════════════════════════════════════════════════════
// PUSH LIVE
// ═══════════════════════════════════════════════════════════════════

async function forceIngested(sessionId) {
    const ok = await themedConfirm(
        '⚡ Force Mark Ingested',
        'This will mark the session as ingested WITHOUT pushing to Shopify. Use this for stuck sessions where you\'ve already handled things manually.',
        { confirmText: 'Force Ingested', dangerous: true }
    );
    if (!ok) return;
    try {
        const r = await fetch(`/api/ingest/session/${sessionId}/force-ingested`, { method: 'POST' });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'Failed'); return; }
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function pushLive(sessionId) {
    const approvedCount = _approvedItems.size;
    const totalRows = document.querySelectorAll('tr[data-item-id]').length;
    const isPartial = approvedCount > 0 && approvedCount < totalRows;

    const confirmMsg = isPartial
        ? `You have approved ${approvedCount} of ${totalRows} items. Only those ${approvedCount} will be pushed now — the session will be marked "Partially Ingested" and you can push the rest later.`
        : 'This will increment inventory for matched items, create damaged listings where needed, and mark the session as ingested. This cannot be easily undone.';
    const confirmLabel = isPartial ? `Push ${approvedCount} Approved Items` : 'Push Live';

    const ok = await themedConfirm(
        '🚀 Push Live to Shopify',
        confirmMsg,
        { confirmText: confirmLabel, dangerous: true }
    );
    if (!ok) return;

    const panel = document.getElementById('push-live-results');
    panel.innerHTML = '<div class="loading"><span class="spinner"></span> Pushing to Shopify... This may take a moment.</div>';

    const body = isPartial ? JSON.stringify({ item_ids: [..._approvedItems] }) : '{}';

    try {
        const r = await fetch(`/api/ingest/session/${sessionId}/push-live`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body,
        });
        const d = await r.json();
        if (!r.ok && !d.results) { panel.innerHTML = `<div class="alert alert-error">${d.error}</div>`; return; }

        let html = `<div class="stats" style="margin-bottom:12px;">
            <div class="stat"><div class="stat-label">Incremented</div><div class="stat-value" style="color:var(--green);">${d.incremented || 0}</div></div>
            <div class="stat"><div class="stat-label">Damaged Created</div><div class="stat-value">${d.created_damaged || 0}</div></div>
            <div class="stat"><div class="stat-label">New Listings</div><div class="stat-value" style="color:var(--accent);">${d.created_listing || 0}</div></div>
            <div class="stat"><div class="stat-label">Errors</div><div class="stat-value" style="color:${(d.error_count||0) > 0 ? 'var(--red)' : 'var(--green)'};">${d.error_count || 0}</div></div>
        </div>`;

        if (d.ingested) {
            html += '<div class="alert alert-success">✅ Session ingested! All items pushed to Shopify.</div>';
        } else if (d.partially_ingested) {
            html += `<div class="alert" style="background:rgba(79,125,249,0.1);border-color:var(--accent);color:var(--accent);">📦 ${d.pushed_count} item(s) pushed. ${d.remaining_count} remaining — push them when the next batch arrives.</div>`;
            // Clear approved set so next batch starts fresh
            _approvedItems.clear();
            _refreshApprovedVisibility();
            _updateApproveStats();
        } else if (d.error_count > 0) {
            html += `<div class="alert alert-warning">⚠ ${d.error_count} item(s) had errors. ${(d.results||[]).length} succeeded and won't be re-pushed.<br>
                <button class="btn btn-sm" style="margin-top:8px;background:var(--amber);color:#000;" onclick="pushLive('${sessionId}')">🔄 Retry Failed Items</button></div>`;
        }

        const allResults = [...(d.results || []), ...(d.errors || [])];
        if (allResults.length) {
            html += '<table><thead><tr><th>Product</th><th>Qty</th><th>Action</th></tr></thead><tbody>';
            html += allResults.map(r => {
                const color = r.action === 'inventory_incremented' ? 'var(--green)'
                    : r.action === 'created_damaged_listing' ? 'var(--accent)'
                    : r.action === 'created_listing' ? 'var(--accent)'
                    : 'var(--red)';
                const label = r.action === 'inventory_incremented' ? '✅ Inventory +' + r.quantity
                    : r.action === 'created_damaged_listing' ? '🆕 Created: ' + (r.new_title || 'Damaged Listing')
                    : r.action === 'created_listing' ? '🆕 Created: ' + (r.new_title || 'New Listing')
                    : '❌ ' + (r.error || 'Error');
                return `<tr>
                    <td>${r.product_name || ''}${r.is_damaged ? ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.6rem;">DMG</span>' : ''}</td>
                    <td>${r.quantity}</td>
                    <td style="color:${color};font-size:0.85rem;">${label}</td>
                </tr>`;
            }).join('');
            html += '</tbody></table>';
        }

        panel.innerHTML = html;

        // If ingested, disable the push button
        if (d.ingested) {
            const pushBtn = panel.closest('.card').querySelector('.btn-success');
            if (pushBtn) { pushBtn.disabled = true; pushBtn.textContent = '✅ Ingested'; }
        }
    } catch(err) {
        panel.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}


// ═══════════════════════════════════════════════════════════════════
// BREAKDOWN LIBRARY
// ═══════════════════════════════════════════════════════════════════

async function showBreakdownLibrary() {
    document.getElementById('library-modal').classList.add('active');
    await loadLibrary();
}

function closeLibrary() {
    document.getElementById('library-modal').classList.remove('active');
}

async function loadLibrary() {
    const body = document.getElementById('library-body');
    body.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
    try {
        const r = await fetch('/api/breakdown-cache');
        const d = await r.json();
        if (!r.ok) { body.innerHTML = `<div class="alert alert-error">${d.error}</div>`; return; }
        const caches = d.caches || [];
        if (!caches.length) {
            body.innerHTML = '<p style="color:var(--text-dim);">No breakdown recipes saved yet. Break down a sealed product and check "Save recipe to cache".</p>';
            return;
        }
        body.innerHTML = `
            <p style="font-size:0.82rem; color:var(--text-dim); margin-bottom:12px;">${caches.length} products cached</p>
            <div style="overflow-x:auto;">
            <table style="font-size:0.85rem;">
                <thead><tr>
                    <th>Product</th><th>TCG ID</th><th>Configs</th><th>Best Value</th><th>Used</th><th>Updated</th><th></th>
                </tr></thead>
                <tbody>
                ${caches.map(c => {
                    const age = c.last_updated ? new Date(c.last_updated).toLocaleDateString() : '—';
                    return `<tr>
                        <td>
                            <strong>${c.product_name}</strong>
                            ${c.variant_names ? `<br><small style="color:var(--text-dim);">${c.variant_names}</small>` : ''}
                        </td>
                        <td style="color:var(--text-dim);">${c.tcgplayer_id || '—'}</td>
                        <td>${c.variant_count || 1}</td>
                        <td>$${(c.best_variant_market||0).toFixed(2)}</td>
                        <td style="color:var(--text-dim);">${c.use_count || 0}x</td>
                        <td style="color:var(--text-dim);">${age}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" style="font-size:0.72rem; padding:2px 8px;"
                                onclick="viewLibraryEntry(${c.tcgplayer_id})">View</button>
                            <button class="btn btn-sm" style="font-size:0.72rem; padding:2px 8px; color:var(--red);"
                                onclick="deleteLibraryEntry(${c.tcgplayer_id}, '${(c.product_name||'').replace(/'/g,'')}')">&#x1F5D1;</button>
                        </td>
                    </tr>`;
                }).join('')}
                </tbody>
            </table>
            </div>
        `;
    } catch(err) {
        body.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

async function viewLibraryEntry(tcgId) {
    const body = document.getElementById('library-body');
    try {
        const r = await fetch(`/api/breakdown-cache/${tcgId}`);
        const d = await r.json();
        if (!d.found) { alert('Not found'); return; }
        const cache = d.cache;
        const variants = cache.variants || [];

        body.innerHTML = `
            <button class="btn btn-secondary btn-sm" onclick="loadLibrary()" style="margin-bottom:12px;">← Back</button>
            <div style="display:flex; gap:8px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; margin-bottom:12px;">
                <div>
                    <strong style="font-size:1rem;">${cache.product_name}</strong>
                    <span style="font-size:0.78rem; color:var(--text-dim); margin-left:8px;">TCG#${cache.tcgplayer_id}</span>
                </div>
                <div style="font-size:0.82rem; color:var(--text-dim);">Used ${cache.use_count||0}x &middot; Updated ${new Date(cache.last_updated).toLocaleDateString()}</div>
            </div>

            ${variants.map((v, vi) => {
                const comps = v.components || [];
                const totalMkt = comps.reduce((s,c) => s + (c.market_price||0)*(c.quantity_per_parent||1), 0);
                return `
                <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:8px;">
                        <div>
                            <strong style="font-size:0.95rem;">${v.variant_name}</strong>
                            ${v.notes ? `<span style="font-size:0.78rem; color:var(--amber); margin-left:8px;">&#x1F4DD; ${v.notes}</span>` : ''}
                        </div>
                        <div style="display:flex; gap:6px; align-items:center;">
                            <span style="font-size:0.82rem; color:var(--text-dim);">$${totalMkt.toFixed(2)} total</span>
                            <button class="btn btn-sm" style="font-size:0.72rem; padding:2px 8px; color:var(--red);"
                                onclick="deleteLibraryVariant('${v.id}', '${v.variant_name.replace(/'/g,'')}', ${tcgId})">&#x1F5D1; Delete config</button>
                        </div>
                    </div>
                    <table style="font-size:0.82rem;">
                        <thead><tr><th>Component</th><th>TCG ID</th><th>Qty/Unit</th><th>Market</th><th>Subtotal</th></tr></thead>
                        <tbody>
                        ${comps.map(c => `<tr>
                            <td>${c.product_name}${c.set_name ? '<br><small style="color:var(--text-dim);">'+c.set_name+'</small>' : ''}</td>
                            <td style="color:var(--text-dim);">${c.tcgplayer_id || '—'}</td>
                            <td>${c.quantity_per_parent}</td>
                            <td>$${(c.market_price||0).toFixed(2)}</td>
                            <td>$${((c.market_price||0)*(c.quantity_per_parent||1)).toFixed(2)}</td>
                        </tr>`).join('')}
                        <tr style="font-weight:600; border-top:2px solid var(--border);">
                            <td colspan="4" style="text-align:right;">Total:</td>
                            <td>$${totalMkt.toFixed(2)}</td>
                        </tr>
                        </tbody>
                    </table>
                </div>`;
            }).join('')}

            <button class="btn btn-sm" style="color:var(--red); font-size:0.78rem;" onclick="deleteLibraryEntry(${cache.tcgplayer_id}, '${(cache.product_name||'').replace(/'/g,'')}')">&#x1F5D1; Delete all configs</button>
        `;
    } catch(err) { body.innerHTML = `<div class="alert alert-error">${err.message}</div>`; }
}

async function deleteLibraryVariant(variantId, name, tcgId) {
    const ok = await themedConfirm('Delete Config', `Remove the "${name}" config?`, { dangerous: true });
    if (!ok) return;
    const r = await fetch(`/api/breakdown-cache/variant/${variantId}`, { method: 'DELETE' });
    const d = await r.json();
    if (!d.cache) {
        // Parent was also deleted, go back to library
        await loadLibrary();
    } else {
        // Reload this entry
        await viewLibraryEntry(tcgId);
    }
}

async function deleteLibraryEntry(tcgId, name) {
    const ok = await themedConfirm('Delete Recipe', `Remove all breakdown configs for "${name}"?`, { dangerous: true });
    if (!ok) return;
    await fetch(`/api/breakdown-cache/${tcgId}`, { method: 'DELETE' });
    await loadLibrary();
}
