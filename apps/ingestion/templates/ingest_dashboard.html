<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pack Fresh — Ingest</title>
    <link rel="stylesheet" href="/pf-static/pf_theme.css">
    <script src="/pf-static/pf_ui.js"></script>
    <style>
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ─── HEADER ─── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 0; margin-bottom: 24px;
        }
        header .container { display: flex; align-items: center; gap: 16px; }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .logo span { color: var(--green); }
        header .status { margin-left: auto; font-size: 0.85rem; color: var(--text-dim); }

        /* ─── CARDS ─── */
        .card h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; }

        /* ─── STATS ─── */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat {
            background: var(--surface-2); border-radius: 8px; padding: 16px;
            border: 1px solid var(--border);
        }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }
        .stat-value { font-size: 1.6rem; font-weight: 700; }

        .action-dropdown {
            display: none; position: fixed;
            z-index: 1050; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 6px; padding: 4px; min-width: 180px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .action-dropdown.show { display: block !important; }
        .action-dropdown button {
            display: block; width: 100%; text-align: left; font-size: 0.8rem;
            background: none; color: var(--text); padding: 8px 10px;
            border: none; border-radius: 4px; cursor: pointer; white-space: nowrap;
        }
        .action-dropdown button:hover { background: var(--surface); }
        .action-dropdown button.danger { color: var(--red); }
        .action-dropdown hr { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

        /* ─── MODAL ─── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 1000;
            align-items: flex-start; justify-content: center;
            backdrop-filter: blur(4px); padding: 40px 20px; overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 28px; width: 90%; max-width: 800px;
            max-height: 85vh; overflow-y: auto; position: relative;
        }
        .modal-close-sticky {
            position: sticky; top: 0; float: right;
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text); font-size: 1.3rem; cursor: pointer;
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; margin-top: -8px; margin-right: -8px;
            transition: all 0.15s;
        }
        .modal-close-sticky:hover { background: var(--red); color: #fff; border-color: var(--red); }

        /* ─── CONFIRM / PROMPT DIALOG ─── */
        .confirm-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; width: 90%; max-width: 420px;
        }
        .confirm-box h3 { margin-bottom: 8px; }
        .confirm-box p { color: var(--text-dim); margin-bottom: 16px; font-size: 0.9rem; }
        .confirm-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

        /* ─── LOADING ─── */
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── TABS ─── */
        .tab-btn {
            background: none; border: none; padding: 8px 16px;
            font-size: 0.9rem; color: var(--text-dim); cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.15s;
        }
        .tab-btn:hover { color: var(--text); }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

        /* ─── SESSION LIST ─── */
        .session-row {
            display: grid; grid-template-columns: 1fr auto auto auto;
            gap: 16px; align-items: center;
            padding: 14px 16px; border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 8px;
            cursor: pointer; transition: all 0.15s;
        }
        .session-row:hover { border-color: var(--accent); background: var(--surface-2); }
        .session-row .name { font-weight: 600; }
        .session-row .meta { font-size: 0.82rem; color: var(--text-dim); }

        /* ─── SEARCH RESULT ITEMS ─── */
        .search-result {
            cursor: pointer; padding: 10px 12px;
            border: 1px solid var(--border); border-radius: 6px;
            margin-bottom: 4px; transition: all 0.15s;
        }
        .search-result:hover { border-color: var(--accent); background: var(--surface-2); }

        /* ─── PROGRESS BAR ─── */
        .progress-bar {
            height: 6px; background: var(--border); border-radius: 3px;
            overflow: hidden; margin: 8px 0;
        }
        .progress-bar .fill {
            height: 100%; background: var(--green); border-radius: 3px;
            transition: width 0.3s;
        }

        /* ─── FILTER BUTTONS ─── */
        .filter-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
        .filter-btn {
            padding: 5px 12px; border: 1px solid var(--border); border-radius: 16px;
            background: none; color: var(--text-dim); font-size: 0.78rem;
            cursor: pointer; transition: all 0.15s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* ─── MOBILE ─── */
        @media (max-width: 768px) {
            .container { padding: 10px; }

            /* Header */
            header .container { flex-wrap: wrap; gap: 8px; }
            .logo { font-size: 1.2rem; }
            header .status { font-size: 0.78rem; }

            /* Tabs */
            .tab-btn { padding: 10px 14px; min-height: 44px; font-size: 0.85rem; }

            /* Session rows: 2-col wrap */
            .session-row {
                grid-template-columns: 1fr auto;
                gap: 8px 12px;
                padding: 14px;
            }

            /* Filter buttons */
            .filter-btn { min-height: 38px; padding: 8px 14px; font-size: 0.82rem; }

            /* Stats grid: 2-col */
            .stats { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat { padding: 12px; }
            .stat-value { font-size: 1.3rem; }

            /* Action dropdown → bottom sheet */
            .action-dropdown {
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                top: auto !important;
                border-radius: 12px 12px 0 0;
                min-width: auto;
                padding: 8px 8px 20px;
                max-height: 60vh;
                overflow-y: auto;
                box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
            }
            .action-dropdown button {
                padding: 14px 12px;
                font-size: 0.9rem;
                min-height: 48px;
            }

            /* Item card actions: consistent row on mobile */
            td[data-label=""] > div {
                flex-wrap: wrap !important;
                gap: 8px !important;
            }
            td[data-label=""] > div > .approve-mobile {
                min-height: 44px !important;
                min-width: 44px !important;
                width: 44px !important;
                flex: 0 0 44px !important;
                font-size: 1.1rem !important;
            }
            td[data-label=""] > div > .btn-primary {
                flex: 1 1 auto !important;
                min-height: 44px !important;
                font-size: 0.85rem !important;
                padding: 8px 12px !important;
            }
            td[data-label=""] > div > .action-dropdown-container {
                flex: 0 0 auto;
            }
            td[data-label=""] > div > .action-dropdown-container > .action-trigger {
                min-height: 44px !important;
                min-width: 44px !important;
                font-size: 1.1rem !important;
                padding: 8px !important;
            }

            /* Modals: near-fullscreen */
            .modal-overlay { padding: 8px 4px; }
            .modal { max-width: 100%; width: 100%; padding: 16px; }
            .modal-close-sticky { width: 40px; height: 40px; font-size: 1.4rem; }

            /* Card headers */
            .card h2 { font-size: 1.05rem; }

            /* Search results: bigger touch targets */
            .search-result { padding: 12px; min-height: 44px; }

            /* Push section: full-width buttons */
            .card .btn-danger,
            .card .btn-primary { width: 100%; text-align: center; margin-bottom: 8px; }
        }

        @media (max-width: 480px) {
            /* Stats: single column */
            .stats { grid-template-columns: 1fr; }

            /* Session rows: single column */
            .session-row { grid-template-columns: 1fr; gap: 6px; }

            /* Stage bar: hide numbers, just show text */
            .stage-tab .stage-num { display: none; }
            .stage-tab { font-size: 0.82rem; padding: 12px 4px; }
        }
        /* ─── STAGE STEPPER ─── */
        .stage-bar {
            display: flex; gap: 0; margin-bottom: 20px;
            border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
        }
        .stage-tab {
            flex: 1; padding: 12px 16px; text-align: center;
            background: var(--surface); border: none; cursor: pointer;
            font-size: 0.9rem; color: var(--text-dim);
            border-right: 1px solid var(--border);
            transition: all 0.15s; position: relative;
        }
        .stage-tab:last-child { border-right: none; }
        .stage-tab:hover { background: var(--surface-2); }
        .stage-tab.active { background: var(--accent); color: #fff; font-weight: 600; }
        .stage-tab.completed { background: rgba(45,212,160,0.1); color: var(--green); }
        .stage-tab.disabled { opacity: 0.4; cursor: not-allowed; }
        .stage-tab .stage-num {
            display: inline-block; width: 22px; height: 22px; line-height: 22px;
            border-radius: 50%; font-size: 0.75rem; font-weight: 700;
            background: var(--border); color: var(--text-dim); margin-right: 6px;
        }
        .stage-tab.active .stage-num { background: rgba(255,255,255,0.3); color: #fff; }
        .stage-tab.completed .stage-num { background: var(--green); color: #fff; }

        /* ─── SORT/GROUP TOOLBAR ─── */
        .sort-toolbar {
            display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
            flex-wrap: wrap; font-size: 0.82rem;
        }
        .sort-toolbar label { color: var(--text-dim); }
        .sort-toolbar select {
            font-size: 0.82rem; padding: 4px 8px;
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text); border-radius: 4px;
        }

        /* ─── VERIFY BUTTONS ─── */
        .verify-btn-group { display: flex; gap: 4px; align-items: center; }
        .verify-btn {
            padding: 4px 10px; border-radius: 4px; font-size: 0.78rem;
            border: 1px solid var(--border); background: none; cursor: pointer;
            transition: all 0.15s; min-height: 32px;
        }
        .verify-btn:hover { background: var(--surface-2); }
        .verify-btn.here { color: var(--green); border-color: var(--green); }
        .verify-btn.here:hover { background: rgba(45,212,160,0.1); }
        .verify-btn.missing { color: var(--red); border-color: var(--red); }
        .verify-btn.missing:hover { background: rgba(240,82,82,0.1); }
        .verify-btn.damaged { color: var(--amber); border-color: var(--amber); }
        .verify-btn.damaged:hover { background: rgba(245,166,35,0.1); }
        .verify-btn.verified {
            background: var(--green); color: #fff; border-color: var(--green);
        }
        .verify-btn.verified-damaged {
            background: var(--amber); color: #fff; border-color: var(--amber);
        }
        .verify-btn.verified-missing {
            background: var(--red); color: #fff; border-color: var(--red);
        }

        /* ─── COMPLETE STAGE BUTTON ─── */
        .complete-stage-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; width: 100%; padding: 14px;
            font-size: 1rem; font-weight: 600;
            border: 2px solid var(--green); border-radius: 8px;
            background: rgba(45,212,160,0.08); color: var(--green);
            cursor: pointer; transition: all 0.15s; margin-top: 16px;
        }
        .complete-stage-btn:hover { background: rgba(45,212,160,0.15); }
        .complete-stage-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @media (max-width: 768px) {
            .stage-bar { font-size: 0.82rem; }
            .stage-tab { padding: 10px 6px; font-size: 0.78rem; }
            .stage-tab .stage-num { width: 20px; height: 20px; line-height: 20px; font-size: 0.7rem; margin-right: 4px; }

            /* Verify buttons: stack vertically for fat thumbs */
            .verify-btn-group { flex-direction: column; width: 100%; }
            .verify-btn { min-height: 44px; padding: 10px 14px; font-size: 0.85rem; width: 100%; text-align: center; }

            /* Sort toolbar: wrap nicely */
            .sort-toolbar { gap: 6px; }
            .sort-toolbar select { flex: 1; min-width: 0; }

            .complete-stage-btn { min-height: 52px; font-size: 1.05rem; }
        }
    </style>
    <link rel="stylesheet" href="/api/breakdown-cache/bd-static/breakdown_modal.css">
</head>
<body>

<header>
    <div class="container">
        <div class="logo">Pack Fresh <span>Ingest</span></div>
        <div class="status" id="header-status"></div>
    </div>
</header>

<div class="container">
    <!-- Session List -->
    <div id="session-list-view">
        <div class="card">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap;">
                <h2 style="margin-bottom:0;">📦 Ingest Queue</h2>
                <button class="btn btn-secondary btn-sm" onclick="showBreakdownLibrary()" style="margin-left:auto; font-size:0.8rem;">📚 Breakdown Library</button>
            </div>
            <div style="display:flex; gap:2px; margin-bottom:16px; border-bottom:1px solid var(--border);">
                <button class="tab-btn active" id="tab-btn-pending" onclick="switchQueueTab('pending')">📥 Ready to Ingest</button>
                <button class="tab-btn" id="tab-btn-completed" onclick="switchQueueTab('completed')">✅ Completed</button>
            </div>
            <div id="tab-pending">
                <div id="sessions-list">
                    <div class="loading"><span class="spinner"></span> Loading sessions...</div>
                </div>
            </div>
            <div id="tab-completed" style="display:none;">
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;">
                    <select id="completed-days" onchange="loadCompletedSessions()" style="font-size:0.85rem; padding:4px 8px;">
                        <option value="7">Last 7 days</option>
                        <option value="14">Last 14 days</option>
                        <option value="30" selected>Last 30 days</option>
                        <option value="90">Last 90 days</option>
                        <option value="">All time</option>
                    </select>
                    <span id="completed-count" style="font-size:0.8rem; color:var(--text-dim);"></span>
                </div>
                <div id="completed-sessions-list">
                    <div class="loading"><span class="spinner"></span> Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Session Detail (hidden until clicked) -->
    <div id="session-detail-view" style="display:none;">
        <div style="margin-bottom:16px;">
            <button class="btn btn-secondary btn-sm" onclick="showList()">← Back to Queue</button>
        </div>
        <div id="session-detail-content"></div>
    </div>
</div>

<!-- Breakdown Library Modal -->
<div id="library-modal" class="modal-overlay">
    <div class="modal" style="max-width:800px;">
        <button class="modal-close-sticky" onclick="closeLibrary()">×</button>
        <h3 style="margin-bottom:4px;">📚 Breakdown Library</h3>
        <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:16px;">Saved breakdown recipes. Click a product to load it.</p>
        <div id="library-body"><div class="loading"><span class="spinner"></span></div></div>
    </div>
</div>

<!-- Breakdown modal now served by shared breakdown_modal.js -->

<!-- Relink Modal -->
<div id="relink-modal" class="modal-overlay">
    <div class="modal" style="max-width:600px;">
        <button class="modal-close-sticky" onclick="closeRelink()">×</button>
        <div id="relink-body"></div>
    </div>
</div>

<!-- Add Item Modal -->
<div id="add-item-modal" class="modal-overlay">
    <div class="modal" style="max-width:600px;">
        <button class="modal-close-sticky" onclick="closeAddItem()">×</button>
        <div id="add-item-body"></div>
    </div>
</div>

<!-- Confirm dialog now provided by shared pf_ui.js (themedConfirm) -->

<div id="prompt-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9000; align-items:center; justify-content:center;">
    <div class="confirm-box" style="min-width:280px;">
        <h3 id="prompt-title"></h3>
        <p id="prompt-msg" style="color:var(--text-dim); font-size:0.9rem; margin-bottom:12px;"></p>
        <div id="prompt-input-area"></div>
        <div class="btn-row" style="margin-top:12px;">
            <button class="btn btn-secondary btn-sm" id="prompt-cancel">Cancel</button>
            <button class="btn btn-primary btn-sm" id="prompt-ok">OK</button>
        </div>
    </div>
</div>

<script>

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════

let _currentSessionId = null;

// themedConfirm is now provided by shared pf_ui.js

function themedPrompt(title, msg, defaultVal = '', inputType = 'number') {
    return new Promise(resolve => {
        const overlay = document.getElementById('prompt-overlay');
        document.getElementById('prompt-title').textContent = title;
        document.getElementById('prompt-msg').textContent = msg;
        const area = document.getElementById('prompt-input-area');
        area.innerHTML = `<input id="prompt-input" type="${inputType}" value="${defaultVal}" style="width:100%;">`;
        overlay.style.display = 'flex';
        const input = document.getElementById('prompt-input');
        setTimeout(() => { input.focus(); input.select(); }, 50);

        const cleanup = (val) => {
            overlay.style.display = 'none';
            document.getElementById('prompt-ok').onclick = null;
            document.getElementById('prompt-cancel').onclick = null;
            resolve(val);
        };
        document.getElementById('prompt-ok').onclick = () => cleanup(input.value);
        document.getElementById('prompt-cancel').onclick = () => cleanup(null);
        input.onkeydown = (e) => {
            if (e.key === 'Enter') cleanup(input.value);
            if (e.key === 'Escape') cleanup(null);
        };
    });
}

// ═══════════════════════════════════════════════════════════════════
// ACTION DROPDOWN
// ═══════════════════════════════════════════════════════════════════

function toggleActionMenu(event, dd) {
    if (event) event.stopPropagation();
    document.querySelectorAll('.action-dropdown.show').forEach(d => { if (d !== dd) d.classList.remove('show'); });
    if (window.innerWidth > 768) {
        const btn = dd.previousElementSibling;
        const rect = btn.getBoundingClientRect();
        const spaceBelow = window.innerHeight - rect.bottom;
        const dropH = 200;
        dd.style.left = Math.max(8, rect.right - 180) + 'px';
        dd.style.top = spaceBelow > dropH ? (rect.bottom + 4) + 'px' : Math.max(4, rect.top - dropH) + 'px';
    } else {
        dd.style.left = ''; dd.style.top = '';
    }
    dd.classList.toggle('show');
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.action-dropdown') && !e.target.closest('.action-trigger')) {
        document.querySelectorAll('.action-dropdown.show').forEach(d => d.classList.remove('show'));
    }
});

window.addEventListener('resize', () => {
    document.querySelectorAll('.action-dropdown.show').forEach(d => d.classList.remove('show'));
});

// ═══════════════════════════════════════════════════════════════════
// SESSION LIST
// ═══════════════════════════════════════════════════════════════════

function switchQueueTab(tab) {
    document.getElementById('tab-pending').style.display = tab === 'pending' ? '' : 'none';
    document.getElementById('tab-completed').style.display = tab === 'completed' ? '' : 'none';
    document.getElementById('tab-btn-pending').classList.toggle('active', tab === 'pending');
    document.getElementById('tab-btn-completed').classList.toggle('active', tab === 'completed');
    if (tab === 'completed') loadCompletedSessions();
    else loadSessions();
}

async function loadSessions() {
    const el = document.getElementById('sessions-list');
    try {
        const r = await fetch('/api/ingest/sessions?status=pending');
        const sessions = await r.json();
        if (!sessions.length) {
            el.innerHTML = '<p style="color:var(--text-dim); text-align:center; padding:20px;">No sessions waiting to be ingested.</p>';
            return;
        }
        el.innerHTML = sessions.map(s => {
            const status = s.status;
            const badgeClass = status === 'received' ? 'badge-amber'
                : status === 'verified' ? 'badge-blue'
                : status === 'breakdown_complete' ? 'badge-green'
                : 'badge-blue';
            const badgeLabel = status === 'received' ? 'Verify'
                : status === 'verified' ? 'Breakdown'
                : status === 'breakdown_complete' ? 'Ready to Push'
                : '📦 Partial';
            const date = new Date(s.created_at).toLocaleDateString();
            return `<div class="session-row" onclick="viewSession('${s.id}')">
                <div>
                    <div class="name">${s.customer_name || 'Unknown'}</div>
                    <div class="meta">${s.session_type || 'sealed'} · ${date}</div>
                </div>
                <div><span class="badge ${badgeClass}">${badgeLabel}</span></div>
                <div style="text-align:right;">
                    <div style="font-weight:600;">${s.item_count || 0} items</div>
                    <div class="meta">${s.total_qty || 0} units</div>
                </div>
                <div style="font-weight:700; font-size:1.1rem;">$${(s.total_offer_amount || 0).toFixed(2)}</div>
            </div>`;
        }).join('');
    } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

async function loadCompletedSessions() {
    const el = document.getElementById('completed-sessions-list');
    const countEl = document.getElementById('completed-count');
    const days = document.getElementById('completed-days').value;
    el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>';
    try {
        const url = `/api/ingest/sessions?status=completed&limit=100${days ? '&days=' + days : ''}`;
        const r = await fetch(url);
        const sessions = await r.json();
        if (countEl) countEl.textContent = `${sessions.length} session${sessions.length !== 1 ? 's' : ''}`;
        if (!sessions.length) {
            el.innerHTML = '<p style="color:var(--text-dim); text-align:center; padding:20px;">No completed sessions in this period.</p>';
            return;
        }
        el.innerHTML = `<table style="width:100%; font-size:0.85rem;">
            <thead><tr>
                <th style="text-align:left;">Customer</th>
                <th style="text-align:left;">Type</th>

// ═══════════════════════════════════════════════════════════════════
// SESSION DETAIL
// ═══════════════════════════════════════════════════════════════════

// ── STAGE STATE ──────────────────────────────────────────────────────────
let _currentStage = 'verify';  // 'verify' | 'breakdown' | 'push'
let _currentSessionData = null;
let _currentSortBy = 'default';  // 'default' | 'alpha' | 'price-high' | 'price-low'
let _currentGroupBy = 'none';    // 'none' | 'type' | 'set'

function _classifyProductType(item) {
    // Use store tags first (from inventory_product_cache.shopify_tags)
    const tags = (item.store_tags || '').toLowerCase();
    if (tags) {
        if (tags.includes('etb') || tags.includes('elite trainer box')) return 'ETB';
        if (tags.includes('booster box')) return 'Booster Box';
        if (tags.includes('booster pack')) return 'Booster Pack';
        if (tags.includes('collection box')) return 'Collection';
        if (tags.includes('tin')) return 'Tin';
        if (tags.includes('bundle')) return 'Bundle';
        if (tags.includes('blister')) return 'Blister';
    }
    // Fallback: product type
    const ptype = (item.product_type || '').toLowerCase();
    if (ptype === 'raw') return 'Raw';
    if (item.is_graded) return 'Graded';
    // Fallback: parse name
    const n = (item.product_name || '').toLowerCase();
    if (n.includes('elite trainer box') || n.includes(' etb')) return 'ETB';
    if (n.includes('booster box') || n.includes('bb ')) return 'Booster Box';
    if (n.includes('booster pack') || n.includes('sleeved booster')) return 'Booster Pack';
    if (n.includes(' tin') || n.includes('tin ')) return 'Tin';
    if (n.includes('bundle') || n.includes('trainer kit')) return 'Bundle';
    if (n.includes('collection') || n.includes('premium collection') || n.includes('ultra premium')) return 'Collection';
    if (n.includes('blister')) return 'Blister';
    return 'Other';
}

function _sortItems(items) {
    const sorted = [...items];
    if (_currentSortBy === 'alpha') sorted.sort((a, b) => (a.product_name || '').localeCompare(b.product_name || ''));
    else if (_currentSortBy === 'price-high') sorted.sort((a, b) => (b.market_price || 0) - (a.market_price || 0));
    else if (_currentSortBy === 'price-low') sorted.sort((a, b) => (a.market_price || 0) - (b.market_price || 0));
    return sorted;
}

function _groupItems(items) {
    if (_currentGroupBy === 'none') return [{ label: null, items }];
    const groups = {};
    items.forEach(i => {
        const key = _currentGroupBy === 'type' ? _classifyProductType(i) : (i.set_name || 'Unknown Set');
        if (!groups[key]) groups[key] = [];
        groups[key].push(i);
    });
    return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0])).map(([label, items]) => ({ label, items }));
}

function _renderSortToolbar() {
    return `<div class="sort-toolbar">
        <label>Group:</label>
        <select onchange="_currentGroupBy=this.value; _rerenderStage();">
            <option value="none" ${_currentGroupBy==='none'?'selected':''}>None</option>
            <option value="type" ${_currentGroupBy==='type'?'selected':''}>Product Type</option>
            <option value="set" ${_currentGroupBy==='set'?'selected':''}>Set</option>
        </select>
        <label style="margin-left:8px;">Sort:</label>
        <select onchange="_currentSortBy=this.value; _rerenderStage();">
            <option value="default" ${_currentSortBy==='default'?'selected':''}>Default</option>
            <option value="alpha" ${_currentSortBy==='alpha'?'selected':''}>Alphabetical</option>
            <option value="price-high" ${_currentSortBy==='price-high'?'selected':''}>Price (High→Low)</option>
            <option value="price-low" ${_currentSortBy==='price-low'?'selected':''}>Price (Low→High)</option>
        </select>
    </div>`;
}

function _rerenderStage() {
    if (!_currentSessionData) return;
    const container = document.getElementById('stage-content');
    if (!container) return;
    if (_currentStage === 'verify') container.innerHTML = _renderVerifyContent(_currentSessionData);
    else if (_currentStage === 'breakdown') container.innerHTML = _renderBreakdownContent(_currentSessionData);
    else if (_currentStage === 'push') container.innerHTML = _renderPushContent(_currentSessionData);
    _postRenderStage();
}

function _postRenderStage() {
    if (!_currentSessionData) return;
    const { session: s, items } = _currentSessionData;
    const sessionId = s.id;
    if (_currentStage === 'breakdown') {
        _lastRenderedItems = items;
        _enrichBreakdownSummaries(items, sessionId, true);
    }
    if (_currentStage === 'push') {
        _loadSessionBarcodes(sessionId);
    }
}

function switchStage(stage) {
    if (!_currentSessionData) return;
    const s = _currentSessionData.session;
    // Allow navigating back to completed stages, and forward only if status allows
    const stageOrder = { verify: 0, breakdown: 1, push: 2 };
    const statusToStage = {
        received: 0,
        verified: 1,
        breakdown_complete: 2,
        partially_ingested: 2,
        ingested: 2,
    };
    const maxStage = statusToStage[s.status] ?? 0;
    if (stageOrder[stage] > maxStage) return;
    _currentStage = stage;
    _rerenderStage();
    _updateStageTabs();
}

function _updateStageTabs() {
    if (!_currentSessionData) return;
    const s = _currentSessionData.session;
    const statusToStage = { received: 0, verified: 1, breakdown_complete: 2, partially_ingested: 2, ingested: 2 };
    const maxStage = statusToStage[s.status] ?? 0;
    const stageOrder = { verify: 0, breakdown: 1, push: 2 };

    document.querySelectorAll('.stage-tab').forEach(tab => {
        const stage = tab.dataset.stage;
        const idx = stageOrder[stage];
        tab.classList.remove('active', 'completed', 'disabled');
        if (stage === _currentStage) tab.classList.add('active');
        else if (idx < maxStage) tab.classList.add('completed');
        else if (idx > maxStage) tab.classList.add('disabled');
    });
}

async function viewSession(sessionId, _preserveScroll) {

    document.getElementById('session-list-view').style.display = 'none';
    document.getElementById('session-detail-view').style.display = '';

    const scrollY = _preserveScroll ? window.scrollY : 0;
    el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading session...</div>';

    try {
        const r = await fetch(`/api/ingest/session/${sessionId}`);
        const data = await r.json();
        const s = data.session;
        const items = data.items;

        _currentSessionData = data;

        // Track pushed items
        _pushedItemIds = new Set(items.filter(i => i.pushed_at).map(i => i.id));

        // Determine default stage from session status
        const statusToStage = {
            received: 'verify',
            verified: 'breakdown',

        };

        }[s.status] || { cls: 'badge-dim', label: s.status };

        let html = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:16px;">
                    <h2 style="margin:0;">${s.customer_name || 'Unknown'} <small style="color:var(--text-dim);font-weight:400;font-size:0.8rem;">${s.session_type || 'sealed'}</small></h2>
                    <span class="badge ${statusBadge.cls}">${statusBadge.label}</span>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Items</div>
                        <div class="stat-value">${activeItems.length}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Total Units</div>
                        <div class="stat-value">${totalQty}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Offer Total</div>
                        <div class="stat-value">$${(s.total_offer_amount || 0).toFixed(2)}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Market Value</div>
                        <div class="stat-value">$${(s.total_market_value || 0).toFixed(2)}</div>
                    </div>
                </div>
            </div>

            <div id="offer-adjustment-card"></div>

                </button>

                    <span class="stage-num">2</span> Breakdown
                </button>
                <button class="stage-tab" data-stage="push" onclick="switchStage('push')">
                    <span class="stage-num">3</span> Push
                </button>
            </div>

            <div id="stage-content"></div>

        el.innerHTML = html;
        _updateStageTabs();
        _rerenderStage();

        _loadOfferAdjustment(sessionId);
        _loadSessionBarcodes(sessionId);
    } catch(err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

// ── VERIFY STAGE ──────────────────────────────────────────────────────────
function _renderVerifyContent(data) {
    const { session: s, items } = data;
    const sessionId = s.id;
    // Show all items including missing for verify
    const allItems = items.filter(i => i.item_status !== 'rejected' && !i.parent_item_id);
    const sorted = _sortItems(allItems);
    const groups = _groupItems(sorted);

    const verifiedCount = allItems.filter(i => i.verified_at || i.item_status === 'missing').length;
    const totalCount = allItems.length;
    const pct = totalCount > 0 ? Math.round((verifiedCount / totalCount) * 100) : 0;
    const allVerified = verifiedCount === totalCount && totalCount > 0;

    let html = `<div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 style="margin:0;">Verify Items</h2>
                <button class="btn btn-sm btn-secondary" style="font-size:0.78rem;padding:3px 10px;" onclick="openAddItem('${sessionId}')">➕ Unexpected Item</button>
            </div>
            <span style="color:${allVerified ? 'var(--green)' : 'var(--text-dim)'}; font-size:0.85rem; font-weight:600;">${verifiedCount}/${totalCount} verified</span>
        </div>
        <div class="progress-bar" style="margin-bottom:12px;">
            <div class="fill" style="width:${pct}%; background:${allVerified ? 'var(--green)' : 'var(--accent)'};"></div>
        </div>
        ${_renderSortToolbar()}
        <div style="overflow-x:auto;">
        <table class="responsive-cards">
            <thead><tr>
                <th>Product</th><th>Qty</th><th>Type</th><th>Store</th><th>COGS</th><th>Verify</th>
            </tr></thead>
            <tbody>`;

    for (const group of groups) {
        if (group.label) {
            html += `<tr><td colspan="6" style="font-weight:700;font-size:0.85rem;background:var(--surface-2);padding:6px 10px;border-bottom:2px solid var(--border);">${group.label}</td></tr>`;
        }
        for (const item of group.items) {
            html += _renderVerifyRow(item, sessionId);
        }
    }

    html += `</tbody></table></div></div>`;

    // Complete button — show unless already ingested
    if (s.status !== 'ingested') {
        html += `<button class="complete-stage-btn" ${!allVerified ? 'disabled' : ''} onclick="completeVerify('${sessionId}')">
            ${allVerified ? '✓ Complete Verification → Breakdown' : `Verify all items first (${totalCount - verifiedCount} remaining)`}
        </button>`;
    }

    return html;
}

function _renderVerifyRow(item, sessionId) {
    const st = item.item_status || 'good';
    const isMissing = st === 'missing';
    const isDamaged = st === 'damaged';
    const isVerified = !!item.verified_at;
    const name = item.product_name || 'Unknown';
    const escName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const ptype = item.product_type || 'sealed';

    let rowStyle = '';
    if (isMissing) rowStyle = 'opacity:0.4; text-decoration:line-through;';
    else if (isDamaged) rowStyle = 'background:rgba(255,170,0,0.06);';
    else if (isVerified) rowStyle = 'background:rgba(45,212,160,0.04);';

    let verifyCell = '';
    if (isMissing) {
        verifyCell = `<span class="verify-btn verified-missing" style="cursor:default;">Missing</span>`;
    } else if (isDamaged && isVerified) {
        verifyCell = `<span class="verify-btn verified-damaged" style="cursor:default;">Damaged</span>`;
    } else if (isVerified) {
        verifyCell = `<span class="verify-btn verified" style="cursor:default;">✓ Here</span>`;
    } else {
        verifyCell = `<div class="verify-btn-group">
            <button class="verify-btn here" onclick="verifyItem('${item.id}', '${sessionId}', 'here', ${item.quantity||1})">✓ Here</button>
            <button class="verify-btn missing" onclick="verifyItem('${item.id}', '${sessionId}', 'missing', ${item.quantity||1})">✗ Missing</button>
            <button class="verify-btn damaged" onclick="verifyItem('${item.id}', '${sessionId}', 'damaged', ${item.quantity||1})">⚠ Damaged</button>
        </div>`;
    }

    return `<tr style="${rowStyle}" data-item-id="${item.id}">
        <td class="name-cell" data-label="">${name}${item.set_name ? '<br><small style="color:var(--text-dim);">' + item.set_name + '</small>' : ''}${item.tcgplayer_id ? '<br><small style="color:var(--text-dim);">TCG#' + item.tcgplayer_id + '</small>' : ''}</td>
        <td data-label="Qty">${item.quantity || 1}</td>
        <td data-label="Type"><span class="badge badge-dim" style="font-size:0.65rem;">${ptype.toUpperCase()}</span></td>
        <td data-label="Store">${item.store_price != null ? '$' + item.store_price.toFixed(2) : '<span style="color:var(--text-dim);">$' + (item.market_price || 0).toFixed(2) + '*</span>'}</td>
        <td data-label="COGS">$${(item.offer_price || 0).toFixed(2)}</td>
        <td data-label="Verify">${verifyCell}</td>
    </tr>`;
}

async function verifyItem(itemId, sessionId, status, totalQty) {
    try {
        if (status === 'here' && totalQty > 1) {
            const input = await themedPrompt('Verify Quantity', `How many are here? (expected: ${totalQty})`, totalQty);
            if (input === null) return;
            const confirmed = parseInt(input);
            if (isNaN(confirmed) || confirmed < 0 || confirmed > totalQty) {
                alert(`Must be between 0 and ${totalQty}`);
                return;
            }
            await fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'here', qty_confirmed: confirmed }),
            });
        } else if (status === 'missing' && totalQty > 1) {
            const input = await themedPrompt('Missing Quantity', `How many are missing? (of ${totalQty})`, totalQty);
            if (input === null) return;
            const missing = parseInt(input);
            if (isNaN(missing) || missing < 1 || missing > totalQty) {
                alert(`Must be between 1 and ${totalQty}`);
                return;
            }
            await fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'missing', missing_qty: missing }),
            });
        } else if (status === 'damaged') {
            let damaged_qty = null;
            if (totalQty > 1) {
                const input = await themedPrompt('Damaged Quantity', `How many are damaged? (1–${totalQty})`, totalQty);
                if (input === null) return;
                damaged_qty = parseInt(input);
                if (isNaN(damaged_qty) || damaged_qty < 1 || damaged_qty > totalQty) {
                    alert(`Must be between 1 and ${totalQty}`);
                    return;
                }
            }
            const body = { status: 'damaged' };
            if (damaged_qty !== null) body.damaged_qty = damaged_qty;
            await fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
        } else {
            await fetch(`/api/ingest/item/${itemId}/verify`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status }),
            });
        }
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function completeVerify(sessionId) {
    try {
        const r = await fetch(`/api/ingest/session/${sessionId}/complete-verify`, { method: 'POST' });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'Failed'); return; }
        _currentStage = 'breakdown';
        viewSession(sessionId, false);
    } catch(err) { alert(err.message); }
}

// ── BREAKDOWN STAGE ──────────────────────────────────────────────────────────
function _renderBreakdownContent(data) {
    const { session: s, items } = data;
    const sessionId = s.id;
    // Show good + damaged items (not missing, not rejected) — including breakdown families
    const activeItems = items.filter(i => ['good','damaged','broken_down'].includes(i.item_status));

    // Build child map
    const childrenOf = {};
    activeItems.forEach(i => {
        if (i.parent_item_id) {
            if (!childrenOf[i.parent_item_id]) childrenOf[i.parent_item_id] = [];
            childrenOf[i.parent_item_id].push(i);
        }
    });

    const topLevel = activeItems.filter(i => !i.parent_item_id);
    const sorted = _sortItems(topLevel);
    const groups = _groupItems(sorted);

    let html = `<div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 style="margin:0;">Breakdown Decisions</h2>
                <button class="btn btn-sm btn-secondary" style="font-size:0.78rem;padding:3px 10px;" onclick="openAddItem('${sessionId}')">➕ Add Item</button>
            </div>
            <span style="color:var(--text-dim); font-size:0.82rem;">Break down what you want, skip the rest</span>
        </div>
        ${_renderSortToolbar()}
        <div style="overflow-x:auto;">
        <table class="responsive-cards">
            <thead><tr>
                <th>Product</th><th>Qty</th><th>Status</th><th>Store</th><th>COGS</th><th>Actions</th>
            </tr></thead>
            <tbody>`;

    for (const group of groups) {
        if (group.label) {
            html += `<tr><td colspan="6" style="font-weight:700;font-size:0.85rem;background:var(--surface-2);padding:6px 10px;border-bottom:2px solid var(--border);">${group.label}</td></tr>`;
        }
        for (const item of group.items) {
            html += renderItemRow(item, true, sessionId, false);
            // Render children
            const kids = childrenOf[item.id] || [];
            for (const kid of kids) {
                html += renderItemRow(kid, true, sessionId, true);
                // Nested children
                const grandkids = childrenOf[kid.id] || [];
                for (const gk of grandkids) {
                    html += renderItemRow(gk, true, sessionId, true);
                }
            }
        }
    }

    html += `</tbody></table></div></div>`;

    // Complete button — show unless already past breakdown or ingested
    if (['received', 'verified'].includes(s.status)) {
        html += `<button class="complete-stage-btn" onclick="completeBreakdown('${sessionId}')">
            ✓ Done with Breakdowns → Push
        </button>`;
    }

    return html;
}

async function completeBreakdown(sessionId) {
    try {
        const r = await fetch(`/api/ingest/session/${sessionId}/complete-breakdown`, { method: 'POST' });
        const d = await r.json();
        if (!r.ok) { alert(d.error || 'Failed'); return; }
        _currentStage = 'push';
        viewSession(sessionId, false);
    } catch(err) { alert(err.message); }
}

// ── PUSH STAGE ──────────────────────────────────────────────────────────
function _renderPushContent(data) {
    const { session: s, items } = data;
    const sessionId = s.id;
    const isActive = ['received', 'verified', 'breakdown_complete', 'partially_ingested'].includes(s.status);

    // Show final state items (good + damaged, not broken_down parents)
    const pushableItems = items.filter(i => ['good','damaged'].includes(i.item_status) && i.is_mapped && !i.pushed_at);
    const pushedItems = items.filter(i => i.pushed_at);
    const sorted = _sortItems(pushableItems);
    const groups = _groupItems(sorted);

    let html = `<div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
            <h2 style="margin:0;">Push Summary</h2>
            <span style="color:var(--text-dim); font-size:0.82rem;">${pushableItems.length} items ready · ${pushedItems.length} already pushed</span>
        </div>
        ${_renderSortToolbar()}
        <div style="overflow-x:auto;">
        <table class="responsive-cards">
            <thead><tr>
                <th>Product</th><th>Qty</th><th>Status</th><th>Store</th><th>COGS</th>
            </tr></thead>
            <tbody>`;

    for (const group of groups) {
        if (group.label) {
            html += `<tr><td colspan="5" style="font-weight:700;font-size:0.85rem;background:var(--surface-2);padding:6px 10px;border-bottom:2px solid var(--border);">${group.label}</td></tr>`;
        }
        for (const item of group.items) {
            const st = item.item_status || 'good';
            const isDamaged = st === 'damaged';
            const name = item.product_name || 'Unknown';
            const isChild = !!item.parent_item_id;
            let badges = '';
            if (isDamaged) badges += ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.65rem;">DAMAGED</span>';
            if (isChild) badges += ' <span class="badge badge-blue" style="font-size:0.65rem;">FROM BREAKDOWN</span>';
            const ptype = item.product_type || 'sealed';

// ── BREAKDOWN SUMMARY ENRICHMENT (uses shared breakdown_inline.js) ──────────
async function _enrichBreakdownSummaries(items, sessionId, isReceived) {
    if (!isReceived) return;
    const tcgIds = [...new Set(items
        .filter(i => i.tcgplayer_id && i.item_status !== 'broken_down')
        .map(i => i.tcgplayer_id))];
    if (!tcgIds.length) return;

    try {
        const r = await fetch('/api/breakdown-cache/batch', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ tcgplayer_ids: tcgIds }),
        });
        const d = await r.json();
        const summaries = d.summaries || {};

        items.filter(i => i.tcgplayer_id && i.item_status !== 'broken_down').forEach(item => {
            const bd = summaries[item.tcgplayer_id];
            const cell = document.querySelector(`tr[data-item-id="${item.id}"] td.name-cell`);
            if (!cell) return;
            cell.querySelectorAll('.bd-badge, .bd-summary-badge').forEach(e => e.remove());
            if (!bd) return;
            renderBreakdownBadge(cell, bd, { market_price: item.market_price }, { priceMode: 'best' });
        });
    } catch(e) { /* silently ignore */ }
}

function renderItemRow(item, isReceived, sessionId, isChild = false) {
    const st = item.item_status || 'good';
    const isBroken = st === 'broken_down';
    const isDamaged = st === 'damaged';
    const name = item.product_name || 'Unknown';
    const escName = name.replace(/'/g, "\\'").replace(/"/g, '&quot;');

    let rowStyle = '';
    if (isBroken) rowStyle = 'opacity:0.35; text-decoration:line-through;';
    else if (isDamaged) rowStyle = 'background:rgba(255,170,0,0.06);';

    let badges = '';
    if (isDamaged) badges += ' <span class="badge" style="background:#b45309;color:#fff;font-size:0.65rem;">DAMAGED</span>';
    if (isBroken) badges += ' <span class="badge badge-dim" style="font-size:0.65rem;">BROKEN DOWN</span>';
    if (isChild) badges += ' <span class="badge badge-blue" style="font-size:0.65rem;">FROM BREAKDOWN</span>';
    if (!item.is_mapped) badges += ' <span class="badge badge-amber" style="font-size:0.65rem;">UNMAPPED</span>';

    let actionCell = '';
    if (isReceived && !isBroken && !isChild) {
        const damageToggle = isDamaged
            ? `<button onclick="markGood('${item.id}', '${sessionId}')">✅ Mark Good</button>`
            : `<button onclick="markDamaged('${item.id}', '${sessionId}', ${item.quantity||1})">⚠️ Mark Damaged</button>`;
        actionCell = `
            <div style="display:flex; align-items:center; gap:6px;">
                <button class="btn btn-sm btn-primary" style="font-size:0.78rem;padding:3px 10px;" onclick="openBdModal('${item.id}', '${sessionId}', '${escName}', ${item.quantity||1}, ${item.tcgplayer_id||'null'}, ${item.market_price||0})">🔨 Break Down</button>
                <div class="action-dropdown-container" style="position:relative;display:inline-block;">
                    <button class="btn btn-sm btn-secondary action-trigger" style="font-size:0.78rem;padding:3px 8px;" onclick="toggleActionMenu(event, this.nextElementSibling)">⋯</button>
                    <div class="action-dropdown">
                        <button onclick="relinkItem('${item.id}', '${sessionId}')">🔗 Relink</button>
                        <button onclick="editItemQty('${item.id}', '${sessionId}', ${item.quantity||1})">✏️ Edit Qty</button>
                        ${damageToggle}
                        <hr>
                        <button class="danger" onclick="deleteItem('${item.id}', '${sessionId}', '${escName}')">✕ Delete</button>
                    </div>
                </div>
            </div>`;
    } else if (isReceived && isBroken) {
        actionCell = `<button class="btn btn-sm btn-secondary" style="font-size:0.72rem;padding:3px 8px;border-color:var(--amber);" onclick="undoBreakdown('${item.id}', '${sessionId}')">↩ Undo</button>`;
    } else if (isReceived && isChild) {
        const childBreakBtn = item.tcgplayer_id
            ? `<button class="btn btn-sm btn-primary" style="font-size:0.72rem;padding:3px 8px;" onclick="openBdModal('${item.id}', '${sessionId}', '${escName}', ${item.quantity||1}, ${item.tcgplayer_id||'null'}, ${item.market_price||0})">🔨 Break Down</button>`
            : '';
        actionCell = `<div style="display:flex;gap:6px;align-items:center;">
            ${childBreakBtn}
            <button class="btn btn-sm btn-secondary" style="font-size:0.72rem;padding:3px 8px;" onclick="editItemQty('${item.id}', '${sessionId}', ${item.quantity||1})">✏️ Qty</button>
            <button class="btn btn-sm" style="font-size:0.72rem;padding:3px 8px;color:var(--red);" onclick="deleteItem('${item.id}', '${sessionId}', '${escName}')">✕</button>
        </div>`;
    }

    const approvedStyle = '';
    return `<tr style="${rowStyle}${approvedStyle}" data-item-id="${item.id}" data-item-status="${st}" data-is-graded="${!!item.is_graded}" data-grade-company="${item.grade_company||''}" data-grade-value="${item.grade_value||''}" data-product-name="${(item.product_name||'').replace(/"/g,'&quot;')}" data-price="${item.market_price||0}">
        <td class="name-cell" data-label="">${isChild ? '<span style="color:var(--text-dim);">↳</span> ' : ''}${name}${badges}${item.set_name ? '<br><small style="color:var(--text-dim);">' + item.set_name + '</small>' : ''}${item.tcgplayer_id ? '<br><small style="color:var(--text-dim);">TCG#' + item.tcgplayer_id + '</small>' : ''}${(() => {
            const v = item.velocity;
            if (!v) return '';
            const sold = v.units_sold_90d || 0;
            const allTime = v.total_sold_all_time || 0;
            const doi = v.velocity_score || 9999;
            const qty = v.current_qty || 0;
            const oos = v.out_of_stock_days || 0;
            const dailyRate = sold > 0 ? (sold / 90).toFixed(1) : 0;
            let rateLabel, rateColor;
            if (sold === 0 && allTime === 0) { rateLabel = 'No Sales'; rateColor = 'var(--text-dim)'; }
            else if (sold === 0) { rateLabel = allTime + ' lifetime'; rateColor = 'var(--accent)'; }
            else if (dailyRate >= 5) { rateLabel = 'Very Fast'; rateColor = 'var(--green)'; }
            else if (dailyRate >= 1) { rateLabel = 'Fast'; rateColor = 'var(--green)'; }
            else if (dailyRate >= 0.3) { rateLabel = 'Medium'; rateColor = 'var(--amber)'; }
            else if (dailyRate >= 0.1) { rateLabel = 'Slow'; rateColor = 'var(--text-dim)'; }
            else { rateLabel = 'Very Slow'; rateColor = 'var(--text-dim)'; }
            const stockInfo = qty > 0 ? (doi < 9999 ? qty + ' stock (' + Math.round(doi) + 'd)' : qty + ' stock') : 'OOS';
            const stockColor = qty === 0 ? 'var(--red)' : doi <= 14 ? 'var(--amber)' : 'var(--text-dim)';
            const conf = oos > 0 ? '' : ' ⚠';
            return '<br><small>📊 <span style="color:' + rateColor + ';">' + sold + ' sold · ' + rateLabel + '</span> · <span style="color:' + stockColor + ';">' + stockInfo + '</span>' + conf + '</small>';
        })()}</td>
        <td data-label="Qty">${item.quantity || 1}</td>
        <td data-label="Status"><span class="badge ${isDamaged ? 'badge-amber' : isBroken ? 'badge-dim' : 'badge-green'}">${st}</span></td>
        <td data-label="Store">${item.store_price != null ? `$${item.store_price.toFixed(2)}` : `<span style="color:var(--dim);" title="Not in store — showing market">$${(item.market_price || 0).toFixed(2)}*</span>`}</td>
        <td data-label="COGS">$${(item.offer_price || 0).toFixed(2)}${(item.quantity || 1) > 1 ? '<br><small style="color:var(--text-dim);">$' + ((item.offer_price || 0) / (item.quantity || 1)).toFixed(2) + '/ea</small>' : ''}</td>
        ${isReceived ? '<td data-label="">' + actionCell + '</td>' : ''}
    </tr>`;
}

async function markDamaged(itemId, sessionId, totalQty) {
    let damagedQty = totalQty;

    if (totalQty > 1) {
        const input = await themedPrompt(`Mark as Damaged`, `How many are damaged? (1–${totalQty})`, totalQty);
        if (input === null) return;
        damagedQty = parseInt(input);
        if (isNaN(damagedQty) || damagedQty < 1 || damagedQty > totalQty) {
            alert(`Must be between 1 and ${totalQty}`);
            return;
        }
    }

    const ok = await themedConfirm(
        'Mark as Damaged',
        damagedQty === totalQty
            ? `Mark all ${totalQty} unit(s) as damaged?`
            : `Split: ${damagedQty} damaged, ${totalQty - damagedQty} good.`,
    );
    if (!ok) return;

    try {
        const body = damagedQty < totalQty ? { damaged_qty: damagedQty } : {};
        await fetch(`/api/ingest/item/${itemId}/damage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
        });
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function markGood(itemId, sessionId) {
    try {
        await fetch(`/api/ingest/item/${itemId}/mark-good`, { method: 'POST' });
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function undoBreakdown(itemId, sessionId) {
    const ok = await themedConfirm(
        '↩ Undo Breakdown',
        'This will delete all components from this breakdown and restore the original item.',
        { confirmText: 'Undo', dangerous: true }
    );
    if (!ok) return;
    try {
        const r = await fetch(`/api/ingest/item/${itemId}/undo-breakdown`, { method: 'POST' });
        const text = await r.text();
        let d;
        try { d = JSON.parse(text); } catch(e) { alert('Server error: ' + text.substring(0, 200)); return; }
        if (!r.ok) { alert(d.error || 'Undo failed'); return; }
        viewSession(sessionId, true);
    } catch(err) { alert(err.message); }
}

async function addItemManual() {

        const sd = await sr.json();

            const pid = p.tcgplayer_id || p.tcgplayerId || p.tcgPlayerId || p.id;
            return String(pid) === String(tcgId);
        });

        const name = match ? (match.name || match.productName || 'Unknown') : 'Unknown';
        const price = match ? (match.unopenedPrice || match.marketPrice || 0) : 0;
        const setName = match ? (match.setName || match.set_name || '') : '';

        const r = await fetch(`/api/ingest/session/${_addItemSessionId}/add-item`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                product_name: name,
                tcgplayer_id: parseInt(tcgId),
                market_price: price,
                set_name: setName || null,
                quantity: qty,
            }),
        });
        const d = await r.json();
        if (!r.ok) { alert(d.error); return; }
        const sid = _addItemSessionId;
        closeAddItem();
        viewSession(sid, true);
    } catch(err) { alert(err.message); }
}

async function _pollPushJob(jobId, total, panel) {
    /**
     * Poll a background push job until it completes.
     * Shows progress bar in the panel. Returns the final job result or null on error.
     * Retries on transient failures — the backend keeps processing even if we lose connection briefly.
     */
    const startTime = Date.now();
    let consecutiveFailures = 0;
    const MAX_RETRIES = 10;
    while (true) {
        await new Promise(r => setTimeout(r, 2000));  // poll every 2s
        try {
            const r = await fetch(`/api/ingest/push-job/${jobId}`);
            if (!r.ok) {
                consecutiveFailures++;
                if (consecutiveFailures >= MAX_RETRIES) {
                    panel.innerHTML = `<div class="alert alert-error">Lost connection to push job after ${MAX_RETRIES} retries. The push may still be running in the background — reload the page to check session status.</div>`;
                    return null;
                }
                continue;
            }
            const d = await r.json();
            consecutiveFailures = 0;  // reset on success

            if (d.status === 'running') {
                const pct = total > 0 ? Math.round((d.progress / total) * 100) : 0;
                const elapsed = Math.round((Date.now() - startTime) / 1000);
                panel.innerHTML = `
                    <div style="padding:16px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem;">
                            <span><span class="spinner" style="display:inline-block;width:14px;height:14px;margin-right:6px;"></span> Pushing to Shopify...</span>
                            <span style="color:var(--text-dim);">${d.progress}/${total} items · ${elapsed}s</span>
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width:${pct}%;"></div>
                        </div>
                    </div>`;
                continue;
            }

            // Job complete
            return d;
        } catch(err) {
            consecutiveFailures++;
            if (consecutiveFailures >= MAX_RETRIES) {
                panel.innerHTML = `<div class="alert alert-error">Connection lost after ${MAX_RETRIES} retries: ${err.message}. The push may still be running — reload the page to check session status.</div>`;
                return null;
            }
            // Show transient warning but keep polling
            const elapsed = Math.round((Date.now() - startTime) / 1000);
            panel.innerHTML = `
                <div style="padding:16px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem;">
                        <span><span class="spinner" style="display:inline-block;width:14px;height:14px;margin-right:6px;"></span> Pushing to Shopify... (reconnecting ${consecutiveFailures}/${MAX_RETRIES})</span>
                        <span style="color:var(--text-dim);">${elapsed}s</span>
                    </div>
                    <div class="progress-bar">
                        <div class="fill" style="width:0%;"></div>
                    </div>
                </div>`;
        }
    }
}


async function pushLive(sessionId) {
    // All unpushed items are candidates (verification replaces old approval gating)
    const allItemRows = [...document.querySelectorAll('tr[data-item-id]')];
    const gradedIds = new Set();
    const sealedRawIds = new Set();
    allItemRows.forEach(row => {
        const id = row.getAttribute('data-item-id');
        if (_pushedItemIds.has(id)) return;
        if (row.getAttribute('data-item-status') === 'broken_down') return;
        if (row.getAttribute('data-is-graded') === 'true') gradedIds.add(id);
        else sealedRawIds.add(id);
    });
    const totalPending = gradedIds.size + sealedRawIds.size;
    const isPartial = false;

    const confirmMsg = `Push ${totalPending} items (${gradedIds.size} graded slabs, ${sealedRawIds.size} sealed/raw). Cannot be easily undone.`;

    const ok = await themedConfirm('🚀 Push Live', confirmMsg,
        { confirmText: `Push ${totalPending} Items`, dangerous: true });
    if (!ok) return;

    const panel = document.getElementById('push-live-results');

    // ── Step 1: Push sealed + raw items (background job with polling) ────────
    if (sealedRawIds.size > 0) {
        panel.innerHTML = '<div class="loading"><span class="spinner"></span> Starting push...</div>';
        try {
            const body = JSON.stringify({ item_ids: [...sealedRawIds] });
            const r = await fetch(`/api/ingest/session/${sessionId}/push-live`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body,
            });
            const d = await r.json();
            if (!r.ok && !d.job_id) {
                panel.innerHTML = `<div class="alert alert-error">${d.error}</div>`;
                return;
            }

            // If server returned a job_id, poll for progress
            if (d.job_id) {
                const result = await _pollPushJob(d.job_id, d.total || 0, panel);
                if (!result) return;  // error already shown
                _renderSealedRawResults(result, sessionId, panel);
            } else {
                // Fallback: server returned immediate results (shouldn't happen but safe)
                _renderSealedRawResults(d, sessionId, panel);
            }
        } catch(err) {
            panel.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
            return;
        }
    }

    // ── Step 2: Graded slabs — cert-entry UI ──────────────────────────────────
    if (gradedIds.size > 0) {
        await _showGradedCertPanel(sessionId, [...gradedIds], panel, sealedRawIds.size > 0);
    }
}

                        <div style="font-size:0.78rem; color:var(--text-dim);">
                            <strong style="color:var(--text);">${b.card_name||''}</strong><br>
                            ${b.set_name||''} · ${b.condition||''} · <span style="color:var(--accent); font-family:monospace;">${b.bin_label||''}</span>
                        </div>
                        <div style="display:flex; gap:6px;">
                            <a href="data:image/png;base64,${b.png_b64}" download="${b.barcode}.png" style="flex:1;">
                                <button class="btn btn-secondary btn-sm" style="width:100%; font-size:0.72rem;">⬇ Download</button>
                            </a>
                            <button class="btn btn-secondary btn-sm" style="flex:1; font-size:0.72rem;" onclick="printOneBarcode('${b.barcode}')">🖨 Print</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>`;
        // Store barcodes for print-all
        window._lastBarcodes = allBarcodes;
    }

    panel.innerHTML = html;
}

async function _loadSessionBarcodes(sessionId) {
    try {
        const r = await fetch(`/api/raw-cards/session/${sessionId}`);
        if (!r.ok) return;
        const d = await r.json();
        const cards = d.cards || [];
        if (!cards.length) return;

        const panel = document.getElementById('session-barcode-section');
        if (!panel) return;

        // Build barcode grid from DB records — use reprint endpoint for images
        const grid = cards.map(c => `
            <div style="background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:10px; display:flex; flex-direction:column; gap:6px;">
                <img src="/api/raw-cards/barcode/${c.barcode}.png" style="width:100%; border-radius:4px; background:#fff;" alt="barcode" loading="lazy">
                <div style="font-size:0.78rem; color:var(--text-dim);">
                    <strong style="color:var(--text);">${c.card_name||''}</strong><br>
                    ${c.set_name||''} · ${c.condition||''} · <span style="color:var(--accent); font-family:monospace;">${c.bin_label||'?'}</span>
                </div>
                <button class="btn btn-secondary btn-sm" style="font-size:0.72rem;" onclick="printOneBarcode('${c.barcode}')">🖨 Print</button>
            </div>
        `).join('');

        const barcodeSection = document.createElement('div');
        barcodeSection.className = 'card';
        barcodeSection.innerHTML = `
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px;">
                <div style="font-weight:700; font-size:0.95rem;">🏷 Barcode Labels (${cards.length})</div>
                <button class="btn btn-primary btn-sm" onclick="printAllBarcodesFromSession('${sessionId}')" style="font-size:0.78rem;">🖨 Print All</button>
            </div>
            <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px;">
                ${grid}
            </div>
        `;

        // Append to push-live-results if empty, otherwise replace any existing barcode section
        const existing = panel.querySelector('.barcode-session-section');
        if (existing) existing.remove();
        barcodeSection.classList.add('barcode-session-section');
        panel.appendChild(barcodeSection);
    } catch(e) { /* silent — barcodes are bonus UI */ }
}

async function printAllBarcodesFromSession(sessionId) {
    try {
        const r = await fetch(`/api/raw-cards/session/${sessionId}`);
        const d = await r.json();
        const cards = d.cards || [];
        if (!cards.length) return;
        const win = window.open('', '_blank');
        // Use reprint endpoint URLs — browser will fetch them
        const imgs = cards.map(c =>
            `<img src="/api/raw-cards/barcode/${c.barcode}.png" style="width:62mm; display:block; page-break-after:always;">`
        ).join('');
        win.document.write(`<html><head><style>@media print { @page { margin:0; size: 89mm 28mm landscape; } body { margin:0; } img { width:89mm; height:28mm; display:block; page-break-after:always; } }</style></head><body style="margin:0">${imgs}<script>window.onload=function(){window.print();window.close()}<\/script></body></html>`);
        win.document.close();
    } catch(e) { alert('Failed to load barcodes: ' + e.message); }
}

function printOneBarcode(barcodeId) {
    const win = window.open('', '_blank');
    win.document.write(`<html><head><style>
        @media print { @page { margin:0; size: 89mm 28mm landscape; } }
        body { margin:0; }
        img { width:89mm; height:28mm; display:block; }
    </style></head><body>
        <img src="/api/raw-cards/barcode/${barcodeId}.png" onload="window.print();window.close()">
    </body></html>`);
    win.document.close();
}

function printAllBarcodes() {
    const barcodes = window._lastBarcodes || [];
    if (!barcodes.length) return;
    const win = window.open('', '_blank');
    const imgs = barcodes.map(b =>
        `<img src="data:image/png;base64,${b.png_b64}" style="width:62mm; display:block; page-break-after:always;">`
    ).join('');
    win.document.write(`<html><head><style>@media print { @page { margin:0; size: 89mm 28mm landscape; } body { margin:0; } img { width:89mm; height:28mm; display:block; page-break-after:always; } }</style></head><body style="margin:0">${imgs}<script>window.onload=function(){window.print();window.close()}<\/script></body></html>`);
    win.document.close();
}

async function _showGradedCertPanel(sessionId, gradedItemIds, panel, append) {
    // Build cert-entry cards for each graded item
    const gradedRows = gradedItemIds.map(id => {
        const row = document.querySelector(`tr[data-item-id="${id}"]`);
        if (!row) return null;
        return {
            id,
            name:    row.getAttribute('data-product-name') || 'Unknown',
            company: row.getAttribute('data-grade-company') || 'PSA',
            grade:   row.getAttribute('data-grade-value') || '?',
            price:   row.getAttribute('data-price') || '0',
        };
    }).filter(Boolean);

    const certPanel = document.createElement('div');
    certPanel.style.cssText = 'margin-top:16px; border-top:2px solid var(--border); padding-top:16px;';
    certPanel.innerHTML = `
        <div style="font-size:1rem;font-weight:700;margin-bottom:12px;">🏅 Graded Slabs — Enter Cert Numbers</div>
        <p style="font-size:0.85rem;color:var(--text-dim);margin-bottom:14px;">
            Enter the cert number for each slab, then push individually. You can skip any and push them later.
        </p>
        ${gradedRows.map(item => `
            <div id="graded-row-${item.id}" style="display:flex;gap:10px;align-items:center;padding:10px;background:var(--surface-2);border-radius:8px;margin-bottom:8px;flex-wrap:wrap;">
                <div style="flex:1;min-width:200px;">
                    <div style="font-weight:600;font-size:0.9rem;">${item.name}</div>
                    <div style="font-size:0.78rem;color:var(--text-dim);">${item.company} ${item.grade} · $${parseFloat(item.price).toFixed(2)}</div>
                </div>
                <input type="text" id="cert-input-${item.id}" placeholder="Cert # (e.g. 12345678)"
                    style="width:170px;font-size:0.85rem;"
                    onkeydown="if(event.key==='Enter') pushGradedSlab('${item.id}','${sessionId}')">
                <button class="btn btn-primary btn-sm" id="cert-btn-${item.id}"
                    onclick="pushGradedSlab('${item.id}','${sessionId}')"
                    style="font-size:0.78rem;white-space:nowrap;">
                    Push Slab
                </button>
                <div id="cert-result-${item.id}" style="font-size:0.8rem;min-width:100px;"></div>
            </div>
        `).join('')}
    `;

    if (append) {
        panel.appendChild(certPanel);
    } else {
        panel.innerHTML = '';
        panel.appendChild(certPanel);
    }
}

async function pushGradedSlab(itemId, sessionId) {
    const certInput = document.getElementById(`cert-input-${itemId}`);
    const btn       = document.getElementById(`cert-btn-${itemId}`);
    const resultEl  = document.getElementById(`cert-result-${itemId}`);
    const cert      = (certInput?.value || '').trim();

    if (!cert) { resultEl.innerHTML = '<span style="color:var(--red);">Enter cert #</span>'; return; }

    btn.disabled = true;
    btn.textContent = '⟳';
    resultEl.innerHTML = '<span style="color:var(--text-dim);">Pushing...</span>';

    try {
        const r = await fetch(`/api/ingest/item/${itemId}/push-graded`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cert_number: cert, session_id: sessionId }),
        });
        const d = await r.json();
        if (!r.ok) {
            btn.disabled = false; btn.textContent = 'Push Slab';
            resultEl.innerHTML = `<span style="color:var(--red);">❌ ${d.error||'Failed'}</span>`;
            return;
        }

        // Success — lock row
        const row = document.getElementById(`graded-row-${itemId}`);
        if (row) {
            const actionLabel = d.action === 'added_variant' ? '✅ Added variant' : '🆕 New listing';
            row.style.opacity = '0.6';
            row.innerHTML = `
                <div style="flex:1;">
                    <div style="font-weight:600;font-size:0.9rem;">${d.title || 'Slab'}</div>
                    <div style="font-size:0.78rem;color:var(--text-dim);">Cert: ${cert}</div>
                </div>
                <span style="color:var(--green);font-size:0.85rem;">${actionLabel}</span>
            `;
        }
        _pushedItemIds.add(itemId);
    } catch(err) {
        btn.disabled = false; btn.textContent = 'Push Slab';
        resultEl.innerHTML = `<span style="color:var(--red);">❌ ${err.message}</span>`;
    }
}
