<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pack Fresh — User Management</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/pf-static/pf_theme.css">
<script src="/pf-static/pf_ui.js"></script>
<style>
body { min-height:100vh; }
header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--accent); }
.back { color:var(--text-dim); text-decoration:none; font-size:0.85rem; }
.back:hover { color:var(--text); text-decoration:none; }
.main { max-width:700px; margin:0 auto; padding:24px; }
.card { border-radius:12px; padding:20px; margin-bottom:16px; }
h2 { font-size:1.1rem; margin-bottom:16px; }
.role-badge { padding:2px 8px; border-radius:10px; font-size:0.68rem; font-weight:700; text-transform:uppercase; }
.role-owner { background:rgba(79,125,249,0.2); color:var(--accent); }
.role-manager { background:rgba(52,208,88,0.2); color:var(--green); }
.role-associate { background:rgba(246,173,85,0.2); color:var(--amber); }
.inactive { opacity:0.4; }
.form-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.form-input { height:40px; border-width:1.5px; border-radius:8px; padding:0 12px; flex:1; min-width:120px; }
.form-select { height:40px; border-width:1.5px; border-radius:8px; padding:0 10px; cursor:pointer; }
.btn { height:40px; padding:0 18px; font-size:0.85rem; }
.btn-sm { height:30px; padding:0 10px; font-size:0.75rem; border-radius:6px; border:1px solid var(--border); background:none; color:var(--text-dim); cursor:pointer; }
.btn-sm:hover { border-color:var(--text); color:var(--text); }
.error { color:var(--red); font-size:0.82rem; margin-top:8px; }
</style>
</head>
<body>

<header>
  <a class="back" href="/">← Console</a>
  <div class="logo">User Management</div>
</header>

<div class="main">
  <div class="card">
    <h2>Add User</h2>
    <div class="form-row">
      <input class="form-input" id="new-name" placeholder="Name">
      <input class="form-input" id="new-email" placeholder="Email" type="email">
    </div>
    <div class="form-row">
      <input class="form-input" id="new-pass" placeholder="Password (min 8)" type="password">
      <select class="form-select" id="new-role">
        <option value="associate">Associate</option>
        <option value="manager">Manager</option>
        <option value="owner">Owner</option>
      </select>
      <button class="btn btn-primary" onclick="addUser()">Add</button>
    </div>
    <div class="error" id="add-error"></div>
  </div>

  <div class="card">
    <h2>Users</h2>
    <div id="users-list"><em style="color:var(--dim);">Loading...</em></div>
  </div>
</div>

<script>

async function loadUsers() {
  const el = document.getElementById('users-list');
  try {
    const r = await fetch('/api/users');
    const d = await r.json();
    const users = d.users || [];
    if (!users.length) { el.innerHTML = '<em style="color:var(--dim);">No users yet.</em>'; return; }
    el.innerHTML = `<table>
      <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Last Login</th><th></th></tr></thead>
      <tbody>${users.map(u => {
        const active = u.is_active !== false;
        const login = u.last_login_at ? new Date(u.last_login_at).toLocaleDateString() : 'Never';
        const esc = s => (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
        return `<tr class="${active ? '' : 'inactive'}">
          <td><strong>${u.name}</strong></td>
          <td style="color:var(--dim);">${u.email}</td>
          <td>
            <select class="form-select" style="height:28px;font-size:0.72rem;padding:0 6px;" onchange="changeRole('${u.id}',this.value)">
              <option value="associate" ${u.role==='associate'?'selected':''}>Associate</option>
              <option value="manager" ${u.role==='manager'?'selected':''}>Manager</option>
              <option value="owner" ${u.role==='owner'?'selected':''}>Owner</option>
            </select>
          </td>
          <td style="color:var(--dim);font-size:0.78rem;">${login}</td>
          <td style="white-space:nowrap;">
            <button class="btn-sm" onclick="editName('${u.id}','${esc(u.name)}')">✏️</button>
            <button class="btn-sm" onclick="resetPassword('${u.id}','${esc(u.name)}')">🔑</button>
            <button class="btn-sm" onclick="toggleActive('${u.id}',${!active})">${active ? '🚫' : '✅'}</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  } catch(e) { el.innerHTML = `<em style="color:var(--red);">${e.message}</em>`; }
}

async function addUser() {
  const name = document.getElementById('new-name').value.trim();
  const email = document.getElementById('new-email').value.trim();
  const password = document.getElementById('new-pass').value;
  const role = document.getElementById('new-role').value;
  const errEl = document.getElementById('add-error');

  if (!name || !email || !password) { errEl.textContent = 'All fields required.'; return; }
  errEl.textContent = '';

  try {
    const r = await fetch('/api/users', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password, role }),
    });
    const d = await r.json();
    if (!r.ok) { errEl.textContent = d.error; return; }
    toast('User created!', 'green');
    document.getElementById('new-name').value = '';
    document.getElementById('new-email').value = '';
    document.getElementById('new-pass').value = '';
    loadUsers();
  } catch(e) { errEl.textContent = e.message; }
}

async function editName(id, currentName) {
  const name = prompt('New name:', currentName);
  if (!name || name === currentName) return;
  try {
    const r = await fetch(`/api/users/${id}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name }),
    });
    if (!r.ok) { const d = await r.json(); alert(d.error); return; }
    toast('Name updated', 'green');
    loadUsers();
  } catch(e) { alert(e.message); }
}

async function resetPassword(id, name) {
  const pw = prompt(`New password for ${name} (min 8 chars):`);
  if (!pw) return;
  if (pw.length < 8) { alert('Password must be at least 8 characters'); return; }
  try {
    const r = await fetch(`/api/users/${id}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw }),
    });
    if (!r.ok) { const d = await r.json(); alert(d.error); return; }
    toast('Password reset', 'green');
  } catch(e) { alert(e.message); }
}

async function changeRole(id, role) {
  try {
    const r = await fetch(`/api/users/${id}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ role }),
    });
    if (!r.ok) { const d = await r.json(); alert(d.error); loadUsers(); return; }
    toast('Role updated', 'green');
  } catch(e) { alert(e.message); }
}

async function toggleActive(id, activate) {
  try {
    await fetch(`/api/users/${id}`, {
      method: 'PATCH', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ is_active: activate }),
    });
    toast(activate ? 'User activated' : 'User deactivated', 'green');
    loadUsers();
  } catch(e) { alert(e.message); }
}

loadUsers();
</script>
</body>
</html>
