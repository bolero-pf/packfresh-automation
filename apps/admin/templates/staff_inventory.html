<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Staff Inventory · Pack Fresh</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/pf-static/pf_theme.css">
<script src="/pf-static/pf_ui.js"></script>
<style>
  body { min-height:100vh; margin:0; font-family:'DM Sans',system-ui,sans-serif; }

  header {
    position:sticky; top:0; z-index:10;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:14px 18px 0;
  }
  .header-top {
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; margin-bottom:12px;
  }
  .header-top h1 {
    margin:0; font-size:1.15rem; font-weight:700;
    display:flex; align-items:center; gap:8px;
  }
  .back-link {
    color:var(--text-dim); text-decoration:none;
    font-size:0.85rem; padding:6px 10px; border-radius:8px;
  }
  .back-link:hover { background:var(--surface); }

  .search-row {
    display:flex; gap:8px; margin-bottom:10px;
  }
  .search-row input {
    flex:1; height:42px; padding:0 14px;
    border:1.5px solid var(--border); border-radius:10px;
    background:var(--surface); color:var(--text);
    font-size:1rem; font-family:inherit;
    outline:none;
  }
  .search-row input:focus { border-color:var(--accent); }
  .clear-btn {
    height:42px; padding:0 12px;
    background:transparent; border:1.5px solid var(--border); border-radius:10px;
    color:var(--text-dim); font-size:0.85rem; cursor:pointer;
  }
  .clear-btn:hover { color:var(--text); border-color:var(--text-dim); }

  .toolbar {
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;
    align-items:center;
  }
  .toolbar select, .toolbar .tb-btn {
    height:36px; padding:0 12px;
    border:1.5px solid var(--border); border-radius:8px;
    background:var(--surface); color:var(--text);
    font-size:0.85rem; font-family:inherit; cursor:pointer;
    outline:none;
  }
  .toolbar select { padding-right:30px; }
  .toolbar .tb-btn:hover { border-color:var(--accent); }
  .toolbar .tb-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .toolbar .tb-btn.danger { color:var(--red,#e25555); }
  .toolbar .tb-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .toolbar .spacer { flex:1; }
  .toolbar .lbl {
    font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--text-dim);
  }

  /* Centered modal for "Save view" / confirmations. */
  .modal-mask {
    position:fixed; inset:0; z-index:50;
    background:rgba(0,0,0,0.55);
    display:none; align-items:center; justify-content:center;
    padding:16px;
  }
  .modal-mask.open { display:flex; }
  .modal-box {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:22px;
    width:100%; max-width:380px;
  }
  .modal-box h3 { margin:0 0 12px; font-size:1.05rem; }
  .modal-box p { margin:0 0 14px; color:var(--text-dim); font-size:0.9rem; }
  .modal-box .mi {
    width:100%; height:42px; padding:0 12px;
    border:1.5px solid var(--border); border-radius:8px;
    background:var(--bg); color:var(--text);
    font-family:inherit; font-size:1rem; outline:none;
    box-sizing:border-box;
  }
  .modal-box .mi:focus { border-color:var(--accent); }
  .modal-box .row { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }
  .modal-box .err { color:var(--red,#e25555); font-size:0.85rem; margin-top:8px; min-height:1.2em; }

  .chip-row {
    display:flex; gap:6px; padding-bottom:10px;
    overflow-x:auto; scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .chip-row.last { padding-bottom:14px; }
  .chip-row::-webkit-scrollbar { display:none; }
  .chip-group-label {
    font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em;
    color:var(--text-dim); padding:4px 0 4px 2px;
  }
  .chip {
    flex-shrink:0;
    background:var(--surface); color:var(--text);
    border:1.5px solid var(--border); border-radius:999px;
    padding:6px 12px; font-size:0.82rem; font-weight:500;
    cursor:pointer; white-space:nowrap;
    transition:background 0.1s, border-color 0.1s, color 0.1s;
    font-family:inherit;
  }
  .chip:hover { border-color:var(--text-dim); }
  .chip.active {
    background:var(--accent); border-color:var(--accent); color:#fff;
  }
  .chip.on-display.active {
    background:var(--green,#34d058); border-color:var(--green,#34d058); color:#0c1411;
  }

  .main {
    max-width:900px; margin:0 auto; padding:14px 14px 60px;
  }

  .status-line {
    color:var(--text-dim); font-size:0.78rem;
    margin:0 4px 10px; display:flex; justify-content:space-between;
    gap:10px; flex-wrap:wrap;
  }

  .list {
    display:flex; flex-direction:column; gap:8px;
  }
  .item {
    display:grid; grid-template-columns:64px 1fr auto;
    gap:12px; align-items:center;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:10px 12px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    transition:border-color 0.1s, background 0.1s;
  }
  .item:hover { border-color:var(--text-dim); }
  .item:active { background:var(--surface-2,#1d2026); }
  .item.on-display {
    border-color:var(--green,#34d058);
    box-shadow:0 0 0 1px var(--green,#34d058) inset;
  }
  .item.toggling { opacity:0.6; }

  .item .thumb {
    width:64px; height:64px; border-radius:8px;
    background:var(--surface-2,#1d2026); overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .item .thumb img { width:100%; height:100%; object-fit:contain; }
  .item .thumb .ph { color:var(--text-dim); font-size:1.4rem; }
  .item .info { min-width:0; }
  .item .name {
    font-weight:600; font-size:0.95rem;
    overflow:hidden; text-overflow:ellipsis;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  }
  .item .meta {
    color:var(--text-dim); font-size:0.75rem;
    margin-top:3px; font-family:'DM Mono',monospace;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .item .right {
    text-align:right; min-width:74px;
    display:flex; flex-direction:column; align-items:flex-end; gap:2px;
  }
  .item .star {
    font-size:1.1rem; line-height:1;
    color:var(--border);
  }
  .item.on-display .star {
    color:var(--green,#34d058);
  }
  .item .price {
    font-weight:700; font-size:1rem;
  }
  .item .qty {
    font-size:0.78rem; color:var(--text-dim);
  }
  .item .qty.oos { color:var(--red,#e25555); font-weight:600; }

  .empty {
    text-align:center; padding:60px 20px; color:var(--text-dim);
  }
  .empty .hint { font-size:0.85rem; margin-top:8px; }
  .empty .btn-link {
    display:inline-block; margin-top:14px;
    padding:8px 14px; border:1.5px solid var(--border); border-radius:8px;
    background:var(--surface); color:var(--text);
    cursor:pointer; font-family:inherit; font-size:0.85rem;
  }
  .empty .btn-link:hover { border-color:var(--accent); }

  .loading {
    text-align:center; padding:40px; color:var(--text-dim);
  }

  @media (min-width:700px) {
    .list { display:grid; grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📋 Staff Inventory</h1>
    <a class="back-link" href="/">← Dashboard</a>
  </div>
  <div class="search-row">
    <input id="q" type="search" placeholder="Search name, SKU, or barcode…"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()" style="display:none;">Clear</button>
  </div>
  <div class="toolbar">
    <select id="view-picker" title="Saved views">
      <option value="">— Saved views —</option>
    </select>
    <button class="tb-btn" id="save-view-btn" onclick="openSaveView()">Save view</button>
    <button class="tb-btn danger" id="delete-view-btn" onclick="deleteCurrentView()" style="display:none;">Delete</button>
    <span class="spacer"></span>
    <select id="sort-picker" title="Sort order">
      <option value="set">Set, then name</option>
      <option value="name">Name</option>
      <option value="price_desc">Price: high → low</option>
      <option value="price_asc">Price: low → high</option>
      <option value="qty_desc">Most in stock</option>
    </select>
    <button class="tb-btn primary" onclick="openPrint()">🖨 Print</button>
  </div>
  <div class="chip-group-label">Showing</div>
  <div class="chip-row" id="state-chips"></div>
  <div class="chip-group-label">Type</div>
  <div class="chip-row" id="type-chips"></div>
  <div class="chip-group-label">Era</div>
  <div class="chip-row last" id="set-chips"></div>
</header>

<div class="main">
  <div class="status-line">
    <span id="status">Loading…</span>
    <span id="oos-note"></span>
  </div>
  <div id="list" class="list"></div>
</div>

<div class="modal-mask" id="save-view-modal">
  <div class="modal-box">
    <h3>Save view</h3>
    <p>Names this filter combo + sort so you can print or recall it later.</p>
    <input class="mi" id="view-name" placeholder="e.g. Booster Boxes on Display" maxlength="200">
    <label style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:0.88rem;cursor:pointer;">
      <input type="checkbox" id="view-show-price" checked>
      Show prices on printout
    </label>
    <div class="err" id="view-err"></div>
    <div class="row">
      <button class="tb-btn" onclick="closeSaveView()">Cancel</button>
      <button class="tb-btn primary" onclick="submitSaveView()">Save</button>
    </div>
  </div>
</div>

<script>
const state = {
  q: "",
  types: new Set(),
  sets: new Set(),
  // Default working view per spec: "On Display" filter on at page load.
  onDisplay: true,
  // Default: in-stock only. Explicit text search overrides this server-side
  // so OOS items still surface when you're hunting for a specific name.
  inStock: true,
  sort: "set",
  currentViewId: null,
};

let facets = { types: [], sets: [] };
let savedViews = [];
let searchTimer = null;

function esc(s) {
  return String(s ?? "").replace(/[&<>"]/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"
  }[c]));
}

function fmtPrice(p) {
  if (p === null || p === undefined) return "—";
  return "$" + Number(p).toFixed(2);
}

async function loadFacets() {
  const r = await fetch("/api/staff-inventory/facets", { credentials: "include" });
  if (!r.ok) return;
  facets = await r.json();
  renderChips();
}

function renderChips() {
  const stateRow = document.getElementById("state-chips");
  stateRow.innerHTML =
    `<button class="chip on-display ${state.onDisplay ? "active" : ""}" data-kind="on-display">📍 On Display</button>`;
  stateRow.querySelector(".chip").addEventListener("click", () => {
    state.onDisplay = !state.onDisplay;
    detachFromView();
    renderChips();
    load();
  });

  const typeRow = document.getElementById("type-chips");
  typeRow.innerHTML = (facets.types || []).map(t =>
    chipHtml(t.value, t.label || t.value, state.types.has(t.value))
  ).join("");
  typeRow.querySelectorAll(".chip").forEach(c =>
    c.addEventListener("click", () => toggleChip("types", c.dataset.value)));

  const setRow = document.getElementById("set-chips");
  setRow.innerHTML = (facets.sets || []).map(s =>
    chipHtml(s.value, s.value, state.sets.has(s.value))
  ).join("");
  setRow.querySelectorAll(".chip").forEach(c =>
    c.addEventListener("click", () => toggleChip("sets", c.dataset.value)));
}

function chipHtml(value, label, active) {
  return `<button class="chip ${active ? "active" : ""}" data-value="${esc(value)}">${esc(label)}</button>`;
}

function toggleChip(setName, value) {
  const s = state[setName];
  if (s.has(value)) s.delete(value);
  else s.add(value);
  detachFromView();
  renderChips();
  load();
}

function detachFromView() {
  // Any user-initiated filter change means we're no longer "viewing" the
  // saved view they picked — clear the picker selection + hide Delete.
  state.currentViewId = null;
  document.getElementById("view-picker").value = "";
  document.getElementById("delete-view-btn").style.display = "none";
}

function clearSearch() {
  state.q = "";
  document.getElementById("q").value = "";
  document.getElementById("clear-btn").style.display = "none";
  load();
}

function buildFilterParams() {
  const params = new URLSearchParams();
  if (state.q) params.set("q", state.q);
  for (const t of state.types) params.append("type", t);
  for (const s of state.sets) params.append("set", s);
  if (state.onDisplay) params.set("on_display", "1");
  if (!state.inStock) params.set("in_stock", "0");
  if (state.sort) params.set("sort", state.sort);
  return params;
}

async function load() {
  const params = buildFilterParams();

  const list = document.getElementById("list");
  list.innerHTML = `<div class="loading">Loading…</div>`;

  const r = await fetch("/api/staff-inventory/items?" + params.toString(), { credentials: "include" });
  if (!r.ok) {
    list.innerHTML = `<div class="empty">Failed to load (${r.status}).</div>`;
    return;
  }
  const data = await r.json();
  render(data);
}

function render(data) {
  const list = document.getElementById("list");
  const status = document.getElementById("status");
  const oosNote = document.getElementById("oos-note");

  if (!data.items.length) {
    if (state.onDisplay && !state.q && !state.types.size && !state.sets.size) {
      // First-run / empty-display state — explain how to populate it.
      list.innerHTML = `<div class="empty">
        Nothing on display yet.
        <div class="hint">Turn off the On Display filter, then tap an item to flag it.</div>
        <button class="btn-link" onclick="turnOffDisplayFilter()">Show all in-stock</button>
      </div>`;
    } else {
      list.innerHTML = `<div class="empty">
        No matches.
        <div class="hint">${state.q ? "Try a different search term." : "Try removing some filters."}</div>
      </div>`;
    }
    status.textContent = "0 items";
    oosNote.textContent = "";
    return;
  }

  status.textContent = `${data.items.length}${data.truncated ? "+" : ""} item${data.items.length === 1 ? "" : "s"}`;
  oosNote.textContent = state.q ? "Showing in-stock + out-of-stock" : "In-stock only";

  list.innerHTML = data.items.map(itemHtml).join("");
  list.querySelectorAll(".item").forEach(el =>
    el.addEventListener("click", () => toggleDisplay(el)));
}

function itemHtml(it) {
  const img = it.image_url
    ? `<img src="${esc(it.image_url)}" alt="" loading="lazy">`
    : `<div class="ph">—</div>`;
  const oos = !it.qty;
  const qtyHtml = oos
    ? `<div class="qty oos">OOS</div>`
    : `<div class="qty">${it.qty} in stock</div>`;
  const metaBits = [it.barcode || it.sku].filter(Boolean);
  const onDisplayClass = it.on_display ? " on-display" : "";
  const star = it.on_display ? "★" : "☆";
  return `
    <div class="item${onDisplayClass}" data-variant-id="${esc(it.shopify_variant_id)}">
      <div class="thumb">${img}</div>
      <div class="info">
        <div class="name">${esc(it.title || "(untitled)")}</div>
        <div class="meta">${esc(metaBits.join(" · "))}</div>
      </div>
      <div class="right">
        <span class="star" aria-label="${it.on_display ? "On display" : "Tap to put on display"}">${star}</span>
        <div class="price">${fmtPrice(it.price)}</div>
        ${qtyHtml}
      </div>
    </div>
  `;
}

async function toggleDisplay(el) {
  if (el.classList.contains("toggling")) return;
  const variantId = el.dataset.variantId;
  const wasOn = el.classList.contains("on-display");

  // Optimistic flip. Reverted if the API rejects.
  el.classList.add("toggling");
  el.classList.toggle("on-display", !wasOn);
  const star = el.querySelector(".star");
  if (star) star.textContent = wasOn ? "☆" : "★";

  try {
    const r = await fetch("/api/staff-inventory/toggle-display", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      credentials: "include",
      body: JSON.stringify({shopify_variant_id: variantId}),
    });
    if (!r.ok) throw new Error("toggle failed: " + r.status);
    const data = await r.json();
    // Sync to server truth in case of contention.
    el.classList.toggle("on-display", !!data.on_display);
    if (star) star.textContent = data.on_display ? "★" : "☆";
  } catch (e) {
    // Revert optimistic flip.
    el.classList.toggle("on-display", wasOn);
    if (star) star.textContent = wasOn ? "★" : "☆";
    if (window.toast) window.toast("Couldn't update — try again");
    else alert("Couldn't update — try again");
  } finally {
    el.classList.remove("toggling");
  }
}

function turnOffDisplayFilter() {
  state.onDisplay = false;
  renderChips();
  load();
}

document.getElementById("q").addEventListener("input", e => {
  state.q = e.target.value.trim();
  document.getElementById("clear-btn").style.display = state.q ? "" : "none";
  detachFromView();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(load, 200);
});

// ─── Saved views ────────────────────────────────────────────────────────────
async function loadSavedViews() {
  const r = await fetch("/api/staff-inventory/views", { credentials: "include" });
  if (!r.ok) return;
  const data = await r.json();
  savedViews = data.views || [];
  renderViewPicker();
}

function renderViewPicker() {
  const sel = document.getElementById("view-picker");
  const current = sel.value;
  sel.innerHTML = `<option value="">— Saved views —</option>` +
    savedViews.map(v => `<option value="${v.id}">${esc(v.name)}</option>`).join("");
  if (current && savedViews.some(v => String(v.id) === current)) {
    sel.value = current;
  }
}

function applyView(view) {
  state.currentViewId = view.id;
  state.q = view.filters.q || "";
  state.types = new Set(view.filters.types || []);
  state.sets = new Set(view.filters.sets || []);
  state.onDisplay = !!view.filters.on_display;
  state.inStock = view.filters.in_stock !== false;
  state.sort = view.sort || "set";

  document.getElementById("q").value = state.q;
  document.getElementById("clear-btn").style.display = state.q ? "" : "none";
  document.getElementById("sort-picker").value = state.sort;
  document.getElementById("delete-view-btn").style.display = "";
  renderChips();
  load();
}

document.getElementById("view-picker").addEventListener("change", e => {
  const id = e.target.value;
  if (!id) {
    state.currentViewId = null;
    document.getElementById("delete-view-btn").style.display = "none";
    return;
  }
  const view = savedViews.find(v => String(v.id) === id);
  if (view) applyView(view);
});

document.getElementById("sort-picker").addEventListener("change", e => {
  state.sort = e.target.value;
  detachFromView();
  load();
});

function currentFiltersPayload() {
  return {
    q: state.q,
    types: [...state.types],
    sets: [...state.sets],
    on_display: state.onDisplay,
    in_stock: state.inStock,
  };
}

function openSaveView() {
  document.getElementById("view-err").textContent = "";
  document.getElementById("view-name").value = "";
  document.getElementById("view-show-price").checked = true;
  document.getElementById("save-view-modal").classList.add("open");
  setTimeout(() => document.getElementById("view-name").focus(), 30);
}
function closeSaveView() {
  document.getElementById("save-view-modal").classList.remove("open");
}
async function submitSaveView() {
  const name = document.getElementById("view-name").value.trim();
  const err = document.getElementById("view-err");
  err.textContent = "";
  if (!name) { err.textContent = "Name is required."; return; }
  const showPrice = document.getElementById("view-show-price").checked;
  const r = await fetch("/api/staff-inventory/views", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    credentials: "include",
    body: JSON.stringify({
      name,
      filters: currentFiltersPayload(),
      sort: state.sort,
      show_price: showPrice,
    }),
  });
  if (!r.ok) {
    const data = await r.json().catch(() => ({}));
    err.textContent = data.error || `Failed (${r.status}).`;
    return;
  }
  const data = await r.json();
  closeSaveView();
  await loadSavedViews();
  document.getElementById("view-picker").value = String(data.view.id);
  state.currentViewId = data.view.id;
  document.getElementById("delete-view-btn").style.display = "";
}
document.getElementById("view-name").addEventListener("keydown", e => {
  if (e.key === "Enter") submitSaveView();
  if (e.key === "Escape") closeSaveView();
});
document.getElementById("save-view-modal").addEventListener("click", e => {
  if (e.target.id === "save-view-modal") closeSaveView();
});

async function deleteCurrentView() {
  if (!state.currentViewId) return;
  const view = savedViews.find(v => v.id === state.currentViewId);
  if (!view) return;
  const ok = confirm(`Delete saved view "${view.name}"?`);
  if (!ok) return;
  const r = await fetch(`/api/staff-inventory/views/${view.id}`, {
    method: "DELETE", credentials: "include",
  });
  if (!r.ok) {
    alert("Failed to delete.");
    return;
  }
  state.currentViewId = null;
  document.getElementById("delete-view-btn").style.display = "none";
  await loadSavedViews();
  document.getElementById("view-picker").value = "";
}

function openPrint() {
  // Prefer the saved view if one's loaded, otherwise pass current filters
  // directly. New tab so the main page state isn't disturbed.
  let url;
  if (state.currentViewId) {
    url = `/staff-inventory/print?view=${state.currentViewId}`;
  } else {
    const params = buildFilterParams();
    params.set("title", printableTitle());
    url = "/staff-inventory/print?" + params.toString();
  }
  window.open(url, "_blank");
}

function printableTitle() {
  const bits = [];
  if (state.onDisplay) bits.push("On Display");
  for (const t of state.types) {
    const chip = (facets.types || []).find(x => x.value === t);
    if (chip) bits.push(chip.label);
  }
  for (const s of state.sets) bits.push(s);
  if (state.q) bits.push(`"${state.q}"`);
  return bits.length ? bits.join(" · ") : "Staff Inventory";
}

document.getElementById("sort-picker").value = state.sort;

loadFacets().then(loadSavedViews).then(load);
</script>
</body>
</html>
