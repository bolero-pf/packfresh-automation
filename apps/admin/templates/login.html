<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pack Fresh — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/pf-static/pf_theme.css">
<style>
body { min-height:100vh; display:flex; align-items:center; justify-content:center; }
.card { border-radius:16px; padding:40px; width:360px; max-width:90vw; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:0.06em; color:var(--accent); text-align:center; margin-bottom:4px; }
.logo-sub { text-align:center; font-size:0.75rem; color:var(--text-dim); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:32px; }
.form-group { margin-bottom:16px; }
.form-input { width:100%; height:48px; border-width:1.5px; border-radius:10px; padding:0 16px; font-size:1rem; }
.btn { width:100%; height:48px; border-radius:10px; font-size:1rem; }
.error { background:var(--red-bg); border:1px solid rgba(252,92,92,0.3); border-radius:8px; padding:10px 14px; font-size:0.85rem; color:var(--red); margin-bottom:16px; display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Pack Fresh</div>
  <div class="logo-sub">Staff Login</div>
  <div class="error" id="error"></div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" id="email" type="email" autocomplete="email" autofocus>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" id="password" type="password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
</div>

<script>
const nextUrl = "{{ next_url }}";

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error');
  const btn = document.getElementById('login-btn');

  if (!email || !password) {
    errEl.textContent = 'Enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.style.display = 'none';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password }),
    });
    const d = await r.json();
    if (!r.ok) {
      errEl.textContent = d.error || 'Login failed.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    window.location.href = nextUrl || '/';
  } catch(e) {
    errEl.textContent = 'Network error. Try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
