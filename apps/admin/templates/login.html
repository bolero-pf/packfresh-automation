<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pack Fresh — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#0a0c10; --surface:#141720; --border:#2a2f42; --accent:#4f7df9; --green:#34d058; --red:#fc5c5c; --text:#e8eaf0; --dim:#6b7280; }
* { box-sizing:border-box; margin:0; padding:0; }
body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; display:flex; align-items:center; justify-content:center; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:360px; max-width:90vw; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:0.06em; color:var(--accent); text-align:center; margin-bottom:4px; }
.logo-sub { text-align:center; font-size:0.75rem; color:var(--dim); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:32px; }
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:0.75rem; color:var(--dim); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
.form-input { width:100%; height:48px; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; color:var(--text); padding:0 16px; font-size:1rem; font-family:inherit; outline:none; transition:border-color 0.2s; }
.form-input:focus { border-color:var(--accent); }
.btn { width:100%; height:48px; border:none; border-radius:10px; font-family:inherit; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
.btn:active { opacity:0.85; }
.btn-primary { background:var(--accent); color:#fff; }
.error { background:rgba(252,92,92,0.1); border:1px solid rgba(252,92,92,0.3); border-radius:8px; padding:10px 14px; font-size:0.85rem; color:var(--red); margin-bottom:16px; display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Pack Fresh</div>
  <div class="logo-sub">Staff Login</div>
  <div class="error" id="error"></div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input class="form-input" id="email" type="email" autocomplete="email" autofocus>
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input class="form-input" id="password" type="password" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
</div>

<script>
const nextUrl = "{{ next_url }}";

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error');
  const btn = document.getElementById('login-btn');

  if (!email || !password) {
    errEl.textContent = 'Enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.style.display = 'none';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password }),
    });
    const d = await r.json();
    if (!r.ok) {
      errEl.textContent = d.error || 'Login failed.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    window.location.href = nextUrl || '/';
  } catch(e) {
    errEl.textContent = 'Network error. Try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
